services:
  ollama:
    image: ollama/ollama:latest
    container_name: alpha-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 0"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 45s

  backend:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: alpha-ai-backend
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_started
    ports:
      - "3003:3003"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3003
      OLLAMA_URL: http://ollama:11434
      MODEL_NAME: ${MODEL_NAME:-llama3.1}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3003/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 180s

volumes:
  ollama_data:
