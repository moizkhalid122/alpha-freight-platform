    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script>
        (function initFirebase(){
            var firebaseConfig = {
              apiKey: "AIzaSyBdn4T4IpwX_nN2pkhHaBI9yqyZ3faAF6o",
              authDomain: "alpha-brokerage.firebaseapp.com",
              databaseURL: "https://alpha-brokerage-default-rtdb.firebaseio.com",
              projectId: "alpha-brokerage",
              storageBucket: "alpha-brokerage.firebasestorage.app",
              messagingSenderId: "834712514965",
              appId: "1:834712514965:web:5dbe0aa2e4eab3cb16c69c"
            };
            if (typeof firebase !== 'undefined' && !firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
        })();

        var db = (typeof firebase !== 'undefined' && firebase.database) ? firebase.database() : null;

        // Check if user is already logged in
        document.addEventListener('DOMContentLoaded', function() {
            const auth = JSON.parse(localStorage.getItem('carrierAuth') || '{}');
            if (auth && auth.isLoggedIn) {
                if (typeof AlphaBrokrage !== 'undefined') {
                    AlphaBrokrage.showAlert('info', 'You are already logged in!');
                } else {
                    alert('You are already logged in!');
                }
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }
        });

        function finishLogin(matched, rememberMe) {
            const authData = {
                email: matched.email,
                firstName: matched.firstName,
                lastName: matched.lastName,
                companyName: matched.companyName,
                phone: matched.phone,
                carrierId: matched.carrierId || matched.id || '',
                country: matched.country,
                isLoggedIn: true,
                loginTime: new Date().toISOString(),
                rememberMe: rememberMe
            };
            localStorage.setItem('carrierAuth', JSON.stringify(authData));
            try {
                localStorage.setItem('ab.portal.lastRole', 'carrier');
            } catch (err) {}

            if (typeof AlphaBrokrage !== 'undefined' && typeof AlphaBrokrage.showAlert === 'function') {
                AlphaBrokrage.showAlert('success', 'Welcome back! Redirecting to dashboard...');
            } else {
                alert('Welcome back! Redirecting to dashboard...');
            }

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        }

        // Google Sign-In for Login page
        function signInWithGoogleLogin() {
            if (typeof google === 'undefined' || !google.accounts || !google.accounts.oauth2) {
                alert('Google Sign-In is not available. Please try again later.');
                return;
            }

            const CLIENT_ID = '834712514965-j9od0ea97k00nvkg92214eas912n8n5v.apps.googleusercontent.com';

            const tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'email profile openid',
                callback: (response) => {
                    if (response && response.access_token) {
                        fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
                            headers: {
                                'Authorization': `Bearer ${response.access_token}`
                            }
                        })
                        .then(res => res.json())
                        .then(user => {
                            handleGoogleLoginUser(user);
                        })
                        .catch(err => {
                            console.error('Google userinfo error:', err);
                            alert('Google sign-in failed. Please try again.');
                        });
                    }
                }
            });

            tokenClient.requestAccessToken();
        }

        function handleGoogleLoginUser(user) {
            const emailRaw = (user && user.email) ? user.email : '';
            const normalizedEmail = emailRaw.trim().toLowerCase();

            if (!normalizedEmail) {
                alert('Google did not return an email address. Please try a different account.');
                return;
            }

            // Try to find existing carrier in Firebase by email (same as normal login, but without password)
            if (!db) {
                alert('Login service unavailable. Please try again later.');
                return;
            }

            db.ref('carriers').orderByChild('email').equalTo(normalizedEmail).once('value', function(snapshot) {
                let matched = null;

                if (snapshot && snapshot.exists()) {
                    snapshot.forEach(function(child) {
                        const carrier = child.val() || {};
                        const carrierEmail = (carrier.email || '').trim().toLowerCase();
                        if (!carrier.carrierId) {
                            carrier.carrierId = child.key;
                        }
                        if (carrierEmail === normalizedEmail && !matched) {
                            matched = carrier;
                        }
                    });
                }

                if (matched) {
                    // Reuse same finishLogin helper so dashboard works the same way
                    finishLogin(matched, true);
                } else {
                    // No existing carrier for this email
                    if (confirm('No carrier account found for this Google email. Would you like to create a new account?')) {
                        // Store pending Google user so register page can prefill
                        try {
                            localStorage.setItem('pendingGoogleUser', JSON.stringify({
                                email: normalizedEmail,
                                firstName: user.given_name || '',
                                lastName: user.family_name || '',
                                fullName: user.name || ''
                            }));
                        } catch (e) {}
                        window.location.href = 'register.html';
                    }
                }
            }, function(error) {
                console.error('Google login Firebase error:', error);
                alert('Login failed. Please try again.');
            });
        }

        // Form submission
        document.getElementById('carrierLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            // Show loading state
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Signing In...</span>';
            submitBtn.disabled = true;

            if (!email || !password) {
                if (typeof AlphaBrokrage !== 'undefined') {
                    AlphaBrokrage.showAlert('error', 'Please enter both email and password!');
                } else {
                    alert('Please enter both email and password!');
                }
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                return;
            }

            function handleFailure(message) {
                if (typeof AlphaBrokrage !== 'undefined') {
                    AlphaBrokrage.showAlert('error', message || 'Invalid email or password! Please register first.');
                } else {
                    alert(message || 'Invalid email or password! Please register first.');
                }
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }

            if (db) {
                // Normalize email - lowercase and trim
                const normalizedEmail = email.trim().toLowerCase();
                console.log('🔐 Login attempt - Original Email:', email);
                console.log('🔐 Login attempt - Normalized Email:', normalizedEmail);
                console.log('🔐 Login attempt - Password entered:', password);
                
                db.ref('carriers').orderByChild('email').equalTo(normalizedEmail).once('value', function(snapshot) {
                    let matched = null;
                    let userCount = 0;
                    
                    if (snapshot && snapshot.exists()) {
                        snapshot.forEach(function(child) {
                            userCount++;
                            const carrier = child.val() || {};
                            const carrierEmail = (carrier.email || '').trim().toLowerCase();
                            
                            if (!carrier.carrierId) {
                                carrier.carrierId = child.key;
                            }
                            
                            console.log('📋 User found in database:', {
                                key: child.key,
                                email: carrierEmail,
                                matches: carrierEmail === normalizedEmail
                            });
                            
                            // Only check password if email exactly matches
                            if (carrierEmail === normalizedEmail) {
                                console.log('🔑 Password in database:', carrier.password);
                                console.log('🔑 Password entered:', password);
                                console.log('✅ Password match:', carrier.password === password);
                                
                                // Strict password check - must match exactly
                                if (carrier.password && carrier.password === password) {
                                    matched = carrier;
                                    console.log('✅ Login successful - Password matched!');
                                } else {
                                    console.log('❌ Login failed - Password mismatch');
                                }
                            } else {
                                console.log('⚠️ Email mismatch - skipping this user');
                            }
                        });
                        
                        if (userCount > 1) {
                            console.warn('⚠️ Multiple users found with same email:', userCount);
                        }
                    } else {
                        console.log('❌ User not found in database with email:', normalizedEmail);
                    }

                    if (matched) {
                        finishLogin(matched, rememberMe);
                    } else {
                        // No fallback - password must match in Firebase database
                        console.log('❌ Login rejected - Invalid credentials');
                        handleFailure('Invalid email or password. Please check your credentials.');
                    }
                }, function(error) {
                    console.error('Login error:', error);
                    handleFailure('Login failed. Please try again.');
                });
            } else {
                handleFailure('Login service unavailable. Please try again later.');
            }
        });
    </script>
