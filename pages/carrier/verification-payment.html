<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Subscription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #3730A3;
            --bg-main: #F3F4F6;
            --card-bg: rgba(255,255,255,0.9);
            --border: rgba(148,163,184,0.35);
            --text-main: #0F172A;
            --text-muted: #64748B;
            --primary-gradient: linear-gradient(135deg, #4F46E5 0%, #6366F1 50%, #22D3EE 100%);
            --card-shadow: 0 12px 30px rgba(15,23,42,0.12), 0 4px 12px rgba(15,23,42,0.06);
            --hover-shadow: 0 20px 40px rgba(15,23,42,0.18), 0 8px 16px rgba(15,23,42,0.10);
        }
        body {
            background:
                radial-gradient(1200px 600px at -10% -20%, rgba(99,102,241,0.08), transparent 60%),
                radial-gradient(1200px 600px at 110% -10%, rgba(20,184,166,0.08), transparent 60%),
                var(--bg-main);
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
        }
        .wrap { max-width: 900px; margin: 24px auto; padding: 0 16px; }
        .card-shell {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(8px);
        }
        .title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1.15rem;
        }
        .plan-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.8);
            box-shadow: var(--card-shadow);
            font-size: 0.8rem;
        }
        .content { padding: 20px; }
        .pay-box {
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            background: rgba(248,250,252,0.8);
        }
        .form-label { font-weight: 600; color: var(--text-main); }
        .btn-pay {
            width: 100%;
            padding: 0.9rem 1rem;
            border: none;
            border-radius: 10px;
            background: var(--primary-gradient);
            color: #fff;
            font-weight: 700;
            box-shadow: 0 8px 22px rgba(79,70,229,0.35);
        }
        .btn-pay:disabled { opacity: 0.6; }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.9rem;
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card-shell">
            <div class="header">
                <div class="title">
                    <i class="fas fa-credit-card"></i>
                    <span>Complete Subscription</span>
                </div>
                <div class="plan-chip">
                    <i class="fas fa-shield-check"></i>
                    <span id="planName">Plan</span>
                    <span>•</span>
                    <span id="planPrice">£0/mo</span>
                </div>
            </div>
            <div class="content">
                <div class="pay-box">
                    <form id="paymentForm">
                        <div class="mb-3">
                            <label class="form-label" for="cardholder-name">Cardholder Name</label>
                            <input type="text" class="form-control" id="cardholder-name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Card Details</label>
                            <div id="card-element" style="padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: #fff;"></div>
                        </div>
                        <button type="submit" class="btn-pay" id="payBtn">
                            <span id="payText">Pay</span>
                            <span class="spinner-border spinner-border-sm ms-2 d-none" id="paySpinner"></span>
                        </button>
                    </form>
                </div>
            </div>
            <div class="footer">
                <div>Secure checkout • Stripe</div>
                <div>Powered by Alpha Freight</div>
            </div>
        </div>
    </div>

    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const plan = (params.get('plan') || 'basic').toLowerCase();
        const amount = parseFloat(params.get('amount') || '19');
        const planNames = { basic: 'Basic', pro: 'Pro', enterprise: 'Enterprise' };

        document.getElementById('planName').textContent = planNames[plan] || 'Plan';
        document.getElementById('planPrice').textContent = '£' + amount + '/mo';
        document.getElementById('payText').textContent = 'Pay £' + amount + '/month';

        const firebaseConfig = {
            apiKey: "AIzaSyBdn4T4IpwX_nN2pkhHaBI9yqyZ3faAF6o",
            authDomain: "alpha-brokerage.firebaseapp.com",
            databaseURL: "https://alpha-brokerage-default-rtdb.firebaseio.com",
            projectId: "alpha-brokerage",
            storageBucket: "alpha-brokerage.firebasestorage.app",
            messagingSenderId: "834712514965",
            appId: "1:834712514965:web:5dbe0aa2e4eab3cb16c69c"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }

        const STRIPE_PUBLISHABLE_KEY = 'pk_live_51Snef8JwsGcenL627huErNXtqNGF92AGxEgXTWOa5WSDNmCS0r7VfdLv9XihRl7xZ0cJVEzRxRQaQUsaHkd3La9g00LKykDcYb';
        const CLOUD_BACKEND_URL = 'https://alpha-freight-server.onrender.com';
        const STRIPE_BACKEND_ENDPOINT = CLOUD_BACKEND_URL + '/api/create-payment-intent';
        const stripe = Stripe(STRIPE_PUBLISHABLE_KEY);

        function getCarrierAuth() {
            try { const a = localStorage.getItem('carrierAuth'); return a ? JSON.parse(a) : null; } catch(e){ return null; }
        }

        let clientSecret = null;
        let cardElement = null;

        async function initPayment() {
            const auth = getCarrierAuth() || {};
            const res = await fetch(STRIPE_BACKEND_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    amount: Math.round(amount * 100),
                    currency: 'gbp',
                    paymentFor: 'verification_subscription',
                    paymentType: plan,
                    carrierId: auth.carrierId || auth.id || 'unknown'
                })
            });
            const data = await res.json();
            if (data.error || !data.clientSecret) { alert('Payment init failed'); return; }
            clientSecret = data.clientSecret;

            const elements = stripe.elements();
            cardElement = elements.create('card', {
                style: { base: { fontSize: '16px', color: '#0F172A' } }
            });
            cardElement.mount('#card-element');
        }

        async function saveSubscription(paymentIntentId) {
            const auth = getCarrierAuth() || {};
            const db = firebase.database();
            const now = new Date();
            const next = new Date(now); next.setMonth(next.getMonth() + 1);
            const verificationData = {
                plan: plan,
                status: 'active',
                amount: amount,
                currency: 'GBP',
                billingCycle: 'monthly',
                startDate: now.toISOString(),
                nextBillingDate: next.toISOString(),
                paymentIntentId: paymentIntentId,
                createdAt: now.toISOString()
            };
            await db.ref('carriers/' + (auth.carrierId || auth.id || 'unknown') + '/verification').set(verificationData);
        }

        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('payBtn');
            const sp = document.getElementById('paySpinner');
            btn.disabled = true; sp.classList.remove('d-none');
            try {
                const { error, paymentIntent } = await stripe.confirmCardPayment(clientSecret, {
                    payment_method: {
                        card: cardElement,
                        billing_details: { name: document.getElementById('cardholder-name').value }
                    }
                });
                if (error) { throw new Error(error.message); }
                if (paymentIntent && paymentIntent.status === 'succeeded') {
                    await saveSubscription(paymentIntent.id);
                    alert('Subscription activated successfully!');
                    window.location.href = 'verification.html';
                } else {
                    alert('Payment not completed. Please try again.');
                }
            } catch (err) {
                alert('Payment failed: ' + err.message);
                btn.disabled = false; sp.classList.add('d-none');
            }
        });

        initPayment();
    </script>
</body>
</html>
