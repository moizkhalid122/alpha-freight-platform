<!DOCTYPE html>
<html lang="en-GB">
<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <title>My Courses | Alpha Freight Academy</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../../image-removebg-preview - 2026-03-04T141043.516.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --secondary: #0f172a;
            --accent: #10b981;
            --bg-main: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            --card-shadow-hover: 0 25px 50px -12px rgba(99, 102, 241, 0.25);
            --sidebar-width: 280px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        html, body {
            overflow-x: hidden;
            width: 100%;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
        }

        /* 3D Animated Background */
        .bg-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #f1f5f9 0%, #e2e8f0 100%);
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--primary);
            filter: blur(80px);
            opacity: 0.15;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        .blob-1 { top: -10%; left: -10%; background: #6366f1; }
        .blob-2 { bottom: -10%; right: -10%; background: #10b981; animation-delay: -5s; }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { transform: translate(100px, 50px) scale(1.2) rotate(360deg); }
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--glass-border);
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 3rem;
        }

        .logo i { color: var(--primary); }

        .nav-menu {
            list-style: none;
            flex-grow: 1;
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 15px -3px var(--primary-glow);
        }

        .nav-link i { font-size: 1.1rem; }

        .logout-btn {
            margin-top: auto;
            color: #ef4444;
            border: 1px solid #fee2e2;
            background: #fef2f2;
        }

        .logout-btn:hover {
            background: #ef4444;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.3);
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 2rem 3rem;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .page-title h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--secondary);
        }

        .page-title p {
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Course Filters */
        .course-filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border-radius: 100px;
            background: white;
            border: 1px solid #f1f5f9;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 10px 15px -3px var(--primary-glow);
        }

        /* Courses Grid */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .course-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #f1f5f9;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .course-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--card-shadow-hover);
        }

        .course-thumb {
            height: 180px;
            position: relative;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 4rem;
        }

        .course-badge {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            color: var(--primary);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .course-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .course-content h3 {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 0.75rem;
        }

        .course-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .course-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .progress-section {
            margin-top: auto;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 10px;
            background: #f1f5f9;
            border-radius: 100px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 100px;
            transition: width 1s ease;
        }

        .course-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .course-btn:hover {
            background: var(--primary-dark);
            box-shadow: 0 10px 15px -3px var(--primary-glow);
        }

        .course-btn.completed {
            background: var(--accent);
        }

        /* Responsive */
        @media (max-width: 992px) {
            body { display: block; }
            .sidebar { 
                left: -100%; 
                z-index: 2000;
                position: fixed;
            }
            .sidebar.active { left: 0; }
            .main-content { margin-left: 0; padding: 1rem; width: 100%; }
            
            .mobile-header {
                display: flex !important;
                justify-content: space-between;
                align-items: center;
                background: white;
                padding: 1rem;
                position: sticky;
                top: 0;
                z-index: 1000;
                border-bottom: 1px solid var(--glass-border);
            }

            header { display: none; }
        }

        .mobile-header { display: none; }

        .menu-toggle {
            width: 40px;
            height: 40px;
            background: var(--bg-main);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1500;
            display: none;
        }

        .sidebar-overlay.active { display: block; }

    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Mobile Header -->
    <div class="mobile-header">
        <a href="academy.html" class="logo" style="margin-bottom: 0;">
            <i class="fas fa-graduation-cap"></i>
            <span>Alpha Academy</span>
        </a>
        <div class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
        </div>
    </div>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="academy.html" class="logo">
            <i class="fas fa-graduation-cap"></i>
            <span>Alpha Academy</span>
        </a>
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="academy-dashboard.html" class="nav-link">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="my-courses.html" class="nav-link active">
                    <i class="fas fa-book-open"></i>
                    <span>My Courses</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="academy.html" class="nav-link">
                    <i class="fas fa-search"></i>
                    <span>Browse Courses</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="certificate.html" class="nav-link">
                    <i class="fas fa-certificate"></i>
                    <span>Certificates</span>
                </a>
            </li>
        </ul>
        <a href="#" class="nav-link logout-btn">
            <i class="fas fa-sign-out-alt"></i>
            <span>Logout</span>
        </a>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header>
            <div class="page-title">
                <h1>My Learning Journey</h1>
                <p>Track your progress and continue your certifications.</p>
            </div>
            <div class="header-actions" style="display: flex; gap: 1rem; align-items: center;">
                <div class="user-profile" style="background: white; padding: 8px 16px; border-radius: 100px; border: 1px solid #f1f5f9; display: flex; align-items: center; gap: 10px;">
                    <img src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" style="width: 30px; height: 30px; border-radius: 50%;">
                    <span style="font-weight: 700; font-size: 0.9rem;">Student</span>
                </div>
            </div>
        </header>

        <!-- Filters -->
        <div class="course-filters">
            <button class="filter-btn active">All Courses</button>
            <button class="filter-btn">In Progress</button>
            <button class="filter-btn">Completed</button>
            <button class="filter-btn">Wishlist</button>
        </div>

        <!-- Courses Grid -->
        <div class="courses-grid" id="coursesGrid">
            <div class="loading-state" style="padding: 3rem; text-align: center; color: var(--text-muted); width: 100%; grid-column: 1 / -1;">
                <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 1rem; display: block;"></i>
                <p>Loading your courses...</p>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        AOS.init({ duration: 800, once: true });

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBdn4T4IpwX_nN2pkhHaBI9yqyZ3faAF6o",
            authDomain: "alpha-brokerage.firebaseapp.com",
            projectId: "alpha-brokerage",
            storageBucket: "alpha-brokerage.firebasestorage.app",
            messagingSenderId: "834712514965",
            appId: "1:834712514965:web:5dbe0aa2e4eab3cb16c69c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // User is signed in
                if (user.photoURL) {
                    document.querySelector('.user-profile img').src = user.photoURL;
                }
                document.querySelector('.user-profile span').textContent = user.displayName || 'Student';

                // Fetch real courses
                renderEnrolledCourses(user.uid);
            } else {
                window.location.href = 'signin.html';
            }
        });

        async function renderEnrolledCourses(uid) {
            const grid = document.getElementById('coursesGrid');
            try {
                const q = query(collection(db, "enrolled_courses"), where("uid", "==", uid));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    grid.innerHTML = `
                        <div class="empty-state" style="padding: 5rem 2rem; text-align: center; color: var(--text-muted); width: 100%; grid-column: 1 / -1; background: white; border-radius: 24px; border: 1px solid #f1f5f9;">
                            <i class="fas fa-book-open" style="font-size: 4rem; color: var(--primary); margin-bottom: 1.5rem; display: block; opacity: 0.2;"></i>
                            <h2 style="color: var(--secondary); margin-bottom: 0.5rem;">No Courses Found</h2>
                            <p>You haven't enrolled in any courses yet. Start your journey today!</p>
                            <a href="academy.html" class="course-btn" style="display: inline-flex; width: auto; margin-top: 2rem; padding: 12px 30px;">Browse All Courses</a>
                        </div>
                    `;
                    return;
                }

                let html = '';
                querySnapshot.forEach((doc) => {
                    const course = doc.data();
                    html += `
                        <div class="course-card" data-aos="fade-up">
                            <div class="course-thumb" style="background: ${course.gradient || 'linear-gradient(135deg, #6366f1, #8b5cf6)'}">
                                <span class="course-badge">${course.status || 'Active'}</span>
                                <i class="${course.icon || 'fas fa-book'}"></i>
                            </div>
                            <div class="course-content">
                                <h3>${course.title}</h3>
                                <div class="course-meta">
                                    <span><i class="far fa-clock"></i> ${course.timeLeft || '--'} Left</span>
                                    <span><i class="far fa-play-circle"></i> ${course.lessonsCompleted || 0}/${course.totalLessons || 0} Lessons</span>
                                </div>
                                <div class="progress-section">
                                    <div class="progress-info">
                                        <span>Overall Progress</span>
                                        <span>${course.progress || 0}%</span>
                                    </div>
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width: ${course.progress || 0}%;"></div>
                                    </div>
                                    <a href="${course.playerUrl || 'course-player.html'}" class="course-btn ${course.progress === 100 ? 'completed' : ''}">
                                        ${course.progress === 100 ? 'Review Course' : 'Resume Learning'} <i class="fas fa-arrow-right"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                });
                grid.innerHTML = html;

            } catch (error) {
                console.error("Error fetching courses:", error);
                grid.innerHTML = `<p style="text-align:center; width:100%; grid-column: 1/-1;">Error loading courses. Please try again later.</p>`;
            }
        }

        // Mobile Menu Toggle
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('sidebarOverlay');

        if (menuToggle) {
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            });
        }

        if (overlay) {
            overlay.addEventListener('click', () => {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            });
        }

        // Filter functionality
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // Logout functionality
        document.querySelector('.logout-btn').addEventListener('click', (e) => {
            e.preventDefault();
            signOut(auth).then(() => {
                window.location.href = 'academy.html';
            });
        });
    </script>
</body>
</html>
