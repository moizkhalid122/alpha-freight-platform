<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appeals Management - Admin Panel</title>
    <!-- Early Authentication Check - Must load first -->
    <script>
        (function() {
            const currentPage = window.location.pathname || window.location.href;
            if (!currentPage.includes('login.html')) {
                const adminAuth = JSON.parse(localStorage.getItem('adminAuth') || 'null');
                if (!adminAuth || !adminAuth.isLoggedIn) {
                    const currentPath = window.location.pathname || window.location.href;
                    let loginPath = 'login.html';
                    if (currentPath.includes('/admin/')) {
                        loginPath = currentPath.substring(0, currentPath.lastIndexOf('/')) + '/login.html';
                    }
                    window.location.replace(loginPath);
                }
            }
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="../assets/css/style.css" rel="stylesheet">
    <style>
        .admin-sidebar {
            min-height: 100vh;
            background: linear-gradient(135deg, #6f42c1 0%, #e83e8c 100%);
        }
        .admin-content {
            background-color: #f8f9fa;
            min-height: 100vh;
        }
        .appeal-card {
            transition: all 0.3s ease;
            border-left: 4px solid #6f42c1;
        }
        .appeal-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .appeal-card.pending {
            border-left-color: #ffc107;
        }
        .appeal-card.resolved {
            border-left-color: #28a745;
        }
        .status-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-pending {
            background-color: #fff3cd;
            color: #856404;
        }
        .status-resolved {
            background-color: #d4edda;
            color: #155724;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 admin-sidebar p-0">
                <div class="p-4">
                    <h4 class="text-white fw-bold mb-4">
                        <i class="fas fa-crown"></i> Admin Panel
                    </h4>
                    <nav class="nav flex-column">
                        <a class="nav-link text-white" href="dashboard.html">
                            <i class="fas fa-tachometer-alt"></i> Dashboard
                        </a>
                        <a class="nav-link text-white" href="users.html">
                            <i class="fas fa-users"></i> Users
                        </a>
                        <a class="nav-link text-white" href="loads.html">
                            <i class="fas fa-boxes"></i> Loads
                        </a>
                        <a class="nav-link text-white" href="carrier-registrations.html">
                            <i class="fas fa-truck"></i> Carrier Registrations
                        </a>
                        <a class="nav-link text-white" href="supplier-registrations.html">
                            <i class="fas fa-shipping-fast"></i> Supplier Registrations
                        </a>
                        <a class="nav-link text-white" href="payments.html">
                            <i class="fas fa-credit-card"></i> Payments
                        </a>
                        <a class="nav-link text-white" href="analytics.html">
                            <i class="fas fa-chart-line"></i> Analytics
                        </a>
                        <a class="nav-link text-white" href="reports.html">
                            <i class="fas fa-file-alt"></i> Reports
                        </a>
                        <a class="nav-link text-white" href="settings.html">
                            <i class="fas fa-cog"></i> Settings
                        </a>
                        <a class="nav-link text-white active" href="appeals.html">
                            <i class="fas fa-gavel"></i> Appeals
                        </a>
                        <hr class="text-white">
                        <a class="nav-link text-white" href="../index.html">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </a>
                    </nav>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 admin-content p-0">
                <!-- Header -->
                <div class="bg-white shadow-sm p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="mb-0 fw-bold">Appeals Management</h5>
                            <small class="text-muted">Review and manage user suspension appeals</small>
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-outline-primary btn-sm" onclick="refreshAppeals()">
                                <i class="fas fa-sync-alt"></i> Refresh
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Appeals Content -->
                <div class="p-4">
                    <!-- Filters -->
                    <div class="card mb-4">
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-3 mb-3">
                                    <label for="statusFilter" class="form-label">Status</label>
                                    <select class="form-select" id="statusFilter">
                                        <option value="">All Status</option>
                                        <option value="pending">Pending</option>
                                        <option value="resolved">Resolved</option>
                                    </select>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="userTypeFilter" class="form-label">User Type</label>
                                    <select class="form-select" id="userTypeFilter">
                                        <option value="">All Types</option>
                                        <option value="supplier">Suppliers</option>
                                        <option value="carrier">Carriers</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">&nbsp;</label>
                                    <div class="d-grid">
                                        <button class="btn btn-primary" onclick="applyFilters()">
                                            <i class="fas fa-filter"></i> Apply Filters
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Appeals List -->
                    <div id="appealsList">
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="text-muted mt-3">Loading appeals...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <!-- Admin Authentication Check -->
    <script src="../assets/js/admin-auth.js"></script>
    <!-- Custom JS -->
    <script src="../assets/js/script.js"></script>
    
    <script>
        // Firebase initialization
        var firebaseConfig = {
            apiKey: "AIzaSyBdn4T4IpwX_nN2pkhHaBI9yqyZ3faAF6o",
            authDomain: "alpha-brokerage.firebaseapp.com",
            databaseURL: "https://alpha-brokerage-default-rtdb.firebaseio.com",
            projectId: "alpha-brokerage",
            storageBucket: "alpha-brokerage.firebasestorage.app",
            messagingSenderId: "834712514965",
            appId: "1:834712514965:web:5dbe0aa2e4eab3cb16c69c"
        };
        firebase.initializeApp(firebaseConfig);

        let allAppeals = [];
        let filteredAppeals = [];

        // Fetch appeals from Firebase
        function fetchAppeals() {
            const db = firebase.database();
            allAppeals = [];
            
            db.ref('appeals').once('value', function(snapshot) {
                snapshot.forEach(function(child) {
                    const appeal = child.val();
                    appeal.id = child.key;
                    allAppeals.push(appeal);
                });
                
                // Sort by date (newest first)
                allAppeals.sort((a, b) => {
                    const dateA = new Date(a.createdAt || a.submittedAt || 0);
                    const dateB = new Date(b.createdAt || b.submittedAt || 0);
                    return dateB - dateA;
                });
                
                filteredAppeals = [...allAppeals];
                renderAppeals();
            });
        }

        // Render appeals
        function renderAppeals() {
            const appealsList = document.getElementById('appealsList');
            if (!appealsList) return;

            if (filteredAppeals.length === 0) {
                appealsList.innerHTML = `
                    <div class="text-center py-5">
                        <i class="fas fa-gavel fa-3x text-muted mb-3"></i>
                        <p class="text-muted">No appeals found</p>
                    </div>
                `;
                return;
            }

            appealsList.innerHTML = filteredAppeals.map(appeal => {
                const status = appeal.status || 'pending';
                const statusClass = status === 'pending' ? 'status-pending' : 'status-resolved';
                const cardClass = status === 'pending' ? 'appeal-card pending' : 'appeal-card resolved';
                const date = formatDate(appeal.createdAt || appeal.submittedAt);
                const userName = appeal.userName || appeal.userEmail || 'Unknown User';
                
                return `
                    <div class="card ${cardClass} mb-3">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <h6 class="fw-bold mb-1">${userName}</h6>
                                    <p class="text-muted mb-1">
                                        <i class="fas fa-${appeal.userType === 'supplier' ? 'shipping-fast' : 'truck'}"></i> 
                                        ${appeal.userType ? appeal.userType.charAt(0).toUpperCase() + appeal.userType.slice(1) : 'User'}
                                    </p>
                                    <span class="status-badge ${statusClass}">${status.charAt(0).toUpperCase() + status.slice(1)}</span>
                                </div>
                                <small class="text-muted">${date}</small>
                            </div>
                            
                            <div class="mb-3">
                                <h6 class="fw-bold">Original Suspension Reason:</h6>
                                <p class="text-danger bg-light p-2 rounded">${appeal.suspensionReason || 'Not specified'}</p>
                            </div>
                            
                            <div class="mb-3">
                                <h6 class="fw-bold">User's Appeal Message:</h6>
                                <p class="bg-light p-3 rounded">${appeal.appealMessage || appeal.message || 'No message provided'}</p>
                            </div>
                            
                            ${status === 'pending' ? `
                                <div class="d-flex gap-2">
                                    <button class="btn btn-success btn-sm" onclick="unsuspendUser('${appeal.userId}', '${appeal.userType}', '${appeal.id}')">
                                        <i class="fas fa-check-circle"></i> Unsuspend User
                                    </button>
                                    <button class="btn btn-secondary btn-sm" onclick="rejectAppeal('${appeal.id}')">
                                        <i class="fas fa-times"></i> Reject Appeal
                                    </button>
                                </div>
                            ` : `
                                <p class="text-muted mb-0">
                                    <i class="fas fa-check-circle text-success"></i> 
                                    Resolved on ${formatDate(appeal.resolvedAt)}
                                </p>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function formatDate(dateString) {
            if (!dateString) return 'Unknown date';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            } catch (e) {
                return 'Unknown date';
            }
        }

        function unsuspendUser(userId, userType, appealId) {
            if (!confirm('Are you sure you want to unsuspend this user? They will receive a congratulations message.')) {
                return;
            }

            const db = firebase.database();
            const userRef = userType === 'supplier' ? db.ref('suppliers/' + userId) : db.ref('carriers/' + userId);
            
            // Get user data first to get their name/email
            userRef.once('value', function(snapshot) {
                const user = snapshot.val();
                const userName = user.companyName || user.firstName + ' ' + (user.lastName || '') || user.email || 'User';
                
                // Update user status to active
                userRef.update({
                    status: 'active',
                    suspensionReason: null,
                    unsuspendedAt: new Date().toISOString(),
                    unsuspendedBy: 'admin'
                }).then(() => {
                    // Update appeal status
                    db.ref('appeals/' + appealId).update({
                        status: 'resolved',
                        resolvedAt: new Date().toISOString(),
                        resolvedBy: 'admin',
                        action: 'unsuspended'
                    }).then(() => {
                        // Send congratulations notification
                        const notificationRef = userType === 'supplier' 
                            ? db.ref('notifications/suppliers/' + userId)
                            : db.ref('notifications/carriers/' + userId);
                        
                        const notificationData = {
                            type: 'account_unsuspended',
                            title: 'Account Unsuspended - Congratulations!',
                            message: 'Congratulations! Your account has been unsuspended and is now active. You can now access all features.',
                            timestamp: new Date().toISOString(),
                            read: false,
                            icon: 'success'
                        };
                        
                        notificationRef.push(notificationData).catch(err => {
                            console.error('Error sending notification:', err);
                        });
                        
                        // Store congratulations message in user data
                        userRef.update({
                            congratulationsMessage: 'Congratulations! Your account has been unsuspended and is now active.',
                            congratulationsShown: false
                        }).then(() => {
                            if (typeof AlphaBrokrage !== 'undefined' && typeof AlphaBrokrage.showAlert === 'function') {
                                AlphaBrokrage.showAlert('success', `${userName} has been unsuspended successfully! They will receive a congratulations message.`);
                            } else {
                                alert(`${userName} has been unsuspended successfully! They will receive a congratulations message.`);
                            }
                            fetchAppeals();
                        }).catch(error => {
                            console.error('Error storing congratulations:', error);
                            fetchAppeals();
                        });
                    }).catch(error => {
                        if (typeof AlphaBrokrage !== 'undefined' && typeof AlphaBrokrage.showAlert === 'function') {
                            AlphaBrokrage.showAlert('error', 'Error updating appeal: ' + error.message);
                        } else {
                            alert('Error updating appeal: ' + error.message);
                        }
                    });
                }).catch(error => {
                    if (typeof AlphaBrokrage !== 'undefined' && typeof AlphaBrokrage.showAlert === 'function') {
                        AlphaBrokrage.showAlert('error', 'Error unsuspending user: ' + error.message);
                    } else {
                        alert('Error unsuspending user: ' + error.message);
                    }
                });
            });
        }

        function rejectAppeal(appealId) {
            if (!confirm('Are you sure you want to reject this appeal?')) {
                return;
            }

            const db = firebase.database();
            db.ref('appeals/' + appealId).update({
                status: 'resolved',
                resolvedAt: new Date().toISOString(),
                resolvedBy: 'admin',
                action: 'rejected'
            }).then(() => {
                if (typeof AlphaBrokrage !== 'undefined' && typeof AlphaBrokrage.showAlert === 'function') {
                    AlphaBrokrage.showAlert('info', 'Appeal rejected');
                } else {
                    alert('Appeal rejected');
                }
                fetchAppeals();
            }).catch(error => {
                if (typeof AlphaBrokrage !== 'undefined' && typeof AlphaBrokrage.showAlert === 'function') {
                    AlphaBrokrage.showAlert('error', 'Error rejecting appeal: ' + error.message);
                } else {
                    alert('Error rejecting appeal: ' + error.message);
                }
            });
        }

        function applyFilters() {
            const status = document.getElementById('statusFilter').value;
            const userType = document.getElementById('userTypeFilter').value;
            
            filteredAppeals = allAppeals.filter(appeal => {
                if (status && (appeal.status || 'pending') !== status) {
                    return false;
                }
                if (userType && appeal.userType !== userType) {
                    return false;
                }
                return true;
            });
            
            renderAppeals();
        }

        function refreshAppeals() {
            fetchAppeals();
            if (typeof AlphaBrokrage !== 'undefined' && typeof AlphaBrokrage.showAlert === 'function') {
                AlphaBrokrage.showAlert('success', 'Appeals refreshed');
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            fetchAppeals();
            
            // Real-time listeners
            const db = firebase.database();
            db.ref('appeals').on('child_added', function(snapshot) {
                fetchAppeals();
            });
            
            db.ref('appeals').on('child_changed', function(snapshot) {
                fetchAppeals();
            });
            
            db.ref('appeals').on('child_removed', function(snapshot) {
                fetchAppeals();
            });
        });
    </script>
</body>
</html>
