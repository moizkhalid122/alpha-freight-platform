    <script>
        (function() {
            const currentPage = window.location.pathname || window.location.href;
            if (!currentPage.includes('login.html')) {
                const adminAuth = JSON.parse(localStorage.getItem('adminAuth') || 'null');
                if (!adminAuth || !adminAuth.isLoggedIn) {
                    const currentPath = window.location.pathname || window.location.href;
                    let loginPath = 'login.html';
                    if (currentPath.includes('/admin/')) {
                        loginPath = currentPath.substring(0, currentPath.lastIndexOf('/')) + '/login.html';
                    }
                    window.location.replace(loginPath);
                }
            }
        })();
    </script>

    <script>
        // Get all carrier withdrawals from localStorage
        function getAllWithdrawals() {
            const allWithdrawals = [];
            const keys = Object.keys(localStorage);
            
            keys.forEach(key => {
                if (key.startsWith('carrierWithdrawals_')) {
                    const carrierId = key.replace('carrierWithdrawals_', '');
                    const withdrawals = JSON.parse(localStorage.getItem(key) || '[]');
                    
                    withdrawals.forEach(withdrawal => {
                        allWithdrawals.push({
                            ...withdrawal,
                            carrierId: carrierId
                        });
                    });
                }
            });
            
            return allWithdrawals;
        }

        // Get carrier bank details
        function getCarrierBankDetails(carrierId) {
            const allBankDetails = JSON.parse(localStorage.getItem('carrierBankDetails') || '{}');
            return allBankDetails[carrierId] || null;
        }
        
        // Get user info from bank details (accountName may contain user name)
        function getUserInfoFromBankDetails(bankDetails) {
            if (!bankDetails) return null;
            
            // Try to extract name from accountName
            if (bankDetails.accountName) {
                const nameParts = bankDetails.accountName.split(' ');
                return {
                    firstName: nameParts[0] || 'Unknown',
                    lastName: nameParts.slice(1).join(' ') || 'User',
                    name: bankDetails.accountName,
                    email: 'N/A'
                };
            }
            return null;
        }

        // Get carrier info - Multiple sources check
        function getCarrierInfo(carrierId) {
            let userInfo = null;
            
            // Try users list from localStorage first
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.id === carrierId || u.carrierId === carrierId || u.email === carrierId);
            if (user) {
                userInfo = user;
            }
            
            // Try carrierProfile from localStorage
            if (!userInfo) {
                const carrierProfile = JSON.parse(localStorage.getItem('carrierProfile') || '{}');
                if (carrierProfile.id === carrierId || carrierProfile.carrierId === carrierId) {
                    userInfo = carrierProfile;
                }
            }
            
            // Try all localStorage keys for carrierProfile with carrierId
            if (!userInfo) {
                const keys = Object.keys(localStorage);
                for (const key of keys) {
                    if (key.includes('carrierProfile') || key.includes('carrierAuth')) {
                        try {
                            const data = JSON.parse(localStorage.getItem(key) || '{}');
                            // If data is an object with id/carrierId matching
                            if (data && (data.id === carrierId || data.carrierId === carrierId)) {
                                userInfo = data;
                                break;
                            }
                            // If data is an object with carrierId as key
                            if (typeof data === 'object' && data[carrierId]) {
                                userInfo = data[carrierId];
                                break;
                            }
                        } catch (e) {
                            // Skip invalid JSON
                        }
                    }
                }
            }
            
            // Try to get from withdrawal data itself
            if (!userInfo) {
                const withdrawalsKey = `carrierWithdrawals_${carrierId}`;
                const withdrawals = JSON.parse(localStorage.getItem(withdrawalsKey) || '[]');
                if (withdrawals.length > 0) {
                    const firstWithdrawal = withdrawals[0];
                    if (firstWithdrawal.userName || firstWithdrawal.userEmail) {
                        userInfo = {
                            firstName: firstWithdrawal.userName ? firstWithdrawal.userName.split(' ')[0] : 'Unknown',
                            lastName: firstWithdrawal.userName ? firstWithdrawal.userName.split(' ').slice(1).join(' ') : 'User',
                            email: firstWithdrawal.userEmail || 'N/A',
                            name: firstWithdrawal.userName || 'Unknown User'
                        };
                    }
                }
            }
            
            // Default fallback
            if (!userInfo) {
                userInfo = { firstName: 'Unknown', lastName: 'User', email: 'N/A', name: 'Unknown User' };
            }
            
            return userInfo;
        }

        // Format currency
        function formatCurrency(amount) {
            return '£' + parseFloat(amount || 0).toLocaleString('en-GB', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        // Format date
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-GB', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Render withdrawals
        function renderWithdrawals() {
            const withdrawals = getAllWithdrawals();
            
            // Sort by date (newest first)
            withdrawals.sort((a, b) => {
                const dateA = new Date(a.requestedAt || a.timestamp || 0);
                const dateB = new Date(b.requestedAt || b.timestamp || 0);
                return dateB - dateA;
            });

            // Calculate stats
            const total = withdrawals.length;
            const pending = withdrawals.filter(w => w.status === 'pending').length;
            const completed = withdrawals.filter(w => w.status === 'completed' || w.status === 'approved').length;
            const totalAmount = withdrawals.reduce((sum, w) => sum + (parseFloat(w.amount) || 0), 0);

            // Update stats
            document.getElementById('totalWithdrawals').textContent = total;
            document.getElementById('pendingWithdrawals').textContent = pending;
            document.getElementById('completedWithdrawals').textContent = completed;
            document.getElementById('totalAmount').textContent = formatCurrency(totalAmount);

            // Render list
            const listEl = document.getElementById('withdrawalsList');
            
            if (withdrawals.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h5>No Withdrawal Requests</h5>
                        <p>No withdrawal requests found in the system.</p>
                    </div>
                `;
                return;
            }

            listEl.innerHTML = withdrawals.map((withdrawal, index) => {
                const carrierInfo = getCarrierInfoWithFirebase(withdrawal.carrierId);
                const bankDetails = getCarrierBankDetails(withdrawal.carrierId);
                const status = withdrawal.status || 'pending';
                const isCompleted = status === 'completed' || status === 'approved';
                const statusClass = isCompleted ? 'completed' : 'pending';
                const statusText = isCompleted ? 'Completed' : 'Pending';
                const statusIcon = isCompleted ? 'fa-check-circle' : 'fa-clock';
                
                // Get user name - try multiple sources (including bank details)
                let userName = 'Unknown User';
                let userEmail = 'N/A';
                
                // Try carrierInfo first
                if (carrierInfo.firstName && carrierInfo.lastName) {
                    userName = `${carrierInfo.firstName} ${carrierInfo.lastName}`;
                    userEmail = carrierInfo.email || carrierInfo.userEmail || 'N/A';
                } else if (carrierInfo.name) {
                    userName = carrierInfo.name;
                    userEmail = carrierInfo.email || carrierInfo.userEmail || 'N/A';
                } else if (carrierInfo.firstName) {
                    userName = carrierInfo.firstName;
                    userEmail = carrierInfo.email || carrierInfo.userEmail || 'N/A';
                }
                
                // If still not found, try bank details accountName
                if (userName === 'Unknown User' && bankDetails && bankDetails.accountName) {
                    userName = bankDetails.accountName;
                }
                
                // Try withdrawal data for email
                if ((userEmail === 'N/A' || !userEmail) && withdrawal.userEmail) {
                    userEmail = withdrawal.userEmail;
                }
                
                // Try Firebase users collection (async - for future use)
                // For now, use localStorage data
                
                const userInitials = userName.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);

                return `
                    <div class="card withdrawal-card ${statusClass}">
                        <div class="card-body">
                            <div class="user-info-header">
                                <div class="user-avatar">${userInitials}</div>
                                <div class="flex-grow-1">
                                    <h5 class="mb-1 fw-bold" style="color: #212529; font-size: 1.125rem;">${userName}</h5>
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="text-muted" style="font-size: 0.9375rem;">
                                            <i class="fas fa-envelope me-1"></i><strong>Email:</strong> ${userEmail}
                                        </span>
                                        <span class="text-muted" style="font-size: 0.875rem;">
                                            <i class="fas fa-id-card me-1"></i><strong>ID:</strong> ${withdrawal.carrierId || 'N/A'}
                                        </span>
                                    </div>
                                </div>
                                <div class="ms-auto">
                                    <span class="status-badge status-${statusClass}">
                                        <i class="fas ${statusIcon} me-1"></i>${statusText}
                                    </span>
                                </div>
                            </div>

                            <div class="row mt-3">
                                <div class="col-md-6">
                                    <div class="withdrawal-amount-display">
                                        ${formatCurrency(withdrawal.amount)}
                                    </div>
                                    <div class="text-muted">
                                        <i class="fas fa-calendar-alt me-1"></i>
                                        Requested: ${formatDate(withdrawal.requestedAt || withdrawal.timestamp)}
                                    </div>
                                    ${withdrawal.verifiedAt ? `
                                        <div class="text-muted mt-1">
                                            <i class="fas fa-shield-alt me-1"></i>
                                            Verified: ${formatDate(withdrawal.verifiedAt)}
                                        </div>
                                    ` : ''}
                                </div>
                                <div class="col-md-6 text-end">
                                    ${!isCompleted ? `
                                        <button class="btn btn-complete-payment" onclick="completePayment('${withdrawal.carrierId}', '${withdrawal.id}')">
                                            <i class="fas fa-check-circle me-2"></i>Complete Payment
                                        </button>
                                    ` : `
                                        <div class="text-success">
                                            <i class="fas fa-check-circle me-2"></i>Payment Completed
                                        </div>
                                        ${withdrawal.completedAt ? `
                                            <small class="text-muted d-block mt-1">
                                                Completed: ${formatDate(withdrawal.completedAt)}
                                            </small>
                                        ` : ''}
                                    `}
                                </div>
                            </div>

                            <div class="bank-details-section mt-3">
                                <h6 class="mb-3 fw-bold">
                                    <i class="fas fa-university me-2"></i>Bank Details
                                </h6>
                                ${bankDetails ? `
                                    <div class="bank-detail-item">
                                        <span class="bank-detail-label">Bank Name</span>
                                        <span class="bank-detail-value">${bankDetails.bankName || 'N/A'}</span>
                                    </div>
                                    <div class="bank-detail-item">
                                        <span class="bank-detail-label">Account Holder</span>
                                        <span class="bank-detail-value">${bankDetails.accountName || withdrawal.accountName || 'N/A'}</span>
                                    </div>
                                    <div class="bank-detail-item">
                                        <span class="bank-detail-label">Account Number</span>
                                        <span class="bank-detail-value">${bankDetails.accountNumber ? bankDetails.accountNumber : (withdrawal.accountNumber || 'N/A')}</span>
                                    </div>
                                    <div class="bank-detail-item">
                                        <span class="bank-detail-label">Sort Code</span>
                                        <span class="bank-detail-value">${bankDetails.sortCode || 'N/A'}</span>
                                    </div>
                                    <div class="bank-detail-item">
                                        <span class="bank-detail-label">IBAN</span>
                                        <span class="bank-detail-value">${bankDetails.iban || 'N/A'}</span>
                                    </div>
                                    <div class="bank-detail-item">
                                        <span class="bank-detail-label">SWIFT/BIC</span>
                                        <span class="bank-detail-value">${bankDetails.swift || 'N/A'}</span>
                                    </div>
                                ` : `
                                    <div class="bank-detail-item">
                                        <span class="bank-detail-label">Bank Name</span>
                                        <span class="bank-detail-value">${withdrawal.bankName || 'N/A'}</span>
                                    </div>
                                    <div class="bank-detail-item">
                                        <span class="bank-detail-label">Account Holder</span>
                                        <span class="bank-detail-value">${withdrawal.accountName || 'N/A'}</span>
                                    </div>
                                    <div class="bank-detail-item">
                                        <span class="bank-detail-label">Account Number</span>
                                        <span class="bank-detail-value">${withdrawal.accountNumber || 'N/A'}</span>
                                    </div>
                                    <div class="alert alert-warning mt-2 mb-0">
                                        <i class="fas fa-exclamation-triangle me-2"></i>
                                        Complete bank details not found in system. Showing available information from withdrawal request.
                                    </div>
                                `}
                            </div>

                            <div class="mt-3">
                                <small class="text-muted">
                                    <i class="fas fa-info-circle me-1"></i>
                                    Processing Time: ${withdrawal.estimatedProcessing || '3-5 business days'}
                                </small>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Complete payment
        function completePayment(carrierId, withdrawalId) {
            if (!confirm('Are you sure you want to mark this payment as completed?')) {
                return;
            }

            const withdrawalsKey = `carrierWithdrawals_${carrierId}`;
            const withdrawals = JSON.parse(localStorage.getItem(withdrawalsKey) || '[]');
            
            const withdrawalIndex = withdrawals.findIndex(w => w.id === withdrawalId);
            if (withdrawalIndex === -1) {
                alert('Withdrawal not found!');
                return;
            }

            // Update withdrawal status
            withdrawals[withdrawalIndex].status = 'completed';
            withdrawals[withdrawalIndex].completedAt = new Date().toISOString();
            withdrawals[withdrawalIndex].processedBy = 'Admin';

            // Save back to localStorage
            localStorage.setItem(withdrawalsKey, JSON.stringify(withdrawals));

            // Show success message
            alert('Payment marked as completed successfully!');

            // Refresh the list
            renderWithdrawals();
        }

        // Refresh withdrawals
        function refreshWithdrawals() {
            renderWithdrawals();
        }

        // Cache for Firebase users
        let firebaseUsersCache = {};
        
        // Fetch users from Firebase (async)
        function fetchUsersFromFirebase() {
            if (typeof firebase === 'undefined' || !firebase.database) {
                return Promise.resolve({});
            }
            
            return new Promise((resolve) => {
                const db = firebase.database();
                const usersData = {};
                
                // Fetch carriers
                db.ref('carriers').once('value', function(snapshot) {
                    snapshot.forEach(function(child) {
                        const data = child.val();
                        const carrierId = child.key;
                        usersData[carrierId] = {
                            firstName: data.firstName || data.name?.split(' ')[0] || '',
                            lastName: data.lastName || data.name?.split(' ').slice(1).join(' ') || '',
                            name: data.name || `${data.firstName || ''} ${data.lastName || ''}`.trim(),
                            email: data.email || ''
                        };
                    });
                    
                    // Update cache
                    Object.assign(firebaseUsersCache, usersData);
                    resolve(usersData);
                }, function(error) {
                    console.error('Firebase error:', error);
                    resolve({});
                });
            });
        }
        
        // Enhanced getCarrierInfo with Firebase support
        function getCarrierInfoWithFirebase(carrierId) {
            // Try Firebase cache first
            if (firebaseUsersCache[carrierId]) {
                return firebaseUsersCache[carrierId];
            }
            
            // Try localStorage sources
            const localInfo = getCarrierInfo(carrierId);
            if (localInfo && localInfo.firstName !== 'Unknown') {
                return localInfo;
            }
            
            // Return Firebase cached data or local fallback
            return firebaseUsersCache[carrierId] || localInfo;
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Fetch Firebase users first, then render
            fetchUsersFromFirebase().then(() => {
                renderWithdrawals();
            }).catch(() => {
                renderWithdrawals();
            });
        });
    </script>
</body>
</html>
