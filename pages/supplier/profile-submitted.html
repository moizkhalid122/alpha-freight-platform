<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submitted - Alpha Freight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="../../assets/css/style.css" rel="stylesheet">
    <style>
        :root {
            --bg: #F6F9FC;
            --text: #0A2540;
            --muted: #425466;
            --primary: #635BFF;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        .wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px 18px;
            position: relative;
        }

        .wrap::before {
            content: "";
            position: absolute;
            inset: -40%;
            background:
                radial-gradient(600px 420px at 20% 20%, rgba(99, 91, 255, 0.16), transparent 60%),
                radial-gradient(560px 420px at 80% 30%, rgba(124, 58, 237, 0.14), transparent 62%),
                radial-gradient(520px 420px at 50% 85%, rgba(16, 185, 129, 0.08), transparent 60%);
            transform: scale(1);
            animation: bgZoom 1.1s cubic-bezier(0.16, 1, 0.3, 1) both;
            pointer-events: none;
        }

        @keyframes bgZoom {
            from { transform: scale(1.12); filter: blur(6px); opacity: 0.0; }
            to { transform: scale(1); filter: blur(0px); opacity: 1; }
        }

        .content {
            width: 100%;
            max-width: 860px;
            text-align: center;
            position: relative;
            z-index: 1;
            padding: 22px 10px;
        }

        .tick-wrap {
            width: 220px;
            height: 220px;
            margin: 6px auto 18px;
            border-radius: 0;
            background: transparent;
            border: none;
            box-shadow: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: scale(0.7);
            opacity: 0;
            animation: popIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
            position: relative;
        }

        .tick-wrap::before {
            content: "";
            position: absolute;
            inset: -46px;
            border-radius: 0;
            background: radial-gradient(circle at 40% 30%, rgba(99, 91, 255, 0.28), transparent 55%),
                        radial-gradient(circle at 70% 65%, rgba(16, 185, 129, 0.18), transparent 55%);
            filter: blur(16px);
            opacity: 0.9;
            z-index: -1;
        }

        @keyframes popIn {
            from { transform: scale(0.65); opacity: 0; filter: blur(6px); }
            to { transform: scale(1); opacity: 1; filter: blur(0px); }
        }

        .tick-img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            display: block;
            filter: drop-shadow(0 22px 50px rgba(10, 37, 64, 0.22));
        }

        .tick-fallback {
            font-size: 72px;
            color: #12B76A;
            display: none;
        }

        .title {
            font-weight: 900;
            letter-spacing: -0.03em;
            font-size: clamp(1.35rem, 2.4vw, 1.7rem);
            margin: 0;
            opacity: 0;
            transform: translateY(10px);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both;
        }

        .desc {
            margin: 10px auto 0;
            max-width: 520px;
            color: var(--muted);
            line-height: 1.55;
            font-size: 1rem;
            opacity: 0;
            transform: translateY(10px);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.45s both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 22px;
            opacity: 0;
            transform: translateY(10px);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.55s both;
            flex-wrap: wrap;
        }

        .btnx {
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btnx-primary {
            color: white;
            background: linear-gradient(135deg, var(--primary) 0%, #4B44D4 100%);
            box-shadow: 0 14px 32px rgba(99, 91, 255, 0.25);
        }

        .btnx-ghost {
            color: var(--text);
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(10, 37, 64, 0.12);
        }

        .btnx:active {
            transform: translateY(1px);
        }

        @media (max-width: 480px) {
            .content { padding: 18px 6px; }
            .tick-wrap { width: 190px; height: 190px; }
            .tick-img { width: 160px; height: 160px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .wrap::before,
            .tick-wrap,
            .title,
            .desc,
            .actions {
                animation: none !important;
                transform: none !important;
                opacity: 1 !important;
                filter: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="content">
            <div class="tick-wrap">
                <img class="tick-img" id="tickImg" src="image-removebg-preview - 2026-04-14T142827.675.png" alt="Submitted">
                <i class="fas fa-circle-check tick-fallback" id="tickFallback" aria-hidden="true"></i>
            </div>
            <h1 class="title">Submission Received</h1>
            <p class="desc">Your profile has been submitted successfully. Our team will review it within 24 hours, and you’ll receive an email update.</p>
            <div class="actions" style="display:none;"></div>
        </div>
    </div>

    <script>
        (function () {
            const img = document.getElementById('tickImg');
            const fallback = document.getElementById('tickFallback');
            if (img) {
                img.addEventListener('error', function () {
                    img.style.display = 'none';
                    if (fallback) fallback.style.display = 'block';
                });
            }

            const qs = new URLSearchParams(location.search);
            const next = qs.get('next') || 'dashboard.html';
            setTimeout(function () {
                location.href = next;
            }, 3000);
        })();
    </script>
</body>
</html>
