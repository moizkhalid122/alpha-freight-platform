<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Logged Out - Alpha Freight | Alpha Freight Solutions</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="../../assets/css/style.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .logout-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            margin-bottom: 2rem;
        }

        .logo-container img {
            max-width: 200px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .logout-message {
            margin-bottom: 2.5rem;
        }

        .logout-message h2 {
            color: #2563EB;
            font-weight: 700;
            margin-bottom: 1rem;
            font-size: 1.75rem;
        }

        .logout-message p {
            color: #64748B;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }

        .logout-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            animation: scaleIn 0.5s ease-out 0.2s both;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .logout-icon i {
            font-size: 2.5rem;
            color: white;
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 0.875rem 2.5rem;
            font-weight: 600;
            font-size: 1.1rem;
            color: white;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .btn-login i {
            font-size: 1.2rem;
        }

        @media (max-width: 576px) {
            .logout-container {
                padding: 2rem 1.5rem;
            }

            .logout-message h2 {
                font-size: 1.5rem;
            }

            .logout-message p {
                font-size: 1rem;
            }

            .logo-container img {
                max-width: 150px;
            }

            .logout-icon {
                width: 60px;
                height: 60px;
            }

            .logout-icon i {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <div class="logo-container">
            <img src="image-removebg-preview - 2026-03-04T185605.074.png" alt="Alpha Freight Logo">
        </div>
        
        <div class="logout-icon">
            <i class="fas fa-check-circle"></i>
        </div>

        <div class="logout-message">
            <h2>You Have Been Logged Out</h2>
            <p>Thank you for using Alpha Freight.</p>
            <p>Your session has been securely ended.</p>
            <p class="text-muted small mt-3">We hope to see you again soon!</p>
        </div>

        <a href="login.html" class="btn btn-login">
            <i class="fas fa-sign-in-alt"></i>
            Login Again
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
