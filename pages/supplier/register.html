        .btn-17,

        .btn-17:disabled {

        .btn-17:-moz-focusring {

        .btn-17 svg {
            display: block;
        }

        .btn-17 [hidden] {
            display: none;
        }

        .btn-17 {
            border-radius: 99rem;
            border-width: 2px;
            padding: 0.8rem 3rem;
            z-index: 0;
            width: 100%;
        }

        .btn-17,
        .btn-17 .text-container {
            overflow: hidden;
            position: relative;
        }

        .btn-17 .text-container {
            display: block;
            mix-blend-mode: difference;
        }

        .btn-17 .text {
            display: block;
            position: relative;
        }

        .btn-17:hover .text {
            -webkit-animation: move-up-alternate 0.3s forwards;
            animation: move-up-alternate 0.3s forwards;
        }

        @-webkit-keyframes move-up-alternate {
            0% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(80%);
            }
            51% {
                transform: translateY(-80%);
            }
            to {
                transform: translateY(0);
            }
        }

        @keyframes move-up-alternate {
            0% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(80%);
            }
            51% {
                transform: translateY(-80%);
            }
            to {
                transform: translateY(0);
            }
        }

        .btn-17:after,
        .btn-17:before {
            --skew: 0.2;
            background: #fff;
            content: "";
            display: block;
            height: 102%;
            left: calc(-50% - 50% * var(--skew));
            pointer-events: none;
            position: absolute;
            top: -104%;
            transform: skew(calc(150deg * var(--skew))) translateY(var(--progress, 0));
            transition: transform 0.2s ease;
            width: 100%;
        }

        .btn-17:after {
            --progress: 0%;
            left: calc(50% + 50% * var(--skew));
            top: 102%;
            z-index: -1;
        }

        .btn-17:hover:before {
            --progress: 100%;
        }

        .btn-17:hover:after {
            --progress: -102%;
        }

        /* From Uiverse.io by abrahamcalsin */
        .dot-spinner {
            --uib-size: 2.8rem;
            --uib-speed: .9s;
            --uib-color: #183153;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            height: var(--uib-size);
            width: var(--uib-size);
        }

        .dot-spinner__dot {
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            height: 100%;
            width: 100%;
        }

        .dot-spinner__dot::before {
            content: '';
            height: 20%;
            width: 20%;
            border-radius: 50%;
            background-color: var(--uib-color);
            transform: scale(0);
            opacity: 0.5;
            animation: pulse0112 calc(var(--uib-speed) * 1.111) ease-in-out infinite;
            box-shadow: 0 0 20px rgba(18, 31, 53, 0.3);
        }

        .dot-spinner__dot:nth-child(2) {
            transform: rotate(45deg);
        }

        .dot-spinner__dot:nth-child(2)::before {
            animation-delay: calc(var(--uib-speed) * -0.875);
        }

        .dot-spinner__dot:nth-child(3) {
            transform: rotate(90deg);
        }

        .dot-spinner__dot:nth-child(3)::before {
            animation-delay: calc(var(--uib-speed) * -0.75);
        }

        .dot-spinner__dot:nth-child(4) {
            transform: rotate(135deg);
        }

        .dot-spinner__dot:nth-child(4)::before {
            animation-delay: calc(var(--uib-speed) * -0.625);
        }

        .dot-spinner__dot:nth-child(5) {
            transform: rotate(180deg);
        }

        .dot-spinner__dot:nth-child(5)::before {
            animation-delay: calc(var(--uib-speed) * -0.5);
        }

        .dot-spinner__dot:nth-child(6) {
            transform: rotate(225deg);
        }

        .dot-spinner__dot:nth-child(6)::before {
            animation-delay: calc(var(--uib-speed) * -0.375);
        }

        .dot-spinner__dot:nth-child(7) {
            transform: rotate(270deg);
        }

        .dot-spinner__dot:nth-child(7)::before {
            animation-delay: calc(var(--uib-speed) * -0.25);
        }

        .dot-spinner__dot:nth-child(8) {
            transform: rotate(315deg);
        }

        .dot-spinner__dot:nth-child(8)::before {
            animation-delay: calc(var(--uib-speed) * -0.125);
        }

        @keyframes pulse0112 {

            100% {
                transform: scale(0);
                opacity: 0.5;
            }

        (function enforcePhoneDigits() {
            const phoneInput = document.getElementById('phone');
            const countryCodeSelect = document.getElementById('phoneCountryCode');
            if (!phoneInput) return;
            
            // Phone number validation rules by country code
            const phoneValidationRules = {
                '+44': { // UK
                    minLength: 10,
                    maxLength: 10,
                    pattern: /^[0-9]{10}$/,
                    errorMessage: 'UK phone number must be 10 digits (e.g., 7123456789)'
                },
                '+1': { // USA/Canada
                    minLength: 10,
                    maxLength: 10,
                    pattern: /^[0-9]{10}$/,
                    errorMessage: 'US/Canada phone number must be 10 digits (e.g., 2125551234)'
                },
                '+49': { // Germany
                    minLength: 10,
                    maxLength: 11,
                    pattern: /^[0-9]{10,11}$/,
                    errorMessage: 'German phone number must be 10-11 digits'
                },
                '+61': { // Australia
                    minLength: 9,
                    maxLength: 9,
                    pattern: /^[0-9]{9}$/,
                    errorMessage: 'Australian phone number must be 9 digits (e.g., 412345678)'
                },
                '+971': { // UAE
                    minLength: 9,
                    maxLength: 9,
                    pattern: /^[0-9]{9}$/,
                    errorMessage: 'UAE phone number must be 9 digits (e.g., 501234567)'
                }
            };

            function validatePhoneNumber() {
                const countryCode = countryCodeSelect ? countryCodeSelect.value : '';
                const phoneNumber = phoneInput.value.replace(/\D+/g, '');
                
                if (!phoneNumber) {
                    phoneInput.classList.remove('is-invalid');
                    phoneInput.classList.remove('is-valid');
                    return true;
                }

                const rule = phoneValidationRules[countryCode];
                if (!rule) {
                    phoneInput.classList.remove('is-invalid');
                    phoneInput.classList.remove('is-valid');
                    return true;
                }

                if (phoneNumber.length < rule.minLength || phoneNumber.length > rule.maxLength) {
                    phoneInput.classList.add('is-invalid');
                    phoneInput.classList.remove('is-valid');
                    phoneInput.setCustomValidity(rule.errorMessage);
                    return false;
                }

                if (!rule.pattern.test(phoneNumber)) {
                    phoneInput.classList.add('is-invalid');
                    phoneInput.classList.remove('is-valid');
                    phoneInput.setCustomValidity(rule.errorMessage);
                    return false;
                }

                phoneInput.classList.remove('is-invalid');
                phoneInput.classList.add('is-valid');
                phoneInput.setCustomValidity('');
                return true;
            }

            phoneInput.addEventListener('input', function() {
                // Remove all non-numeric characters
                let value = this.value;
                const numeric = value.replace(/\D+/g, '');
                if (numeric !== this.value) {
                    this.value = numeric;

                // Validate on input

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <script>
        // EmailJS Configuration
        const EMAILJS_REGISTRATION_CONFIG = {
            serviceId: 'service_mvxwoue',       // Hostinger SMTP Service ID
            templateId: 'template_z5k8r3d',    // Complete Profile Template ID
            adminTemplateId: 'template_r5ptt44', // Admin New User Notification Template ID
            otpTemplateId: 'template_ta8howf', // OTP Template ID
            publicKey: 'f5bWSTVw5Z8mVVwTu'     // Public Key
        };

        // OTP System Variables
        let currentOTP = '';
        let otpEmail = '';
        let otpTimer = null;
        let otpTimerSeconds = 60;
        let isOTPVerified = false;

        // Generate 6-digit OTP
        function generateOTP() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        // Send OTP via EmailJS
        async function sendOTP(email, firstName = '', lastName = '') {
            try {
                // Wait for EmailJS to be available
                let retries = 0;
                while (typeof emailjs === 'undefined' && retries < 5) {
                    await new Promise(resolve => setTimeout(resolve, 500));
                    retries++;
                }

                if (typeof emailjs === 'undefined') {
                    throw new Error('EmailJS library not loaded');
                }

                // Initialize EmailJS if needed
                try {
                    if (typeof emailjs.init === 'function') {
                        emailjs.init(EMAILJS_REGISTRATION_CONFIG.publicKey);
                    }
                } catch (initError) {
                    console.warn('EmailJS already initialized or init failed:', initError);
                }

                // Generate new OTP
                currentOTP = generateOTP();
                otpEmail = email;

                // Prepare user name
                let userName = '';
                if (firstName && lastName) {
                    userName = firstName + ' ' + lastName;
                } else if (firstName) {
                    userName = firstName;
                } else {
                    userName = email.split('@')[0]; // Fallback to email username
                }

                // Prepare email parameters - matching template variables (same as carrier register)
                const emailParams = {
                    to_email: email,
                    email: email,
                    otp_code: currentOTP.toString(),
                    passcode: currentOTP.toString(),
                    user_name: userName,
                    name: userName, // Also send as name
                    app_name: 'Alpha Freight'
                };

                console.log('📧 Sending OTP email with params:', emailParams);
                console.log('🔑 OTP Code:', currentOTP);

                // Send OTP email
                const response = await emailjs.send(
                    EMAILJS_REGISTRATION_CONFIG.serviceId,
                    EMAILJS_REGISTRATION_CONFIG.otpTemplateId,
                    emailParams
                );

                console.log('✅ OTP sent successfully!', response);
                return { success: true, otp: currentOTP };
            } catch (error) {
                console.error('❌ Error sending OTP:', error);
                return { success: false, error: error.message || 'Failed to send OTP' };
            }
        }

        // Show OTP Modal
        function showOTPModal(email) {

            resetOTPTimer();

            document.getElementById('otpModal').classList.remove('show');
            clearOTPTimer();

        // Clear OTP Inputs
        function clearOTPInputs() {
            for (let i = 1; i <= 6; i++) {
                document.getElementById('otp' + i).value = '';
                document.getElementById('otp' + i).classList.remove('filled');

            hideOTPMessages();
        }

        // Get OTP from inputs
        function getOTPFromInputs() {
            let otp = '';
            for (let i = 1; i <= 6; i++) {
                otp += document.getElementById('otp' + i).value;
            }
            return otp;
        }

        // Verify OTP
        function verifyOTP(inputOTP) {
            if (inputOTP === currentOTP) {
                isOTPVerified = true;
                showOTPSuccess('Email verified successfully!');
                setTimeout(() => {
                    hideOTPModal();
                    // Automatically submit the form after OTP verification
                    setTimeout(() => {
                        const form = document.getElementById('supplierRegistrationForm');

                document.getElementById('otp1').focus();

        }

        // Show OTP Error
        function showOTPError(message) {
            const errorEl = document.getElementById('otpError');

            errorEl.classList.add('show');
            document.getElementById('otpSuccess').classList.remove('show');

            successEl.textContent = message;
            successEl.classList.add('show');
            document.getElementById('otpError').classList.remove('show');
        }

        // Hide OTP Messages
        function hideOTPMessages() {
            document.getElementById('otpError').classList.remove('show');
            document.getElementById('otpSuccess').classList.remove('show');
        }

        // Reset OTP Timer
        function resetOTPTimer() {
            clearOTPTimer();
            otpTimerSeconds = 60;
            updateOTPTimer();
            otpTimer = setInterval(() => {
                otpTimerSeconds--;
                updateOTPTimer();
                if (otpTimerSeconds <= 0) {
                    clearOTPTimer();
                }
            }, 1000);
        }

        // Update OTP Timer Display
        function updateOTPTimer() {
            const timerEl = document.getElementById('otpTimer');
            const resendBtn = document.getElementById('btnResendOTP');
            if (otpTimerSeconds > 0) {
                timerEl.textContent = `Resend code in ${otpTimerSeconds} seconds`;
                resendBtn.disabled = true;
            } else {
                timerEl.textContent = '';
                resendBtn.disabled = false;
            }
        }

        // Clear OTP Timer
        function clearOTPTimer() {
            if (otpTimer) {
                clearInterval(otpTimer);
                otpTimer = null;
            }
        }

        // OTP Input Event Handlers
        document.addEventListener('DOMContentLoaded', function() {
            // Setup OTP input handlers
            for (let i = 1; i <= 6; i++) {
                const otpInput = document.getElementById('otp' + i);
                if (!otpInput) continue;

                // Handle input
                otpInput.addEventListener('input', function(e) {
                    const value = e.target.value.replace(/[^0-9]/g, '');
                    e.target.value = value;
                    
                    if (value) {
                        e.target.classList.add('filled');
                        // Move to next input

                        }
                    } else {
                        e.target.classList.remove('filled');
                    }
                });

                // Handle backspace
                otpInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && !e.target.value && i > 1) {
                        document.getElementById('otp' + (i - 1)).focus();
                    }
                });

                // Handle paste
                otpInput.addEventListener('paste', function(e) {
                    e.preventDefault();
                    const paste = (e.clipboardData || window.clipboardData).getData('text');
                    const digits = paste.replace(/[^0-9]/g, '').slice(0, 6);
                    
                    for (let j = 0; j < digits.length && (i + j) <= 6; j++) {
                        const input = document.getElementById('otp' + (i + j));
                        if (input) {
                            input.value = digits[j];
                            input.classList.add('filled');
                        }
                    }
                    
                    // Focus last filled input or verify button
                    const lastFilled = Math.min(i + digits.length - 1, 6);
                    if (lastFilled < 6) {
                        document.getElementById('otp' + (lastFilled + 1)).focus();
                    } else {
                        document.getElementById('btnVerifyOTP').focus();
                    }
                });
            }

            // Verify OTP Button
            const btnVerifyOTP = document.getElementById('btnVerifyOTP');
            if (btnVerifyOTP) {
                btnVerifyOTP.addEventListener('click', function() {
                    const inputOTP = getOTPFromInputs();
                    if (inputOTP.length !== 6) {
                        showOTPError('Please enter all 6 digits.');
                        return;
                    }
                    verifyOTP(inputOTP);
                });
            }

            // Resend OTP Button
            const btnResendOTP = document.getElementById('btnResendOTP');
            if (btnResendOTP) {
                btnResendOTP.addEventListener('click', function() {
                    if (!otpEmail) return;
                    
                    // Get firstName and lastName from form
                    const firstName = document.getElementById('firstName') ? document.getElementById('firstName').value : '';
                    const lastName = document.getElementById('lastName') ? document.getElementById('lastName').value : '';
                    
                    btnResendOTP.disabled = true;
                    btnResendOTP.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Sending...';
                    sendOTP(otpEmail, firstName, lastName).then(result => {
                        btnResendOTP.innerHTML = '<i class="fas fa-redo me-2"></i>Resend Code';
                        if (result.success) {
                            showOTPSuccess('OTP code resent successfully!');
                            resetOTPTimer();
                        } else {
                            showOTPError('Failed to resend OTP. Please try again.');
                            btnResendOTP.disabled = false;
                        }
                    });
                });
            }

            // Close modal on backdrop click
            const otpModal = document.getElementById('otpModal');
            if (otpModal) {
                otpModal.addEventListener('click', function(e) {
                    if (e.target === otpModal) {
                        hideOTPModal();
                    }
                });
            }
        });

        // Initialize EmailJS
        function initializeRegistrationEmailJS() {
            if (typeof emailjs !== 'undefined') {
                try {
                    emailjs.init(EMAILJS_REGISTRATION_CONFIG.publicKey);
                    console.log('✅ EmailJS initialized for Registration');
                    return true;
                } catch (error) {
                    console.error('❌ EmailJS initialization error:', error);
                    return false;
                }
            } else {
                console.warn('⚠️ EmailJS library not loaded yet');
                return false;
            }
        }

        // Wait for EmailJS to load
        if (typeof emailjs === 'undefined') {
            window.addEventListener('load', function() {
                setTimeout(function() {
                    if (typeof emailjs !== 'undefined') {
                        initializeRegistrationEmailJS();
                    } else {
                        console.error('❌ EmailJS library failed to load');
                    }
                }, 1000);
            });
        } else {
            initializeRegistrationEmailJS();
        }

        // Send "Complete Your Profile" email
        async function sendCompleteProfileEmail(userEmail, userName, userId, userType = 'carrier') {
            // Skip if template ID is not set
            if (!EMAILJS_REGISTRATION_CONFIG.templateId || EMAILJS_REGISTRATION_CONFIG.templateId === '') {
                console.warn('⚠️ Complete Profile template ID not configured. Skipping email.');
                return { success: false, error: 'Template not configured' };
            }

            try {
                // Wait for EmailJS to be available
                let retries = 0;
                while (typeof emailjs === 'undefined' && retries < 5) {
                    await new Promise(resolve => setTimeout(resolve, 500));
                    retries++;
                }

                // Ensure EmailJS is initialized
                if (typeof emailjs === 'undefined') {
                    console.error('❌ EmailJS library not loaded after waiting');
                    return { success: false, error: 'Email service not available' };
                }

                // Initialize EmailJS if not already initialized
                try {
                    if (typeof emailjs.init === 'function') {
                        emailjs.init(EMAILJS_REGISTRATION_CONFIG.publicKey);
                    }
                } catch (initError) {
                    console.warn('⚠️ EmailJS already initialized or init failed:', initError);
                }

                // Validate required fields
                if (!userEmail || !userName) {
                    return { success: false, error: 'Missing user email or name' };
                }

                // Prepare email parameters
                // Both profile_link and dashboard_link point to dashboard (button will redirect to dashboard)
                const dashboardLink = userType === 'supplier'
                    ? window.location.origin + '/pages/supplier/dashboard.html'
                    : window.location.origin + '/pages/carrier/dashboard.html';

                const emailParams = {
                    // Recipient email
                    to_email: userEmail,
                    email: userEmail,
                    
                    // User information
                    user_name: userName,
                    name: userName,
                    first_name: userName.split(' ')[0] || userName,
                    user_type: userType === 'supplier' ? 'Supplier' : 'Carrier',
                    
                    // Profile completion links (both redirect to dashboard)
                    profile_link: dashboardLink, // Changed to dashboard
                    dashboard_link: dashboardLink,
                    user_id: userId || 'N/A'
                };

                console.log('📧 Sending Complete Profile email...', emailParams);

                // Send email
                const response = await emailjs.send(
                    EMAILJS_REGISTRATION_CONFIG.serviceId,
                    EMAILJS_REGISTRATION_CONFIG.templateId,
                    emailParams
                );

                console.log('✅ Complete Profile email sent successfully!', response);
                return { success: true, response: response };
            } catch (emailError) {
                console.error('❌ Error sending Complete Profile email:', emailError);
                
                // Log full error details for debugging
                const errorDetails = {
                    text: emailError.text,
                    message: emailError.message,
                    status: emailError.status,
                    statusText: emailError.statusText,
                    response: emailError.response
                };
                console.error('❌ Email error details:', errorDetails);
                
                // Don't block registration if email fails
                return {
                    success: false,
                    error: emailError.text || emailError.message || 'Unknown error',
                    status: emailError.status,
                    details: errorDetails
                };
            }
        }

                if (typeof emailjs === 'undefined') {

                // Prepare admin email parameters
                const adminEmailParams = {

                    to_email: 'support@alphafreightuk.com',

                    // User information
                    user_name: (userData.firstName || '') + ' ' + (userData.lastName || ''),
                    user_email: userData.email || 'N/A',
                    user_phone: userData.phone || 'N/A',

                    // Registration information
                    user_id: userId || 'N/A',
                    registration_date: new Date().toLocaleString('en-GB', {

                        month: '2-digit', 
                        year: 'numeric', 
                        hour: '2-digit',

                    }),
                    created_at: new Date().toLocaleString('en-GB', {

                console.log('✅ Admin new user notification sent successfully!', response);

            } catch (emailError) {

                // Don't block registration if admin email fails
                return {
                    success: false,
                    error: emailError.text || emailError.message || 'Unknown error',
                    status: emailError.status
