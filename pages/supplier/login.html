        @media (max-width: 576px) {

<body>
    <!-- Top Logo -->
    <div class="top-logo">
        <img src="image-removebg-preview - 2026-03-04T185605.074.png" alt="Alpha Freight Logo">

    <div class="auth-container">

            <form id="supplierLoginForm" class="form">
                <input type="email" class="input" id="email" placeholder="Email Address" required>

                <div class="remember-row">

                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">
                            Remember me
                        </label>
                    </div>
                    <span class="forgot-password"><a href="#" id="forgotPasswordLink">Forgot Password?</a></span>

                <button type="submit" class="login-button">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>

            <div class="agreement">
                Don't have an account? <a href="register.html">Create one here</a>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="forgot-modal" id="forgotModal">
        <div class="forgot-modal-content">
            <button class="forgot-modal-close" id="closeForgotModal" type="button">
                <i class="fas fa-times"></i>
            </button>
            <div class="forgot-modal-title">Reset Password</div>
            <div class="forgot-modal-subtitle">OTP will be sent to your email</div>

            <!-- Step 1 -->
            <div id="forgotStep1">
                <form id="forgotPasswordForm">
                    <input type="email" id="forgotEmail" class="modal-input" placeholder="Email Address" required>
                    <button type="submit" class="modal-btn" id="sendOtpBtn">Send OTP</button>
                </form>
            </div>

            <!-- Step 2 -->
            <div id="forgotStep2" style="display: none;">
                <div class="otp-row">
                    <input type="text" class="otp-input" id="otp1" maxlength="1" inputmode="numeric" pattern="[0-9]" required>
                    <input type="text" class="otp-input" id="otp2" maxlength="1" inputmode="numeric" pattern="[0-9]" required>
                    <input type="text" class="otp-input" id="otp3" maxlength="1" inputmode="numeric" pattern="[0-9]" required>
                    <input type="text" class="otp-input" id="otp4" maxlength="1" inputmode="numeric" pattern="[0-9]" required>
                    <input type="text" class="otp-input" id="otp5" maxlength="1" inputmode="numeric" pattern="[0-9]" required>
                    <input type="text" class="otp-input" id="otp6" maxlength="1" inputmode="numeric" pattern="[0-9]" required>
                </div>
                <button type="button" class="modal-btn" id="verifyOtpBtn">Verify OTP</button>
            </div>

            <!-- Step 3 -->
            <div id="forgotStep3" style="display: none;">
                <input type="password" id="forgotNewPassword" class="modal-input" placeholder="New Password" minlength="6" required>
                <input type="password" id="forgotConfirmPassword" class="modal-input" placeholder="Confirm New Password" minlength="6" required>
                <button type="button" class="modal-btn" id="resetPasswordBtn">Reset Password</button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="../../assets/js/script.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    
    <!-- Firebase Init -->
    <script src="../../assets/js/firebase-init.js"></script>
    
    <!-- Beautiful Alerts System -->
    <script src="../../assets/js/alerts.js"></script>
    
    <!-- Firebase Storage Helper -->
    <script src="../../assets/js/firebase-storage.js"></script>
    
    <!-- Firebase Complete Integration -->
    <script src="../../assets/js/firebase-complete.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
    var firebaseConfig = {
      apiKey: "AIzaSyBdn4T4IpwX_nN2pkhHaBI9yqyZ3faAF6o",
      authDomain: "alpha-brokerage.firebaseapp.com",
      databaseURL: "https://alpha-brokerage-default-rtdb.firebaseio.com",
      projectId: "alpha-brokerage",
      storageBucket: "alpha-brokerage.firebasestorage.app",
      messagingSenderId: "834712514965",
      appId: "1:834712514965:web:5dbe0aa2e4eab3cb16c69c"
    };
    if (!firebase.apps || !firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    var db = firebase.database();

    var EMAILJS_CONFIG = {
        publicKey: 'f5bWSTVw5Z8mVVwTu',
        serviceId: 'service_mvxwoue',
        templateId: 'template_af6fmrs'
    };
    if (EMAILJS_CONFIG.publicKey && EMAILJS_CONFIG.publicKey !== 'YOUR_EMAILJS_PUBLIC_KEY') {
        emailjs.init(EMAILJS_CONFIG.publicKey);
    }

    var forgotPasswordLink = document.getElementById('forgotPasswordLink');
    var forgotModal = document.getElementById('forgotModal');
    var closeForgotModal = document.getElementById('closeForgotModal');
    var forgotPasswordForm = document.getElementById('forgotPasswordForm');
    var forgotEmailInput = document.getElementById('forgotEmail');
    var forgotNewPassword = document.getElementById('forgotNewPassword');
    var forgotConfirmPassword = document.getElementById('forgotConfirmPassword');
    var resetPasswordBtn = document.getElementById('resetPasswordBtn');
    var sendOtpBtn = document.getElementById('sendOtpBtn');
    var verifyOtpBtn = document.getElementById('verifyOtpBtn');

    var forgotStep1 = document.getElementById('forgotStep1');
    var forgotStep2 = document.getElementById('forgotStep2');
    var forgotStep3 = document.getElementById('forgotStep3');

    var otpInputs = [
        document.getElementById('otp1'),
        document.getElementById('otp2'),
        document.getElementById('otp3'),
        document.getElementById('otp4'),
        document.getElementById('otp5'),
        document.getElementById('otp6')
    ];

    var currentOtp = '';
    var otpEmail = '';

    function openForgotModal() {
        var loginEmail = document.getElementById('email').value.trim();
        if (loginEmail) {
            forgotEmailInput.value = loginEmail;
        }
        forgotModal.classList.add('active');
    }

    function closeForgotPasswordModal() {
        forgotModal.classList.remove('active');
        forgotPasswordForm.reset();
        forgotStep1.style.display = 'block';
        forgotStep2.style.display = 'none';
        forgotStep3.style.display = 'none';
        otpInputs.forEach(function(input) { input.value = ''; });
        currentOtp = '';
        otpEmail = '';
        sendOtpBtn.disabled = false;
        sendOtpBtn.textContent = 'Send OTP';
        resetPasswordBtn.disabled = false;
        resetPasswordBtn.textContent = 'Reset Password';
    }

    forgotPasswordLink.addEventListener('click', function(e) {
        e.preventDefault();
        openForgotModal();
    });

    closeForgotModal.addEventListener('click', function() {
        closeForgotPasswordModal();
    });

    forgotModal.addEventListener('click', function(e) {
        if (e.target === forgotModal) {
            closeForgotPasswordModal();
        }
    });

    function generateOtp() {
        return Math.floor(100000 + Math.random() * 900000).toString();
    }

    function moveFocus(currentIndex) {
        if (currentIndex < otpInputs.length - 1) {
            otpInputs[currentIndex + 1].focus();
        }
    }

    otpInputs.forEach(function(input, index) {
        input.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 1);
            if (this.value) {
                moveFocus(index);
            }
        });
    });

    forgotPasswordForm.addEventListener('submit', function(e) {
        e.preventDefault();
        var email = forgotEmailInput.value.trim().toLowerCase();
        if (!email) {
            alert('Please enter your email!');
            return;
        }

        sendOtpBtn.disabled = true;
        sendOtpBtn.textContent = 'Sending...';

        if (typeof emailjs === 'undefined') {
            alert('Email service not loaded. Please refresh and try again.');
            sendOtpBtn.disabled = false;
            sendOtpBtn.textContent = 'Send OTP';
            return;
        }

        if (!EMAILJS_CONFIG.publicKey || !EMAILJS_CONFIG.serviceId || !EMAILJS_CONFIG.templateId) {
            alert('Email service not configured.');
            sendOtpBtn.disabled = false;
            sendOtpBtn.textContent = 'Send OTP';
            return;
        }

        db.ref('suppliers').orderByChild('email').equalTo(email).once('value', function(snapshot) {
            if (!snapshot.exists()) {
                alert('Email not found!');
                sendOtpBtn.disabled = false;
                sendOtpBtn.textContent = 'Send OTP';
                return;
            }

            currentOtp = generateOtp();
            otpEmail = email;

            var emailParams = {
                to_email: email,
                email: email,
                otp_code: currentOtp,
                passcode: currentOtp
            };

            emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, emailParams)
                .then(function() {
                    forgotStep1.style.display = 'none';
                    forgotStep2.style.display = 'block';
                    otpInputs[0].focus();
                })
                .catch(function(error) {
                    console.error('EmailJS error:', error);
                    alert('OTP send failed. Please check EmailJS settings.');
                })
                .finally(function() {
                    sendOtpBtn.disabled = false;
                    sendOtpBtn.textContent = 'Send OTP';
                });
        }, function(error) {
            console.error('Lookup error:', error);
            alert('Something went wrong. Please try again.');
            sendOtpBtn.disabled = false;
            sendOtpBtn.textContent = 'Send OTP';
        });
    });

    verifyOtpBtn.addEventListener('click', function() {
        var enteredOtp = otpInputs.map(function(input) { return input.value; }).join('');
        if (enteredOtp.length !== 6) {
            alert('Please enter 6-digit OTP!');
            return;
        }

        if (enteredOtp !== currentOtp) {
            alert('Invalid OTP!');
            return;
        }

        forgotStep2.style.display = 'none';
        forgotStep3.style.display = 'block';
    });

    resetPasswordBtn.addEventListener('click', function() {
        var newPassword = forgotNewPassword.value;
        var confirmPassword = forgotConfirmPassword.value;

        if (!newPassword || !confirmPassword) {
            alert('Please fill all fields!');
            return;
        }

        if (newPassword.length < 6) {
            alert('Password must be at least 6 characters!');
            return;
        }

        if (newPassword !== confirmPassword) {
            alert('Passwords do not match!');
            return;
        }

        resetPasswordBtn.disabled = true;
        resetPasswordBtn.textContent = 'Updating...';

        db.ref('suppliers').orderByChild('email').equalTo(otpEmail).once('value', function(snapshot) {
            if (!snapshot.exists()) {
                alert('Email not found!');
                resetPasswordBtn.disabled = false;
                resetPasswordBtn.textContent = 'Reset Password';
                return;
            }

            var userRef = null;
            snapshot.forEach(function(child) {
                if (!userRef) {
                    userRef = child.ref;
                }
            });

            if (!userRef) {
                alert('Email not found!');
                resetPasswordBtn.disabled = false;
                resetPasswordBtn.textContent = 'Reset Password';
                return;
            }

            userRef.update({ password: newPassword }).then(function() {
                alert('Password updated successfully!');
                closeForgotPasswordModal();
            }).catch(function(error) {
                console.error('Reset error:', error);
                alert('Password reset failed. Please try again.');
                resetPasswordBtn.disabled = false;
                resetPasswordBtn.textContent = 'Reset Password';
            });
        }, function(error) {
            console.error('Lookup error:', error);
            alert('Something went wrong. Please try again.');
            resetPasswordBtn.disabled = false;
            resetPasswordBtn.textContent = 'Reset Password';
        });
    });

    document.getElementById('supplierLoginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var email = document.getElementById('email').value.trim().toLowerCase();
        var password = document.getElementById('password').value;
        var rememberMe = document.getElementById('rememberMe').checked;
        var submitBtn = this.querySelector('button[type="submit"]');
        var originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing In...';
        submitBtn.disabled = true;
        
        if (!email || !password) {
            alert('Please enter both email and password!');
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
            return;
        }
        
        db.ref('suppliers').orderByChild('email').equalTo(email).once('value', function(snapshot) {
          var matched = null;
          if (snapshot.exists()) {
            snapshot.forEach(function(child) {
              var supplierData = child.val();
              // Get supplierId from the key if not in data
              if (!supplierData.supplierId) {
                supplierData.supplierId = child.key;
              }
              // Check password match
              if (supplierData.password && supplierData.password === password) {
                matched = supplierData;
              }
            });
          }
          
          if (matched) {
            var authData = {
              email: matched.email,
              firstName: matched.firstName,
              lastName: matched.lastName,
              companyName: matched.companyName,
              phone: matched.phone,
              supplierId: matched.supplierId,
              country: matched.country,
              isLoggedIn: true,
              loginTime: new Date().toISOString(),
              rememberMe: rememberMe
            };
            localStorage.setItem('supplierAuth', JSON.stringify(authData));
            try {
                localStorage.setItem('ab.portal.lastRole', 'supplier');
            } catch (err) {}
            // Redirect immediately on successful login
            window.location.href = 'dashboard.html';
          } else {
            alert('Invalid email or password!');
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
          }
        }, function(error) {
          console.error('Login error:', error);
          alert('Login failed. Please try again.');
          submitBtn.innerHTML = originalText;
          submitBtn.disabled = false;
        });
    });
    </script>
</body>
</html>
