<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Freight Social Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="../../assets/css/style.css" rel="stylesheet">
    <link href="../../assets/css/social-hub.css" rel="stylesheet">
</head>
<body class="social-layout">
    <header class="social-nav py-3 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
            <a href="../../index.html" class="d-flex align-items-center text-white text-decoration-none">
                <img src="../../image-removebg-preview - 2025-10-29T055946.105.png" alt="Alpha Freight" style="height:42px;" class="me-3">
                <span class="fw-bold fs-5"></span>
            </a>
            <nav class="d-flex align-items-center gap-3 flex-wrap justify-content-end ms-auto">
                <div class="d-flex align-items-center gap-3">
                    <a href="feed.html" class="nav-link active">Feed</a>
                    <a href="post.html" class="nav-link">Post</a>
                    <a href="profile.html" class="nav-link">Profile</a>
                    <a href="verify.html" class="nav-link">Buy Verified</a>
                    <a href="ads.html" class="nav-link">Ads</a>
                    <a href="notifications.html" class="nav-link">Notifications</a>
                    <button class="btn btn-light position-relative" data-notification-bell>
                        <i class="fas fa-bell"></i>
                        <span class="badge bg-danger rounded-pill position-absolute top-0 start-100 translate-middle d-none" data-notification-badge>0</span>
                    </button>
                </div>
                <div class="profile-search-wrapper d-none d-lg-block" data-profile-search-wrapper>
                    <div class="profile-search position-relative">
                        <input type="search" class="form-control form-control-sm" placeholder="Search profiles..." autocomplete="off" data-profile-search-input>
                        <div class="profile-search-results shadow-sm d-none" data-profile-search-results></div>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="py-5">
        <div class="container">
            <div class="row g-4">
                <aside class="col-lg-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body text-center">
                            <div class="profile-avatar-wrapper mb-3">
                                <img src="image-removebg-preview - 2025-11-08T080252.861.png" alt="Current user" class="rounded-circle border profile-avatar" style="width:100px;height:100px;" data-feed-avatar>
                            </div>
                            <h5 class="mb-1" data-feed-name>Emma Logistics Ltd</h5>
                            <p class="text-muted small mb-1" data-feed-role>Member</p>
                            <p class="text-muted small mb-4" data-feed-location>London, UK</p>
                            <div class="d-flex justify-content-around">
                                <div>
                                    <p class="fw-semibold mb-0" data-feed-followers>0</p>
                                    <span class="text-muted small">Followers</span>
                                </div>
                                <div>
                                    <p class="fw-semibold mb-0" data-feed-following>0</p>
                                    <span class="text-muted small">Following</span>
                                </div>
                            </div>
                            <div class="mt-4 text-start d-none" data-profile-select-wrapper>
                                <label class="form-label text-muted small mb-1">Active Profile</label>
                                <select class="form-select form-select-sm" data-profile-select>
                                    <option>Loading...</option>
                                </select>
                            </div>
                            <a class="btn btn-outline-primary btn-sm w-100 mt-3 d-none" data-profile-portal target="_blank" rel="noopener">Open Portal Profile</a>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm mt-4">
                        <div class="card-body">
                            <h6 class="fw-bold mb-3">People you may know</h6>
                            <div data-suggested-follows></div>
                        </div>
                    </div>
                </aside>

                <section class="col-lg-6">
                    <div class="d-flex align-items-center justify-content-between mb-3">
                        <h5 class="fw-bold mb-0">Latest Freight Updates</h5>
                        <a href="post.html" class="btn btn-sm btn-outline-primary">
                            <i class="fas fa-pen me-2"></i>Create Post
                        </a>
                    </div>
                    <div data-feed-list></div>
                </section>

                <aside class="col-lg-3"></aside>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="../../assets/js/firebase-init.js"></script>
    <script src="../../assets/js/script.js"></script>
    <script src="../../assets/js/social-hub.js"></script>
</body>
</html>
