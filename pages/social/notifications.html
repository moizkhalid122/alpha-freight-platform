<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Freight Notifications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="../../assets/css/style.css" rel="stylesheet">
    <link href="../../assets/css/social-hub.css" rel="stylesheet">
</head>
<body class="social-layout">
    <header class="social-nav py-3 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="feed.html" class="d-flex align-items-center text-white text-decoration-none">
                <img src="../../image-removebg-preview - 2025-10-29T055946.105.png" alt="Alpha Freight" style="height:42px;" class="me-3">
                <span class="fw-bold fs-5">Alpha Freight Social Hub</span>
            </a>
            <nav class="d-flex align-items-center gap-3">
                <a href="feed.html" class="nav-link">Feed</a>
                <a href="post.html" class="nav-link">Post</a>
                <a href="profile.html" class="nav-link">Profile</a>
                <a href="verify.html" class="nav-link">Buy Verified</a>
                <a href="ads.html" class="nav-link">Ads</a>
                <a href="notifications.html" class="nav-link active">Notifications</a>
                <button class="btn btn-light position-relative" data-notification-bell>
                    <i class="fas fa-bell"></i>
                    <span class="badge bg-danger rounded-pill position-absolute top-0 start-100 translate-middle d-none" data-notification-badge>0</span>
                </button>
            </nav>
        </div>
    </header>

    <main class="py-5">
        <div class="container">
            <div class="d-flex align-items-center justify-content-between mb-4">
                <h2 class="fw-bold mb-0">Notifications</h2>
                <button class="btn btn-outline-light text-white d-none" data-mark-read>
                    Mark all as read
                </button>
            </div>
            <div class="row">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <div data-notification-list class="d-flex flex-column gap-2"></div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4 mt-4 mt-lg-0">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <h6 class="fw-bold mb-3">Stay connected</h6>
                            <p class="text-muted small mb-0">
                                Notifications show all the latest follows and likes in one place.
                                Jump back to the feed to engage with posts and grow your network.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="../../assets/js/firebase-init.js"></script>
    <script src="../../assets/js/script.js"></script>
    <script src="../../assets/js/social-hub.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const markReadBtn = document.querySelector('[data-mark-read]');
            const currentUser = window.AlphaBrokrage?.socialHub?.getSessionUser();
            if (markReadBtn && currentUser) {
                markReadBtn.classList.remove('d-none');
                markReadBtn.addEventListener('click', function() {
                    window.AlphaBrokrage.socialHub.markNotificationsRead(currentUser.id);
                    window.AlphaBrokrage?.showAlert?.('info', 'All notifications marked as read.');
                });
            }
        });
    </script>
</body>
</html>
