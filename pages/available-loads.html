    <!-- Firebase v10+ Modular SDK for Real-time Loads Display -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, onChildAdded, onChildRemoved, onChildChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBdn4T4IpwX_nN2pkhHaBI9yqyZ3faAF6o",
            authDomain: "alpha-brokerage.firebaseapp.com",
            databaseURL: "https://alpha-brokerage-default-rtdb.firebaseio.com",
            projectId: "alpha-brokerage",
            storageBucket: "alpha-brokerage.firebasestorage.app",
            messagingSenderId: "834712514965",
            appId: "1:834712514965:web:5dbe0aa2e4eab3cb16c69c"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Get container element
        const loadsContainer = document.getElementById('loadsContainer');
        const loadsMap = new Map(); // To track existing loads

        // Function to format date
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        // Function to get urgency badge
        function getUrgencyBadge(urgency) {
            const badges = {
                'normal': '<span class="badge bg-secondary">Normal</span>',
                'urgent': '<span class="badge bg-warning">Urgent</span>',
                'same-day': '<span class="badge bg-danger">Same Day</span>'
            };
            return badges[urgency] || badges['normal'];
        }

        // Commission calculation (same as carrier page - silent commission)
        function calculateCarrierAmount(originalAmount) {
            if (!originalAmount || originalAmount <= 0) return null;
            
            // Determine commission tier: small (10%), medium (15%), large (20%)
            let commissionRate = 0.10; // Default small
            if (originalAmount > 5000) {
                commissionRate = 0.20; // Large (>5000)
            } else if (originalAmount > 1000) {
                commissionRate = 0.15; // Medium (1000-5000)
            }
            // Small: <=1000, commissionRate = 0.10
            
            // Calculate reduced amount after commission
            let commissionAmount = originalAmount * commissionRate;
            let carrierAmount = originalAmount - commissionAmount;
            
            return Math.round(carrierAmount * 100) / 100; // Round to 2 decimals
        }

        // Function to format budget (with silent commission deduction)
        function formatBudget(minBudget, maxBudget, budget) {
            // Calculate original budget
            let originalBudget = budget;
            if (!originalBudget && minBudget && maxBudget) {
                originalBudget = (minBudget + maxBudget) / 2;
            } else if (!originalBudget) {
                originalBudget = maxBudget || minBudget;
            }

            // Apply silent commission (same as carrier page)
            if (originalBudget && originalBudget > 0) {
                const carrierAmount = calculateCarrierAmount(originalBudget);
                if (carrierAmount) {
                    return `£${carrierAmount.toFixed(2)}`;
                }
            }

            // Fallback for range display
            if (minBudget && maxBudget) {
                const minCarrier = calculateCarrierAmount(minBudget);
                const maxCarrier = calculateCarrierAmount(maxBudget);
                if (minCarrier && maxCarrier) {
                    return `£${minCarrier.toFixed(2)} - £${maxCarrier.toFixed(2)}`;
                }
                return `£${minBudget.toLocaleString()} - £${maxBudget.toLocaleString()}`;
            }
            
            return 'Negotiable';
        }

        // Function to create load card HTML
        function createLoadCard(loadId, loadData) {
            return `
                <div class="col-md-6 col-lg-4 mb-4" data-load-id="${loadId}">
                    <div class="card h-100 shadow-sm load-card">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <h5 class="card-title fw-bold text-primary mb-0" style="font-size: 1.1rem;">${loadData.loadTitle || 'Freight Load'}</h5>
                                ${getUrgencyBadge(loadData.urgency)}
                            </div>
                            
                            <div class="mb-3">
                                <div class="d-flex align-items-center mb-2">
                                    <i class="fas fa-map-marker-alt text-danger me-2"></i>
                                    <small class="text-muted"><strong>From:</strong> ${loadData.pickupLocation || 'N/A'}</small>
                                </div>
                                <div class="d-flex align-items-center">
                                    <i class="fas fa-map-marker-alt text-success me-2"></i>
                                    <small class="text-muted"><strong>To:</strong> ${loadData.deliveryLocation || 'N/A'}</small>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-6">
                                    <div class="load-info">
                                        <i class="fas fa-calendar text-primary me-1"></i>
                                        <small class="text-muted">${formatDate(loadData.pickupDate)}</small>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="load-info">
                                        <i class="fas fa-weight text-info me-1"></i>
                                        <small class="text-muted">${loadData.cargoWeight || 'N/A'} tonnes</small>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <div class="d-flex align-items-center mb-1">
                                    <i class="fas fa-box text-warning me-2"></i>
                                    <small class="text-muted"><strong>Cargo:</strong> ${loadData.cargoType || 'N/A'}</small>
                                </div>
                                <div class="d-flex align-items-center mb-1">
                                    <i class="fas fa-truck text-success me-2"></i>
                                    <small class="text-muted"><strong>Vehicle:</strong> ${loadData.vehicleType || 'N/A'}</small>
                                </div>
                                <div class="d-flex align-items-center">
                                    <i class="fas fa-pound-sign text-primary me-2"></i>
                                    <small class="text-muted"><strong>Budget:</strong> ${formatBudget(loadData.minBudget, loadData.maxBudget, loadData.budget)}</small>
                                </div>
                            </div>

                            ${loadData.cargoDescription ? `<p class="text-muted mb-3" style="font-size: 0.85rem;">${loadData.cargoDescription.substring(0, 100)}${loadData.cargoDescription.length > 100 ? '...' : ''}</p>` : ''}

                            <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top">
                                <small class="text-muted">
                                    <i class="far fa-clock me-1"></i>
                                    ${loadData.createdAt ? new Date(loadData.createdAt).toLocaleString('en-GB', { hour: '2-digit', minute: '2-digit' }) : 'Just now'}
                                </small>
                                <button class="btn btn-sm btn-outline-primary view-load-btn" data-load-id="${loadId}">
                                    <i class="fas fa-eye me-1"></i> View Details
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Function to add or update load card
        function addOrUpdateLoadCard(loadId, loadData) {
            if (loadData.status !== 'active') return; // Only show active loads

            const existingCard = loadsContainer.querySelector(`[data-load-id="${loadId}"]`);
            const cardHTML = createLoadCard(loadId, loadData);

            if (existingCard) {
                // Update existing card
                existingCard.outerHTML = cardHTML;
            } else {
                // Remove loading message if exists
                const loadingMsg = loadsContainer.querySelector('.loading-placeholder');
                if (loadingMsg) {
                    loadsContainer.innerHTML = '';
                }

                // Add new card at the beginning
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = cardHTML;
                loadsContainer.insertBefore(tempDiv.firstElementChild, loadsContainer.firstChild);
            }

            loadsMap.set(loadId, loadData);

            // Add click handlers for view buttons - redirect to supplier login
            document.querySelectorAll('.view-load-btn').forEach(btn => {
                // Remove existing listeners to avoid duplicates
                const newBtn = btn.cloneNode(true);
                btn.parentNode.replaceChild(newBtn, btn);
                
                newBtn.addEventListener('click', function() {
                    // Redirect to supplier login page
                    window.location.href = 'supplier/signin.html';
                });
            });
        }

        // Function to remove load card
        function removeLoadCard(loadId) {
            const card = loadsContainer.querySelector(`[data-load-id="${loadId}"]`);
            if (card) {
                card.style.transition = 'opacity 0.3s ease';
                card.style.opacity = '0';
                setTimeout(() => {
                    card.remove();
                    loadsMap.delete(loadId);

                    // Show empty message if no loads
                    if (loadsMap.size === 0) {
                        loadsContainer.innerHTML = `
                            <div class="col-12 empty-state">
                                <i class="fas fa-box-open"></i>
                                <h4 class="text-muted">No loads available at the moment</h4>
                                <p class="text-muted">Check back later for new freight loads</p>
                            </div>
                        `;
                    }
                }, 300);
            }
        }

        // Set up real-time listeners
        const loadsRef = ref(database, 'loads');
        
        // Listen for new loads using onChildAdded()
        onChildAdded(loadsRef, (snapshot) => {
            const loadId = snapshot.key;
            const loadData = snapshot.val();
            if (loadData && loadData.status === 'active') {
                addOrUpdateLoadCard(loadId, loadData);
            }
        });

        // Listen for removed loads
        onChildRemoved(loadsRef, (snapshot) => {
            const loadId = snapshot.key;
            removeLoadCard(loadId);
        });

        // Listen for updated loads
        onChildChanged(loadsRef, (snapshot) => {
            const loadId = snapshot.key;
            const loadData = snapshot.val();
            if (loadData && loadData.status === 'active') {
                addOrUpdateLoadCard(loadId, loadData);
            } else {
                removeLoadCard(loadId);
            }
        });

    </script>
</body>
</html>
