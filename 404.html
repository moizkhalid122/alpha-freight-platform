<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Alpha Freight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
    <style>
        /* 404 Page Specific Styles */
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            padding: 2rem;
        }

        .error-content {
            text-align: center;
            color: #333;
            max-width: 600px;
        }

        .error-image {
            width: 300px;
            height: auto;
            margin: 0 auto 2rem;
            display: block;
        }

        .error-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #333;
        }

        .error-message {
            font-size: 1rem;
            margin-bottom: 2rem;
            color: #666;
            line-height: 1.6;
        }

        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .btn-home {
            background: #333;
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 5px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background: #555;
            color: white;
        }

        .btn-back {
            background: #f5f5f5;
            color: #333;
            padding: 0.75rem 2rem;
            border-radius: 5px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid #ddd;
        }

        .btn-back:hover {
            background: #e5e5e5;
            color: #333;
        }

        .quick-links {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #eee;
        }

        .quick-links h5 {
            margin-bottom: 1rem;
            font-size: 1rem;
            color: #666;
            font-weight: 500;
        }

        .quick-links-list {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .quick-links-list a {
            color: #333;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            background: #f5f5f5;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .quick-links-list a:hover {
            background: #e5e5e5;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .error-image {
                width: 200px;
            }

            .error-title {
                font-size: 1.5rem;
            }

            .error-message {
                font-size: 0.9rem;
            }

            .error-actions {
                flex-direction: column;
                align-items: center;
            }

            .btn-home,
            .btn-back {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <img src="pages/shy.png" alt="404" class="error-image">
            <h2 class="error-title">Oops! Page Not Found</h2>
            <p class="error-message">
                The page you're looking for seems to have taken a wrong turn. 
                It might have been moved, deleted, or doesn't exist.
            </p>
            
            <div class="error-actions">
                <a href="index.html" class="btn-home">
                    <i class="fas fa-home me-2"></i>Go to Homepage
                </a>
                <a href="javascript:history.back()" class="btn-back">
                    <i class="fas fa-arrow-left me-2"></i>Go Back
                </a>
            </div>

            <div class="quick-links">
                <h5>Quick Links:</h5>
                <div class="quick-links-list">
                    <a href="pages/carrier/signin.html">
                        <i class="fas fa-truck me-1"></i> Carrier Login
                    </a>
                    <a href="pages/supplier/signin.html">
                        <i class="fas fa-box me-1"></i> Supplier Login
                    </a>
                    <a href="pages/available-loads.html">
                        <i class="fas fa-list me-1"></i> Available Loads
                    </a>
                    <a href="pages/contact.html">
                        <i class="fas fa-envelope me-1"></i> Contact Us
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/404-handler.js"></script>
</body>
</html>
