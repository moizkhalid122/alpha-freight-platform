    <style>
        :root {
            --primary: #6f42c1;
            --primary-dark: #4c2d8b;
            --primary-light: #c4b5fd;
            --success: #059669;
            --error: #dc2626;
            --warning: #d97706;
            --text-dark: #0f172a;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --bg-main: #f1f5f9;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.06);
            --shadow-card: 0 10px 34px rgba(15, 23, 42, 0.08), 0 2px 8px rgba(15, 23, 42, 0.03);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 22px;
            --radius-sm: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #e2e8f0 0%, #f1f5f9 18%, #f8fafc 100%);
            min-height: 100vh;
            color: var(--text-dark);
        }

        .header {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 52%, #4c2d8b 100%);
            color: #fff;
            padding: 1.55rem 1.25rem 1.1rem;
            border-radius: 0 0 30px 30px;
            position: relative;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(600px 260px at 18% 12%, rgba(196, 181, 253, 0.18) 0%, transparent 60%);
            pointer-events: none;
        }
        .header-row {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        .title {
            font-size: 1.15rem;
            font-weight: 900;
            letter-spacing: -0.03em;
        }
        .sub {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.82);
            margin-top: 0.25rem;
        }
        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.14);
            color: #fff;
            display: grid;
            place-items: center;
            cursor: pointer;
        }
        .icon-btn:active { transform: scale(0.98); }

        .content { padding: 0 1.25rem 1.25rem; }

        .filters {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 0.9rem;
            margin-bottom: 0.95rem;
        }
        .field {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }
        .field:last-child { margin-bottom: 0; }
        .input, .select {
            width: 100%;
            padding: 0.85rem 0.95rem;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: rgba(241, 245, 249, 0.85);
            color: var(--text-dark);
            font-weight: 700;
            outline: none;
        }
        .input:focus, .select:focus {
            border-color: rgba(111, 66, 193, 0.65);
            box-shadow: 0 0 0 4px rgba(111, 66, 193, 0.12);
            background: #fff;
        }

        .counts {
            display: flex;
            justify-content: space-between;
            gap: 0.75rem;
            font-size: 0.85rem;
            color: var(--text-medium);
            margin-bottom: 0.85rem;
        }
        .counts strong { color: var(--text-dark); }

        .list { display: grid; gap: 0.85rem; }
        .user-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
            padding: 1rem;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .user-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary-light), var(--primary));
            opacity: 0.75;
        }
        .top {
            display: flex;
            justify-content: space-between;
            gap: 0.75rem;
            align-items: flex-start;
        }
        .name { font-weight: 900; letter-spacing: -0.02em; }
        .subline { color: var(--text-medium); font-size: 0.88rem; margin-top: 0.25rem; }
        .meta {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
            font-size: 0.82rem;
            color: var(--text-medium);
        }
        .meta span { display: inline-flex; align-items: center; gap: 0.35rem; }

        .badge {
            font-size: 0.75rem;
            font-weight: 900;
            border-radius: 999px;
            padding: 0.35rem 0.65rem;
            white-space: nowrap;
        }
        .badge.success { background: rgba(5, 150, 105, 0.12); color: var(--success); }
        .badge.warning { background: rgba(217, 119, 6, 0.14); color: var(--warning); }

        .empty {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 1.5rem;
            text-align: center;
            color: var(--text-medium);
        }
        .empty i { font-size: 2rem; color: var(--primary); margin-bottom: 0.5rem; }
        .empty h3 { color: var(--text-dark); font-size: 1.05rem; font-weight: 900; margin-bottom: 0.25rem; }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.55);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
            z-index: 2000;
        }
        .modal {
            width: min(520px, 100%);
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 22px;
            box-shadow: 0 24px 60px rgba(2, 6, 23, 0.35);
            overflow: hidden;
        }
        .modal-head {
            padding: 1rem 1rem 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.75rem;
        }
        .modal-title { font-weight: 900; color: var(--text-dark); letter-spacing: -0.02em; }
        .modal-sub { font-size: 0.85rem; color: var(--text-medium); margin-top: 0.2rem; }
        .close-btn {
            border: 0;
            background: rgba(15, 23, 42, 0.06);
            border-radius: 14px;
            width: 42px;
            height: 42px;
            cursor: pointer;
            color: var(--text-dark);
        }
        .modal-body {
            padding: 0 1rem 1rem;
            color: var(--text-dark);
            font-size: 0.9rem;
        }
        .kv {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.75rem 0;
            border-top: 1px solid rgba(15, 23, 42, 0.10);
        }
        .kv:first-child { border-top: 0; padding-top: 0; }
        .k { color: var(--text-medium); font-weight: 800; }
        .v { font-weight: 900; text-align: right; }

        @media (min-width: 768px) {
            body { max-width: 520px; margin: 0 auto; box-shadow: 0 0 48px rgba(15, 23, 42, 0.12); }
        }
    </style>
</head>
<body class="has-bottom-nav">
    <div class="header">
        <div class="header-row">
            <div>
                <div class="title">Carriers</div>
                <div class="sub" id="subText">Loading...</div>
            </div>
            <button class="icon-btn" type="button" onclick="refresh()">
                <i class="fas fa-rotate"></i>
            </button>
        </div>
    </div>

    <div class="content">
        <div class="filters">
            <div class="field">
                <input class="input" id="searchInput" placeholder="Search name, company, email, phone">
            </div>
            <div class="field">
                <select class="select" id="statusFilter">
                    <option value="all">All Status</option>
                    <option value="verified">Verified</option>
                    <option value="pending">Pending</option>
                </select>
            </div>
        </div>

        <div class="counts">
            <span>Total: <strong id="totalCount">0</strong></span>
            <span>Verified: <strong id="verifiedCount">0</strong></span>
            <span>Pending: <strong id="pendingCount">0</strong></span>
        </div>

        <div class="list" id="list"></div>
    </div>

    <div id="detailsOverlay" class="overlay">
        <div class="modal">
            <div class="modal-head">
                <div>
                    <div class="modal-title" id="modalTitle">Carrier</div>
                    <div class="modal-sub" id="modalSub">—</div>
                </div>
                <button class="close-btn" type="button" onclick="closeDetails()"><i class="fas fa-xmark"></i></button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <nav class="bottom-nav" aria-label="Main navigation">
        <a href="dashboard.html" class="bottom-nav-item">
            <i class="fas fa-house"></i><span>Home</span>
        </a>
        <a href="loads.html" class="bottom-nav-item">
            <i class="fas fa-boxes"></i><span>Loads</span>
        </a>
        <a href="finance.html" class="bottom-nav-item">
            <i class="fas fa-credit-card"></i><span>Finance</span>
        </a>
        <a href="messages.html" class="bottom-nav-item">
            <i class="fas fa-comments"></i><span>Chat</span>
        </a>
        <a href="settings.html" class="bottom-nav-item">
            <i class="fas fa-gear"></i><span>Settings</span>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="../../assets/js/firebase-init.js"></script>
    <script src="../../assets/js/admin-auth.js"></script>

    <script>
        const CACHE_KEY = 'admin_mobile_carriers_cache_v1';
        const CACHE_MAX_AGE_MS = 60000;
        let carriers = [];

        function normalizeStatus(rawStatus) {
            return String(rawStatus || '').trim().toLowerCase().replace(/_/g, '-');
        }

        function isVerifiedStatus(status) {
            const s = normalizeStatus(status);
            return s === 'verified' || s === 'approved' || s === 'active';
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function getDisplayName(u) {
            const company = u.companyName || u.company || '';
            const name = `${u.firstName || ''} ${u.lastName || ''}`.trim();
            return company || name || u.email || u.id || 'Carrier';
        }

        function getCache() {
            try {
                const raw = sessionStorage.getItem(CACHE_KEY);
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                if (!parsed || !parsed.ts || !parsed.data) return null;
                if (Date.now() - parsed.ts > CACHE_MAX_AGE_MS) return null;
                return parsed.data;
            } catch { return null; }
        }

        function setCache(data) {
            try { sessionStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch {}
        }

        function applyCounts() {
            const total = carriers.length;
            const verified = carriers.filter(u => isVerifiedStatus(u.status)).length;
            const pending = total - verified;
            document.getElementById('totalCount').textContent = total.toLocaleString();
            document.getElementById('verifiedCount').textContent = verified.toLocaleString();
            document.getElementById('pendingCount').textContent = pending.toLocaleString();
            document.getElementById('subText').textContent = `${total.toLocaleString()} carriers`;
        }

        function getFiltered() {
            const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
            const filter = document.getElementById('statusFilter').value;
            return carriers.filter(u => {
                const verified = isVerifiedStatus(u.status);
                if (filter === 'verified' && !verified) return false;
                if (filter === 'pending' && verified) return false;
                if (!q) return true;
                const name = getDisplayName(u).toLowerCase();
                const email = String(u.email || '').toLowerCase();
                const phone = String(u.phone || u.companyPhone || '').toLowerCase();
                const city = String(u.city || u.address || '').toLowerCase();
                return name.includes(q) || email.includes(q) || phone.includes(q) || city.includes(q);
            });
        }

        function render() {
            const list = document.getElementById('list');
            applyCounts();
            const filtered = getFiltered();
            if (!filtered.length) {
                list.innerHTML = `
                    <div class="empty">
                        <i class="fas fa-user-slash"></i>
                        <h3>No carriers found</h3>
                        <p>Try changing search or filter</p>
                    </div>
                `;
                return;
            }

            const sorted = filtered.slice().sort((a, b) => {
                const at = new Date(a.createdAt || a.updatedAt || 0).getTime() || 0;
                const bt = new Date(b.createdAt || b.updatedAt || 0).getTime() || 0;
                return bt - at;
            }).slice(0, 250);

            list.innerHTML = sorted.map(u => {
                const name = getDisplayName(u);
                const email = u.email || '—';
                const phone = u.phone || u.companyPhone || '—';
                const badge = isVerifiedStatus(u.status) ? '<span class="badge success">Verified</span>' : '<span class="badge warning">Pending</span>';
                const id = u.id || '';
                return `
                    <div class="user-card" onclick="openDetails('${escapeHtml(String(id))}')">
                        <div class="top">
                            <div>
                                <div class="name">${escapeHtml(name)}</div>
                                <div class="subline">${escapeHtml(email)}</div>
                            </div>
                            ${badge}
                        </div>
                        <div class="meta">
                            <span><i class="fas fa-phone"></i>${escapeHtml(phone)}</span>
                            <span><i class="fas fa-id-badge"></i>${escapeHtml(String(id).slice(0, 10) || '—')}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openDetails(id) {
            const overlay = document.getElementById('detailsOverlay');
            const u = carriers.find(x => String(x.id || '') === String(id)) || null;
            if (!overlay || !u) return;
            const name = getDisplayName(u);
            document.getElementById('modalTitle').textContent = name;
            document.getElementById('modalSub').textContent = isVerifiedStatus(u.status) ? 'Verified' : 'Pending';
            const fields = [
                ['Email', u.email || '—'],
                ['Phone', u.phone || u.companyPhone || '—'],
                ['Company', u.companyName || u.company || '—'],
                ['City', u.city || '—'],
                ['Address', u.address || '—'],
                ['Status', normalizeStatus(u.status) || 'pending'],
                ['ID', u.id || '—']
            ];
            document.getElementById('modalBody').innerHTML = fields.map(([k, v]) => `
                <div class="kv">
                    <div class="k">${escapeHtml(k)}</div>
                    <div class="v">${escapeHtml(v)}</div>
                </div>
            `).join('');
            overlay.style.display = 'flex';
        }

        function closeDetails() {
            const overlay = document.getElementById('detailsOverlay');
            if (overlay) overlay.style.display = 'none';
        }

        async function fetchData(force = false) {
            const cached = getCache();
            if (cached && !force) {
                carriers = cached;
                render();
            } else {
                document.getElementById('subText').textContent = 'Loading...';
            }

            const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
            if (!db) return;
            try {
                if (typeof window.ensureAdminFirebaseAuthReady === 'function') {
                    try { await window.ensureAdminFirebaseAuthReady(); } catch (e) {}
                }
                const snap = await db.ref('carriers').once('value');
                const list = [];
                if (snap.exists()) {
                    snap.forEach(ch => list.push({ id: ch.key, ...(ch.val() || {}) }));
                }
                carriers = list;
                setCache(list);
                render();
            } catch (e) {
                document.getElementById('list').innerHTML = `
                    <div class="empty">
                        <i class="fas fa-triangle-exclamation"></i>
                        <h3>Failed to load</h3>
                        <p>${escapeHtml((e && (e.code || e.message)) ? (e.code || e.message) : 'Check connection and try refresh')}</p>
                    </div>
                `;
            }
        }

        function refresh() {
            fetchData(true);
        }

        document.addEventListener('DOMContentLoaded', function() {
            fetchData(false);
            document.getElementById('searchInput').addEventListener('input', render);
            document.getElementById('statusFilter').addEventListener('change', render);
            document.getElementById('detailsOverlay').addEventListener('click', function(e) {
                if (e.target && e.target.id === 'detailsOverlay') closeDetails();
            });
        });
    </script>
</body>
