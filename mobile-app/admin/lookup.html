    <style>
        :root {
            --primary: #6f42c1;
            --primary-dark: #4c2d8b;
            --primary-light: #c4b5fd;
            --success: #059669;
            --error: #dc2626;
            --warning: #d97706;

            --text-medium: #475569;
            --text-light: #94a3b8;
            --bg-main: #f1f5f9;
            --card-bg: #ffffff;
            --border: #e2e8f0;

            --shadow-card: 0 10px 34px rgba(15, 23, 42, 0.08), 0 2px 8px rgba(15, 23, 42, 0.03);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #e2e8f0 0%, #f1f5f9 18%, #f8fafc 100%);

            color: var(--text-dark);
        }

        .header {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 52%, #4c2d8b 100%);
            color: #fff;
            padding: 1.55rem 1.25rem 1.1rem;
            border-radius: 0 0 30px 30px;
            position: relative;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(600px 260px at 18% 12%, rgba(196, 181, 253, 0.18) 0%, transparent 60%);
            pointer-events: none;

        .header-row {

            justify-content: space-between;
            align-items: center;
            gap: 1rem;

        }
        .sub {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.82);
            margin-top: 0.25rem;
        }
        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.14);

            display: grid;
            place-items: center;
            cursor: pointer;
        }
        .icon-btn:active { transform: scale(0.98); }

        .content { padding: 0 1.25rem 1.25rem; }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
            padding: 1rem;
            position: relative;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary-light), var(--primary));
            opacity: 0.75;
        }

        .field {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.85rem;
        }
        .input, .select {
            width: 100%;
            padding: 0.85rem 0.95rem;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: rgba(241, 245, 249, 0.85);
            color: var(--text-dark);
            font-weight: 700;
            outline: none;
        }
        .input:focus, .select:focus {
            border-color: rgba(111, 66, 193, 0.65);
            box-shadow: 0 0 0 4px rgba(111, 66, 193, 0.12);
            background: #fff;
        }

        .btn {
            width: 100%;
            border: 0;
            border-radius: 999px;
            padding: 0.9rem 1rem;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(145deg, rgba(111, 66, 193, 0.95) 0%, rgba(232, 62, 140, 0.95) 100%);
            box-shadow: 0 18px 46px rgba(232, 62, 140, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
        }
        .btn:disabled { opacity: 0.65; cursor: not-allowed; }
        .btn:active { transform: scale(0.99); }

        .result-head {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: flex-start;
            margin-bottom: 0.65rem;
        }
        .name {
            font-weight: 900;
            letter-spacing: -0.02em;
            font-size: 1.1rem;
            margin-bottom: 0.15rem;
        }
        .meta { color: var(--text-medium); font-size: 0.88rem; }

        .pill {
            font-size: 0.75rem;
            font-weight: 900;
            border-radius: 999px;
            padding: 0.35rem 0.65rem;
            background: rgba(15, 23, 42, 0.06);
            color: var(--text-dark);
            white-space: nowrap;
        }
        .pill.success { background: rgba(5, 150, 105, 0.12); color: var(--success); }
        .pill.warning { background: rgba(217, 119, 6, 0.14); color: var(--warning); }

        .kv {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.75rem 0;
            border-top: 1px solid rgba(15, 23, 42, 0.10);
        }
        .kv:first-child { border-top: 0; padding-top: 0; }
        .k { color: var(--text-medium); font-weight: 900; }
        .v { font-weight: 800; text-align: right; word-break: break-word; }

        .json {
            margin-top: 0.85rem;
            padding: 0.9rem;
            border-radius: 16px;
            border: 1px solid rgba(15, 23, 42, 0.10);
            background: rgba(2, 6, 23, 0.03);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
            font-size: 0.8rem;
            color: var(--text-dark);
            overflow: auto;
            max-height: 40vh;
            white-space: pre;
        }

        .empty {
            padding: 1.5rem;
            text-align: center;
            color: var(--text-medium);
        }
        .empty i { font-size: 2rem; color: var(--primary); margin-bottom: 0.5rem; }
        .empty h3 { color: var(--text-dark); font-size: 1.05rem; font-weight: 900; margin-bottom: 0.25rem; }

        @media (min-width: 768px) {
            body { max-width: 520px; margin: 0 auto; box-shadow: 0 0 48px rgba(15, 23, 42, 0.12); }
        }

</head>
<body class="has-bottom-nav">
    <div class="header">
        <div class="header-row">
            <div>
                <div class="title">ID Lookup</div>
                <div class="sub">Search supplier/carrier by ID</div>
            </div>
            <button class="icon-btn" type="button" onclick="window.location.href='ids.html'">
                <i class="fas fa-list"></i>
            </button>
        </div>
    </div>

    <div class="content">
        <div class="card">
            <div class="field">
                <input class="input" id="idInput" placeholder="Enter user ID">
            </div>
            <div class="field">
                <select class="select" id="typeSelect">
                    <option value="auto">Auto detect</option>
                    <option value="supplier">Supplier</option>
                    <option value="carrier">Carrier</option>
                </select>
            </div>
            <button class="btn" id="searchBtn" type="button" onclick="doLookup()">
                <i class="fas fa-magnifying-glass"></i> Search
            </button>
        </div>

        <div class="card" id="resultCard" style="display:none;"></div>
    </div>

        </a>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="../../assets/js/firebase-init.js"></script>
    <script src="../../assets/js/admin-auth.js"></script>

    <script>
        const CACHE_KEY = 'admin_mobile_lookup_cache_v1';
        const CACHE_MAX_AGE_MS = 300000;

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function normalizeStatus(rawStatus) {
            return String(rawStatus || '').trim().toLowerCase().replace(/_/g, '-');
        }

        function getDisplayName(u) {
            const company = u.companyName || u.company || '';
            const name = `${u.firstName || ''} ${u.lastName || ''}`.trim();
            return company || name || u.email || u.id || 'User';
        }

        function getCache(id, type) {
            try {
                const raw = sessionStorage.getItem(CACHE_KEY);
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                if (!parsed || !parsed.ts || !parsed.data) return null;
                if (Date.now() - parsed.ts > CACHE_MAX_AGE_MS) return null;
                const key = `${type}:${id}`;
                return parsed.data[key] || null;
            } catch { return null; }
        }

        function setCache(id, type, value) {
            try {
                const raw = sessionStorage.getItem(CACHE_KEY);
                let parsed = null;
                try { parsed = raw ? JSON.parse(raw) : null; } catch (e) { parsed = null; }
                const data = parsed && parsed.data ? parsed.data : {};
                const key = `${type}:${id}`;
                data[key] = value;
                sessionStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
            } catch {}
        }

        function setResultHtml(html) {
            const card = document.getElementById('resultCard');
            card.style.display = 'block';
            card.innerHTML = html;
        }

        function renderUserResult(user, userType, userId) {
            const name = getDisplayName(user);
            const email = user.email || '—';
            const phone = user.phone || user.companyPhone || user.mobile || '—';
            const status = normalizeStatus(user.status);
            const statusPill = status === 'active' || status === 'verified' || status === 'approved'
                ? '<span class="pill success">Verified</span>'
                : '<span class="pill warning">Pending</span>';

            const top = `
                <div class="result-head">
                    <div>
                        <div class="name">${escapeHtml(name)}</div>
                        <div class="meta">${escapeHtml(email)} • ${escapeHtml(phone)}</div>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:0.5rem;align-items:flex-end;">
                        <span class="pill">${escapeHtml(userType)}</span>
                        ${statusPill}
                    </div>
                </div>
            `;

            const fields = [
                ['ID', userId],
                ['Status', status || 'pending'],
                ['Company', user.companyName || user.company || '—'],
                ['City', user.city || '—'],
                ['Address', user.address || '—'],
                ['Created', user.createdAt || user.created_at || '—'],
                ['Updated', user.updatedAt || user.updated_at || '—']
            ];

            const kvHtml = fields.map(([k, v]) => `
                <div class="kv">
                    <div class="k">${escapeHtml(k)}</div>
                    <div class="v">${escapeHtml(v)}</div>
                </div>
            `).join('');

            const json = `<div class="json">${escapeHtml(JSON.stringify(user, null, 2))}</div>`;
            setResultHtml(top + kvHtml + json);
        }

        function renderNotFound(id) {
            setResultHtml(`
                <div class="empty">
                    <i class="fas fa-user-slash"></i>
                    <h3>User not found</h3>
                    <p>ID: ${escapeHtml(id)}</p>
                </div>
            `);
        }

        function renderError(err) {
            const msg = (err && (err.code || err.message)) ? (err.code || err.message) : 'Failed';
            setResultHtml(`
                <div class="empty">
                    <i class="fas fa-triangle-exclamation"></i>
                    <h3>Failed to load</h3>
                    <p>${escapeHtml(msg)}</p>
                </div>
            `);
        }

        async function fetchUser(type, id) {
            const cached = getCache(id, type);
            if (cached) return cached;

            if (typeof window.ensureAdminFirebaseAuthReady === 'function') {
                try { await window.ensureAdminFirebaseAuthReady(); } catch (e) {}
            }
            const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
            if (!db) throw new Error('Firebase not ready');

            const path = type === 'supplier' ? `suppliers/${id}` : `carriers/${id}`;
            const snap = await db.ref(path).once('value');
            if (!snap.exists()) return null;
            const value = snap.val() || {};
            setCache(id, type, value);
            return value;
        }

        async function doLookup() {
            const btn = document.getElementById('searchBtn');
            const id = (document.getElementById('idInput').value || '').trim();
            const type = document.getElementById('typeSelect').value;
            if (!id) return;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Searching...';
            setResultHtml(`
                <div class="empty">
                    <i class="fas fa-spinner fa-spin"></i>
                    <h3>Searching</h3>
                    <p>Please wait</p>
                </div>
            `);

            try {
                if (type === 'supplier' || type === 'carrier') {
                    const user = await fetchUser(type, id);
                    if (!user) { renderNotFound(id); return; }
                    renderUserResult(user, type, id);
                    return;
                }

                const supplier = await fetchUser('supplier', id);
                if (supplier) {
                    renderUserResult(supplier, 'supplier', id);
                    return;
                }
                const carrier = await fetchUser('carrier', id);
                if (carrier) {
                    renderUserResult(carrier, 'carrier', id);
                    return;
                }
                renderNotFound(id);
            } catch (e) {
                renderError(e);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-magnifying-glass"></i> Search';
            }
        }

        function parseParams() {
            const params = new URLSearchParams(window.location.search);
            const id = (params.get('id') || '').trim();
            const type = (params.get('type') || 'auto').trim();
            return { id, type };
        }

        document.addEventListener('DOMContentLoaded', function() {
            const { id, type } = parseParams();
            if (id) document.getElementById('idInput').value = id;
            if (type === 'supplier' || type === 'carrier') document.getElementById('typeSelect').value = type;
            if (id) doLookup();
            document.getElementById('idInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') doLookup();
            });
        });
    </script>
</body>
