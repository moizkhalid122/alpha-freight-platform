    <style>
        :root {
            --primary: #6f42c1;
            --primary-dark: #4c2d8b;
            --primary-light: #c4b5fd;
            --success: #059669;
            --error: #dc2626;
            --warning: #d97706;
            --text-dark: #0f172a;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --bg-main: #f1f5f9;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.06);
            --shadow-card: 0 10px 34px rgba(15, 23, 42, 0.08), 0 2px 8px rgba(15, 23, 42, 0.03);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 22px;
            --radius-sm: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #e2e8f0 0%, #f1f5f9 18%, #f8fafc 100%);
            min-height: 100vh;
            color: var(--text-dark);
        }

        .header {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 52%, #4c2d8b 100%);
            color: #fff;
            padding: 1.55rem 1.25rem 1.1rem;
            border-radius: 0 0 30px 30px;
            position: relative;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(600px 260px at 18% 12%, rgba(196, 181, 253, 0.18) 0%, transparent 60%);
            pointer-events: none;
        }
        .header-row {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        .title {
            font-size: 1.15rem;
            font-weight: 900;
            letter-spacing: -0.03em;
        }
        .sub {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.82);
            margin-top: 0.25rem;
        }
        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.14);
            color: #fff;
            display: grid;
            place-items: center;
            cursor: pointer;
        }
        .icon-btn:active { transform: scale(0.98); }

        .content { padding: 0 1.25rem 1.25rem; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.85rem;
            margin-bottom: 1rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary-light), var(--primary));
            opacity: 0.75;
        }
        .metric-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.55rem;
        }
        .metric-label {
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-medium);
        }
        .metric-icon {
            width: 38px;
            height: 38px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: rgba(217, 119, 6, 0.12);
            color: var(--warning);
        }
        .metric-value {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: -0.03em;
            color: var(--text-dark);
            min-height: 1.9rem;
        }
        .metric-sub {
            margin-top: 0.15rem;
            font-size: 0.82rem;
            color: var(--text-medium);
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
            overflow: hidden;
        }
        .panel-head {
            padding: 0.95rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            background: rgba(241, 245, 249, 0.65);
        }
        .panel-title { font-weight: 900; letter-spacing: -0.02em; }
        .pill {
            font-size: 0.75rem;
            font-weight: 900;
            border-radius: 999px;
            padding: 0.35rem 0.65rem;
            background: rgba(217, 119, 6, 0.14);
            color: var(--warning);
            white-space: nowrap;
        }

        .row-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            padding: 0.95rem 1rem;
            border-bottom: 1px solid var(--border);
        }
        .row-item:last-child { border-bottom: none; }
        .row-left { min-width: 0; }
        .row-title {
            font-weight: 900;
            letter-spacing: -0.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .row-sub {
            margin-top: 0.25rem;
            color: var(--text-medium);
            font-size: 0.84rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            align-items: flex-end;
        }
        .btn {
            border: 0;
            border-radius: 999px;
            padding: 0.6rem 0.85rem;
            font-weight: 900;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .btn-approve {
            background: linear-gradient(145deg, rgba(5, 150, 105, 0.95) 0%, rgba(16, 185, 129, 0.95) 100%);
            color: #fff;
            box-shadow: 0 16px 28px rgba(5, 150, 105, 0.18);
        }
        .btn:disabled { opacity: 0.65; cursor: not-allowed; }

        .empty {
            padding: 1.5rem;
            text-align: center;
            color: var(--text-medium);
        }
        .empty i { font-size: 2rem; color: var(--primary); margin-bottom: 0.5rem; }
        .empty h3 { color: var(--text-dark); font-size: 1.05rem; font-weight: 900; margin-bottom: 0.25rem; }

        @media (min-width: 768px) {
            body { max-width: 520px; margin: 0 auto; box-shadow: 0 0 48px rgba(15, 23, 42, 0.12); }
        }
    </style>
</head>
<body class="has-bottom-nav">
    <div class="header">
        <div class="header-row">
            <div>
                <div class="title">Verifications</div>
                <div class="sub">Approve pending carriers + suppliers</div>
            </div>
            <button class="icon-btn" type="button" onclick="refresh()">
                <i class="fas fa-rotate"></i>
            </button>
        </div>
    </div>

    <div class="content">
        <div class="grid">
            <div class="card">
                <div class="metric-top">
                    <div class="metric-label">Carrier Pending</div>
                    <div class="metric-icon"><i class="fas fa-truck"></i></div>
                </div>
                <div class="metric-value" id="carrierPendingCount">0</div>
                <div class="metric-sub">Need approval</div>
            </div>
            <div class="card">
                <div class="metric-top">
                    <div class="metric-label">Supplier Pending</div>
                    <div class="metric-icon"><i class="fas fa-warehouse"></i></div>
                </div>
                <div class="metric-value" id="supplierPendingCount">0</div>
                <div class="metric-sub">Need approval</div>
            </div>
        </div>

        <div class="panel" id="panel">
            <div class="panel-head">
                <div class="panel-title">Pending Users</div>
                <div class="pill" id="pendingTotalPill">0</div>
            </div>
            <div id="list"></div>
        </div>
    </div>

    <nav class="bottom-nav" aria-label="Main navigation">

        <a href="finance.html" class="bottom-nav-item">

        </a>
        <a href="messages.html" class="bottom-nav-item">
            <i class="fas fa-comments"></i><span>Chat</span>
        </a>
        <a href="settings.html" class="bottom-nav-item">
            <i class="fas fa-gear"></i><span>Settings</span>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="../../assets/js/firebase-init.js"></script>
    <script src="../../assets/js/admin-auth.js"></script>

    <script>
        let db = null;
        let pending = [];

        function normalizeStatus(rawStatus) {
            return String(rawStatus || '').trim().toLowerCase().replace(/_/g, '-');
        }

        function isVerifiedStatus(status) {
            const s = normalizeStatus(status);
            return s === 'verified' || s === 'approved' || s === 'active';
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function getDisplayName(u) {
            const company = u.companyName || u.company || '';
            const name = `${u.firstName || ''} ${u.lastName || ''}`.trim();
            return company || name || u.email || u.id || 'User';
        }

        function countDocs(u) {
            try {
                const docs = (u && u.verificationDocs) ? u.verificationDocs : {};
                return Object.keys(docs || {}).filter(k => docs && docs[k] && docs[k].url).length;
            } catch (e) {
                return 0;
            }
        }

        function applyCounts() {
            const carrierPending = pending.filter(p => p.userType === 'carrier').length;
            const supplierPending = pending.filter(p => p.userType === 'supplier').length;
            document.getElementById('carrierPendingCount').textContent = carrierPending.toLocaleString();
            document.getElementById('supplierPendingCount').textContent = supplierPending.toLocaleString();
            document.getElementById('pendingTotalPill').textContent = pending.length.toLocaleString();
        }

        function render() {
            applyCounts();
            const list = document.getElementById('list');
            if (!pending.length) {
                list.innerHTML = `
                    <div class="empty">
                        <i class="fas fa-circle-check"></i>
                        <h3>No pending users</h3>
                        <p>All verified</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = pending.slice(0, 120).map(u => {
                const name = getDisplayName(u);
                const typeLabel = u.userType === 'carrier' ? 'Carrier' : 'Supplier';
                const email = u.email || '—';
                const id = u.id || '';
                const docsCount = countDocs(u);
                const docsText = docsCount ? ` • Docs: ${docsCount}` : '';
                return `
                    <div class="row-item">
                        <div class="row-left">
                            <div class="row-title">${escapeHtml(name)} • ${escapeHtml(typeLabel)}</div>
                            <div class="row-sub">${escapeHtml(email)} • ${escapeHtml(String(id).slice(0, 10) || '—')}${escapeHtml(docsText)}</div>
                        </div>
                        <div class="actions">
                            <button class="btn btn-approve" type="button" onclick="approveUser('${escapeHtml(id)}','${escapeHtml(u.userType)}', this)">Approve</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function approveUser(userId, userType, btn) {
            if (!db || !userId || !userType) return;
            if (btn) btn.disabled = true;
            const path = userType === 'carrier' ? 'carriers/' + userId : 'suppliers/' + userId;
            try {
                await db.ref(path).update({
                    status: 'active',
                    approvedAt: new Date().toISOString(),
                    verifiedAt: new Date().toISOString(),
                    kycStatus: 'approved',
                    kycApprovedAt: new Date().toISOString()
                });
                pending = pending.filter(x => !(x.userType === userType && String(x.id) === String(userId)));
                render();
            } catch (e) {
                if (btn) btn.disabled = false;
            }
        }

        async function fetchData() {
            if (!db) return;
            document.getElementById('list').innerHTML = `
                <div class="empty">
                    <i class="fas fa-spinner fa-spin"></i>
                    <h3>Loading</h3>
                    <p>Please wait</p>
                </div>
            `;

            try {
                if (typeof window.ensureAdminFirebaseAuthReady === 'function') {
                    try { await window.ensureAdminFirebaseAuthReady(); } catch (e) {}
                }
                const [supSnap, carSnap] = await Promise.all([
                    db.ref('suppliers').once('value'),
                    db.ref('carriers').once('value')
                ]);

                const list = [];
                if (supSnap.exists()) supSnap.forEach(ch => list.push({ userType: 'supplier', id: ch.key, ...(ch.val() || {}) }));
                if (carSnap.exists()) carSnap.forEach(ch => list.push({ userType: 'carrier', id: ch.key, ...(ch.val() || {}) }));

                pending = list.filter(u => !isVerifiedStatus(u.status));
                pending.sort((a, b) => {
                    const at = new Date(a.createdAt || a.updatedAt || 0).getTime() || 0;
                    const bt = new Date(b.createdAt || b.updatedAt || 0).getTime() || 0;
                    return bt - at;
                });

                render();
            } catch (e) {
                pending = [];
                render();
            }
        }

        function refresh() {
            fetchData();
        }

        document.addEventListener('DOMContentLoaded', function() {
            db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
            fetchData();
        });
    </script>
</body>
