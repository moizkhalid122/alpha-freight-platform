<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        :root {
            --primary: #6f42c1;
            --primary-dark: #4c2d8b;
            --primary-light: #c4b5fd;
            --success: #059669;
            --error: #dc2626;
            --warning: #d97706;
            --text-dark: #0f172a;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --bg-main: #f1f5f9;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.06);
            --shadow-card: 0 10px 34px rgba(15, 23, 42, 0.08), 0 2px 8px rgba(15, 23, 42, 0.03);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 22px;
            --radius-sm: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #e2e8f0 0%, #f1f5f9 18%, #f8fafc 100%);
            min-height: 100vh;
            color: var(--text-dark);
        }

        .header {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 52%, #4c2d8b 100%);
            color: #fff;
            padding: 1.55rem 1.25rem 1.1rem;
            border-radius: 0 0 30px 30px;
            position: relative;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(600px 260px at 18% 12%, rgba(196, 181, 253, 0.18) 0%, transparent 60%);
            pointer-events: none;
        }
        .header-row {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        .title {
            font-size: 1.15rem;
            font-weight: 900;
            letter-spacing: -0.03em;
        }
        .sub {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.82);
            margin-top: 0.25rem;
        }
        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.14);
            color: #fff;
            display: grid;
            place-items: center;
            cursor: pointer;
        }
        .icon-btn:active { transform: scale(0.98); }

        .content { padding: 0 1.25rem 1.25rem; }

        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 0.9rem;
        }
        .tab {
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.85);
            border-radius: 999px;
            padding: 0.7rem 0.85rem;
            font-weight: 900;
            color: var(--text-dark);
            cursor: pointer;
        }
        .tab.active {
            border-color: rgba(111, 66, 193, 0.4);
            background: linear-gradient(145deg, rgba(111, 66, 193, 0.14) 0%, rgba(232, 62, 140, 0.08) 100%);
            color: var(--primary-dark);
        }

        .filters {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 0.9rem;
            margin-bottom: 0.95rem;
        }
        .input {
            width: 100%;
            padding: 0.85rem 0.95rem;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            background: rgba(241, 245, 249, 0.85);
            color: var(--text-dark);
            font-weight: 700;
            outline: none;
        }
        .input:focus {
            border-color: rgba(111, 66, 193, 0.65);
            box-shadow: 0 0 0 4px rgba(111, 66, 193, 0.12);
            background: #fff;
        }

        .counts {
            display: flex;
            justify-content: space-between;
            gap: 0.75rem;
            font-size: 0.85rem;
            color: var(--text-medium);
            margin-bottom: 0.85rem;
        }
        .counts strong { color: var(--text-dark); }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
            overflow: hidden;
        }
        .row-item {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.95rem 1rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .row-item:last-child { border-bottom: none; }
        .row-item:active { background: rgba(15, 23, 42, 0.03); }
        .row-left { min-width: 0; }
        .row-title {
            font-weight: 900;
            letter-spacing: -0.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .row-sub {
            margin-top: 0.25rem;
            color: var(--text-medium);
            font-size: 0.84rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .actions {
            display: flex;
            gap: 0.55rem;
            align-items: center;
            flex-shrink: 0;
        }
        .chip {
            font-size: 0.75rem;
            font-weight: 900;
            border-radius: 999px;
            padding: 0.35rem 0.65rem;
            background: rgba(15, 23, 42, 0.06);
            color: var(--text-dark);
            white-space: nowrap;
        }
        .copy-btn {
            width: 40px;
            height: 40px;
            border-radius: 16px;
            border: 1px solid rgba(111, 66, 193, 0.18);
            background: rgba(111, 66, 193, 0.10);
            color: var(--primary-dark);
            cursor: pointer;
            display: grid;
            place-items: center;
        }
        .copy-btn:active { transform: scale(0.98); }

        .empty {
            padding: 1.5rem;
            text-align: center;
            color: var(--text-medium);
        }
        .empty i { font-size: 2rem; color: var(--primary); margin-bottom: 0.5rem; }
        .empty h3 { color: var(--text-dark); font-size: 1.05rem; font-weight: 900; margin-bottom: 0.25rem; }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            background: rgba(2, 6, 23, 0.88);
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 14px;
            padding: 0.75rem 0.9rem;
            color: #fff;
            font-weight: 800;
            display: none;
            width: min(520px, calc(100% - 2rem));
            box-shadow: 0 22px 60px rgba(2, 6, 23, 0.6);
            z-index: 2200;
        }

        @media (min-width: 768px) {
            body { max-width: 520px; margin: 0 auto; box-shadow: 0 0 48px rgba(15, 23, 42, 0.12); }
        }
    </style>
</head>
<body class="has-bottom-nav">
    <div class="header">
        <div class="header-row">
            <div>
                <div class="title">User IDs</div>
                <div class="sub" id="subText">Loading...</div>
            </div>
            <button class="icon-btn" type="button" onclick="refresh()">
                <i class="fas fa-rotate"></i>
            </button>
        </div>
    </div>

    <div class="content">
        <div class="tabs">
            <button class="tab active" id="tabSup" type="button" onclick="setTab('suppliers')"><i class="fas fa-warehouse"></i> Suppliers</button>
            <button class="tab" id="tabCar" type="button" onclick="setTab('carriers')"><i class="fas fa-truck"></i> Carriers</button>
        </div>

        <div class="filters">
            <input class="input" id="searchInput" placeholder="Search by name, email, or id">
        </div>

        <div class="counts">
            <span>Total: <strong id="totalCount">0</strong></span>
            <span>Showing: <strong id="showingCount">0</strong></span>
            <span><a href="lookup.html" style="color:var(--primary-dark);font-weight:900;text-decoration:none;">ID Lookup</a></span>
        </div>

        <div class="panel" id="list"></div>
    </div>

    <div id="toast" class="toast"></div>

    <nav class="bottom-nav" aria-label="Main navigation">
        <a href="dashboard.html" class="bottom-nav-item">
            <i class="fas fa-house"></i><span>Home</span>
        </a>
        <a href="loads.html" class="bottom-nav-item">
            <i class="fas fa-boxes"></i><span>Loads</span>
        </a>
        <a href="finance.html" class="bottom-nav-item">
            <i class="fas fa-credit-card"></i><span>Finance</span>
        </a>
        <a href="messages.html" class="bottom-nav-item">
            <i class="fas fa-comments"></i><span>Chat</span>
        </a>
        <a href="settings.html" class="bottom-nav-item">
            <i class="fas fa-gear"></i><span>Settings</span>
        </a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="../../assets/js/firebase-init.js"></script>
    <script src="../../assets/js/admin-auth.js"></script>

    <script>
        const CACHE_KEY = 'admin_mobile_ids_cache_v1';
        const CACHE_MAX_AGE_MS = 60000;
        let currentTab = 'suppliers';
        let suppliers = [];
        let carriers = [];

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg || '';
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 1800);
        }

        function getDisplayName(u) {
            const company = u.companyName || u.company || '';
            const name = `${u.firstName || ''} ${u.lastName || ''}`.trim();
            return company || name || u.email || u.id || 'User';
        }

        function setTab(tab) {
            currentTab = tab;
            document.getElementById('tabSup').classList.toggle('active', tab === 'suppliers');
            document.getElementById('tabCar').classList.toggle('active', tab === 'carriers');
            render();
        }

        function getCache() {
            try {
                const raw = sessionStorage.getItem(CACHE_KEY);
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                if (!parsed || !parsed.ts || !parsed.data) return null;
                if (Date.now() - parsed.ts > CACHE_MAX_AGE_MS) return null;
                return parsed.data;
            } catch { return null; }
        }

        function setCache(data) {
            try { sessionStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch {}
        }

        function getCurrentList() {
            return currentTab === 'suppliers' ? suppliers : carriers;
        }

        function render() {
            const listEl = document.getElementById('list');
            const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
            const items = getCurrentList();
            const filtered = items.filter(u => {
                if (!q) return true;
                const name = getDisplayName(u).toLowerCase();
                const email = String(u.email || '').toLowerCase();
                const id = String(u.id || '').toLowerCase();
                return name.includes(q) || email.includes(q) || id.includes(q);
            });

            document.getElementById('totalCount').textContent = items.length.toLocaleString();
            document.getElementById('showingCount').textContent = filtered.length.toLocaleString();
            document.getElementById('subText').textContent = `${currentTab === 'suppliers' ? 'Suppliers' : 'Carriers'} IDs`;

            if (!filtered.length) {
                listEl.innerHTML = `
                    <div class="empty">
                        <i class="fas fa-users"></i>
                        <h3>No results</h3>
                        <p>Try a different search</p>
                    </div>
                `;
                return;
            }

            const sorted = filtered.slice().sort((a, b) => {
                const at = new Date(a.createdAt || a.updatedAt || 0).getTime() || 0;
                const bt = new Date(b.createdAt || b.updatedAt || 0).getTime() || 0;
                return bt - at;
            });

            listEl.innerHTML = sorted.map(u => {
                const id = u.id || '';
                const name = getDisplayName(u);
                const email = u.email || '—';
                const typeChip = currentTab === 'suppliers' ? 'Supplier' : 'Carrier';
                return `
                    <div class="row-item" onclick="openLookup('${escapeHtml(id)}','${currentTab}')">
                        <div class="row-left">
                            <div class="row-title">${escapeHtml(name)}</div>
                            <div class="row-sub">${escapeHtml(email)} • ${escapeHtml(String(id).slice(0, 18) || '—')}</div>
                        </div>
                        <div class="actions">
                            <div class="chip">${typeChip}</div>
                            <button class="copy-btn" type="button" onclick="copyId(event,'${escapeHtml(id)}')">
                                <i class="fas fa-copy"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openLookup(id, tab) {
            const type = tab === 'suppliers' ? 'supplier' : 'carrier';
            window.location.href = `lookup.html?id=${encodeURIComponent(id)}&type=${encodeURIComponent(type)}`;
        }

        async function copyId(event, id) {
            event.stopPropagation();
            try {
                await navigator.clipboard.writeText(id);
                showToast('ID copied');
            } catch (e) {
                showToast('Copy failed');
            }
        }

        async function fetchData(force = false) {
            const cached = getCache();
            if (cached && !force) {
                suppliers = Array.isArray(cached.suppliers) ? cached.suppliers : [];
                carriers = Array.isArray(cached.carriers) ? cached.carriers : [];
                render();
            } else {
                document.getElementById('subText').textContent = 'Loading...';
                document.getElementById('list').innerHTML = `
                    <div class="empty">
                        <i class="fas fa-spinner fa-spin"></i>
                        <h3>Loading</h3>
                        <p>Please wait</p>
                    </div>
                `;
            }

            if (typeof window.ensureAdminFirebaseAuthReady === 'function') {
                try { await window.ensureAdminFirebaseAuthReady(); } catch (e) {}
            }

            const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
            if (!db) return;

            try {
                const [supSnap, carSnap] = await Promise.all([
                    db.ref('suppliers').once('value'),
                    db.ref('carriers').once('value')
                ]);

                const sList = [];
                if (supSnap.exists()) supSnap.forEach(ch => sList.push({ id: ch.key, ...(ch.val() || {}) }));
                const cList = [];
                if (carSnap.exists()) carSnap.forEach(ch => cList.push({ id: ch.key, ...(ch.val() || {}) }));

                suppliers = sList;
                carriers = cList;
                setCache({ suppliers: sList, carriers: cList });
                render();
            } catch (e) {
                document.getElementById('list').innerHTML = `
                    <div class="empty">
                        <i class="fas fa-triangle-exclamation"></i>
                        <h3>Failed to load</h3>
                        <p>${escapeHtml((e && (e.code || e.message)) ? (e.code || e.message) : 'Check connection and try refresh')}</p>
                    </div>
                `;
            }
        }

        function refresh() {
            fetchData(true);
        }

        document.addEventListener('DOMContentLoaded', function() {
            fetchData(false);
            document.getElementById('searchInput').addEventListener('input', render);
        });
    </script>
</body>
</html>
