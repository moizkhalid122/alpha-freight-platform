<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F4F6FB">
  <title>Onboarding • Alpha Freight</title>
  <style>
    :root{
      --bg:#F4F6FB;
      --card:#FFFFFF;
      --text:#0F172A;
      --muted:#64748B;
      --line:rgba(148,163,184,0.26);
      --shadow:0 18px 50px rgba(15, 23, 42, 0.12);
      --radius:28px;
      --primary:#7C3AED;
      --primary2:#A78BFA;
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ height:100%; }
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(900px 520px at 10% 10%, rgba(167,139,250,0.22), rgba(244,246,251,0) 62%),
        radial-gradient(900px 520px at 90% 40%, rgba(124,58,237,0.14), rgba(244,246,251,0) 62%),
        linear-gradient(180deg, #FFFFFF, var(--bg));
      color:var(--text);
      overflow:hidden;
    }
    .wrap{
      min-height:100vh;
      min-height:100dvh;
      display:flex;
      align-items:stretch;
      justify-content:stretch;
      padding:0;
    }
    .device{
      width:100%;
      background:transparent;
      border-radius:0;
      box-shadow:none;
      overflow:hidden;
      border:0;
      height:100vh;
      height:100dvh;
      display:flex;
      flex-direction:column;
      position:relative;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 16px 14px;
      position:absolute;
      top:0;
      left:0;
      right:0;
      z-index:20;
      background:transparent;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .brand img{
      width:82px;
      height:82px;
      object-fit:contain;
    }
    .brand b{
      font-weight:1000;
      letter-spacing:-0.02em;
      font-size:0.92rem;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .skip{
      border:0;
      background:transparent;
      color:rgba(100,116,139,0.95);
      font-weight:900;
      font-size:0.9rem;
      padding:10px 10px;
      border-radius:12px;
      cursor:pointer;
      display:none;
    }
    .skip:active{ background:rgba(2,6,23,0.06); }

    .viewport{
      position:relative;
      width:100%;
      overflow:hidden;
      flex:1;
    }
    .track{
      display:flex;
      width:100%;
      height:100%;
      transform:translateX(0%);
      transition:transform 320ms cubic-bezier(.2,.9,.2,1);
      will-change:transform;
    }
    .slide{
      min-width:100%;
      height:100%;
      position:relative;
      background:transparent;
    }
    .hero{
      position:absolute;
      inset:0;
      overflow:hidden;
      background:linear-gradient(180deg, rgba(124,58,237,0.04), rgba(167,139,250,0.03));
      z-index:0;
    }
    .hero img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      position:absolute;
      inset:0;
      object-position: center 18%;
      transform: translateZ(0);
    }
    .slide:nth-child(2) .hero img{
      object-position: 84% 18%;
      transform: translateZ(0);
    }
    .hero-fallback{
      position:absolute;
      inset:0;
      display:none;
      place-items:center;
      padding:22px;
      z-index:1;
    }
    .hero-fallback svg{
      width:100%;
      height:100%;
      max-width:360px;
      max-height:360px;
      opacity:0.92;
    }

    .sheet{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:24%;
      min-height:190px;
      background:rgba(255,255,255,0.97);
      border-top-left-radius:var(--radius);
      border-top-right-radius:var(--radius);
      box-shadow:0 -8px 30px rgba(15,23,42,0.10);
      border-top:1px solid rgba(148,163,184,0.20);
      padding:14px 18px 14px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:10px;
      z-index:10;
    }
    .dots{
      display:flex;
      align-items:center;
      gap:7px;
      padding-left:2px;
    }
    .dot{
      width:7px;
      height:7px;
      border-radius:99px;
      background:rgba(100,116,139,0.22);
      transition:width 200ms cubic-bezier(.2,.9,.2,1), background 200ms cubic-bezier(.2,.9,.2,1);
    }
    .dot.active{
      width:20px;
      background:rgba(124,58,237,0.65);
    }
    .title{
      font-size:1.7rem;
      font-weight:1000;
      letter-spacing:-0.03em;
      line-height:1.08;
      margin-top:2px;
    }
    .subtitle{
      font-size:0.92rem;
      line-height:1.55;
      color:var(--muted);
      max-width:40ch;
    }

    .cta-wrap{
      padding:0;
    }
    .nav-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }
    .nav-btn{
      border:0;
      border-radius:14px;
      padding:12px 14px;
      font-weight:900;
      cursor:pointer;
      min-height:44px;
      flex:1;
    }
    .nav-btn.secondary{
      background:#fff;
      border:1px solid rgba(148,163,184,0.28);
      color:#0F172A;
    }
    .nav-btn.primary{
      background:linear-gradient(145deg, var(--primary), #5B21B6);
      color:#fff;
      box-shadow:0 14px 34px rgba(124,58,237,0.18);
    }
    .nav-btn:disabled{
      opacity:0.55;
      cursor:not-allowed;
      box-shadow:none;
    }
    .nav-btn:active{ transform:scale(0.99); }
    .slider{
      width:100%;
      background:rgba(124,58,237,0.12);
      border:1px solid rgba(124,58,237,0.22);
      border-radius:999px;
      padding:10px 10px;
      display:flex;
      align-items:center;
      gap:10px;
      position:relative;
      overflow:hidden;
      user-select:none;
      -webkit-user-select:none;
      touch-action:none;
    }
    .slider-text{
      font-weight:900;
      font-size:0.92rem;
      color:rgba(15,23,42,0.78);
      letter-spacing:-0.01em;
      text-align:center;
      flex:1;
      padding-right:48px;
    }
    .knob{
      width:44px;
      height:44px;
      border-radius:999px;
      background:linear-gradient(145deg, var(--primary), #5B21B6);
      box-shadow:0 14px 34px rgba(124,58,237,0.22);
      display:grid;
      place-items:center;
      flex:0 0 auto;
      transform:translateX(0);
      transition:transform 160ms cubic-bezier(.2,.9,.2,1);
    }
    .knob svg{ width:20px; height:20px; }
    .knob path{ fill:#fff; }
    .slider-fill{
      position:absolute;
      left:0; top:0; bottom:0;
      width:0%;
      background:linear-gradient(90deg, rgba(124,58,237,0.18), rgba(167,139,250,0.16));
      border-radius:999px;
      pointer-events:none;
      transition:width 160ms cubic-bezier(.2,.9,.2,1);
    }
    .slider:active .knob{ transform:translateX(0) scale(0.99); }

    @media (prefers-reduced-motion: reduce){
      .track{ transition:none; }
      .dot{ transition:none; }
      .knob{ transition:none; }
      .slider-fill{ transition:none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="device" role="application" aria-label="Onboarding">
      <div class="topbar"></div>

      <div class="viewport" id="viewport">
        <div class="track" id="track">
          <div class="slide">
            <div class="hero">
              <img id="heroImg1" src="/assets/img/onboarding/screen-1.jpg" alt="Truck loading illustration" loading="eager" decoding="async">
            </div>
            <div class="hero-fallback">
              <svg viewBox="0 0 600 420" aria-hidden="true">
                <rect x="52" y="110" width="430" height="170" rx="28" fill="rgba(255,255,255,0.82)"/>
                <rect x="86" y="138" width="210" height="70" rx="18" fill="rgba(124,58,237,0.16)"/>
                <rect x="312" y="150" width="140" height="56" rx="16" fill="rgba(167,139,250,0.22)"/>
                <rect x="315" y="210" width="180" height="40" rx="14" fill="rgba(15,23,42,0.10)"/>
                <circle cx="360" cy="270" r="24" fill="rgba(15,23,42,0.45)"/>
                <circle cx="450" cy="270" r="24" fill="rgba(15,23,42,0.45)"/>
                <path d="M120 252h360" stroke="rgba(15,23,42,0.12)" stroke-width="10" stroke-linecap="round"/>
              </svg>
            </div>
          </div>

          <div class="slide">
            <div class="hero">
              <img src="/assets/img/onboarding/screen-2.jpg" alt="GPS map with moving truck" onerror="this.style.display='none'; this.parentElement.parentElement.querySelector('.hero-fallback').style.display='grid';">
            </div>
            <div class="hero-fallback">
              <svg viewBox="0 0 600 420" aria-hidden="true">
                <rect x="52" y="90" width="496" height="240" rx="32" fill="rgba(255,255,255,0.82)"/>
                <path d="M110 150h160M110 200h280M110 250h210" stroke="rgba(15,23,42,0.14)" stroke-width="12" stroke-linecap="round"/>
                <path d="M190 140c70 40 110 80 160 130 45 45 80 55 140 80" stroke="rgba(124,58,237,0.72)" stroke-width="14" stroke-linecap="round" fill="none"/>
                <circle cx="190" cy="140" r="18" fill="rgba(124,58,237,0.90)"/>
                <circle cx="500" cy="320" r="18" fill="rgba(167,139,250,0.95)"/>
              </svg>
            </div>
          </div>

          <div class="slide">
            <div class="hero">
              <img src="/assets/img/onboarding/screen-3.jpg" alt="Money transfer illustration" onerror="this.style.display='none'; this.parentElement.parentElement.querySelector('.hero-fallback').style.display='grid';">
            </div>
            <div class="hero-fallback">
              <svg viewBox="0 0 600 420" aria-hidden="true">
                <rect x="62" y="110" width="476" height="180" rx="30" fill="rgba(255,255,255,0.82)"/>
                <rect x="100" y="154" width="230" height="18" rx="9" fill="rgba(15,23,42,0.12)"/>
                <rect x="100" y="186" width="160" height="18" rx="9" fill="rgba(15,23,42,0.12)"/>
                <circle cx="450" cy="200" r="44" fill="rgba(124,58,237,0.90)"/>
                <path d="M430 200h40" stroke="rgba(255,255,255,0.92)" stroke-width="10" stroke-linecap="round"/>
                <path d="M450 180v40" stroke="rgba(255,255,255,0.92)" stroke-width="10" stroke-linecap="round"/>
              </svg>
            </div>
          </div>

          <div class="slide">
            <div class="hero">
              <img src="/assets/img/onboarding/screen-4.jpg" alt="Verified badge with shield" onerror="this.style.display='none'; this.parentElement.parentElement.querySelector('.hero-fallback').style.display='grid';">
            </div>
            <div class="hero-fallback">
              <svg viewBox="0 0 600 420" aria-hidden="true">
                <rect x="82" y="90" width="436" height="240" rx="32" fill="rgba(255,255,255,0.82)"/>
                <path d="M300 135c85 40 145 40 145 40v90c0 90-62 140-145 170-83-30-145-80-145-170v-90s60 0 145-40z" fill="rgba(167,139,250,0.55)"/>
                <path d="M252 250l34 34 78-92" stroke="rgba(124,58,237,0.88)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              </svg>
            </div>
          </div>
        </div>

        <div class="sheet">
          <div class="content">
            <div class="dots" id="dots"></div>
            <div class="title" id="titleText">Post loads in 60 seconds</div>
            <div class="subtitle" id="subtitleText">Create a shipment fast and send it to trusted carriers.</div>
          </div>
          <div class="cta-wrap">
            <div class="nav-row" id="navRow">
              <button class="nav-btn secondary" type="button" id="btnBack">Back</button>
              <button class="nav-btn primary" type="button" id="btnNext">Next</button>
            </div>
            <div class="slider" id="slider" aria-label="Swipe to start" style="display:none;">
              <div class="slider-fill" id="sliderFill"></div>
              <div class="knob" id="knob" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M9.2 18.6a1.2 1.2 0 0 1 0-1.7l4.9-4.9-4.9-4.9a1.2 1.2 0 1 1 1.7-1.7l5.7 5.7a1.2 1.2 0 0 1 0 1.7l-5.7 5.7a1.2 1.2 0 0 1-1.7 0z"/>
                </svg>
              </div>
              <div class="slider-text" id="sliderText">Swipe to start</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var KEY = 'ab.mobile.onboarding.screens.v2.done';
      var track = document.getElementById('track');
      var viewport = document.getElementById('viewport');
      var dotsHost = document.getElementById('dots');
      var titleText = document.getElementById('titleText');
      var subtitleText = document.getElementById('subtitleText');
      var btnBack = document.getElementById('btnBack');
      var btnNext = document.getElementById('btnNext');
      var navRow = document.getElementById('navRow');
      var slider = document.getElementById('slider');
      var knob = document.getElementById('knob');
      var fill = document.getElementById('sliderFill');
      var sliderText = document.getElementById('sliderText');
      if (!track || !viewport || !dotsHost || !titleText || !subtitleText || !btnBack || !btnNext || !navRow || !slider || !knob || !fill || !sliderText) return;

      (function () {
        var img = document.getElementById('heroImg1');
        if (!img) return;
        var fallback = img.parentElement && img.parentElement.parentElement ? img.parentElement.parentElement.querySelector('.hero-fallback') : null;
        var candidates = [
          '/assets/img/onboarding/screen-1.jpg'
        ];
        var idx = 0;

        function showFallback() {
          try { img.style.display = 'none'; } catch (e) {}
          if (fallback) fallback.style.display = 'grid';
        }

        function tryNext() {
          if (idx >= candidates.length) { showFallback(); return; }
          var src = candidates[idx++];
          img.src = src;
        }

        img.addEventListener('error', tryNext);
        img.addEventListener('load', function () {
          try { if (fallback) fallback.style.display = 'none'; } catch (e) {}
          try { img.style.display = 'block'; } catch (e) {}
        });

        tryNext();
      })();

      var total = track.children.length || 4;
      var idx = 0;
      var startX = 0;
      var swiping = false;
      var knobX = 0;
      var maxX = 0;

      function setDone() { try { localStorage.setItem(KEY, '1'); } catch (e) {} }
      function nextUrl() {
        var params = new URLSearchParams(location.search);
        return params.get('next') || '/mobile-app/index.html';
      }
      function goNext() {
        setDone();
        var url = nextUrl();
        try { location.replace(url); } catch (e) { location.href = url; }
      }

      function renderDots() {
        dotsHost.innerHTML = '';
        for (var i = 0; i < total; i++) {
          var d = document.createElement('div');
          d.className = 'dot' + (i === idx ? ' active' : '');
          dotsHost.appendChild(d);
        }
      }

      function resetSwipe() {
        knobX = 0;
        try { knob.style.transform = 'translateX(0px)'; } catch (e) {}
        try { fill.style.width = '0%'; } catch (e) {}
      }

      function layoutSwipe() {
        try {
          var r = slider.getBoundingClientRect();
          maxX = Math.max(0, Math.floor(r.width - 20 - 44));
          resetSwipe();
        } catch (e) {
          maxX = 0;
          resetSwipe();
        }
      }

      function updateSwipe(x) {
        knobX = Math.max(0, Math.min(maxX, x));
        knob.style.transform = 'translateX(' + knobX + 'px)';
        var pct = maxX ? (knobX / maxX) : 0;
        fill.style.width = Math.round(pct * 100) + '%';
      }

      function finishSwipe() {
        var pct = maxX ? (knobX / maxX) : 0;
        if (pct >= 0.72) {
          updateSwipe(maxX);
          setTimeout(goNext, 110);
          return;
        }
        resetSwipe();
      }

      function setSlide(i) {
        idx = Math.max(0, Math.min(total - 1, i));
        track.style.transform = 'translateX(' + (-idx * 100) + '%)';
        renderDots();
        var titles = ['Post loads in 60 seconds', 'Real-time tracking', 'Get paid in 48 hours', 'Trusted carriers'];
        var subs = [
          'Create a shipment fast and send it to trusted carriers.',
          'Track pickup, transit, and delivery with live updates.',
          'Clear payouts with wallet ledger and withdrawals.',
          'Work with verified carriers and secure workflows.'
        ];
        titleText.textContent = titles[idx] || '';
        subtitleText.textContent = subs[idx] || '';

        btnBack.disabled = idx === 0;
        btnNext.textContent = (idx === total - 1) ? 'Start' : 'Next';

        if (idx === total - 1) {
          navRow.style.display = 'none';
          slider.style.display = 'flex';
          sliderText.textContent = 'Swipe to start';
          slider.setAttribute('aria-label', 'Swipe to start');
          layoutSwipe();
        } else {
          navRow.style.display = 'flex';
          slider.style.display = 'none';
          resetSwipe();
        }
      }

      viewport.addEventListener('touchstart', function (e) {
        try {
          var t = e.touches && e.touches[0];
          if (!t) return;
          startX = t.clientX;
        } catch (e2) {}
      }, { passive: true });
      viewport.addEventListener('touchend', function (e) {
        try {
          var t = e.changedTouches && e.changedTouches[0];
          if (!t) return;
          var dx = t.clientX - startX;
          if (Math.abs(dx) < 40) return;
          if (dx < 0) return;
          if (idx >= total - 1) goNext();
          else setSlide(idx + 1);
        } catch (e2) {}
      }, { passive: true });

      btnBack.addEventListener('click', function () {
        if (idx <= 0) return;
        setSlide(idx - 1);
      });
      btnNext.addEventListener('click', function () {
        if (idx >= total - 1) { goNext(); return; }
        setSlide(idx + 1);
      });

      slider.addEventListener('pointerdown', function (e) {
        if (idx !== total - 1) return;
        if (!e) return;
        layoutSwipe();
        swiping = true;
        startX = e.clientX;
        try { slider.setPointerCapture && slider.setPointerCapture(e.pointerId); } catch (e2) {}
      });
      slider.addEventListener('pointermove', function (e) {
        if (!swiping || idx !== total - 1) return;
        if (!e) return;
        updateSwipe(e.clientX - startX);
      });
      slider.addEventListener('pointerup', function () {
        if (!swiping) return;
        swiping = false;
        if (idx !== total - 1) { resetSwipe(); return; }
        finishSwipe();
      });
      slider.addEventListener('pointercancel', function () {
        if (!swiping) return;
        swiping = false;
        resetSwipe();
      });
      window.addEventListener('resize', function () {
        if (idx === total - 1) layoutSwipe();
      }, { passive: true });

      setSlide(0);
    })();
  </script>
</body>
</html>
