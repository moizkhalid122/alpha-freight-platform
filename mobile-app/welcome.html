<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#F6F7FB" />
  <title>Welcome • Alpha Freight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800;900&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg0: #FFFFFF;
      --bg1: #F6F7FB;
      --glowA: rgba(99, 91, 255, 0.10);
      --glowB: rgba(6, 182, 212, 0.10);
      --text: rgba(15,23,42,0.92);
      --muted: rgba(100,116,139,0.92);
      --card: rgba(255,255,255,0.92);
      --card-border: rgba(15,23,42,0.10);
      --shadow: 0 18px 55px rgba(15,23,42,0.10);
      --primary: #635bff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "Plus Jakarta Sans", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(900px 520px at 12% 6%, var(--glowA), rgba(246,247,251,0) 62%),
        radial-gradient(900px 520px at 88% 22%, var(--glowB), rgba(246,247,251,0) 62%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      color: var(--text);
      overflow: hidden;
    }
    .wrap {
      position: relative;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 18px;
    }
    .panel {
      width: 100%;
      max-width: 520px;
      text-align: center;
      display: grid;
      gap: 14px;
      align-items: center;
      justify-items: center;
      padding: 0;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      position: relative;
    }
    .panel::before{
      content:"";
      position:absolute;
      inset: -22% -18% auto -18%;
      height: 320px;
      background: radial-gradient(circle at 50% 45%, rgba(99,91,255,0.12), rgba(6,182,212,0.08) 45%, rgba(246,247,251,0) 70%);
      filter: blur(10px);
      pointer-events:none;
    }
    .logo {
      width: 180px;
      max-width: 70vw;
      opacity: 0;
      transform: translateY(10px) scale(0.98);
      filter: drop-shadow(0 14px 26px rgba(15,23,42,0.18));
      animation: logoIn 900ms cubic-bezier(.2,.9,.2,1) forwards;
      animation-delay: 120ms;
    }
    .title {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      opacity: 0;
      transform: translateY(10px);
      text-shadow: none;
    }
    .title strong {
      color: rgba(15,23,42,0.92);
      background: none;
      -webkit-background-clip: initial;
      background-clip: initial;
      filter: none;
    }
    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      opacity: 0;
      transform: translateY(10px);
    }
    .shine {
      position: absolute;
      inset: -40%;
      background: conic-gradient(from 180deg, rgba(0,0,0,0) 0deg, rgba(99,91,255,0.12) 75deg, rgba(6,182,212,0.10) 130deg, rgba(0,0,0,0) 200deg, rgba(0,0,0,0) 360deg);
      filter: blur(38px);
      opacity: 0;
      animation: shine 2200ms ease-out forwards;
      pointer-events: none;
    }
    .cursorline {
      height: 2px;
      width: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(99,91,255,0), rgba(99,91,255,0.75), rgba(6,182,212,0.65), rgba(6,182,212,0));
      opacity: 0;
      animation: lineIn 950ms cubic-bezier(.2,.9,.2,1) forwards;
      animation-delay: 1180ms;
    }
    .hint {
      margin-top: 14px;
      font-size: 0.85rem;
      opacity: 0;
      color: rgba(100,116,139,0.92);
      animation: hintIn 650ms ease forwards;
      animation-delay: 2500ms;
    }
    .hint kbd {
      font-family: inherit;
      font-weight: 800;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(15,23,42,0.10);
      background: rgba(15,23,42,0.06);
      color: rgba(15,23,42,0.86);
    }
    .start .title { animation: textIn 700ms cubic-bezier(.2,.9,.2,1) forwards; animation-delay: 780ms; }
    .start .subtitle { animation: textIn 700ms cubic-bezier(.2,.9,.2,1) forwards; animation-delay: 980ms; }

    @keyframes logoIn {
      0% { opacity: 0; transform: translateY(10px) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes textIn {
      0% { opacity: 0; transform: translateY(10px); filter: blur(1px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    @keyframes lineIn {
      0% { opacity: 0; width: 0; }
      25% { opacity: 1; }
      100% { opacity: 1; width: min(420px, 78vw); }
    }
    @keyframes shine {
      0% { opacity: 0; transform: rotate(-12deg) scale(0.92); }
      40% { opacity: 1; }
      100% { opacity: 0.35; transform: rotate(8deg) scale(1); }
    }
    @keyframes hintIn {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .logo, .title, .subtitle, .cursorline, .shine, .hint { animation: none !important; opacity: 1 !important; transform: none !important; width: auto !important; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="shine"></div>
    <div class="panel" id="panel">
      <img class="logo" src="/pages/supplier/image-removebg-preview%20-%202026-03-04T185605.074.png" alt="Alpha Freight" />
      <div class="title" id="titleText"><strong>Welcome</strong> to Alpha Freight</div>
      <div class="subtitle" id="subtitle">Let’s set up your profile.</div>
      <div class="cursorline"></div>
      <div class="hint"><kbd>Tap</kbd> anywhere to continue</div>
    </div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var role = String(params.get('role') || '').toLowerCase();
      var mode = String(params.get('mode') || '').toLowerCase();
      var name = String(params.get('name') || '');
      var next = params.get('next') || '/mobile-app/index.html';
      var subtitle = document.getElementById('subtitle');
      var title = document.getElementById('titleText');
      var panel = document.getElementById('panel');

      function esc(s) {
        return String(s || '').replace(/[&<>"']/g, function (c) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c] || c;
        });
      }

      function pickFirstName(raw) {
        var t = String(raw || '').trim();
        if (!t) return '';
        var parts = t.split(/\s+/).filter(Boolean);
        return parts.length ? parts[0] : t;
      }

      if (subtitle) {
        if (mode === 'back') {
          subtitle.textContent = 'Good to see you again.';
        } else {
          if (role === 'supplier') subtitle.textContent = 'Let’s set up your supplier profile.';
          else if (role === 'carrier') subtitle.textContent = 'Let’s set up your carrier profile.';
        }
      }

      if (title && mode === 'back') {
        var fn = pickFirstName(name);
        if (fn) title.innerHTML = '<strong>Welcome back</strong>, ' + esc(fn);
        else title.innerHTML = '<strong>Welcome back</strong>';
      }

      var KEY = 'ab.welcome.v1';
      function safeNow() { return Date.now ? Date.now() : (new Date()).getTime(); }

      function decodeNext(v) {
        try { return decodeURIComponent(String(v || '')); } catch (e) { return String(v || ''); }
      }
      next = decodeNext(next) || '/mobile-app/index.html';

      if (mode !== 'back') {
      try {
        var raw = localStorage.getItem(KEY);
        if (raw) {
          var prev = JSON.parse(raw);
          if (prev && prev.next === next && prev.role === role && prev.at && (safeNow() - prev.at) < 10 * 60 * 1000) {
            location.replace(next);
            return;
          }
        }
      } catch (e) {}

      try {
        localStorage.setItem(KEY, JSON.stringify({ at: safeNow(), role: role || null, next: next || null }));
      } catch (e) {}
      }

      if (panel) panel.classList.add('start');

      var done = false;
      function go() {
        if (done) return;
        done = true;
        try { location.replace(next); } catch (e) { location.href = next; }
      }

      document.addEventListener('click', go, { once: true });
      setTimeout(go, 3200);
    })();
  </script>
</body>
</html>
