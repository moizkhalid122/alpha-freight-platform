    <style>
        :root {
            --primary: #635bff;
            --primary-dark: #4f46e5;
            --primary-light: #8b5cf6;
            --accent: #06b6d4;
            --success: #059669;

            --warning: #d97706;
            --text-dark: #0f172a;

            --text-light: #94a3b8;

            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 22px;
            --radius-sm: 14px;

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-main);

            color: var(--text-dark);
            line-height: 1.55;
            overflow-x: hidden;
        }
        body::before{
            content:"";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(900px 520px at 14% 8%, rgba(99, 91, 255, 0.12), rgba(246,247,251,0) 62%),
                radial-gradient(900px 520px at 88% 22%, rgba(6, 182, 212, 0.10), rgba(246,247,251,0) 62%);
            pointer-events:none;
            z-index: 0;
        }
        body > *{ position: relative; z-index: 1; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(15, 23, 42, 0.16); border-radius: 10px; transition: background 0.3s var(--ease); }
        * { scrollbar-width: thin; scrollbar-color: rgba(15, 23, 42, 0.16) transparent; }

        .header {
            padding: calc(18px + env(safe-area-inset-top, 0px)) var(--page-pad) 12px;

        .header-card{

            border-radius: 28px;
            box-shadow: 0 18px 55px rgba(15,23,42,0.10);
            padding: 16px 14px 14px;
            position: relative;
            overflow: hidden;
        }
        .header-card::before{
            content:"";
            position:absolute;
            inset:-120px -120px auto auto;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(99,91,255,0.12), rgba(246,247,251,0) 70%);

            pointer-events:none;
        }
        .header-row{
            display:flex;
            align-items:flex-start;
            justify-content:space-between;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

            letter-spacing: -0.03em;

        }
        .sub{

    <script>
        function safeJsonParse(s, fallback) {
            try { return JSON.parse(s); } catch (e) { return fallback; }
        }
        function nowIso() { return new Date().toISOString(); }
        function genId() { return 'tpl_' + Math.random().toString(16).slice(2) + '_' + Date.now().toString(16); }
        function escapeHtml(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function getUserData() {
            const auth = localStorage.getItem('supplierAuth');
            return auth ? safeJsonParse(auth, null) : null;
        }

        function getSupplierKey() {
            const user = getUserData();
            if (!user) return 'guest';
            return String(user.supplierId || user.id || user.email || 'guest');
        }

        function storageKey() {
            return 'ab.loadTemplates.supplier.' + getSupplierKey();
        }

        function readTemplates() {
            const raw = localStorage.getItem(storageKey());
            const list = safeJsonParse(raw || '[]', []);
            return Array.isArray(list) ? list : [];
        }

        function writeTemplates(list) {
            localStorage.setItem(storageKey(), JSON.stringify(list || []));
        }

        let templates = [];
        let editingId = '';

        function openEditor(tpl) {
            const isEdit = !!tpl;
            editingId = isEdit ? String(tpl.id || '') : '';
            document.getElementById('editorTitle').textContent = isEdit ? 'Edit Template' : 'New Template';

            document.getElementById('tplName').value = tpl?.name || '';
            document.getElementById('tplPickup').value = tpl?.pickupLocation || '';
            document.getElementById('tplDelivery').value = tpl?.deliveryLocation || '';
            document.getElementById('tplVehicle').value = tpl?.vehicleType || '';
            document.getElementById('tplCargoType').value = tpl?.cargoType || '';
            document.getElementById('tplWeight').value = tpl?.cargoWeight || '';
            document.getElementById('tplUrgency').value = tpl?.urgency || '';
            document.getElementById('tplMinBudget').value = tpl?.minBudget || '';
            document.getElementById('tplMaxBudget').value = tpl?.maxBudget || '';
            document.getElementById('tplTitle').value = tpl?.loadTitle || '';
            document.getElementById('tplNotes').value = tpl?.notes || '';

            const overlay = document.getElementById('editorOverlay');
            overlay.classList.add('show');
            overlay.setAttribute('aria-hidden', 'false');
        }

        function closeEditor() {
            const overlay = document.getElementById('editorOverlay');
            overlay.classList.remove('show');
            overlay.setAttribute('aria-hidden', 'true');
            editingId = '';
        }

        function normalizeBudget(v) {
            const n = Number(String(v || '').replace(/[^\d.]/g, ''));
            return Number.isFinite(n) && n > 0 ? String(Math.round(n)) : '';
        }

        function normalizeWeight(v) {
            const n = Number(String(v || '').replace(/[^\d.]/g, ''));
            return Number.isFinite(n) && n > 0 ? String(Math.round(n)) : '';
        }

        function saveEditor() {
            const name = String(document.getElementById('tplName').value || '').trim();
            const pickupLocation = String(document.getElementById('tplPickup').value || '').trim();
            const deliveryLocation = String(document.getElementById('tplDelivery').value || '').trim();
            const vehicleType = String(document.getElementById('tplVehicle').value || '').trim();
            const cargoType = String(document.getElementById('tplCargoType').value || '').trim();
            const cargoWeight = normalizeWeight(document.getElementById('tplWeight').value);
            const urgency = String(document.getElementById('tplUrgency').value || '').trim();
            const minBudget = normalizeBudget(document.getElementById('tplMinBudget').value);
            const maxBudget = normalizeBudget(document.getElementById('tplMaxBudget').value);
            const loadTitle = String(document.getElementById('tplTitle').value || '').trim();
            const notes = String(document.getElementById('tplNotes').value || '').trim();

            if (!name) {
                alert('Please enter template name');
                return;
            }
            if (!pickupLocation || !deliveryLocation) {
                alert('Please enter pickup and delivery');
                return;
            }

            const base = {
                id: editingId || genId(),
                name,
                pickupLocation,
                deliveryLocation,
                vehicleType,
                cargoType,
                cargoWeight,
                urgency,
                minBudget,
                maxBudget,
                loadTitle,
                notes
            };

            if (editingId) {
                templates = templates.map(t => t.id === editingId ? { ...t, ...base, updatedAt: nowIso() } : t);
            } else {
                templates = [{ ...base, createdAt: nowIso(), updatedAt: nowIso() }, ...templates];
            }

            writeTemplates(templates);
            closeEditor();
            render();
        }

        function applyTemplate(id) {
            const tpl = templates.find(t => String(t.id) === String(id));
            if (!tpl) return;
            localStorage.setItem('ab.loadTemplate.apply', JSON.stringify(tpl));
            window.location.href = 'post-load.html';
        }

        function deleteTemplate(id) {
            const tpl = templates.find(t => String(t.id) === String(id));
            if (!tpl) return;
            const ok = window.confirm('Delete "' + (tpl.name || 'template') + '"?');
            if (!ok) return;
            templates = templates.filter(t => String(t.id) !== String(id));
            writeTemplates(templates);
            render();
        }

        function formatUpdatedAt(tpl) {
            const iso = tpl.updatedAt || tpl.createdAt || '';
            const d = new Date(iso);
            if (Number.isNaN(d.getTime())) return '';
            return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        }

        function render() {
            const list = document.getElementById('templateList');
            document.getElementById('templateCount').textContent = String(templates.length);

            if (!templates.length) {
                list.innerHTML = '<div class="empty"><i class="fas fa-layer-group"></i><h3>No templates yet</h3><p>Create a template to reuse route, vehicle and budget</p></div>';
                return;
            }

            list.innerHTML = templates.slice(0, 60).map(t => {
                const route = `${t.pickupLocation || 'N/A'} → ${t.deliveryLocation || 'N/A'}`;
                const tags = [];
                if (t.vehicleType) tags.push(t.vehicleType);
                if (t.cargoType) tags.push(t.cargoType);
                if (t.cargoWeight) tags.push(`${t.cargoWeight}kg`);
                if (t.minBudget || t.maxBudget) tags.push(`£${t.minBudget || '0'}–£${t.maxBudget || t.minBudget || '0'}`);
                if (t.urgency) tags.push(t.urgency);
                const updated = formatUpdatedAt(t);
                if (updated) tags.push('Updated ' + updated);

                return `
                    <div class="card">
                        <div class="card-head">
                            <div style="min-width:0;">
                                <p class="name">${escapeHtml(t.name || 'Template')}</p>
                                <div class="route">${escapeHtml(route)}</div>
                            </div>
                        </div>
                        <div class="meta">
                            ${tags.slice(0, 5).map(x => `<span class="tag">${escapeHtml(x)}</span>`).join('')}
                        </div>
                        <div class="card-actions">
                            <button type="button" class="btn-mini primary" data-act="apply" data-id="${escapeHtml(t.id)}"><i class="fas fa-bolt"></i> Apply</button>
                            <button type="button" class="btn-mini" data-act="edit" data-id="${escapeHtml(t.id)}"><i class="fas fa-pen"></i> Edit</button>
                            <button type="button" class="btn-mini danger" data-act="delete" data-id="${escapeHtml(t.id)}"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    </div>
                `;
            }).join('');

            list.querySelectorAll('button[data-act]').forEach(btn => {
                const act = btn.dataset.act || '';
                const id = btn.dataset.id || '';
                btn.addEventListener('click', () => {
                    if (act === 'apply') applyTemplate(id);
                    else if (act === 'edit') {
                        const tpl = templates.find(t => String(t.id) === String(id));
                        openEditor(tpl);
                    } else if (act === 'delete') deleteTemplate(id);
                });
            });
        }

        function createFromDraft() {
            const raw = localStorage.getItem('loadDraft');
            if (!raw) return;
            const d = safeJsonParse(raw, null);
            if (!d) return;

            const pickupLocation = String(d.pickupLocation || '').trim();
            const deliveryLocation = String(d.deliveryLocation || '').trim();
            if (!pickupLocation || !deliveryLocation) {
                alert('Draft has no pickup/delivery');
                return;
            }

            const tpl = {
                id: '',
                name: String(d.loadTitle || `${pickupLocation} → ${deliveryLocation}`).trim() || 'Template',
                pickupLocation,
                deliveryLocation,
                vehicleType: String(d.vehicleType || '').trim(),
                cargoType: String(d.cargoType || '').trim(),
                cargoWeight: String(d.cargoWeight || '').trim(),
                urgency: String(d.urgency || '').trim(),
                minBudget: String(d.minBudget || '').trim(),
                maxBudget: String(d.maxBudget || '').trim(),
                loadTitle: String(d.loadTitle || '').trim(),
                notes: String(d.additionalNotes || d.specialInstructions || '').trim()
            };
            openEditor(tpl);
        }

        document.getElementById('newTemplateBtn').addEventListener('click', () => openEditor(null));
        document.getElementById('editorCloseBtn').addEventListener('click', closeEditor);
        document.getElementById('editorCancelBtn').addEventListener('click', closeEditor);
        document.getElementById('editorSaveBtn').addEventListener('click', saveEditor);
        document.getElementById('editorOverlay').addEventListener('click', (e) => { if (e.target && e.target.id === 'editorOverlay') closeEditor(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeEditor(); });

        document.getElementById('goPostLoadBtn').addEventListener('click', () => { window.location.href = 'post-load.html'; });

        document.addEventListener('DOMContentLoaded', () => {
            templates = readTemplates();
            render();
            const hasDraft = !!localStorage.getItem('loadDraft');
            const btn = document.getElementById('createFromDraftBtn');
            if (btn) {
                btn.style.display = hasDraft ? '' : 'none';
                btn.addEventListener('click', createFromDraft);
            }
        });
    </script>
</body>
</html>
