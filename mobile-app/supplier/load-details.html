    <script>
        const alertSystem = new AlertSystem();
        const params = new URLSearchParams(location.search);
        const loadId = params.get('id') || params.get('loadId') || '';

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return;
            if (authSdk.currentUser) return;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => { if (!done) { done = true; resolve(); } }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
        }

        function formatCurrency(amt) {
            return '£' + parseFloat(amt || 0).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatDate(str) {
            if (!str) return 'N/A';
            try {
                return new Date(str).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
            } catch { return str; }
        }

        function getStatusClass(status) {
            const s = (status || '').toLowerCase();
            if (['available', 'pending'].includes(s)) return s === 'available' ? 'available' : 'pending';
            if (['active', 'accepted'].includes(s)) return 'active';
            if (s.includes('transit')) return 'in-transit';
            if (['completed', 'delivered'].includes(s)) return 'completed';
            if (['cancelled', 'canceled'].includes(s)) return 'cancelled';
            return 'pending';
        }

        function getStatusText(status) {
            const s = (status || '').toLowerCase();
            if (s === 'available') return 'Available';
            if (['active', 'accepted'].includes(s)) return 'Active';
            if (s.includes('transit')) return 'In Transit';
            if (['completed', 'delivered'].includes(s)) return 'Completed';
            if (s === 'pending') return 'Pending';
            if (['cancelled', 'canceled'].includes(s)) return 'Cancelled';
            return (status || '').charAt(0).toUpperCase() + (status || '').slice(1);
        }

        function getLoadFromCache() {
            try {
                const raw = sessionStorage.getItem('supplier_my_loads');
                if (!raw) return null;
                const { data } = JSON.parse(raw);
                return Array.isArray(data) ? data.find(l => (l.loadId || l.id) === loadId) : null;
            } catch (e) { return null; }
        }

        function getInitials(name) {
            const n = (name || '').trim();
            if (!n) return 'C';
            const parts = n.split(/\s+/).filter(Boolean);
            if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
            return n.substring(0, 2).toUpperCase();
        }

        function buildStars(rating) {
            const r = Math.max(0, Math.min(5, Math.round((parseFloat(rating) || 0) * 2) / 2));
            let stars = '';
            for (let i = 1; i <= 5; i++) stars += i <= Math.round(r) ? '★' : '☆';
            return stars;
        }

        function normalizeStatus(s) {
            const t = String(s || '').toLowerCase().replace(/_/g, '-');
            if (t === 'complete') return 'completed';
            if (t === 'intransit') return 'in-transit';
            return t;
        }

        function getOrderRef(lid, load) {
            if (load && load.formattedOrderId) return String(load.formattedOrderId);
            if (load && load.orderRef) return String(load.orderRef);
            const id = String(lid || loadId || '');
            const shortId = id ? id.substring(0, 8).toUpperCase() : '--------';
            return 'ORD-' + shortId;
        }

        function isLoadPaid(load) {
            if (!load) return false;
            const ps = load.paymentStatus;
            if (ps && typeof ps === 'object') {
                if (ps.completed === true) return true;
                const st = String(ps.status || '').toLowerCase();
                if (st === 'completed' || st === 'paid') return true;
                if (ps.paidAt) return true;
                if (ps.upfrontPaid === true) return true;
                if (ps.depositPaid === true && ps.remainingPaid === true) return true;
            }
            if (load.upfrontPaid === true) return true;
            if (load.isPaid === true) return true;
            if (load.paid === true) return true;
            if (String(load.paymentStatus || '').toLowerCase() === 'paid') return true;
            if (String(load.paymentStatus || '').toLowerCase() === 'completed') return true;
            if (String(load.paymentState || '').toLowerCase() === 'paid') return true;
            if (String(load.paymentState || '').toLowerCase() === 'completed') return true;
            if (String(load.paymentMethod || '').toLowerCase().includes('paid')) return true;
            return false;
        }

        function getPaymentPlan(load) {
            return String((load && load.paymentPlan) ? load.paymentPlan : 'full_upfront').toLowerCase();
        }

        function getPaymentBaseAmount(load, fallback) {
            const base = parseFloat(load && (load.commissionBaseAmount || load.price || load.budget || load.maxBudget || load.minBudget || 0)) || 0;
            if (base > 0) return base;
            return parseFloat(fallback || 0) || 0;
        }

        function buildSupplierPaymentAction(load, statusLower, price, cancelReqStatus) {
            const plan = getPaymentPlan(load);
            const ps = (load && load.paymentStatus && typeof load.paymentStatus === 'object') ? load.paymentStatus : {};
            const paid = isLoadPaid(load);

        function buildTimelineSteps(load) {
            const steps = [];
            steps.push({ label: 'Posted', at: load && (load.createdAt || load.postedAt || '') });
            steps.push({ label: 'Accepted', at: load && (load.acceptedAt || '') });
            steps.push({ label: 'Cancelled', at: load && (load.cancelledAt || load.canceledAt || '') });
            steps.push({ label: 'Picked Up', at: load && (load.pickedUpAt || '') });
            steps.push({ label: 'In Transit', at: load && (load.inTransitAt || '') });
            steps.push({ label: 'Delivered', at: load && (load.completedAt || load.deliveredAt || '') });
            steps.push({ label: 'POD Submitted', at: load && ((load.pod && load.pod.submittedAt) || load.podUploadedAt || '') });
            steps.push({ label: 'Paid', at: getPaidAt(load) });
            const trimmed = [];

                trimmed.push(s);

            return trimmed.length ? trimmed : steps.slice(0, 2);

        const carrierMiniCache = { profile: {}, rating: {} };

        function sanitizeFirebaseKey(key) {
            return String(key || '').replace(/[.#$\[\]\/]/g, '_');

        async function resolveCarrierProfile(rawId) {
            const id = String(rawId || '').trim();
            if (!id) return null;
            if (carrierMiniCache.profile[id]) return carrierMiniCache.profile[id];
            const db = window.AlphaBrokrage.firebaseDb;
            const candidates = [];
            candidates.push(id);
            const sanitized = sanitizeFirebaseKey(id);
            if (sanitized && sanitized !== id) candidates.push(sanitized);

            for (const cand of candidates) {
                try {
                    const snap = await db.ref('carriers/' + cand).once('value');
                    if (snap.exists()) {
                        const p = snap.val() || {};
                        const out = { key: cand, profile: { ...p, carrierId: p.carrierId || cand } };
                        carrierMiniCache.profile[id] = out;
                        carrierMiniCache.profile[cand] = out;
                        return out;
                    }
                } catch (e) {}
            }

            if (id.includes('@')) {
                try {
                    const snap = await db.ref('carriers').orderByChild('email').equalTo(id).limitToFirst(1).once('value');
                    if (snap.exists()) {
                        let out = null;
                        snap.forEach((child) => {
                            if (out) return true;
                            const p = child.val() || {};
                            out = { key: child.key, profile: { ...p, carrierId: p.carrierId || child.key } };
                            return true;
                        });
                        if (out) {
                            carrierMiniCache.profile[id] = out;
                            carrierMiniCache.profile[out.key] = out;
                            return out;
                        }
                    }
                } catch (e) {}
            }

            const fallback = { key: sanitized, profile: null };
            carrierMiniCache.profile[id] = fallback;
            return fallback;
        }

        async function computeCarrierRatingAny(ids) {
            const list = Array.from(new Set((ids || []).map((x) => String(x || '').trim()).filter(Boolean)));
            const cacheKey = list.slice().sort().join('|');
            if (carrierMiniCache.rating[cacheKey]) return carrierMiniCache.rating[cacheKey];
            const db = window.AlphaBrokrage.firebaseDb;
            const byLoadId = new Map();
            for (const id of list) {
                try {
                    const snap = await db.ref('loads').orderByChild('carrierId').equalTo(id).limitToLast(250).once('value');
                    if (!snap.exists()) continue;
                    snap.forEach((child) => {
                        const load = child.val() || {};
                        const st = normalizeStatus(load.status);
                        const rt = parseFloat(load.carrierRating || 0) || 0;
                        if ((st === 'completed' || st === 'delivered') && rt > 0) byLoadId.set(child.key, rt);
                    });
                } catch (e) {}
            }
            const ratings = Array.from(byLoadId.values());
            if (!ratings.length) {
                const out = { rating: 0, count: 0 };
                carrierMiniCache.rating[cacheKey] = out;
                return out;
            }
            const avg = ratings.reduce((a, b) => a + b, 0) / ratings.length;
            const out = { rating: Math.round(avg * 10) / 10, count: ratings.length };
            carrierMiniCache.rating[cacheKey] = out;
            return out;
        }

        async function hydrateCarrierMini(load) {
            try {
                const holder = document.getElementById('carrierMiniHolder');
                if (!holder) return;
                const cid = load && (load.carrierId || load.assignedCarrier || load.acceptedBy) ? (load.carrierId || load.assignedCarrier || load.acceptedBy) : '';
                if (!cid) { holder.innerHTML = ''; return; }
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                if (!authSdk) return;
                if (!authSdk.currentUser && typeof authSdk.onAuthStateChanged === 'function') {
                    let done = false;
                    const unsub = authSdk.onAuthStateChanged(() => {
                        if (done) return;
                        done = true;
                        try { unsub(); } catch (e) {}
                        hydrateCarrierMini(load);
                    });
                    return;
                }
                if (!authSdk.currentUser) return;

                const resolved = await resolveCarrierProfile(cid);
                const carrierKey = resolved && resolved.key ? resolved.key : sanitizeFirebaseKey(cid);
                const profile = resolved ? resolved.profile : null;

                const displayName = (profile && (profile.companyName || `${profile.firstName || ''} ${profile.lastName || ''}`.trim() || profile.email)) || (load.carrierName || 'Carrier');
                const photoUrl = profile && (profile.profilePhoto || profile.photoUrl || profile.avatarUrl || profile.photoURL);
                const ids = [];
                ids.push(carrierKey);
                ids.push(cid);
                if (profile && profile.email) ids.push(profile.email);
                if (profile && profile.email) ids.push(sanitizeFirebaseKey(profile.email));
                const rating = await computeCarrierRatingAny(ids);
                const stars = rating && rating.count ? buildStars(rating.rating) : '☆☆☆☆☆';
                const ratingText = rating && rating.count ? `${rating.rating}/5 (${rating.count})` : 'New';

                holder.innerHTML = `
                    <div class="mini-profile" id="carrierMiniCard">
                        <div class="mini-avatar">${photoUrl ? `<img src="${String(photoUrl).replace(/\"/g, '&quot;')}" alt="Carrier">` : getInitials(displayName)}</div>
                        <div style="min-width:0;">
                            <div class="mini-name">${displayName}</div>
                            <div class="mini-meta"><span class="mini-stars">${stars}</span><span style="margin-left:0.4rem;">${ratingText}</span></div>
                        </div>
                        <div class="mini-chevron"><i class="fas fa-chevron-right"></i></div>
                    </div>
                `;
                const card = document.getElementById('carrierMiniCard');
                if (card) {
                    card.addEventListener('click', () => {
                        window.location.href = `carrier-profile.html?id=${encodeURIComponent(carrierKey)}`;
                    });
                }
            } catch (e) {
                console.error(e);
            }
        }

        function renderContent(load) {
            if (!load) {
                document.getElementById('contentArea').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Load Not Found</h3>
                        <p>This load may have been removed or the link is invalid.</p>
                    </div>
                `;
                return;
            }

            const lid = load.loadId || load.id || loadId;
            const statusClass = getStatusClass(load.status);
            const statusText = getStatusText(load.status);
            const pickup = load.pickupLocation || load.from || load.pickup_location || 'N/A';
            const delivery = load.deliveryLocation || load.to || load.delivery_location || 'N/A';
            const cargo = load.cargoType || load.cargo || 'General';
            const price = load.price || load.budget || load.maxBudget || load.minBudget || 0;
            const pickupDate = load.pickupDate || load.pickup_date;
            const deliveryDate = load.deliveryDate || load.delivery_date;

            document.getElementById('loadIdDisplay').textContent = `Load #${(lid + '').substring(0, 8)}`;

            const statusLower = (load.status || '').toLowerCase();
            const hasPOD = !!(load && (load.hasPOD || load.podUrl || (load.pod && (load.pod.photoDataUrl || load.pod.signatureDataUrl))));
            const paid = isLoadPaid(load);
            const cancelReq = load && load.cancellationRequest && typeof load.cancellationRequest === 'object' ? load.cancellationRequest : null;
            const cancelReqStatus = cancelReq ? String(cancelReq.status || '').toLowerCase() : '';
            const cancelFeeAmount = cancelReq && typeof cancelReq.proposedFee === 'number' ? cancelReq.proposedFee : calculateCancelFee(load);
            const cancelFeeUrl = buildCancelFeePayUrl(cancelFeeAmount);
            let actionsHTML = '';

            if (['available', 'pending'].includes(statusLower)) {
                actionsHTML = `
                    <a href="load-status.html?id=${lid}" class="btn-action secondary">
                        <i class="fas fa-tasks"></i> Status
                    </a>
                    <button class="btn-action danger" onclick="cancelLoad()">
                        <i class="fas fa-times"></i> Cancel Load
                    </button>
                `;
            } else if (['cancelled', 'canceled'].includes(statusLower)) {
                actionsHTML = `
                    <a href="load-status.html?id=${lid}" class="btn-action secondary">
                        <i class="fas fa-tasks"></i> Status
                    </a>
                    <button class="btn-action secondary" type="button" disabled>
                        <i class="fas fa-ban"></i> Cancelled
                    </button>
                `;
            } else if (['active', 'accepted'].includes(statusLower)) {
                actionsHTML = `
                    <a href="load-status.html?id=${lid}" class="btn-action secondary">
                        <i class="fas fa-tasks"></i> Status
                    </a>
                    <a href="track.html?loadId=${lid}" class="btn-action primary">
                        <i class="fas fa-map-marker-alt"></i> Track
                    </a>
                    <button class="btn-action secondary" type="button" onclick="requestReschedule()">
                        <i class="fas fa-calendar"></i> Reschedule
                    </button>
                    ${cancelReqStatus === 'fee_pending' ? `
                    <a class="btn-action danger" href="${cancelFeeUrl}">
                        <i class="fas fa-credit-card"></i> Pay Cancel Fee (£${cancelFeeAmount.toFixed(2)})
                    </a>
                    <button class="btn-action secondary" type="button" disabled>
                        <i class="fas fa-hourglass-half"></i> Awaiting Approval
                    </button>
                    ` : cancelReqStatus === 'pending_approval' || cancelReqStatus === 'pending' ? `
                    <button class="btn-action secondary" type="button" disabled>
                        <i class="fas fa-hourglass-half"></i> Awaiting Approval
                    </button>
                    ` : cancelReqStatus === 'rejected' ? `
                    <button class="btn-action secondary" type="button" disabled>
                        <i class="fas fa-xmark"></i> Cancellation Rejected
                    </button>
                    ` : (!paid ? `
                    <button class="btn-action danger" type="button" onclick="requestCancellation()">
                        <i class="fas fa-ban"></i> Cancel Request
                    </button>
                    ` : '')}
                    ${buildSupplierPaymentAction(load, statusLower, price, cancelReqStatus)}
                `;
            } else if (statusLower.includes('transit')) {
                actionsHTML = `
                    <a href="load-status.html?id=${lid}" class="btn-action secondary">
                        <i class="fas fa-tasks"></i> Status
                    </a>
                    <a href="track.html?loadId=${lid}" class="btn-action primary">
                        <i class="fas fa-map-marker-alt"></i> Track
                    </a>
                    ${buildSupplierPaymentAction(load, statusLower, price, cancelReqStatus)}
                `;
            } else if (['completed', 'delivered'].includes(statusLower)) {
                actionsHTML = `
                    <a href="load-status.html?id=${lid}" class="btn-action secondary">
                        <i class="fas fa-tasks"></i> Status
                    </a>
                    ${hasPOD ? `
                    <a href="pod.html?id=${lid}" class="btn-action primary">
                        <i class="fas fa-file-signature"></i> POD
                    </a>
                    ` : ''}
                    <button class="btn-action danger" type="button" onclick="raiseDispute()">
                        <i class="fas fa-flag"></i> Dispute
                    </button>
                    ${buildSupplierPaymentAction(load, statusLower, price, cancelReqStatus)}
                `;
            } else {
                actionsHTML = `
                    <a href="load-status.html?id=${lid}" class="btn-action secondary">
                        <i class="fas fa-tasks"></i> Status
                    </a>
                    ${buildSupplierPaymentAction(load, statusLower, price, cancelReqStatus)}
                `;
            }

            document.getElementById('contentArea').innerHTML = `
                <div class="details-card">
                    <div class="details-header">
                        <div>
                            <div class="load-id">Load #${(lid + '').substring(0, 8)}</div>
                            <div class="id-sub">${getOrderRef(lid, load)}</div>
                        </div>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>
                    <div class="route-section">
                        <div class="route-row">
                            <div class="route-dot pickup"></div>
                            <div>
                                <div class="route-label">Pickup</div>
                                <div class="route-value">${pickup}</div>
                            </div>
                        </div>
                        <div class="route-row">
                            <div class="route-dot delivery"></div>
                            <div>
                                <div class="route-label">Delivery</div>
                                <div class="route-value">${delivery}</div>
                            </div>
                        </div>
                    </div>
                    <div class="details-grid">
                        <div class="detail-item">
                            <div class="detail-label">Pickup Date</div>
                            <div class="detail-value">${formatDate(pickupDate)}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Cargo Type</div>
                            <div class="detail-value">${cargo}</div>
                        </div>
                        ${deliveryDate ? `
                        <div class="detail-item">
                            <div class="detail-label">Delivery Date</div>
                            <div class="detail-value">${formatDate(deliveryDate)}</div>
                        </div>
                        ` : ''}
                    </div>
                    <div class="price-row">
                        <span class="price-label">Amount</span>
                        <span class="price-value">${formatCurrency(price)}</span>
                    </div>
                </div>
                ${buildTimelineHtml(load)}
                <div id="carrierMiniHolder"></div>
                <div class="actions-section">
                    <div class="action-btns">${actionsHTML}</div>
                </div>
            `;
            renderCarrierMiniPlaceholder(load);
            hydrateCarrierMini(load);
        }

        async function loadDetails() {
            if (!loadId) {
                document.getElementById('loadIdDisplay').textContent = 'No load selected';
                renderContent(null);
                return;
            }

            // 1. Try cache first for instant display
            const cached = getLoadFromCache();
            if (cached) {
                renderContent(cached);
            }

            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const snap = await db.ref('loads/' + loadId).once('value');
                const load = snap.val();

                if (load) {
                    load.loadId = loadId;
                    load.id = loadId;
                    renderContent(load);
                } else if (!cached) {
                    renderContent(null);
                }
            } catch (e) {
                console.error(e);
                if (!cached) {
                    document.getElementById('contentArea').innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-exclamation-triangle"></i>
                            <h3>Error</h3>
                            <p>Failed to load load details. Please try again.</p>
                        </div>
                    `;
                }
            }
        }

        async function cancelLoad() {
            try {
                await cancelNowFree();
            } catch (e) {
                alertSystem.show('error', 'Failed to cancel load');
            }
        }

        document.addEventListener('DOMContentLoaded', loadDetails);
    </script>
</body>
</html>
