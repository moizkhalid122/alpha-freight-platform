    <style>
        /* —— Premium theme (matches dashboard) —— */
        :root {
            --primary: #1d4ed8;
            --primary-dark: #1e3a8a;
            --primary-light: #60a5fa;
            --gold: #c9a227;
            --success: #059669;
            --error: #dc2626;
            --warning: #d97706;
            --text-dark: #0f172a;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --bg-main: #f1f5f9;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08), 0 2px 8px rgba(15, 23, 42, 0.04);
            --shadow-card: 0 8px 32px rgba(15, 23, 42, 0.06), 0 2px 8px rgba(15, 23, 42, 0.03);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 22px;
            --radius-sm: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #e2e8f0 0%, #f1f5f9 18%, #f8fafc 100%);
            min-height: 100vh;
            color: var(--text-dark);
            line-height: 1.55;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            /* footer from supplier-bottom-nav.css */
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(29, 78, 216, 0.25); border-radius: 10px; transition: background 0.3s var(--ease); }
        * { scrollbar-width: thin; scrollbar-color: rgba(29, 78, 216, 0.25) transparent; }

        /* Page Header – premium navy + gold */
        .page-header {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 48%, #1e3a8a 100%);
            color: #fff;
            padding: 1.5rem 1.25rem 1.75rem;
            border-radius: 0 0 36px 36px;
            margin-bottom: 1.5rem;
            position: relative;
            box-shadow: 0 16px 48px rgba(15, 23, 42, 0.3);
        }
        .page-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            border-radius: 0 0 36px 36px;
            opacity: 0.7;
        }

        .header-content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .new-message-btn {
            background: linear-gradient(145deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.06) 100%);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 0.625rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s var(--ease), background 0.3s var(--ease), box-shadow 0.3s var(--ease);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12);
        }
        .new-message-btn:active { transform: scale(0.97); background: rgba(255,255,255,0.22); }

        .conversations-section { padding: 0 1.25rem; margin-bottom: 2rem; }

        .conversation-item {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.125rem 1.125rem;
            margin-bottom: 0.875rem;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.35s var(--ease), box-shadow 0.35s var(--ease);
            display: flex;
            align-items: center;
            gap: 1rem;
            position: relative;
            overflow: hidden;
        }
        .conversation-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 12px;
            bottom: 12px;
            width: 4px;
            background: linear-gradient(180deg, var(--primary), var(--primary-dark));
            border-radius: 0 2px 2px 0;
            opacity: 0.9;
        }
        .conversation-item:active { transform: scale(0.99); box-shadow: var(--shadow-sm); }

        .conversation-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(145deg, #3b82f6 0%, #1d4ed8 100%);
            box-shadow: 0 6px 18px rgba(29, 78, 216, 0.25), inset 0 1px 0 rgba(255,255,255,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 800;
            font-size: 1.125rem;
            flex-shrink: 0;
        }

        .conversation-content { flex: 1; min-width: 0; }

        .conversation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.25rem;
            gap: 0.75rem;
        }

        .conversation-name { font-size: 1rem; font-weight: 800; color: var(--text-dark); }
        .conversation-time { font-size: 0.75rem; color: var(--text-medium); white-space: nowrap; }
        .conversation-preview { font-size: 0.875rem; color: var(--text-medium); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .unread-badge {
            background: linear-gradient(145deg, #2563eb 0%, var(--primary) 100%);
            color: #fff;
            border-radius: 999px;
            padding: 0.25rem 0.6rem;
            font-size: 0.75rem;
            font-weight: 800;
            min-width: 22px;
            text-align: center;
            box-shadow: 0 4px 14px rgba(29, 78, 216, 0.35);
        }

        /* Chat overlay */
        .chat-view {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: calc(72px + env(safe-area-inset-bottom, 0));
            background: linear-gradient(180deg, #e2e8f0 0%, #f1f5f9 18%, #f8fafc 100%);
            z-index: 1000;
            flex-direction: column;
        }
        .chat-view.active { display: flex; }

        .chat-header {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 48%, #1e3a8a 100%);
            color: #fff;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.875rem;
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.18);
        }

        .back-btn {
            background: linear-gradient(145deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.06) 100%);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            width: 42px;
            height: 42px;
            border-radius: var(--radius-sm);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s var(--ease), background 0.3s var(--ease);
        }
        .back-btn:active { transform: scale(0.97); background: rgba(255,255,255,0.22); }

        .chat-title {
            flex: 1;
            font-size: 1.05rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.875rem;
        }

        .message-bubble {
            max-width: 78%;
            padding: 0.75rem 1rem;
            border-radius: 18px;
            word-wrap: break-word;
            animation: fadeInUp 0.35s var(--ease) backwards;
        }

        .message-sent {
            background: linear-gradient(145deg, #2563eb 0%, var(--primary) 100%);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
            box-shadow: 0 6px 18px rgba(29, 78, 216, 0.22);
        }

        .message-received {
            background: var(--card-bg);
            color: var(--text-dark);
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .message-time { font-size: 0.75rem; opacity: 0.75; margin-top: 0.25rem; }

        .chat-input-area {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            padding: 0.875rem 1rem calc(0.875rem + env(safe-area-inset-bottom, 0));
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            border-radius: 999px;
            font-size: 0.9375rem;
            resize: none;
            max-height: 140px;
            min-height: 44px;
            font-family: inherit;
            background: #fff;
            transition: border-color 0.3s var(--ease), box-shadow 0.3s var(--ease);
        }
        .message-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.12);
        }

        .send-btn {
            background: linear-gradient(145deg, #2563eb 0%, var(--primary) 100%);
            color: #fff;
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
            flex-shrink: 0;
            box-shadow: 0 8px 22px rgba(29, 78, 216, 0.35);
        }
        .send-btn:active { transform: scale(0.96); box-shadow: 0 4px 14px rgba(29, 78, 216, 0.3); }
        .send-btn:disabled { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

        .empty-state {
            text-align: center;
            padding: 3rem 1.5rem;
            background: var(--card-bg);
            border-radius: var(--radius);
            margin: 0 1.25rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        .empty-state i { font-size: 2.75rem; color: var(--text-light); margin-bottom: 1rem; }
        .empty-state h3 { font-size: 1.125rem; font-weight: 700; color: var(--text-dark); margin-bottom: 0.5rem; }
        .empty-state p { font-size: 0.875rem; color: var(--text-medium); }

        .loading { display: flex; justify-content: center; align-items: center; padding: 3rem; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s var(--ease) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Bottom nav: supplier-bottom-nav.css – same as dashboard */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .conversation-item { animation: fadeInUp 0.45s var(--ease) backwards; }

        @media (min-width: 768px) {
            body { max-width: 440px; margin: 0 auto; box-shadow: 0 0 48px rgba(15, 23, 42, 0.12); }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="../../assets/js/firebase-init.js"></script>
    <script src="../../assets/js/alerts.js"></script>

    <script>
        const alertSystem = new AlertSystem();

        function showError(message) {
            alertSystem.show('error', message);
        }

        let currentConversation = null;
        let messagesRef = null;
        let messagesQuery = null;
        let conversations = [];

        function getUserData() {
            const supplierAuth = localStorage.getItem('supplierAuth');
            if (!supplierAuth) return null;
            return JSON.parse(supplierAuth);
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return 'Just now';
            if (minutes < 60) return `${minutes}m ago`;
            if (hours < 24) return `${hours}h ago`;
            if (days < 7) return `${days}d ago`;
            return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        }

        function formatMessageTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        }

        async function loadConversations() {
            const user = getUserData();
            if (!user) {
                document.getElementById('conversationsSection').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-sign-in-alt"></i>
                        <h3>Please Sign In</h3>
                        <p>Sign in to view your messages</p>
                    </div>
                `;
                return;
            }

            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const supplierId = user.supplierId || user.email?.replace('@', '_').replace(/\./g, '_');

                const snapshot = await db.ref('messages').orderByChild('supplierId').equalTo(supplierId).limitToLast(500).once('value');
                const allMessages = snapshot.val() || {};

                const conversationMap = {};
                Object.entries(allMessages).forEach(([msgId, msg]) => {
                    if (msg.supplierId === supplierId || msg.supplierEmail === user.email) {
                        const carrierId = msg.carrierId || 'support';
                        const carrierName = msg.carrierName || 'Support';

                        if (!conversationMap[carrierId]) {
                            conversationMap[carrierId] = {
                                carrierId: carrierId,
                                carrierName: carrierName,
                                lastMessage: '',
                                lastMessageTime: 0,
                                unreadCount: 0,
                                messages: []
                            };
                        }

                        conversationMap[carrierId].messages.push({ ...msg, id: msgId });

                        const msgTime = msg.timestamp || msg.createdAt || 0;
                        if (msgTime > conversationMap[carrierId].lastMessageTime) {
                            conversationMap[carrierId].lastMessage = msg.message || '';
                            conversationMap[carrierId].lastMessageTime = msgTime;
                        }

                        if ((msg.senderType === 'carrier' || msg.senderType === 'support') && !msg.read) {
                            conversationMap[carrierId].unreadCount++;
                        }
                    }
                });

                conversations = Object.values(conversationMap).sort((a, b) =>
                    b.lastMessageTime - a.lastMessageTime
                );

                renderConversations();

            } catch (error) {
                console.error('Error loading conversations:', error);
                showError('Failed to load conversations');
                document.getElementById('conversationsSection').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error Loading Messages</h3>
                        <p>Please try again later</p>
                    </div>
                `;
            }
        }

        function renderConversations() {
            const section = document.getElementById('conversationsSection');

            if (conversations.length === 0) {
                section.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>No Messages Yet</h3>
                        <p>Messages from carriers will appear here</p>
                    </div>
                `;
                return;
            }

            section.innerHTML = conversations.map((conv, index) => {
                const initials = conv.carrierName.substring(0, 2).toUpperCase();
                const unreadBadge = conv.unreadCount > 0
                    ? `<span class="unread-badge">${conv.unreadCount}</span>`
                    : '';

                return `
                    <div class="conversation-item" data-carrier-id="${(conv.carrierId || '').replace(/"/g, '&quot;')}" data-carrier-name="${(conv.carrierName || '').replace(/"/g, '&quot;')}" style="animation-delay: ${index * 0.1}s">
                        <div class="conversation-avatar">${initials}</div>
                        <div class="conversation-content">
                            <div class="conversation-header">
                                <div class="conversation-name">${conv.carrierName}</div>
                                <div class="conversation-time">${formatTime(conv.lastMessageTime)}</div>
                            </div>
                            <div class="conversation-preview">${(conv.lastMessage || 'No messages yet').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
                        </div>
                        ${unreadBadge}
                    </div>
                `;
            }).join('');

            section.querySelectorAll('.conversation-item').forEach(el => {
                el.addEventListener('click', () => {
                    openConversation(el.dataset.carrierId || '', el.dataset.carrierName || 'Carrier');
                });
            });
        }

        function openConversation(carrierId, carrierName) {
            currentConversation = { carrierId, carrierName };
            document.getElementById('chatTitle').textContent = carrierName;
            document.getElementById('chatView').classList.add('active');
            loadMessages(carrierId);
        }

        function closeChat() {
            document.getElementById('chatView').classList.remove('active');
            currentConversation = null;
            if (messagesRef) {
                const db = window.AlphaBrokrage.firebaseDb;
                if (db && messagesQuery) messagesQuery.off('value', messagesRef);
                messagesRef = null;
                messagesQuery = null;
            }
        }

        function loadMessages(carrierId) {
            const user = getUserData();
            if (!user) return;

            const db = window.AlphaBrokrage.firebaseDb;
            const supplierId = user.supplierId || user.email?.replace('@', '_').replace(/\./g, '_');

            if (messagesRef && messagesQuery) {
                messagesQuery.off('value', messagesRef);
            }

            messagesRef = (snapshot) => {
                const messages = [];
                snapshot.forEach((child) => {
                    const msg = child.val() || {};
                    if (msg.carrierId === carrierId) {
                        messages.push({ ...msg, id: child.key });
                    }
                });

                messages.sort((a, b) => {
                    const timeA = a.timestamp || a.createdAt || 0;
                    const timeB = b.timestamp || b.createdAt || 0;
                    return timeA - timeB;
                });

                displayMessages(messages);
                markAsRead(carrierId);
            };

            messagesQuery = db.ref('messages').orderByChild('supplierId').equalTo(supplierId).limitToLast(500);
            messagesQuery.on('value', messagesRef);
        }

        function displayMessages(messages) {
            const container = document.getElementById('chatMessages');
            const user = getUserData();
            const supplierId = user.supplierId || user.email?.replace('@', '_').replace(/\./g, '_');

            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comment-dots"></i>
                        <h3>No messages yet</h3>
                        <p>Start the conversation!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = messages.map(msg => {
                const isSent = msg.senderType === 'supplier' && msg.senderId === supplierId;
                const time = formatMessageTime(msg.timestamp || msg.createdAt);
                const rawMsg = (msg.message || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const messageText = rawMsg.replace(/\n/g, '<br>');

                return `
                    <div class="message-bubble ${isSent ? 'message-sent' : 'message-received'}">
                        <div>${messageText}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
            }).join('');

            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            if (!currentConversation) {
                showError('Please select a conversation');
                return;
            }

            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();

            if (!message) return;

            const user = getUserData();
            if (!user) {
                showError('Please sign in to send messages');
                return;
            }

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const supplierId = user.supplierId || user.email?.replace('@', '_').replace(/\./g, '_');
                const supplierName = user.companyName || user.company || user.email || 'Supplier';

                const messageData = {
                    supplierId: supplierId,
                    supplierName: supplierName,
                    supplierEmail: user.email,
                    supplierUid: (window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth && window.AlphaBrokrage.firebaseAuth.currentUser) ? window.AlphaBrokrage.firebaseAuth.currentUser.uid : '',
                    carrierId: currentConversation.carrierId,
                    carrierName: currentConversation.carrierName,
                    message: message,
                    senderType: 'supplier',
                    senderId: supplierId,
                    senderUid: (window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth && window.AlphaBrokrage.firebaseAuth.currentUser) ? window.AlphaBrokrage.firebaseAuth.currentUser.uid : '',
                    recipientType: currentConversation.carrierId === 'support' ? 'support' : 'carrier',
                    recipientId: currentConversation.carrierId,
                    read: false,
                    timestamp: Date.now(),
                    createdAt: new Date().toISOString()
                };

                await db.ref('messages').push(messageData);

                messageInput.value = '';
                messageInput.style.height = 'auto';

                loadConversations();

            } catch (error) {
                console.error('Error sending message:', error);
                showError('Failed to send message. Please try again.');
            } finally {
                sendBtn.disabled = false;
            }
        }

        function markAsRead(carrierId) {
            const user = getUserData();
            if (!user) return;

            const db = window.AlphaBrokrage.firebaseDb;
            const supplierId = user.supplierId || user.email?.replace('@', '_').replace(/\./g, '_');

            db.ref('messages')
                .orderByChild('supplierId')
                .equalTo(supplierId)
                .once('value', (snapshot) => {
                    const updates = {};
                    snapshot.forEach((child) => {
                        const msg = child.val();
                        if (msg.carrierId === carrierId &&
                            (msg.senderType === 'carrier' || msg.senderType === 'support') &&
                            !msg.read) {
                            updates[`messages/${child.key}/read`] = true;
                        }
                    });
                    if (Object.keys(updates).length > 0) {
                        db.ref().update(updates);
                    }
                });
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const messageInput = document.getElementById('messageInput');
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });
        });

        function openNewMessage() {
            openConversation('support', 'Alpha Freight Support');
        }

        document.addEventListener('DOMContentLoaded', function() {
            ensureAuthReady().then(loadConversations);
        });

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return;
            if (authSdk.currentUser) return;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => {
                    if (done) return;
                    done = true;
                    resolve();
                }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
        }
    </script>
</body>
</html>
