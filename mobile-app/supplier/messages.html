    <style>
        /* —— Premium theme (matches dashboard) —— */
        :root {
            --primary: #635bff;
            --primary-dark: #4f46e5;
            --primary-light: #8b5cf6;
            --accent: #06b6d4;
            --gold: #c9a227;
            --success: #059669;
            --error: #dc2626;
            --warning: #d97706;
            --text-dark: #0f172a;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --bg-main: #F6F7FB;
            --card-bg: rgba(255,255,255,0.92);
            --border: rgba(15,23,42,0.10);
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08), 0 2px 8px rgba(15, 23, 42, 0.04);
            --shadow-card: 0 8px 32px rgba(15, 23, 42, 0.06), 0 2px 8px rgba(15, 23, 42, 0.03);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 22px;
            --radius-sm: 14px;
            --page-pad: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-main);
            min-height: 100vh;
            color: var(--text-dark);
            line-height: 1.55;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            /* footer from supplier-bottom-nav.css */
        }
        body::before{
            content:"";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(900px 520px at 14% 8%, rgba(99, 91, 255, 0.10), rgba(246,247,251,0) 62%),
                radial-gradient(900px 520px at 88% 22%, rgba(6, 182, 212, 0.10), rgba(246,247,251,0) 62%);
            pointer-events:none;
            z-index: 0;
        }
        body > *{ position: relative; z-index: 1; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(15, 23, 42, 0.16); border-radius: 10px; transition: background 0.3s var(--ease); }
        * { scrollbar-width: thin; scrollbar-color: rgba(15, 23, 42, 0.16) transparent; }

        /* Page Header */
        .page-header {
            background: transparent;
            color: var(--text-dark);
            padding: calc(18px + env(safe-area-inset-top, 0px)) var(--page-pad) 12px;
            border-radius: 0;
            margin-bottom: 12px;
            position: relative;
            box-shadow: none;
        }
        .page-header::after { display:none; }

        .header-content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            text-shadow: none;
        }

        .new-message-btn {
            background: rgba(255,255,255,0.92);
            border: 1px solid rgba(15,23,42,0.10);
            color: rgba(15,23,42,0.86);
            padding: 0.625rem 0.95rem;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.3s var(--ease), background 0.3s var(--ease), box-shadow 0.3s var(--ease);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 10px 22px rgba(15,23,42,0.08);
        }
        .new-message-btn i{ color: rgba(99,91,255,0.95); }
        .new-message-btn:active { transform: scale(0.99); }

        .conversations-section { padding: 0 var(--page-pad); margin-bottom: 2rem; }

        .conversation-item {
            background: rgba(255,255,255,0.92);
            border-radius: var(--radius);
            padding: 1.125rem 1.125rem;
            margin-bottom: 0.875rem;
            box-shadow: 0 14px 34px rgba(15,23,42,0.10);
            border: 1px solid rgba(15,23,42,0.10);
            cursor: pointer;
            transition: transform 0.35s var(--ease), box-shadow 0.35s var(--ease);
            display: flex;
            align-items: center;
            gap: 1rem;
            position: relative;
            overflow: hidden;
        }
        .conversation-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 12px;
            bottom: 12px;
            width: 3px;
            background: linear-gradient(180deg, rgba(99,91,255,0.95), rgba(6,182,212,0.75));
            border-radius: 0 2px 2px 0;
            opacity: 0.9;
        }
        .conversation-item:active { transform: scale(0.99); box-shadow: var(--shadow-sm); }

        .conversation-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(99,91,255,0.95) 0%, rgba(6,182,212,0.85) 100%);
            box-shadow: 0 10px 22px rgba(15,23,42,0.10), inset 0 1px 0 rgba(255,255,255,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 800;
            font-size: 1.125rem;
            flex-shrink: 0;
        }

        .conversation-content { flex: 1; min-width: 0; }

        .conversation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.25rem;
            gap: 0.75rem;
        }

        .conversation-name { font-size: 1rem; font-weight: 800; color: var(--text-dark); }
        .conversation-time { font-size: 0.75rem; color: var(--text-medium); white-space: nowrap; }
        .conversation-preview { font-size: 0.875rem; color: var(--text-medium); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .unread-badge {
            background: var(--primary);
            color: #fff;
            border-radius: 999px;
            padding: 0.25rem 0.6rem;
            font-size: 0.75rem;
            font-weight: 800;
            min-width: 22px;
            text-align: center;
            box-shadow: 0 12px 28px rgba(99,91,255,0.22);
        }

        /* Chat overlay */
        .chat-view {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: calc(72px + env(safe-area-inset-bottom, 0));
            background: var(--bg-main);
            z-index: 1000;
            flex-direction: column;
        }
        .chat-view.active { display: flex; }

        .chat-header {
            background: rgba(255,255,255,0.92);
            color: rgba(15,23,42,0.92);
            padding: calc(14px + env(safe-area-inset-top, 0px)) var(--page-pad) 12px;
            display: flex;
            align-items: center;
            gap: 0.875rem;
            border-bottom: 1px solid rgba(15,23,42,0.10);
            box-shadow: 0 10px 25px rgba(15,23,42,0.08);
        }

        .back-btn {
            background: rgba(15,23,42,0.06);
            border: 1px solid rgba(15,23,42,0.10);
            color: rgba(15,23,42,0.85);
            width: 42px;
            height: 42px;
            border-radius: var(--radius-sm);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s var(--ease), background 0.3s var(--ease);
        }
        .back-btn:active { transform: scale(0.99); }

        .chat-title {
            flex: 1;
            font-size: 1.05rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.875rem;
        }

        .message-bubble {
            max-width: 78%;
            padding: 0.75rem 1rem;
            border-radius: 18px;
            word-wrap: break-word;
            animation: fadeInUp 0.35s var(--ease) backwards;
        }

        .message-sent {
            background: var(--primary);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
            box-shadow: 0 14px 34px rgba(99, 91, 255, 0.20);
        }

        .message-received {
            background: rgba(255,255,255,0.92);
            color: var(--text-dark);
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            box-shadow: 0 10px 22px rgba(15,23,42,0.08);
            border: 1px solid rgba(15,23,42,0.10);
        }

        .typing-bubble{
            padding: 0.7rem 0.85rem;
        }
        .typing-dots{
            display:flex;
            gap: 6px;
            align-items:center;
            justify-content:flex-start;
            height: 16px;
        }
        .typing-dots span{
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: rgba(100,116,139,0.55);
            display:inline-block;
            animation: typingBounce 1.05s ease-in-out infinite;
        }
        .typing-dots span:nth-child(2){ animation-delay: 0.15s; }
        .typing-dots span:nth-child(3){ animation-delay: 0.3s; }
        @keyframes typingBounce{
            0%, 100%{ transform: translateY(0); opacity: 0.55; }
            50%{ transform: translateY(-5px); opacity: 0.95; }
        }

        .message-time { font-size: 0.75rem; opacity: 0.75; margin-top: 0.25rem; }

        .chat-input-area {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(15,23,42,0.10);
            padding: 0.875rem var(--page-pad) calc(0.875rem + env(safe-area-inset-bottom, 0));
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1.5px solid rgba(15,23,42,0.22);
            border-radius: 999px;
            font-size: 0.9375rem;
            resize: none;
            max-height: 140px;
            min-height: 44px;
            font-family: inherit;
            background: #fff;
            transition: border-color 0.3s var(--ease), box-shadow 0.3s var(--ease);
        }
        .message-input:focus {
            outline: none;
            border-color: rgba(15,23,42,0.45);
            box-shadow: 0 0 0 4px rgba(99, 91, 255, 0.14);
        }

        .send-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
            flex-shrink: 0;
            box-shadow: 0 14px 34px rgba(99, 91, 255, 0.22);
        }
        .send-btn:active { transform: scale(0.99); box-shadow: 0 10px 28px rgba(99, 91, 255, 0.18); }
        .send-btn:disabled { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

        .empty-state {
            text-align: center;
            padding: 3rem 1.5rem;
            background: rgba(255,255,255,0.92);
            border-radius: var(--radius);
            margin: 0 var(--page-pad);
            border: 1px solid rgba(15,23,42,0.10);
            box-shadow: 0 14px 34px rgba(15,23,42,0.10);
        }
        .empty-state i { font-size: 2.75rem; color: var(--text-light); margin-bottom: 1rem; }
        .empty-state h3 { font-size: 1.125rem; font-weight: 700; color: var(--text-dark); margin-bottom: 0.5rem; }
        .empty-state p { font-size: 0.875rem; color: var(--text-medium); }

        .loading { display: flex; justify-content: center; align-items: center; padding: 3rem; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s var(--ease) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Bottom nav: supplier-bottom-nav.css – same as dashboard */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .conversation-item { animation: fadeInUp 0.45s var(--ease) backwards; }

        @media (min-width: 768px) {
            body { max-width: 440px; margin: 0 auto; box-shadow: 0 0 48px rgba(15, 23, 42, 0.12); }
        }
    </style>

    <script>
        const alertSystem = new AlertSystem();

        function showError(message) {
            alertSystem.show('error', message);
        }

        let currentConversation = null;
        let messagesRef = null;
        let messagesQuery = null;
        let conversations = [];

        function getUserData() {
            const supplierAuth = localStorage.getItem('supplierAuth');
            if (!supplierAuth) return null;
            return JSON.parse(supplierAuth);
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return 'Just now';
            if (minutes < 60) return `${minutes}m ago`;
            if (hours < 24) return `${hours}h ago`;
            if (days < 7) return `${days}d ago`;
            return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        }

        function formatMessageTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        }

        function supportStateKey(supplierId) {
            return 'ab.support.ai.state.' + String(supplierId || 'unknown');
        }

        function supportEscalationsKey(supplierId) {
            return 'ab.support.escalations.' + String(supplierId || 'unknown');
        }

        function getSupportState(supplierId) {
            try { return JSON.parse(localStorage.getItem(supportStateKey(supplierId)) || '{}') || {}; } catch (e) { return {}; }
        }

        function setSupportState(supplierId, state) {
            try { localStorage.setItem(supportStateKey(supplierId), JSON.stringify(state || {})); } catch (e) {}
        }

        function getEscalations(supplierId) {
            try { return JSON.parse(localStorage.getItem(supportEscalationsKey(supplierId)) || '[]') || []; } catch (e) { return []; }
        }

        function setEscalations(supplierId, items) {
            try { localStorage.setItem(supportEscalationsKey(supplierId), JSON.stringify(items || [])); } catch (e) {}
        }

        function roundToNextMinutes(date, stepMinutes) {
            const d = new Date(date.getTime());
            const ms = stepMinutes * 60 * 1000;
            d.setTime(Math.ceil(d.getTime() / ms) * ms);
            return d;
        }

        function seniorContactSchedule(now) {
            const d = new Date(now.getTime());
            const h = d.getHours();
            if (h >= 9 && h < 17) {
                const due = roundToNextMinutes(new Date(d.getTime() + 2 * 60 * 60 * 1000), 30);
                return { due, label: 'today', time: due.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) };
            }
            const tomorrow = new Date(d.getTime());
            tomorrow.setDate(tomorrow.getDate() + 1);
            tomorrow.setHours(10, 0, 0, 0);
            return { due: tomorrow, label: 'tomorrow', time: tomorrow.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) };
        }

        function supportIsSerious(text) {
            const t = String(text || '').toLowerCase();
            return /(refund|chargeback|fraud|scam|hacked|hack|stolen|legal|police|threat|abuse|harass|harassment|injury|accident|money not received|not received|overcharged|wrong charge|unauthorized|urgent|emergency)/i.test(t);
        }

        function supportIntent(text) {
            const t = String(text || '').toLowerCase();
            if (/(pay|payment|card|stripe|pay letter|invoice|receipt|charged|charge)/.test(t)) return 'payment';
            if (/(post load|create load|new load|shipment|posting)/.test(t)) return 'post_load';
            if (/(track|tracking|eta|location|in transit|status)/.test(t)) return 'tracking';
            if (/(login|sign in|password|otp|pin|2fa|two factor|code)/.test(t)) return 'login';
            if (/(cancel|cancellation|dispute|refund)/.test(t)) return 'dispute';
            if (/(hello|hi|assalam|salam|hey)/.test(t)) return 'greet';
            return 'unknown';
        }

        function extractLoadId(text) {
            const t = String(text || '');
            const m = t.match(/\bLOAD-([A-Z0-9]{4,})\b/i);
            if (m) return 'LOAD-' + String(m[1]).toUpperCase();
            const h = t.match(/\b([a-f0-9]{8,})\b/i);
            if (h) return String(h[1]).substring(0, 12);
            return '';
        }

        function supportReplyText(intent, userMessage, state) {
            const msg = String(userMessage || '');
            const loadHint = extractLoadId(msg);
            const asked = String((state && state.lastAsked) || '');
            const askLoad = !loadHint ? ' Please share the Load ID (e.g., LOAD-ABC12345).' : '';
            if (intent === 'greet') {
                return "Hi! I’m Alpha Freight AI Support. Tell me what you need help with (Payments, Post Load, Tracking, Messages, Profile).";
            }
            if (intent === 'post_load') {
                return "To post a load: go to Post → fill Pickup/Delivery + dates + vehicle type → set budget → Post Load. If you want, write your load in one line and use AI Assist to auto‑fill.";
            }
            if (intent === 'tracking') {
                if (!loadHint && asked !== 'load') return "For tracking: open My Loads → select the load → Track. If the status/ETA looks wrong, tell me the route and current status." + askLoad;
                return "For tracking: open My Loads → select the load → Track. If you share the Load ID, I can guide the next step based on the current status.";
            }
            if (intent === 'login') {
                return "Login help: check email/password, then try again. If PIN/2FA is enabled, enter the code. If you can’t access, tell me the exact error message shown on screen.";
            }
            if (intent === 'dispute') {
                return "For disputes/refunds: open My Loads → AI Dispute to generate a professional draft, or open the load and use Dispute. Share the Load ID and what happened (cancelled, late, damaged, etc.).";
            }
            if (intent === 'payment') {
                const hasError = /(error|failed|declined|not working|problem)/i.test(msg);
                if (hasError) return "Payment help: tell me which page you are on (Pay Now / Pay with Card / Pay Letter) and the exact error text you see. If it’s a Pay Letter item, tap AI on the order to see the breakdown." + askLoad;
                return "For payments: open Pay Letter or Pay Now. If you’re unsure what the payment is for, open Pay Letter and tap AI on the order to see the breakdown." + askLoad;
            }
            return "I can help, but I need details: which page are you on, what is the Load ID (if any), and what exact error do you see?";
        }

        let supportTypingEl = null;
        let supportTypingSeq = 0;

        function showSupportTyping() {
            const container = document.getElementById('chatMessages');
            if (!container) return;
            if (supportTypingEl && supportTypingEl.isConnected) return;
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble message-received typing-bubble';
            bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
            container.appendChild(bubble);
            container.scrollTop = container.scrollHeight;
            supportTypingEl = bubble;
        }

        function hideSupportTyping() {
            try {
                if (supportTypingEl && supportTypingEl.parentNode) supportTypingEl.parentNode.removeChild(supportTypingEl);
            } catch (e) {}
            supportTypingEl = null;
        }

        function estimateTypingDelay(text) {
            const len = String(text || '').trim().length;
            const base = 650;
            const extra = Math.min(1100, Math.max(0, Math.floor(len * 18)));
            return base + extra;
        }

        async function sendSupportAutoMessage(supplierId, supplierName, userEmail, text, { senderLabel } = {}) {
            const db = window.AlphaBrokrage.firebaseDb;
            if (!db) return;
            const now = Date.now();
            const msg = {
                supplierId: supplierId,
                supplierName: supplierName,
                supplierEmail: userEmail,
                supplierUid: (window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth && window.AlphaBrokrage.firebaseAuth.currentUser) ? window.AlphaBrokrage.firebaseAuth.currentUser.uid : '',
                carrierId: 'support',
                carrierName: 'Alpha Freight Support',
                message: senderLabel ? `${senderLabel}: ${text}` : text,
                senderType: 'support',
                senderId: 'support',
                senderUid: '',
                recipientType: 'supplier',
                recipientId: supplierId,
                read: false,
                timestamp: now,
                createdAt: new Date().toISOString()
            };
            await db.ref('messages').push(msg);
        }

        async function handleSupportAutoReply(userMessage) {
            const user = getUserData();
            if (!user) return;
            const db = window.AlphaBrokrage.firebaseDb;
            if (!db) return;
            const supplierId = user.supplierId || user.email?.replace('@', '_').replace(/\./g, '_');
            const supplierName = user.companyName || user.company || user.email || 'Supplier';
            const state = getSupportState(supplierId);
            const snippet = String(userMessage || '').slice(0, 200);
            const serious = supportIsSerious(userMessage);
            const intent = supportIntent(userMessage);

            let unknownCount = parseInt(state.unknownCount || 0, 10) || 0;
            if (intent === 'unknown') unknownCount += 1;
            else unknownCount = 0;

            const nextAsked = intent === 'tracking' && !extractLoadId(userMessage) ? 'load' : '';
            setSupportState(supplierId, { ...state, unknownCount, lastUserAt: new Date().toISOString(), lastIntent: intent, lastAsked: nextAsked });

            if (serious || unknownCount >= 2) {
                const sched = seniorContactSchedule(new Date());
                const msg1 = "I can’t fully handle this here. I’m connecting you with our senior support.";
                const msg2 = `You will receive a message ${sched.label} at ${sched.time} (your local time).`;
                const items = getEscalations(supplierId);
                items.push({
                    dueAt: sched.due.toISOString(),
                    createdAt: new Date().toISOString(),
                    snippet: snippet,
                    sent: false
                });
                setEscalations(supplierId, items.slice(-20));
                await sendSupportAutoMessage(supplierId, supplierName, user.email, msg1, { senderLabel: 'AI Support' });
                await sendSupportAutoMessage(supplierId, supplierName, user.email, msg2, { senderLabel: 'AI Support' });
                return;
            }

            const reply = supportReplyText(intent, userMessage, state);
            await sendSupportAutoMessage(supplierId, supplierName, user.email, reply, { senderLabel: 'AI Support' });
        }

        async function flushSeniorEscalations() {
            const user = getUserData();
            if (!user) return;
            const supplierId = user.supplierId || user.email?.replace('@', '_').replace(/\./g, '_');
            const supplierName = user.companyName || user.company || user.email || 'Supplier';
            const items = getEscalations(supplierId);
            if (!items.length) return;
            const now = Date.now();
            let changed = false;
            for (const it of items) {
                if (it.sent) continue;
                const ts = Date.parse(it.dueAt || '');
                if (!Number.isFinite(ts) || ts > now) continue;
                const msg = "Senior Support: Hi, I’m here to help. Please share your Load ID and a short summary so we can resolve this quickly.";
                try {
                    await sendSupportAutoMessage(supplierId, supplierName, user.email, msg);
                    it.sent = true;
                    it.sentAt = new Date().toISOString();
                    changed = true;
                } catch (e) {}
            }
            if (changed) setEscalations(supplierId, items.slice(-20));
        }

        async function loadConversations() {
            const user = getUserData();
            if (!user) {
                document.getElementById('conversationsSection').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-sign-in-alt"></i>
                        <h3>Please Sign In</h3>
                        <p>Sign in to view your messages</p>
                    </div>
                `;
                return;
            }

            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const supplierId = user.supplierId || user.email?.replace('@', '_').replace(/\./g, '_');

                const snapshot = await db.ref('messages').orderByChild('supplierId').equalTo(supplierId).limitToLast(500).once('value');
                const allMessages = snapshot.val() || {};

                const conversationMap = {};
                Object.entries(allMessages).forEach(([msgId, msg]) => {
                    if (msg.supplierId === supplierId || msg.supplierEmail === user.email) {
                        const carrierId = msg.carrierId || 'support';
                        const carrierName = msg.carrierName || 'Support';
                        const loadId = msg.loadId ? String(msg.loadId) : '';
                        const convKey = carrierId + '|' + loadId;

                        if (!conversationMap[convKey]) {
                            conversationMap[convKey] = {
                                key: convKey,
                                carrierId: carrierId,
                                carrierName: carrierName,
                                loadId: loadId,
                                lastMessage: '',
                                lastMessageTime: 0,
                                unreadCount: 0,
                                messages: []
                            };
                        }

                        conversationMap[convKey].messages.push({ ...msg, id: msgId });

                        const msgTime = msg.timestamp || msg.createdAt || 0;
                        if (msgTime > conversationMap[convKey].lastMessageTime) {
                            conversationMap[convKey].lastMessage = msg.message || '';
                            conversationMap[convKey].lastMessageTime = msgTime;
                        }

                        if ((msg.senderType === 'carrier' || msg.senderType === 'support') && !msg.read) {
                            conversationMap[convKey].unreadCount++;
                        }
                    }
                });

                conversations = Object.values(conversationMap).sort((a, b) =>
                    b.lastMessageTime - a.lastMessageTime
                );

                renderConversations();
                flushSeniorEscalations().catch(function () {});

            } catch (error) {
                console.error('Error loading conversations:', error);
                showError('Failed to load conversations');
                document.getElementById('conversationsSection').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error Loading Messages</h3>
                        <p>Please try again later</p>
                    </div>
                `;
            }
        }

        function renderConversations() {
            const section = document.getElementById('conversationsSection');

            if (conversations.length === 0) {
                section.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>No Messages Yet</h3>
                        <p>Messages from carriers will appear here</p>
                    </div>
                `;
                return;
            }

            section.innerHTML = conversations.map((conv, index) => {
                const initials = conv.carrierName.substring(0, 2).toUpperCase();
                const unreadBadge = conv.unreadCount > 0
                    ? `<span class="unread-badge">${conv.unreadCount}</span>`
                    : '';
                const loadSuffix = conv.loadId ? ` • #${String(conv.loadId).substring(0, 8)}` : '';

                return `
                    <div class="conversation-item" data-carrier-id="${(conv.carrierId || '').replace(/"/g, '&quot;')}" data-carrier-name="${(conv.carrierName || '').replace(/"/g, '&quot;')}" data-load-id="${(conv.loadId || '').replace(/"/g, '&quot;')}" style="animation-delay: ${index * 0.1}s">
                        <div class="conversation-avatar">${initials}</div>
                        <div class="conversation-content">
                            <div class="conversation-header">
                                <div class="conversation-name">${conv.carrierName}${loadSuffix}</div>
                                <div class="conversation-time">${formatTime(conv.lastMessageTime)}</div>
                            </div>
                            <div class="conversation-preview">${(conv.lastMessage || 'No messages yet').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
                        </div>
                        ${unreadBadge}
                    </div>
                `;
            }).join('');

            section.querySelectorAll('.conversation-item').forEach(el => {
                el.addEventListener('click', () => {
                    openConversation(el.dataset.carrierId || '', el.dataset.carrierName || 'Carrier', el.dataset.loadId || '');
                });
            });
        }

        let bidLockQuery = null;
        let bidLockHandler = null;

        function setChatLocked(locked, reason) {
            const input = document.getElementById('messageInput');
            const btn = document.getElementById('sendBtn');
            if (input) {
                input.disabled = !!locked;
                input.placeholder = locked ? (reason || 'Chat locked') : 'Type a message...';
            }
            if (btn) btn.disabled = !!locked;
        }

        function attachBidLockListener() {
            try {
                if (bidLockQuery && bidLockHandler) bidLockQuery.off('value', bidLockHandler);
            } catch (e) {}
            bidLockQuery = null;
            bidLockHandler = null;

            if (!currentConversation || !currentConversation.loadId) {
                setChatLocked(false, '');
                return;
            }
            if (String(currentConversation.carrierId) === 'support') {
                setChatLocked(false, '');
                return;
            }
            const db = window.AlphaBrokrage.firebaseDb;
            if (!db) return;
            const carrierId = String(currentConversation.carrierId || '');
            const loadId = String(currentConversation.loadId || '');
            if (!carrierId || !loadId) return;

            bidLockQuery = db.ref(`bids/${loadId}/${carrierId}/status`);
            bidLockHandler = (snap) => {
                const st = String(snap.val() || '').toLowerCase();
                if (st === 'accepted') setChatLocked(true, 'Chat locked (bid accepted)');
                else if (st === 'rejected') setChatLocked(true, 'Chat locked (bid rejected)');
                else setChatLocked(false, '');
            };
            bidLockQuery.on('value', bidLockHandler);
        }

        function openConversation(carrierId, carrierName, loadId) {
            currentConversation = { carrierId, carrierName, loadId: String(loadId || '') };
            const lidShort = currentConversation.loadId ? ` • #${currentConversation.loadId.substring(0, 8)}` : '';
            document.getElementById('chatTitle').textContent = carrierName + lidShort;
            document.getElementById('chatView').classList.add('active');
            loadMessages(carrierId);
            attachBidLockListener();
        }

        function closeChat() {
            document.getElementById('chatView').classList.remove('active');
            currentConversation = null;
            if (messagesRef) {
                const db = window.AlphaBrokrage.firebaseDb;
                if (db && messagesQuery) messagesQuery.off('value', messagesRef);
                messagesRef = null;
                messagesQuery = null;
            }
            try {
                if (bidLockQuery && bidLockHandler) bidLockQuery.off('value', bidLockHandler);
            } catch (e) {}
            bidLockQuery = null;
            bidLockHandler = null;
            setChatLocked(false, '');
        }

        function loadMessages(carrierId) {
            const user = getUserData();
            if (!user) return;

            const db = window.AlphaBrokrage.firebaseDb;
            const supplierId = user.supplierId || user.email?.replace('@', '_').replace(/\./g, '_');

            if (messagesRef && messagesQuery) {
                messagesQuery.off('value', messagesRef);
            }

            messagesRef = (snapshot) => {
                const messages = [];
                snapshot.forEach((child) => {
                    const msg = child.val() || {};
                    if (msg.carrierId === carrierId) {
                        if (currentConversation && currentConversation.loadId) {
                            if (String(msg.loadId || '') !== String(currentConversation.loadId)) return;
                        }
                        messages.push({ ...msg, id: child.key });
                    }
                });

                messages.sort((a, b) => {
                    const timeA = a.timestamp || a.createdAt || 0;
                    const timeB = b.timestamp || b.createdAt || 0;
                    return timeA - timeB;
                });

                displayMessages(messages);
                markAsRead(carrierId);
            };

            messagesQuery = db.ref('messages').orderByChild('supplierId').equalTo(supplierId).limitToLast(500);
            messagesQuery.on('value', messagesRef);
        }

        function displayMessages(messages) {
            const container = document.getElementById('chatMessages');
            const user = getUserData();
            const supplierId = user.supplierId || user.email?.replace('@', '_').replace(/\./g, '_');

            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comment-dots"></i>
                        <h3>No messages yet</h3>
                        <p>Start the conversation!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = messages.map(msg => {
                const isSent = msg.senderType === 'supplier' && msg.senderId === supplierId;
                const time = formatMessageTime(msg.timestamp || msg.createdAt);
                const rawMsg = (msg.message || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const messageText = rawMsg.replace(/\n/g, '<br>');

                return `
                    <div class="message-bubble ${isSent ? 'message-sent' : 'message-received'}">
                        <div>${messageText}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
            }).join('');

            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            if (!currentConversation) {
                showError('Please select a conversation');
                return;
            }

            const messageInput = document.getElementById('messageInput');
            if (messageInput && messageInput.disabled) {
                showError('Chat is locked');
                return;
            }
            const message = messageInput.value.trim();

            if (!message) return;

            const user = getUserData();
            if (!user) {
                showError('Please sign in to send messages');
                return;
            }

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const supplierId = user.supplierId || user.email?.replace('@', '_').replace(/\./g, '_');
                const supplierName = user.companyName || user.company || user.email || 'Supplier';
                await ensureAuthReady();
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                const authUid = (authSdk && authSdk.currentUser && authSdk.currentUser.uid) ? String(authSdk.currentUser.uid) : '';
                if (!authUid) {
                    showError('Session expired. Please login again.');
                    setTimeout(() => { window.location.href = 'login.html'; }, 800);
                    return;
                }

                const messageData = {
                    supplierId: supplierId,
                    supplierName: supplierName,
                    supplierEmail: user.email,
                    supplierUid: (window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth && window.AlphaBrokrage.firebaseAuth.currentUser) ? window.AlphaBrokrage.firebaseAuth.currentUser.uid : '',
                    carrierId: currentConversation.carrierId,
                    carrierName: currentConversation.carrierName,
                    ...(currentConversation.loadId ? { loadId: currentConversation.loadId } : {}),
                    message: message,
                    senderType: 'supplier',
                    senderId: supplierId,
                    senderUid: (window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth && window.AlphaBrokrage.firebaseAuth.currentUser) ? window.AlphaBrokrage.firebaseAuth.currentUser.uid : '',
                    recipientType: currentConversation.carrierId === 'support' ? 'support' : 'carrier',
                    recipientId: currentConversation.carrierId,
                    read: false,
                    timestamp: Date.now(),
                    createdAt: new Date().toISOString()
                };

                await db.ref('messages').push(messageData);
                try {
                    if (authUid && currentConversation.carrierId && currentConversation.carrierId !== 'support') {
                        const title = 'New Message';
                        const msg = `New message from ${supplierName}`;
                        const url = '/mobile-app/carrier/messages.html?supplierId=' + encodeURIComponent(supplierId) + '&supplierName=' + encodeURIComponent(supplierName) + (currentConversation.loadId ? ('&loadId=' + encodeURIComponent(currentConversation.loadId)) : '');
                        await db.ref('notificationQueue').push({
                            senderUid: authUid,
                            toUserId: String(currentConversation.carrierId),
                            toUserType: 'carrier',
                            title,
                            message: msg,
                            type: 'new_message',
                            data: { type: 'new_message', loadId: currentConversation.loadId || null, supplierId: supplierId, url: url, icon: '/image-removebg-preview - 2026-03-04T141043.516.png' },
                            createdAt: new Date().toISOString()
                        });
                    }
                } catch (e) {}

                messageInput.value = '';
                messageInput.style.height = 'auto';

                loadConversations();
                if (currentConversation && currentConversation.carrierId === 'support') {
                    const mySeq = ++supportTypingSeq;
                    showSupportTyping();
                    const delay = estimateTypingDelay(message);
                    setTimeout(() => {
                        if (mySeq !== supportTypingSeq) return;
                        try {
                            handleSupportAutoReply(message).catch(function () {}).finally(() => {
                                if (mySeq !== supportTypingSeq) return;
                                hideSupportTyping();
                            });
                        } catch (e) {
                            hideSupportTyping();
                        }
                    }, delay);
                }

            } catch (error) {
                console.error('Error sending message:', error);
                showError('Failed to send message. Please try again.');
            } finally {
                sendBtn.disabled = false;
            }
        }

        function markAsRead(carrierId) {
            const user = getUserData();
            if (!user) return;

            const db = window.AlphaBrokrage.firebaseDb;
            const supplierId = user.supplierId || user.email?.replace('@', '_').replace(/\./g, '_');

            db.ref('messages')
                .orderByChild('supplierId')
                .equalTo(supplierId)
                .once('value', (snapshot) => {
                    const updates = {};
                    snapshot.forEach((child) => {
                        const msg = child.val();
                        if (msg.carrierId === carrierId &&
                            (msg.senderType === 'carrier' || msg.senderType === 'support') &&
                            !msg.read) {
                            updates[`messages/${child.key}/read`] = true;
                        }
                    });
                    if (Object.keys(updates).length > 0) {
                        db.ref().update(updates);
                    }
                });
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const messageInput = document.getElementById('messageInput');
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });
        });

        function openNewMessage() {
            openConversation('support', 'Alpha Freight Support');
        }

        document.addEventListener('DOMContentLoaded', function() {
            (async function () {
                await ensureAuthReady();
                await loadConversations();
                try {
                    const raw = localStorage.getItem('ab.messages.openCarrier');
                    if (!raw) return;
                    localStorage.removeItem('ab.messages.openCarrier');
                    const v = JSON.parse(raw);
                    const carrierId = String(v && v.carrierId ? v.carrierId : '');
                    const carrierName = String(v && v.carrierName ? v.carrierName : 'Carrier');
                    const loadId = String(v && v.loadId ? v.loadId : '');
                    if (carrierId) openConversation(carrierId, carrierName, loadId);
                } catch (e) {}
                try {
                    const p = new URLSearchParams(window.location.search);
                    const carrierId = p.get('carrierId') || '';
                    const carrierName = p.get('carrierName') || 'Carrier';
                    const loadId = p.get('loadId') || '';
                    if (carrierId) openConversation(carrierId, carrierName, loadId);
                } catch (e) {}
            })();
        });

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return;
            if (authSdk.currentUser) return;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => {
                    if (done) return;
                    done = true;
                    resolve();
                }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
        }
    </script>
