<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turn Off 2FA - Alpha Freight</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary:#2563EB; --primary2:#1E40AF; --navy:#0B1220; --dark:#0F172A; --muted:#64748B; --bg:#F1F5F9; --card:#fff; --border:#E2E8F0; --shadow:0 18px 50px rgba(2,6,23,.10); --radius:22px; --radius2:16px; --error:#EF4444; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(180deg,#E2E8F0 0%, var(--bg) 22%, #F8FAFC 100%);min-height:100vh;color:var(--dark);padding-bottom:24px}
        .wrap{max-width:520px;margin:0 auto}
        .header{background:linear-gradient(180deg,var(--navy) 0%, #111B31 55%, var(--primary2) 100%);color:#fff;padding:1.25rem 1.25rem 1.1rem;display:flex;gap:1rem;align-items:center;position:sticky;top:0;z-index:5;box-shadow:0 18px 40px rgba(2,6,23,.18)}
        .back{width:44px;height:44px;border-radius:14px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none}
        .title{font-weight:900;letter-spacing:-.02em}
        .sub{font-size:.875rem;opacity:.92}
        .card{background:var(--card);margin:1rem 1.25rem 0;padding:1.1rem;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow)}
        .muted{color:var(--muted);font-size:.875rem}
        .row{margin-top:.75rem}
        .warn{display:flex;gap:.75rem;align-items:flex-start;padding:.95rem;border:1px solid rgba(239,68,68,.22);background:rgba(239,68,68,.06);border-radius:18px;margin-top:.85rem}
        .warn i{color:var(--error);margin-top:.1rem}
        .input{width:100%;padding:.95rem 1rem;font-size:1.05rem;border:2px solid rgba(148,163,184,.28);border-radius:16px;background:rgba(248,250,252,.9);min-height:52px;letter-spacing:6px;text-align:center;font-weight:800}
        .actions{display:flex;gap:.6rem;margin-top:.9rem}
        .btn{flex:1;padding:.95rem;border-radius:16px;font-weight:900;border:1px solid rgba(148,163,184,.35);background:#fff;color:var(--dark)}
        .btn.danger{border-color:rgba(239,68,68,.35);background:linear-gradient(135deg, rgba(239,68,68,.16), rgba(239,68,68,.06));color:#991B1B}
        .btn[disabled]{opacity:.65}
        .err{color:var(--error);font-size:.875rem;margin-top:.5rem}
        .tip{margin-top:.9rem;display:flex;gap:.6rem;align-items:flex-start;color:var(--muted);font-size:.875rem}
        .tip i{color:var(--primary);margin-top:.1rem}
    </style>
</head>
<body>
    <div class="wrap">
        <div class="header">
            <a href="profile.html" class="back" aria-label="Back"><i class="fas fa-arrow-left"></i></a>
            <div>
                <div class="title">Turn Off 2FA</div>
                <div class="sub">Confirm with your 6‑digit code</div>
            </div>
        </div>
        <div class="card">
            <div class="warn">
                <i class="fas fa-triangle-exclamation"></i>
                <div>
                    <div style="font-weight:900;color:var(--dark);">This reduces account security</div>
                    <div class="muted" style="margin-top:.2rem;">Enter the current code from your authenticator to turn off 2FA.</div>
                </div>
            </div>
            <div class="row"><input id="code" class="input" inputmode="numeric" maxlength="6" placeholder="••••••"></div>
            <div id="err" class="err"></div>
            <div class="actions">
                <a class="btn" href="profile.html" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:.45rem;"><i class="fas fa-xmark"></i> Cancel</a>
                <button class="btn danger" id="disableBtn" type="button" onclick="disable2FA()"><i class="fas fa-lock-open"></i> Turn Off</button>
            </div>
            <div class="tip"><i class="fas fa-circle-info"></i><div>If you lose access to your authenticator app, contact support before disabling.</div></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="../../assets/js/firebase-init.js"></script>
    <script>
        const BASE = 'https://us-central1-alpha-brokerage.cloudfunctions.net';
        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return;
            if (authSdk.currentUser) return;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => { if (!done) { done = true; resolve(); } }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
        }
        async function getIdToken() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            await ensureAuthReady();
            if (!authSdk || !authSdk.currentUser) return '';
            return await authSdk.currentUser.getIdToken();
        }
        async function disable2FA() {
            const err = document.getElementById('err');
            const btn = document.getElementById('disableBtn');
            err.textContent = '';
            const token = await getIdToken();
            const code = (document.getElementById('code').value || '').trim();
            if (!/^\d{6}$/.test(code)) { err.textContent = 'Enter 6-digit code'; return; }
            btn.disabled = true;
            btn.textContent = 'Turning off...';
            try {
                const r = await fetch(BASE + '/twoFADisablePublic', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ role: 'supplier', token: code })
                });
                const js = await r.json();
                if (js && js.success) {
                    window.location.href = 'profile.html';
                    return;
                }
                err.textContent = (js && js.error && js.error.message) ? js.error.message : 'Failed';
            } catch (e) {
                err.textContent = 'Failed';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Turn Off';
            }
        }
    </script>
</body>
</html>
