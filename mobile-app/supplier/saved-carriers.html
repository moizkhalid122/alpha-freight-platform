    <script>
        const alertSystem = new AlertSystem();
        function showError(msg) { alertSystem.show('error', msg); }
        function showSuccess(msg) { alertSystem.show('success', msg); }

        function safeJsonParse(s, fallback) { try { return JSON.parse(s); } catch (e) { return fallback; } }
        function escapeHtml(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

        function getUserData() {
            const raw = localStorage.getItem('supplierAuth') || localStorage.getItem('lastSupplierProfile');
            return raw ? safeJsonParse(raw, null) : null;
        }

        function supplierKey() {
            const u = getUserData();
            return String((u && (u.supplierId || u.id || u.email)) || 'guest');
        }

        function listKey(kind) {
            return 'ab.preferredNetwork.supplier.' + supplierKey() + '.' + kind;
        }

        function prefKey(name) {
            return 'ab.supplier.settings.' + supplierKey() + '.' + name;
        }

        function readList(kind) {
            const raw = localStorage.getItem(listKey(kind));
            const arr = safeJsonParse(raw || '[]', []);
            return Array.isArray(arr) ? arr : [];
        }

        function writeList(kind, arr) {
            localStorage.setItem(listKey(kind), JSON.stringify(arr || []));
        }

        function readToggle(name, fallbackOn) {
            const raw = localStorage.getItem(prefKey(name));
            if (raw === null || raw === undefined || raw === '') return !!fallbackOn;
            return raw === '1';
        }

        function writeToggle(name, on) {
            localStorage.setItem(prefKey(name), on ? '1' : '0');
        }

        function sanitizeFirebaseKey(key) {
            return String(key || '').trim().replace(/[#.$\[\]]/g, '_');
        }

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return false;
            if (authSdk.currentUser) return true;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => { if (!done) { done = true; resolve(); } }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
            return !!(window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth && window.AlphaBrokrage.firebaseAuth.currentUser);
        }

        async function fetchCarrierProfile(idOrEmail) {
            const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
            if (!db) return { key: sanitizeFirebaseKey(idOrEmail), profile: null };

            const id = String(idOrEmail || '').trim();
            if (!id) return { key: '', profile: null };

            const candidates = [];
            candidates.push(id);
            const sanitized = sanitizeFirebaseKey(id);
            if (sanitized && sanitized !== id) candidates.push(sanitized);

            for (const cand of candidates) {
                try {
                    const snap = await db.ref('carriers/' + cand).once('value');
                    if (snap.exists()) {
                        const p = snap.val() || {};
                        if (!p.carrierId) p.carrierId = cand;
                        return { key: cand, profile: p };
                    }
                } catch (e) {}
            }

            if (id.includes('@')) {
                try {
                    const snap = await db.ref('carriers').orderByChild('email').equalTo(id).limitToFirst(1).once('value');
                    if (snap.exists()) {
                        let out = null;
                        snap.forEach((child) => {
                            if (out) return true;
                            const p = child.val() || {};
                            out = { key: child.key, profile: { ...p, carrierId: p.carrierId || child.key } };
                            return true;
                        });
                        if (out) return out;
                    }
                } catch (e) {}
            }

            return { key: sanitized, profile: null };
        }

        function normalizeCarrierEntry(key, profile) {
            const p = profile || {};
            const carrierId = String(p.carrierId || key || '').trim();
            const name = String(p.companyName || p.company || p.displayName || p.name || p.contactName || carrierId || 'Carrier').trim();
            const email = String(p.email || '').trim();
            const phone = String(p.phone || p.mobile || '').trim();
            return {
                carrierId,
                carrierName: name,
                email,
                phone,
                updatedAt: new Date().toISOString(),
                addedAt: new Date().toISOString(),
                favorite: true
            };
        }

        async function sendInviteMessage(carrierId, carrierName, text) {
            const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
            if (!db) return false;

            const user = getUserData();
            if (!user) return false;
            const supplierId = String(user.supplierId || user.id || user.email?.replace('@', '_').replace(/\./g, '_') || '');
            const supplierName = String(user.companyName || user.company || user.email || 'Supplier');

            const messageData = {
                supplierId: supplierId,
                supplierName: supplierName,
                supplierEmail: user.email || '',
                supplierUid: (window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth && window.AlphaBrokrage.firebaseAuth.currentUser) ? window.AlphaBrokrage.firebaseAuth.currentUser.uid : '',
                carrierId: carrierId,
                carrierName: carrierName || 'Carrier',
                message: String(text || ''),
                senderType: 'supplier',
                senderId: supplierId,
                senderUid: (window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth && window.AlphaBrokrage.firebaseAuth.currentUser) ? window.AlphaBrokrage.firebaseAuth.currentUser.uid : '',
                recipientType: 'carrier',
                recipientId: carrierId,
                read: false,
                timestamp: Date.now(),
                createdAt: new Date().toISOString()
            };

            try {
                await db.ref('messages').push(messageData);
                return true;
            } catch (e) {
                return false;
            }
        }

        let tab = 'preferred';
        let preferred = [];
        let blocked = [];

        function inList(arr, carrierId) {
            const id = String(carrierId || '').toLowerCase();
            return arr.some(x => String(x.carrierId || '').toLowerCase() === id);
        }

        function upsert(arr, entry) {
            const id = String(entry.carrierId || '').toLowerCase();
            const i = arr.findIndex(x => String(x.carrierId || '').toLowerCase() === id);
            if (i >= 0) {
                const prev = arr[i] || {};
                arr[i] = { ...prev, ...entry, addedAt: prev.addedAt || entry.addedAt || new Date().toISOString() };
                return arr;
            }
            return [entry, ...arr];
        }

        function removeFrom(arr, carrierId) {
            const id = String(carrierId || '').toLowerCase();
            return arr.filter(x => String(x.carrierId || '').toLowerCase() !== id);
        }

        function render() {
            const list = document.getElementById('listArea');
            const items = tab === 'blocked' ? blocked : preferred;

            if (!items.length) {
                list.innerHTML = tab === 'blocked'
                    ? '<div class="empty"><i class="fas fa-ban"></i><h3>No blocked carriers</h3><p>Block carriers you do not want to work with</p></div>'
                    : '<div class="empty"><i class="fas fa-star"></i><h3>No preferred carriers</h3><p>Add favorite carriers to invite them first</p></div>';
                return;
            }

            list.innerHTML = items.slice(0, 80).map(c => {
                const carrierId = String(c.carrierId || '');
                const nm = String(c.carrierName || carrierId || 'Carrier');
                const small = [c.email ? c.email : '', c.phone ? c.phone : ''].filter(Boolean).join(' â€¢ ');

                const pill = tab === 'blocked'
                    ? '<span class="pill danger"><i class="fas fa-circle"></i>Blocked</span>'
                    : '<span class="pill success"><i class="fas fa-circle"></i>Preferred</span>';

                const profileHref = 'carrier-profile.html?id=' + encodeURIComponent(carrierId);
                const msgPayload = JSON.stringify({ carrierId: carrierId, carrierName: nm });

                const btnFav = tab === 'blocked'
                    ? ''
                    : `<button type="button" class="btn-mini" data-act="fav" data-id="${escapeHtml(carrierId)}"><i class="fas fa-star"></i> Favorite</button>`;

                const btnMove = tab === 'blocked'
                    ? `<button type="button" class="btn-mini primary" data-act="unblock" data-id="${escapeHtml(carrierId)}"><i class="fas fa-unlock"></i> Unblock</button>`
                    : `<button type="button" class="btn-mini danger" data-act="block" data-id="${escapeHtml(carrierId)}"><i class="fas fa-ban"></i> Block</button>`;

                const btnInvite = tab === 'blocked'
                    ? ''
                    : `<button type="button" class="btn-mini primary" data-act="invite" data-id="${escapeHtml(carrierId)}" data-name="${escapeHtml(nm)}"><i class="fas fa-paper-plane"></i> Invite</button>`;

                return `
                    <div class="item">
                        <div class="item-head">
                            <div class="avatar" aria-hidden="true"><i class="fas fa-truck"></i></div>
                            <div style="min-width:0;">
                                <p class="name">${escapeHtml(nm)}</p>
                                <div class="meta">${escapeHtml(carrierId)}${small ? ' â€¢ ' + escapeHtml(small) : ''}</div>
                            </div>
                            ${pill}
                        </div>
                        <div class="actions">
                            <a class="btn-mini" href="${escapeHtml(profileHref)}"><i class="fas fa-id-card"></i> View</a>
                            <button type="button" class="btn-mini" data-act="message" data-payload="${escapeHtml(msgPayload)}"><i class="fas fa-comments"></i> Message</button>
                            ${btnInvite}
                            ${btnMove}
                            ${btnFav}
                            <button type="button" class="btn-mini danger" data-act="remove" data-id="${escapeHtml(carrierId)}"><i class="fas fa-trash"></i> Remove</button>
                        </div>
                    </div>
                `;
            }).join('');

            list.querySelectorAll('button[data-act]').forEach(btn => {
                const act = btn.dataset.act || '';
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.id || '';
                    if (act === 'message') {
                        try {
                            const raw = btn.dataset.payload || '';
                            const v = JSON.parse(raw);
                            localStorage.setItem('ab.messages.openCarrier', JSON.stringify(v));
                            window.location.href = 'messages.html';
                        } catch (e) {
                            showError('Could not open chat');
                        }
                        return;
                    }
                    if (act === 'invite') {
                        const name = btn.dataset.name || 'Carrier';
                        const note = prompt('Invite message (optional):', 'Hi! You are invited to join my preferred carrier network on Alpha Freight.');
                        if (note === null) return;
                        const ok = await ensureAuthReady();
                        if (!ok) { showError('Please login again'); return; }
                        const sent = await sendInviteMessage(String(id), String(name), String(note || '').trim() || 'You are invited to join my preferred carrier network on Alpha Freight.');
                        if (sent) showSuccess('Invite sent');
                        else showError('Invite failed');
                        return;
                    }
                    if (act === 'block') {
                        if (!id) return;
                        if (!confirm('Block this carrier?')) return;
                        const entry = preferred.find(x => String(x.carrierId) === String(id));
                        preferred = removeFrom(preferred, id);
                        blocked = upsert(blocked, { ...(entry || { carrierId: id, carrierName: id }), updatedAt: new Date().toISOString() });
                        writeList('preferred', preferred);
                        writeList('blocked', blocked);
                        render();
                        showSuccess('Blocked');
                        return;
                    }
                    if (act === 'unblock') {
                        if (!id) return;
                        blocked = removeFrom(blocked, id);
                        writeList('blocked', blocked);
                        render();
                        showSuccess('Unblocked');
                        return;
                    }
                    if (act === 'fav') {
                        if (!id) return;
                        preferred = preferred.map(x => String(x.carrierId) === String(id) ? { ...x, favorite: true, updatedAt: new Date().toISOString() } : x);
                        writeList('preferred', preferred);
                        render();
                        showSuccess('Marked favorite');
                        return;
                    }
                    if (act === 'remove') {
                        if (!id) return;
                        if (!confirm('Remove this carrier from list?')) return;
                        if (tab === 'blocked') {
                            blocked = removeFrom(blocked, id);
                            writeList('blocked', blocked);
                        } else {
                            preferred = removeFrom(preferred, id);
                            writeList('preferred', preferred);
                        }
                        render();
                        showSuccess('Removed');
                    }
                });
            });
        }

        async function addCarrierFlow(idOrEmail, addTo) {
            const raw = String(idOrEmail || '').trim();
            if (!raw) return;

            const ok = await ensureAuthReady();
            if (!ok) {
                showError('Please login again');
                return;
            }

            const { key, profile } = await fetchCarrierProfile(raw);
            const entry = normalizeCarrierEntry(key, profile);

            if (!entry.carrierId) {
                showError('Carrier not found');
                return;
            }

            if (addTo === 'blocked') {
                preferred = removeFrom(preferred, entry.carrierId);
                blocked = upsert(blocked, { ...entry, favorite: false });
                writeList('preferred', preferred);
                writeList('blocked', blocked);
                tab = 'blocked';
                setActiveTab();
                render();
                showSuccess('Added to blocklist');
                return;
            }

            if (inList(blocked, entry.carrierId)) {
                showError('This carrier is blocked. Unblock first.');
                return;
            }

            preferred = upsert(preferred, { ...entry, favorite: true });
            writeList('preferred', preferred);
            tab = 'preferred';
            setActiveTab();
            render();
            showSuccess('Added to preferred');
        }

        function setActiveTab() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            const btn = document.querySelector(`.filter-btn[data-tab="${tab}"]`);
            if (btn) btn.classList.add('active');
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                tab = btn.dataset.tab || 'preferred';
                setActiveTab();
                render();
            });
        });

        document.getElementById('searchBtn').addEventListener('click', () => {
            const q = String(document.getElementById('searchInput').value || '').trim();
            if (!q) return;
            const mode = tab === 'blocked' ? 'blocked' : 'preferred';
            addCarrierFlow(q, mode).catch(() => showError('Could not add carrier'));
        });

        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('searchBtn').click();
            }
        });

        document.getElementById('addBtn').addEventListener('click', () => {
            const q = prompt('Enter carrier id or email:');
            if (q === null) return;
            const mode = tab === 'blocked' ? 'blocked' : 'preferred';
            addCarrierFlow(q, mode).catch(() => showError('Could not add carrier'));
        });

        document.getElementById('autoAssignToggle').addEventListener('change', (e) => {
            writeToggle('autoAssignPreferred', !!e.target.checked);
            showSuccess(e.target.checked ? 'Auto-assign enabled' : 'Auto-assign disabled');
        });

        document.addEventListener('DOMContentLoaded', () => {
            preferred = readList('preferred');
            blocked = readList('blocked');
            const t = document.getElementById('autoAssignToggle');
            if (t) t.checked = readToggle('autoAssignPreferred', true);
            setActiveTab();
            render();
        });
    </script>
</body>
</html>
