        :root {
            --primary: #635bff;
            --primary-dark: #4f46e5;
            --primary-light: #8b5cf6;

            --success: #059669;

            --card-bg: rgba(255,255,255,0.92);

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-main);
            min-height: 100vh;
            color: var(--text-dark);
            line-height: 1.55;
            overflow-x: hidden;
        }
        body::before{
            content:"";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(900px 520px at 14% 8%, rgba(99, 91, 255, 0.12), rgba(246,247,251,0) 62%),
                radial-gradient(900px 520px at 88% 22%, rgba(6, 182, 212, 0.10), rgba(246,247,251,0) 62%);
            pointer-events:none;
            z-index: 0;
        }
        body > *{ position: relative; z-index: 1; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(15, 23, 42, 0.16); border-radius: 10px; transition: background 0.3s var(--ease); }

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

    <script>
        const alertSystem = new AlertSystem();
        function showError(msg) { alertSystem.show('error', msg); }

        let rangeDays = 'all';
        let allLoads = [];

        function getUserData() {
            const auth = localStorage.getItem('supplierAuth');
            return auth ? JSON.parse(auth) : null;
        }

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return false;
            if (authSdk.currentUser) return true;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => { if (!done) { done = true; resolve(); } }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
            return !!(window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth && window.AlphaBrokrage.firebaseAuth.currentUser);
        }

        async function resolveSupplierIdByUid(db, authUid, fallbackId) {
            if (!db || !authUid) return fallbackId || '';
            if (fallbackId) {
                try {
                    const snap = await db.ref('suppliers/' + String(fallbackId)).once('value');
                    if (snap.exists()) {
                        const v = snap.val() || {};
                        if (v.firebaseUid && String(v.firebaseUid) === String(authUid)) return String(fallbackId);
                    }
                } catch (e) {}
            }
            try {
                const snap = await db.ref('suppliers').orderByChild('firebaseUid').equalTo(String(authUid)).limitToFirst(1).once('value');
                if (snap.exists()) {
                    let out = '';
                    snap.forEach((ch) => { if (!out) out = ch.key; });
                    if (out) return out;
                }
            } catch (e) {}
            return fallbackId || '';
        }

        function normStatus(s) {
            return String(s || '').toLowerCase().replace(/\s+/g, '_').replace(/-/g, '_');
        }

        function isCompletedStatus(s) {
            const k = normStatus(s);
            return k === 'completed' || k === 'delivered';
        }

        function isActiveStatus(s) {
            const k = normStatus(s);
            return ['active', 'accepted', 'in_transit', 'intransit', 'pending', 'posted', 'available'].includes(k);
        }

        function parseDateAny(v) {
            if (!v) return null;
            if (typeof v === 'number') {
                const d = new Date(v);
                return Number.isNaN(d.getTime()) ? null : d;
            }
            const d = new Date(String(v));
            return Number.isNaN(d.getTime()) ? null : d;
        }

        function getCreatedAt(load) {
            return load.createdAt || load.created_at || load.postedAt || load.updatedAt || '';
        }

        function getAmount(load) {
            const amount = Number(load.totalAmount !== undefined ? load.totalAmount : (load.totalCost !== undefined ? load.totalCost : (load.price || load.budget || load.maxBudget || load.minBudget || 0)));
            return Number.isFinite(amount) ? amount : 0;
        }

        function formatCurrency(val) {
            const n = Number(val || 0);
            const safe = Number.isFinite(n) ? n : 0;
            return '£' + safe.toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }

        function filterByRange(loads) {
            if (rangeDays === 'all') return loads;
            const days = Number(rangeDays);
            const since = new Date(Date.now() - days * 24 * 60 * 60 * 1000);
            return loads.filter(l => {
                const d = parseDateAny(getCreatedAt(l));
                return d && d >= since;
            });
        }

        function computeTopRoutes(loads) {
            const map = new Map();
            loads.forEach(l => {
                const pickup = String(l.pickupLocation || l.pickup_location || '').trim() || 'N/A';
                const delivery = String(l.deliveryLocation || l.delivery_location || '').trim() || 'N/A';
                const key = pickup + ' → ' + delivery;
                map.set(key, (map.get(key) || 0) + 1);
            });
            return Array.from(map.entries()).sort((a, b) => b[1] - a[1]).slice(0, 8);
        }

        function renderTopRoutes(loads) {
            const el = document.getElementById('topRoutes');
            const top = computeTopRoutes(loads);
            if (!top.length) {
                el.innerHTML = '<div class="empty"><i class="fas fa-inbox"></i><h3>No data</h3><p>Post loads to see analytics</p></div>';
                return;
            }
            el.innerHTML = top.map(([route, count]) => {
                return `
                    <div class="row">
                        <div class="row-left">
                            <div class="row-title">${String(route).replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
                            <div class="row-sub">Loads posted</div>
                        </div>
                        <div class="badge">${count}</div>
                    </div>
                `;
            }).join('');
        }

        function renderSpark(loads) {
            const days = 14;
            const bins = [];
            for (let i = 0; i < days; i++) bins.push(0);

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            loads.forEach(l => {
                const d = parseDateAny(getCreatedAt(l));
                if (!d) return;
                const dd = new Date(d.getTime());
                dd.setHours(0, 0, 0, 0);
                const diff = Math.floor((today.getTime() - dd.getTime()) / (24 * 60 * 60 * 1000));
                if (diff >= 0 && diff < days) bins[days - 1 - diff] += 1;
            });

            const max = Math.max(1, ...bins);
            const bars = document.getElementById('sparkBars');
            const w = 140, h = 56;
            const gap = 2;
            const barW = (w - (days - 1) * gap) / days;
            let out = '';
            bins.forEach((v, i) => {
                const bh = (v / max) * (h - 10);
                const x = i * (barW + gap);
                const y = h - bh;
                out += `<rect x="${x.toFixed(2)}" y="${y.toFixed(2)}" width="${barW.toFixed(2)}" height="${bh.toFixed(2)}" rx="2" fill="url(#barGrad)" opacity="${v ? 1 : 0.25}"></rect>`;
            });
            bars.innerHTML = out;
            document.getElementById('sparkTotal').textContent = String(bins.reduce((s, x) => s + x, 0));
        }

        function updateStats(loads) {
            const total = loads.length;
            const active = loads.filter(l => isActiveStatus(l.status) && !isCompletedStatus(l.status)).length;
            const completed = loads.filter(l => isCompletedStatus(l.status)).length;
            const spend = loads.reduce((s, l) => s + getAmount(l), 0);

            document.getElementById('statLoads').textContent = String(total);
            document.getElementById('statActive').textContent = String(active);
            document.getElementById('statCompleted').textContent = String(completed);
            document.getElementById('statSpend').textContent = formatCurrency(spend);
        }

        function applyRangeAndRender() {
            const filtered = filterByRange(allLoads);
            updateStats(filtered);
            renderSpark(filtered);
            renderTopRoutes(filtered);
        }

        function htmlEscape(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function reportRangeLabel() {
            if (rangeDays === 'all') return 'All time';
            const n = Number(rangeDays);
            if (Number.isFinite(n) && n > 0) return 'Last ' + n + ' days';
            return 'All time';
        }

        function buildReportHtml() {
            const user = getUserData() || {};
            const company = String(user.companyName || user.company || user.email || 'Supplier');
            const createdAt = new Date();

            const loads = filterByRange(allLoads);
            const total = loads.length;
            const active = loads.filter(l => isActiveStatus(l.status) && !isCompletedStatus(l.status)).length;
            const completed = loads.filter(l => isCompletedStatus(l.status)).length;
            const spend = loads.reduce((s, l) => s + getAmount(l), 0);

            const top = computeTopRoutes(loads);
            const topHtml = top.length
                ? top.map(([route, count]) => `<tr><td>${htmlEscape(route)}</td><td style="text-align:right;font-weight:800;">${count}</td></tr>`).join('')
                : `<tr><td colspan="2" style="color:#475569;">No data</td></tr>`;

            const statCards = `
                <div class="grid">
                    <div class="stat"><div class="k">Loads</div><div class="v">${htmlEscape(total)}</div></div>
                    <div class="stat"><div class="k">Active</div><div class="v">${htmlEscape(active)}</div></div>
                    <div class="stat"><div class="k">Completed</div><div class="v">${htmlEscape(completed)}</div></div>
                    <div class="stat"><div class="k">Spend</div><div class="v">${htmlEscape(formatCurrency(spend))}</div></div>
                </div>
            `;

            const stamp = createdAt.toLocaleString('en-GB');
            const rangeTxt = reportRangeLabel();

            return `
                <!doctype html>
                <html lang="en-GB">
                <head>
                    <meta charset="utf-8" />
                    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
                    <title>Analytics Report</title>
                    <style>
                        :root{ --primary:#635bff; --text:#0f172a; --muted:#475569; --border:rgba(15,23,42,0.12); }
                        *{ box-sizing:border-box; }
                        body{ font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 18px; color: var(--text); background:#fff; }
                        .wrap{ max-width: 820px; margin: 0 auto; }
                        .top{ display:flex; align-items:flex-start; justify-content:space-between; gap: 12px; margin-bottom: 12px; }
                        h1{ font-size: 20px; margin: 0; }
                        .sub{ margin-top: 6px; color: var(--muted); font-size: 13px; font-weight: 700; }
                        .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; border:1px solid var(--border); background:#fff; border-radius: 10px; padding: 10px 12px; font-weight: 800; cursor:pointer; }
                        .btn.primary{ border-color: rgba(99,91,255,0.35); background: rgba(99,91,255,0.10); color:#1e1b4b; }
                        .hint{ font-size: 12px; color: var(--muted); font-weight: 700; margin-top: 6px; }
                        .card{ border:1px solid var(--border); border-radius: 14px; padding: 12px; margin-top: 12px; }
                        .grid{ display:grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
                        .stat{ border:1px solid var(--border); border-radius: 12px; padding: 10px; }
                        .k{ font-size: 11px; color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; }
                        .v{ margin-top: 6px; font-size: 18px; font-weight: 900; }
                        table{ width:100%; border-collapse: collapse; font-size: 13px; }
                        th, td{ padding: 10px 8px; border-bottom: 1px solid rgba(15,23,42,0.10); }
                        th{ text-align:left; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
                        .foot{ margin-top: 14px; font-size: 12px; color: var(--muted); font-weight: 700; }
                        @media print { .no-print{ display:none !important; } body{ padding: 0; } .wrap{ max-width: none; } }
                    </style>
                </head>
                <body>
                    <div class="wrap">
                        <div class="top">
                            <div>
                                <h1>Analytics / Reports</h1>
                                <div class="sub">${htmlEscape(company)}</div>
                                <div class="hint">Range: ${htmlEscape(rangeTxt)} • Generated: ${htmlEscape(stamp)}</div>
                            </div>
                            <div class="no-print">
                                <button class="btn primary" onclick="window.print()">Print / Save as PDF</button>
                            </div>
                        </div>

                        <div class="card">
                            ${statCards}
                        </div>

                        <div class="card">
                            <div style="font-weight:900; margin-bottom:8px;">Top Routes</div>
                            <table>
                                <thead>
                                    <tr><th>Route</th><th style="text-align:right;">Loads</th></tr>
                                </thead>
                                <tbody>
                                    ${topHtml}
                                </tbody>
                            </table>
                        </div>

                        <div class="foot">Alpha Freight • Analytics export</div>
                    </div>
                    <script>
                        try { setTimeout(function(){ window.print(); }, 550); } catch (e) {}
                    ${'</scr' + 'ipt>'}
                </body>
                </html>
            `;
        }

        function generatePdf() {
            if (!allLoads || !Array.isArray(allLoads)) {
                showError('Report not ready yet');
                return;
            }
            const html = buildReportHtml();
            const win = window.open('', '_blank');
            if (!win) {
                showError('Popup blocked. Please allow popups to export PDF.');
                return;
            }
            win.document.open();
            win.document.write(html);
            win.document.close();
        }

        async function loadAnalytics() {
            const user = getUserData();
            const topEl = document.getElementById('topRoutes');
            topEl.innerHTML = '<div class="empty"><i class="fas fa-spinner fa-spin"></i><h3>Loading…</h3><p>Please wait</p></div>';

            if (!user) {
                topEl.innerHTML = '<div class="empty"><i class="fas fa-sign-in-alt"></i><h3>Sign in required</h3><p>Login to view analytics</p></div>';
                return;
            }

            const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
            const ok = await ensureAuthReady();
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!db || !ok || !authSdk || !authSdk.currentUser) {
                topEl.innerHTML = '<div class="empty"><i class="fas fa-wifi"></i><h3>Not connected</h3><p>Please login again</p></div>';
                return;
            }

            const authUid = String(authSdk.currentUser.uid || '');
            const authEmail = String(authSdk.currentUser.email || user.email || '');
            const fallbackSupplierId = user.supplierId || user.id || user.email?.replace(/@/g, '_').replace(/\./g, '_');
            const supplierId = await resolveSupplierIdByUid(db, authUid, fallbackSupplierId);

            const map = {};
            async function mergeQuery(q) {
                const snap = await q.once('value');
                if (!snap.exists()) return;
                snap.forEach((ch) => { map[ch.key] = ch.val() || {}; });
            }

            const jobs = [mergeQuery(db.ref('loads').orderByChild('supplierFirebaseUid').equalTo(authUid))];
            if (authEmail) jobs.push(mergeQuery(db.ref('loads').orderByChild('supplierEmail').equalTo(authEmail)));
            if (supplierId) jobs.push(mergeQuery(db.ref('loads').orderByChild('supplierId').equalTo(supplierId)));
            await Promise.allSettled(jobs);

            allLoads = Object.values(map).map(v => v || {});
            applyRangeAndRender();
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const v = btn.dataset.range || '7';
                rangeDays = v === 'all' ? 'all' : Number(v);
                applyRangeAndRender();
            });
        });

        const refreshBtn = document.getElementById('refreshBtn');
        if (refreshBtn) refreshBtn.addEventListener('click', () => loadAnalytics().catch(() => showError('Could not refresh')));

        const pdfBtn = document.getElementById('pdfBtn');
        if (pdfBtn) pdfBtn.addEventListener('click', generatePdf);

        document.addEventListener('DOMContentLoaded', () => {
            rangeDays = 'all';
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            const allBtn = document.querySelector('.filter-btn[data-range="all"]');
            if (allBtn) allBtn.classList.add('active');
            loadAnalytics().catch(() => showError('Failed to load analytics'));
        });
    </script>
</body>
</html>
