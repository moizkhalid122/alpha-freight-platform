    <style>

        ::-webkit-scrollbar-thumb:hover { background: rgba(37, 99, 235, 0.5); }
        * { scrollbar-width: thin; scrollbar-color: rgba(37, 99, 235, 0.3) transparent; }

        body { font-family: 'Inter', sans-serif; background: radial-gradient(1200px 700px at 20% -10%, rgba(99, 102, 241, 0.10) 0%, rgba(99, 102, 241, 0) 60%), var(--bg-main); min-height: 100vh; padding-bottom: 2rem; }

        .page-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);

            align-items: center;

            background: rgba(255,255,255,0.2);

            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
        }
        .page-title { font-size: 1.25rem; font-weight: 700; }
        .page-amount { font-size: 0.9375rem; opacity: 0.9; margin-top: 0.25rem; }

        .summary-card {
            background: var(--card-bg);
            margin: 1rem 1.25rem;

            border-radius: 18px;

        .wallet-wrap {
            background: var(--card-bg);
            border: 1px solid rgba(148, 163, 184, 0.18);

        .wallet-hint { margin-top: 0.75rem; font-size: 0.8125rem; color: var(--text-medium); display:flex; gap:0.5rem; align-items:center; }

        .divider {

        .submit-btn {

        }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .submit-btn:active:not(:disabled) { transform: scale(0.98); }

        .secure-note { font-size: 0.75rem; color: var(--text-medium); margin-top: 1rem; text-align: center; display:flex; gap:0.5rem; align-items:center; justify-content:center; }
        .secure-note i { color: var(--muted); }

        .processing {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 1.25rem;
        }
        .processing.show { display:flex; }
        .processing-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 18px;
            padding: 1.25rem;
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: var(--shadow);
            text-align: center;
        }
        .processing-card .spin {
            width: 44px;
            height: 44px;
            border-radius: 999px;
            border: 3px solid rgba(2, 6, 23, 0.12);
            border-top-color: rgba(37, 99, 235, 0.95);
            margin: 0 auto 0.75rem auto;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .processing-card .title { font-weight: 800; color: var(--text-dark); margin-bottom: 0.25rem; }
        .processing-card .sub { color: var(--text-medium); font-size: 0.875rem; }

        @media (min-width: 768px) { body { max-width: 500px; margin: 0 auto; } }
    </style>
</head>

    <script>
        const alertSystem = new AlertSystem();
        const STRIPE_KEY = 'pk_live_51Snef8JwsGcenL627huErNXtqNGF92AGxEgXTWOa5WSDNmCS0r7VfdLv9XihRl7xZ0cJVEzRxRQaQUsaHkd3La9g00LKykDcYb';
        const BACKEND = 'https://alpha-freight-server.onrender.com/api/create-payment-intent';

        const params = new URLSearchParams(location.search);
        const loadId = params.get('loadId') || '';
        const amount = parseFloat(params.get('amount') || 0);
        const paymentFor = params.get('paymentFor') || 'Load Payment';
        const paymentType = params.get('paymentType') || 'Payment';
        const paymentTypeLower = String(paymentType || '').toLowerCase();
        const isCancellationFee = paymentTypeLower.includes('cancellation');
        const isDeposit = paymentTypeLower === 'deposit';
        const isRemaining = paymentTypeLower === 'remaining';
        const isNonCommissionPayment = isCancellationFee || isDeposit || isRemaining;

        let totalAmount = amount;
        let stripe = null;
        let elements = null;
        let cardElement = null;
        let cardExpiryElement = null;
        let cardCvcElement = null;
        let paymentRequest = null;
        let prButton = null;

        function formatCurrency(v) {
            return '£' + parseFloat(v || 0).toLocaleString('en-GB', { minimumFractionDigits: 2 });
        }

        function calcCommission(amt) {
            if (!amt || amt <= 0) return { commission: 0, total: amt };
            let rate = amt > 5000 ? 0.03 : amt > 1000 ? 0.04 : 0.05;
            return { commission: amt * rate, total: amt + amt * rate };
        }

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return;
            if (authSdk.currentUser) return;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => { if (!done) { done = true; resolve(); } }, 2500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (!done) { done = true; clearTimeout(timer); try { unsub(); } catch(e){}; resolve(); }
                });
            });
        }

        function getSupplierAuth() {
            try {
                return JSON.parse(localStorage.getItem('supplierAuth') || localStorage.getItem('lastSupplierProfile') || 'null');
            } catch (e) {
                return null;
            }
        }

        function getSupplierId(user) {
            if (!user) return '';
            return user.supplierId || user.id || (user.email || '').replace(/@/g, '_').replace(/\./g, '_');
        }

        async function createDbNotification(userId, userType, title, message, data) {
            try {
                const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
                if (!db || !userId || !userType) return null;
                const payload = {
                    user_id: userId,
                    user_type: userType,
                    type: (data && data.type) ? data.type : 'system',
                    title: title,
                    message: message,
                    data: data || {},
                    read: false,
                    created_at: new Date().toISOString()
                };
                const ref = db.ref('notifications').push();
                await ref.set(payload).catch(() => {});
                try {
                    if (userType === 'supplier') {
                        await db.ref(`notifications/suppliers/${userId}`).push({ title, message, type: payload.type, data: payload.data, read: false, createdAt: new Date().toISOString() }).catch(() => {});
                    } else if (userType === 'carrier') {
                        await db.ref(`notifications/carriers/${userId}`).push({ title, message, type: payload.type, data: payload.data, read: false, createdAt: new Date().toISOString() }).catch(() => {});
                    }
                } catch (e) {}
                return ref.key || null;
            } catch (e) {
                return null;
            }
        }

        async function recordSuccessfulPayment(paymentIntent) {
            const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
            if (!db || !loadId) return null;

            await ensureAuthReady();
            const supplier = getSupplierAuth();
            const supplierId = getSupplierId(supplier);

            if (isCancellationFee) {
                const nowIso = new Date().toISOString();
                let carrierId = '';
                let carrierName = '';
                try {
                    const loadSnap = await db.ref('loads/' + loadId).once('value');
                    const load = loadSnap.val() || {};
                    carrierId = load.carrierId || (load.assignedCarrier || '') || '';
                    carrierName = load.carrierName || load.carrierEmail || carrierId || 'Carrier';
                } catch (e) {}

                let paymentId = null;
                try {
                    const payRef = db.ref('payments').push();
                    paymentId = payRef.key;
                    await payRef.set({
                        paymentId: payRef.key,
                        loadId: loadId,
                        supplierId: supplierId || null,
                        supplierEmail: supplier && supplier.email ? supplier.email : null,
                        paymentFor: paymentFor || 'Cancellation Fee',
                        paymentType: paymentType || 'CancellationFee',
                        method: 'card',
                        status: 'completed',
                        amount: amount,
                        commission: 0,
                        commissionRate: 0,
                        totalAmount: amount,
                        currency: 'GBP',
                        paymentIntentId: paymentIntent && paymentIntent.id ? paymentIntent.id : null,
                        createdAt: nowIso
                    });
                } catch (e) {}

                try {
                    const reqSnap = await db.ref('loads/' + loadId + '/cancellationRequest').once('value');
                    const req = reqSnap.val() || {};
                    await db.ref('loads/' + loadId).update({
                        cancellationStatus: 'pending_approval',
                        cancellationRequest: {
                            ...req,
                            status: 'pending_approval',
                            feePaid: true,
                            feePaidAt: nowIso,
                            feePaymentId: paymentId || null,
                            feePaymentIntentId: paymentIntent && paymentIntent.id ? paymentIntent.id : null,
                            proposedFee: typeof req.proposedFee === 'number' ? req.proposedFee : amount,
                            carrierId: req.carrierId || carrierId || '',
                            carrierName: req.carrierName || carrierName || ''
                        }
                    });
                } catch (e) {}

                try {
                    const cid = carrierId || '';
                    if (cid) {
                        const msg = `Supplier paid cancellation fee (£${amount.toFixed(2)}). Reason is available in load details.`;
                        if (typeof NotificationManager !== 'undefined' && NotificationManager.create) {
                            await NotificationManager.create('cancel_request', 'Cancellation Fee Paid', msg, { type: 'cancel_fee_paid', loadId: loadId, url: '/mobile-app/carrier/load-details.html?id=' + encodeURIComponent(loadId) }, cid, 'carrier');
                        } else {
                            await createDbNotification(cid, 'carrier', 'Cancellation Fee Paid', msg, { type: 'cancel_fee_paid', loadId: loadId, url: '/mobile-app/carrier/load-details.html?id=' + encodeURIComponent(loadId) });
                        }
                    }
                } catch (e) {}

                return paymentId;
            }

            if (isDeposit || isRemaining) {
                const nowIso = new Date().toISOString();
                let paymentId = null;
                let load = null;
                try {
                    const loadSnap = await db.ref('loads/' + loadId).once('value');
                    load = loadSnap.val() || null;
                } catch (e) {}

                try {
                    const payRef = db.ref('payments').push();
                    paymentId = payRef.key;
                    await payRef.set({
                        paymentId: payRef.key,
                        loadId: loadId,
                        supplierId: supplierId || null,
                        supplierEmail: supplier && supplier.email ? supplier.email : null,
                        paymentFor: paymentFor || (isDeposit ? 'Deposit' : 'Remaining'),
                        paymentType: paymentType || (isDeposit ? 'Deposit' : 'Remaining'),
                        paymentPart: isDeposit ? 'deposit' : 'remaining',
                        method: 'card',
                        status: 'paid',
                        amount: amount,
                        commission: 0,
                        commissionRate: 0,
                        totalAmount: amount,
                        currency: 'GBP',
                        paymentIntentId: paymentIntent && paymentIntent.id ? paymentIntent.id : null,
                        createdAt: nowIso
                    });
                } catch (e) {}

                const ps = (load && load.paymentStatus && typeof load.paymentStatus === 'object') ? load.paymentStatus : {};
                const nextPs = {
                    ...ps,
                    method: 'card',
                    status: 'pending',
                    completed: false,
                    updatedAt: nowIso
                };

                if (isDeposit) {
                    nextPs.depositPaid = true;
                    nextPs.depositPaidAt = nowIso;
                    nextPs.depositAmount = amount;
                } else {
                    nextPs.remainingPaid = true;
                    nextPs.remainingPaidAt = nowIso;
                    nextPs.remainingAmount = amount;
                }

                const plan = String(load && load.paymentPlan ? load.paymentPlan : '').toLowerCase();
                const depositPaid = nextPs.depositPaid === true || (load && load.deposit && load.deposit.paid === true);
                const remainingPaid = nextPs.remainingPaid === true || (load && load.remaining && load.remaining.paid === true);
                if (plan === 'deposit_remaining') {
                    if (depositPaid && remainingPaid) {
                        nextPs.status = 'paid';
                        nextPs.completed = true;
                        nextPs.paidAt = nowIso;
                    } else {
                        nextPs.status = 'pending';
                        nextPs.completed = false;
                    }
                }

                try {
                    const updates = { paymentStatus: nextPs, updatedAt: nowIso };
                    if (isDeposit) updates.deposit = { ...(load && load.deposit ? load.deposit : {}), required: true, amount: (load && load.deposit && typeof load.deposit.amount === 'number') ? load.deposit.amount : amount, paid: true, paidAt: nowIso };
                    if (isRemaining) updates.remaining = { ...(load && load.remaining ? load.remaining : {}), amount: (load && load.remaining && typeof load.remaining.amount === 'number') ? load.remaining.amount : amount, paid: true, paidAt: nowIso };
                    if (paymentId) updates.paymentStatus = { ...nextPs, paymentId };
                    await db.ref('loads/' + loadId).update(updates);
                } catch (e) {}

                try {
                    const carrierId = load && (load.carrierId || load.assignedCarrier) ? (load.carrierId || load.assignedCarrier) : '';
                    if (carrierId && plan === 'deposit_remaining' && nextPs.status === 'paid') {
                        const net = (typeof load.carrierNetAmount === 'number' ? load.carrierNetAmount : null);
                        const netAmt = net != null ? net : Math.round((parseFloat(load.commissionBaseAmount || load.price || 0) - parseFloat(load.supplierCommission || 0)) * 100) / 100;
                        const route = `${load.pickupLocation || load.pickup_location || ''} → ${load.deliveryLocation || load.delivery_location || ''}`.trim();
                        const entry = {
                            type: 'earning',
                            loadId: loadId,
                            orderRef: load.formattedOrderId || load.orderRef || ('ORD-' + String(loadId).substring(0, 8).toUpperCase()),
                            route: route || '',
                            amountNet: netAmt,
                            status: 'available',
                            createdAt: nowIso
                        };
                        await db.ref(`walletLedger/${carrierId}/load_${loadId}`).set(entry).catch(() => {});
                    }
                } catch (e) {}

                return paymentId;
            }

            const comm = calcCommission(amount);
            const supplierCommission = comm.commission || 0;
            const supplierCommissionRate = amount > 5000 ? 0.03 : amount > 1000 ? 0.04 : 0.05;
            const total = comm.total || totalAmount;
            const nowIso = new Date().toISOString();
            const carrierNetAmount = Math.round((amount - supplierCommission) * 100) / 100;
            let carrierId = '';
            let orderRef = '';
            let route = '';
            try {
                const loadSnap = await db.ref('loads/' + loadId).once('value');
                const existing = loadSnap.val() || {};
                carrierId = existing.carrierId || existing.assignedCarrier || '';
                orderRef = existing.formattedOrderId || existing.orderRef || '';
                route = `${existing.pickupLocation || existing.pickup_location || ''} → ${existing.deliveryLocation || existing.delivery_location || ''}`.trim();
            } catch (e) {}

            const paymentStatus = {
                completed: true,
                status: 'paid',
                method: 'card',
                paidAt: nowIso,
                upfrontPaid: true,
                upfrontPaidDate: nowIso,
                upfrontAmount: total,
                paymentIntentId: paymentIntent && paymentIntent.id ? paymentIntent.id : null,
                transactionId: paymentIntent && paymentIntent.id ? paymentIntent.id : null,
                reference: paymentIntent && paymentIntent.id ? paymentIntent.id : null,
                amount: amount,
                commission: supplierCommission,
                totalAmount: total
            };

            try {
                await db.ref('loads/' + loadId).update({
                    supplierId: supplierId || undefined,
                    supplierCommission: supplierCommission,
                    supplierCommissionRate: supplierCommissionRate,
                    totalAmount: total,
                    totalCost: total,
                    commissionBaseAmount: amount,
                    carrierCommissionRate: supplierCommissionRate,
                    carrierCommissionAmount: supplierCommission,
                    carrierNetAmount: carrierNetAmount,
                    paymentMethod: 'full-upfront',
                    paymentStatus: paymentStatus,
                    paidAt: nowIso,
                    updatedAt: nowIso
                });
            } catch (e) {}

            try {
                if (carrierId) {
                    const entry = {
                        type: 'earning',
                        loadId: loadId,
                        orderRef: orderRef || ('ORD-' + String(loadId).substring(0, 8).toUpperCase()),
                        route: route || '',
                        amountNet: carrierNetAmount,
                        status: 'available',
                        createdAt: nowIso
                    };
                    await db.ref(`walletLedger/${carrierId}/load_${loadId}`).set(entry).catch(() => {});
                }
            } catch (e) {}

            try {
                const payRef = db.ref('payments').push();
                await payRef.set({
                    paymentId: payRef.key,
                    loadId: loadId,
                    supplierId: supplierId || null,
                    supplierEmail: supplier && supplier.email ? supplier.email : null,
                    paymentFor: paymentFor || 'Load Payment',
                    paymentType: paymentType || 'Payment',
                    method: 'card',
                    status: 'paid',
                    amount: amount,
                    commission: supplierCommission,
                    commissionRate: supplierCommissionRate,
                    totalAmount: total,
                    currency: 'GBP',
                    paymentIntentId: paymentIntent && paymentIntent.id ? paymentIntent.id : null,
                    createdAt: nowIso
                });
                try {
                    await db.ref('loads/' + loadId + '/paymentStatus').update({ paymentId: payRef.key });
                } catch (e) {}
                return payRef.key;
            } catch (e) {
                return null;
            }
        }

        function init() {
            const comm = isNonCommissionPayment ? { commission: 0, total: amount } : calcCommission(amount);
            totalAmount = comm.total;
            const fee = comm.commission || 0;
            document.getElementById('totalDisplay').textContent = formatCurrency(totalAmount);
            document.getElementById('totalDisplay2').textContent = formatCurrency(totalAmount);
            document.getElementById('amountDisplay').textContent = formatCurrency(amount);
            document.getElementById('feeDisplay').textContent = formatCurrency(fee);
            document.getElementById('payAmount').textContent = formatCurrency(totalAmount);

            if (typeof Stripe === 'undefined' || !STRIPE_KEY) {
                document.getElementById('payment-request-button').innerHTML = '<p style="color:#64748B;font-size:0.875rem;">Card payments loading...</p>';
                return;
            }

            stripe = Stripe(STRIPE_KEY, { apiVersion: '2023-10-16' });
            const amtPence = Math.round(totalAmount * 100);

            paymentRequest = stripe.paymentRequest({
                country: 'GB',
                currency: 'gbp',
                total: { label: paymentFor || 'Payment', amount: amtPence },
                requestPayerName: true,
                requestPayerEmail: true
            });

            prButton = stripe.elements().create('paymentRequestButton', {
                paymentRequest: paymentRequest,
                style: {
                    paymentRequestButton: {
                        type: 'default',
                        theme: 'dark',
                        height: '48px'
                    }
                }
            });

            paymentRequest.canMakePayment().then(result => {
                const status = document.getElementById('walletStatus');
                const hint = document.getElementById('walletHint');
                if (result && result.applePay) {
                    prButton.mount('#payment-request-button');
                    if (status) status.textContent = 'Apple Pay available';
                    if (hint) hint.innerHTML = '<i class="fab fa-apple"></i><span>Pay with Apple Pay using your device’s native checkout.</span>';
                } else if (result && result.googlePay) {
                    prButton.mount('#payment-request-button');
                    if (status) status.textContent = 'Google Pay available';
                    if (hint) hint.innerHTML = '<i class="fab fa-google-pay"></i><span>Pay with Google Pay using your device’s native checkout.</span>';
                } else {
                    document.getElementById('payment-request-button').classList.add('hidden');
                    if (status) status.textContent = 'Not available on this device';
                    if (hint) hint.innerHTML = '<i class="fas fa-info-circle"></i><span>Use card details below to pay.</span>';
                }
            }).catch(() => {
                document.getElementById('payment-request-button').classList.add('hidden');
                const status = document.getElementById('walletStatus');
                const hint = document.getElementById('walletHint');
                if (status) status.textContent = 'Not available on this device';
                if (hint) hint.innerHTML = '<i class="fas fa-info-circle"></i><span>Use card details below to pay.</span>';
            });

            paymentRequest.on('paymentmethod', async (ev) => {
                const processing = document.getElementById('processing');
                try {
                    if (processing) processing.classList.add('show');
                    const res = await fetch(BACKEND, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            amount: amtPence,
                            currency: 'gbp',
                            loadId,
                            paymentFor,
                            paymentType,
                            payerUid: (window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth && window.AlphaBrokrage.firebaseAuth.currentUser) ? window.AlphaBrokrage.firebaseAuth.currentUser.uid : ''
                        })
                    });
                    const data = await res.json();
                    if (data.error || !data.clientSecret) {
                        ev.complete('fail');
                        if (processing) processing.classList.remove('show');
                        alertSystem.show('error', data.error?.message || 'Payment failed');
                        return;
                    }
                    const { error, paymentIntent } = await stripe.confirmCardPayment(data.clientSecret, {
                        payment_method: ev.paymentMethod.id
                    });
                    if (error) {
                        ev.complete('fail');
                        if (processing) processing.classList.remove('show');
                        alertSystem.show('error', error.message);
                        return;
                    }
                    ev.complete('success');
                    if (processing) processing.classList.remove('show');
                    alertSystem.show('success', 'Payment successful!');
                    const receiptPaymentId = await recordSuccessfulPayment(paymentIntent);
                    const qs = `loadId=${encodeURIComponent(loadId)}${receiptPaymentId ? `&paymentId=${encodeURIComponent(receiptPaymentId)}` : ''}`;
                    setTimeout(() => { window.location.href = 'receipt.html?' + qs; }, 800);
                } catch (e) {
                    ev.complete('fail');
                    if (processing) processing.classList.remove('show');
                    alertSystem.show('error', 'Payment failed. Try card.');
                }
            });

            elements = stripe.elements();
            const style = { base: { fontSize: '16px', color: '#0F172A' }, invalid: { color: '#EF4444' } };
            cardElement = elements.create('cardNumber', { style });
            cardElement.mount('#card-element');
            cardExpiryElement = elements.create('cardExpiry', { style });
            cardExpiryElement.mount('#card-expiry-element');
            cardCvcElement = elements.create('cardCvc', { style });
            cardCvcElement.mount('#card-cvc-element');

            cardElement.on('change', e => {
                document.getElementById('card-errors').textContent = e.error ? e.error.message : '';
                const brands = document.getElementById('cardBrands');
                if (brands) {
                    brands.querySelectorAll('.brand').forEach((el) => {
                        const b = el.getAttribute('data-brand');
                        if (e.brand && b === e.brand) el.classList.add('active');
                        else el.classList.remove('active');
                    });
                }
            });

            const setBoxFocus = (boxId, focused) => {
                const el = document.getElementById(boxId);
                if (!el) return;
                if (focused) el.classList.add('is-focus');
                else el.classList.remove('is-focus');
            };

            cardElement.on('focus', () => setBoxFocus('cardNumberBox', true));
            cardElement.on('blur', () => setBoxFocus('cardNumberBox', false));
            cardExpiryElement.on('focus', () => setBoxFocus('cardExpiryBox', true));
            cardExpiryElement.on('blur', () => setBoxFocus('cardExpiryBox', false));
            cardCvcElement.on('focus', () => setBoxFocus('cardCvcBox', true));
            cardCvcElement.on('blur', () => setBoxFocus('cardCvcBox', false));
        }

        async function submitPayment() {
            const btn = document.getElementById('submitBtn');
            const name = document.getElementById('cardholderName').value.trim();
            if (!name) {
                alertSystem.show('error', 'Enter cardholder name');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            const processing = document.getElementById('processing');
            if (processing) processing.classList.add('show');

            try {
                const res = await fetch(BACKEND, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        amount: Math.round(totalAmount * 100),
                        currency: 'gbp',
                        loadId,
                        paymentFor,
                        paymentType,
                        payerUid: (window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth && window.AlphaBrokrage.firebaseAuth.currentUser) ? window.AlphaBrokrage.firebaseAuth.currentUser.uid : ''
                    })
                });
                const data = await res.json();
                if (data.error || !data.clientSecret) {
                    throw new Error(data.error?.message || 'Payment failed');
                }
                const { error, paymentIntent } = await stripe.confirmCardPayment(data.clientSecret, {
                    payment_method: {
                        card: cardElement,
                        billing_details: { name }
                    }
                });
                if (error) throw error;
                if (paymentIntent.status === 'succeeded') {
                    if (processing) processing.classList.remove('show');
                    alertSystem.show('success', 'Payment successful!');
                    const receiptPaymentId = await recordSuccessfulPayment(paymentIntent);
                    try {
                        const supplierAuthRaw = localStorage.getItem('supplierAuth') || localStorage.getItem('lastSupplierProfile');
                        const supplierAuth = supplierAuthRaw ? JSON.parse(supplierAuthRaw) : null;
                        const supplierId = supplierAuth ? (supplierAuth.supplierId || supplierAuth.id) : null;
                        if (!isNonCommissionPayment && supplierId && typeof NotificationManager !== 'undefined' && NotificationManager.create) {
                            const title = 'Payment Successful';
                            const body = `£${totalAmount.toFixed(2)} ka payment complete ho gaya (${paymentFor || 'Payment'}).`;
                            await NotificationManager.create('deposit', title, body, { type: 'deposit', amount: String(totalAmount), url: '/mobile-app/supplier/pay-letter.html' }, supplierId, 'supplier');
                        }
                    } catch (e) {}
                    if (isNonCommissionPayment) {
                        setTimeout(() => { window.location.href = 'load-details.html?id=' + encodeURIComponent(loadId); }, 800);
                    } else {
                        const qs = `loadId=${encodeURIComponent(loadId)}${receiptPaymentId ? `&paymentId=${encodeURIComponent(receiptPaymentId)}` : ''}`;
                        setTimeout(() => { window.location.href = 'receipt.html?' + qs; }, 800);
                    }
                }
            } catch (e) {
                btn.disabled = false;
                if (processing) processing.classList.remove('show');
                btn.innerHTML = '<i class="fas fa-lock"></i> Pay <span id="payAmount">' + formatCurrency(totalAmount) + '</span>';
                alertSystem.show('error', e.message || 'Payment failed');
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
