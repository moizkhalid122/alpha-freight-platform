<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#F6F7FB">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Shared responsive bottom nav -->
    
    <link rel="stylesheet" href="../../assets/css/supplier-ultra-premium.css?v=1">
    <script src="../../assets/js/app-resume-fix.js"></script>
    <style>
        /* â€”â€” Premium theme (matches supplier dashboard) â€”â€” */
        :root {
            --primary: #635bff;
            --primary-dark: #4f46e5;
            --primary-light: #8b5cf6;
            --accent: #06b6d4;
            --gold: #c9a227;
            --success: #059669;
            --error: #dc2626;
            --warning: #d97706;
            --text-dark: #0f172a;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --bg-main: #F6F7FB;
            --card-bg: rgba(255,255,255,0.92);
            --border: rgba(15,23,42,0.10);
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08), 0 2px 8px rgba(15, 23, 42, 0.04);
            --shadow-card: 0 8px 32px rgba(15, 23, 42, 0.06), 0 2px 8px rgba(15, 23, 42, 0.03);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 22px;
            --radius-sm: 14px;
            --page-pad: 18px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(15, 23, 42, 0.16); border-radius: 10px; transition: background 0.3s var(--ease); }
        * { scrollbar-width: thin; scrollbar-color: rgba(15, 23, 42, 0.16) transparent; }

        body {
            font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-main);
            min-height: 100vh;
            /* footer padding from supplier-bottom-nav.css */
            color: var(--text-dark);
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        body::before{
            content:"";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(900px 520px at 14% 8%, rgba(99, 91, 255, 0.10), rgba(246,247,251,0) 62%),
                radial-gradient(900px 520px at 88% 22%, rgba(6, 182, 212, 0.10), rgba(246,247,251,0) 62%);
            pointer-events:none;
            z-index: 0;
        }
        body > *{ position: relative; z-index: 1; }

        /* Header */
        .page-header {
            background: transparent;
            color: rgba(15,23,42,0.92);
            padding: calc(18px + env(safe-area-inset-top, 0px)) var(--page-pad) 12px;
            display: flex;
            align-items: center;
            gap: 0.875rem;
            border-radius: 0;
            margin-bottom: 12px;
            position: relative;
            box-shadow: none;
        }
        .page-header::after { display:none; }

        .page-title { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.03em; }
        .page-subtitle { font-size: 0.8125rem; opacity: 1; color: rgba(100,116,139,0.92); font-weight: 700; margin-top: 0.2rem; }

        /* Cards */
        .load-summary {
            background: var(--card-bg);
            margin: 0 var(--page-pad) 12px;
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            position: relative;
            overflow: hidden;
        }
        .load-summary::before {
            content: '';
            position: absolute;
            left: 0;
            top: 12px;
            bottom: 12px;
            width: 3px;
            background: linear-gradient(180deg, rgba(99,91,255,0.95), rgba(6,182,212,0.75));
            border-radius: 0 2px 2px 0;
            opacity: 0.9;
        }
        .load-route { font-size: 1rem; font-weight: 800; color: var(--text-dark); margin-bottom: 0.5rem; letter-spacing: -0.02em; }
        .load-meta { font-size: 0.8125rem; color: var(--text-medium); font-weight: 600; }

        .status-timeline {
            background: var(--card-bg);
            margin: 0 var(--page-pad) 12px;
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            position: relative;
            overflow: hidden;
        }
        .status-timeline::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, rgba(99,91,255,0.55), rgba(6,182,212,0.35), rgba(99,91,255,0));
            opacity: 0.45;
        }

        .timeline-title {
            font-size: 0.9375rem;
            font-weight: 800;
            margin-bottom: 1.25rem;
            color: var(--text-dark);
            letter-spacing: -0.02em;
        }

        .timeline-step {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.25rem;
            position: relative;
        }

        .timeline-step:last-child { margin-bottom: 0; }

        .timeline-step:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 15px;
            top: 36px;
            bottom: -1.25rem;
            width: 2px;
            background: rgba(15,23,42,0.10);
        }

        .timeline-step.done:not(:last-child)::after {
            background: var(--success);
        }

        .timeline-step.current:not(:last-child)::after {
            background: linear-gradient(to bottom, rgba(99,91,255,0.95) 50%, rgba(15,23,42,0.10) 50%);
        }

        .timeline-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            flex-shrink: 0;
            z-index: 1;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
        }

        .timeline-step.done .timeline-icon {
            background: var(--success);
            color: white;
        }

        .timeline-step.current .timeline-icon {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 0 3px rgba(99, 91, 255, 0.18), 0 14px 34px rgba(99, 91, 255, 0.18);
        }

        .timeline-step.pending .timeline-icon {
            background: rgba(255,255,255,0.78);
            border: 1px solid rgba(15,23,42,0.10);
            color: var(--text-medium);
            box-shadow: none;
        }

        .timeline-step.cancelled .timeline-icon {
            background: var(--error);
            color: white;
        }

        .timeline-content { flex: 1; min-width: 0; }
        .timeline-label { font-size: 0.9375rem; font-weight: 800; color: var(--text-dark); letter-spacing: -0.02em; }
        .timeline-step.pending .timeline-label { color: var(--text-medium); }
        .timeline-date { font-size: 0.75rem; color: var(--text-medium); margin-top: 0.25rem; }

        .actions-section {
            margin: 0 var(--page-pad);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }

        .btn-action {
            padding: 0.875rem;
            border-radius: 12px;
            font-size: 0.9375rem;
            font-weight: 900;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
            min-height: 52px;
            white-space: nowrap;
        }

        .btn-action.primary { background: var(--primary); color: #fff; box-shadow: 0 14px 34px rgba(99, 91, 255, 0.22); }
        .btn-action.success { background: linear-gradient(145deg, #10b981 0%, #059669 100%); color: #fff; box-shadow: 0 14px 34px rgba(5, 150, 105, 0.22); }
        .btn-action.secondary { background: rgba(255,255,255,0.92); color: rgba(15,23,42,0.86); border: 1px solid rgba(15,23,42,0.10); box-shadow: 0 10px 22px rgba(15,23,42,0.08); }

        .empty-state {
            text-align: center;
            padding: 3rem 1.5rem;
        }

        .empty-state i { font-size: 3rem; color: var(--text-medium); margin-bottom: 1rem; }
        .empty-state h3 { font-size: 1.125rem; margin-bottom: 0.5rem; }
        .empty-state p { font-size: 0.875rem; color: var(--text-medium); }

        .loading {
            display: flex;
            justify-content: center;
            padding: 3rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s var(--ease) infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Bottom nav: supplier-bottom-nav.css â€“ same as dashboard */
        @media (min-width: 768px) { body { max-width: 440px; margin: 0 auto; box-shadow: 0 0 48px rgba(15, 23, 42, 0.12); } }
    </style>
</head>
<body class="has-bottom-nav">
    <div class="page-header">
        <div>
            <h1 class="page-title">Load Status</h1>
            <p class="page-subtitle" id="loadRef">Loading...</p>
        </div>
    </div>

    <div id="contentArea">
        <div class="loading"><div class="spinner"></div></div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="post-load.html" class="bottom-nav-item"><i class="fas fa-plus-circle"></i><span>Post</span></a>
        <a href="my-loads.html" class="bottom-nav-item active"><i class="fas fa-boxes"></i><span>Loads</span></a>
        <a href="messages.html" class="bottom-nav-item"><i class="fas fa-comments"></i><span>Chat</span></a>
        <a href="profile.html" class="bottom-nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="../../assets/js/firebase-init.js"></script>

    <script>
        const params = new URLSearchParams(location.search);
        const loadId = params.get('id') || params.get('loadId') || '';

        const STEPS = [
            { key: 'posted', label: 'Posted', statuses: ['available', 'pending'], dateKey: 'createdAt' },
            { key: 'accepted', label: 'Accepted', statuses: ['active', 'accepted'], dateKey: 'acceptedAt' },
            { key: 'picked', label: 'Picked Up', statuses: ['picked-up', 'picked_up'], dateKey: 'pickedUpAt' },
            { key: 'transit', label: 'In Transit', statuses: ['in-transit', 'in_transit'], dateKey: 'inTransitAt' },
            { key: 'delivered', label: 'Delivered', statuses: ['completed', 'delivered'], dateKey: 'deliveredAt' }
        ];

        const CANCELLED_STEP = { key: 'cancelled', label: 'Cancelled', statuses: ['cancelled', 'canceled'] };

        function formatDate(str) {
            if (!str) return '';
            try {
                return new Date(str).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            } catch { return str; }
        }

        function formatCurrency(amt) {
            return 'Â£' + parseFloat(amt || 0).toLocaleString('en-GB', { minimumFractionDigits: 2 });
        }

        function getCurrentStep(status) {
            const s = (status || '').toLowerCase();
            if (['cancelled', 'canceled'].includes(s)) return 'cancelled';
            for (let i = STEPS.length - 1; i >= 0; i--) {
                if (STEPS[i].statuses.some(x => s.includes(x))) return STEPS[i].key;
            }
            return 'posted';
        }

        function getLoadFromCache() {
            try {
                const raw = sessionStorage.getItem('supplier_my_loads');
                if (!raw) return null;
                const { data } = JSON.parse(raw);
                return Array.isArray(data) ? data.find(l => (l.loadId || l.id) === loadId) : null;
            } catch (e) { return null; }
        }

        function renderContent(load) {
            if (!load) {
                document.getElementById('contentArea').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Load Not Found</h3>
                        <p>This load may have been removed.</p>
                    </div>
                `;
                return;
            }

            const lid = load.loadId || load.id || loadId;
            const status = (load.status || '').toLowerCase();
            const pickup = load.pickupLocation || load.from || 'N/A';
            const delivery = load.deliveryLocation || load.to || 'N/A';
            const price = load.price || load.budget || load.maxBudget || load.minBudget || 0;
            const currentStep = getCurrentStep(load.status);
            const isCancelled = ['cancelled', 'canceled'].includes(status);

            document.getElementById('loadRef').textContent = `Load #${(lid + '').substring(0, 8)}`;

            let stepsToRender = [];
            const currentIdx = STEPS.findIndex(s => s.key === currentStep);

            if (isCancelled) {
                stepsToRender = STEPS.slice(0, 1).map((step) => ({
                    ...step,
                    state: 'done',
                    date: load[step.dateKey] ? formatDate(load[step.dateKey]) : ''
                }));
                stepsToRender.push({ ...CANCELLED_STEP, state: 'cancelled', date: formatDate(load.cancelledAt) });
            } else {
                stepsToRender = STEPS.map((step, i) => {
                    let state = 'pending';
                    if (i < currentIdx) state = 'done';
                    else if (i === currentIdx) state = 'current';
                    const date = load[step.dateKey] ? formatDate(load[step.dateKey]) : '';
                    return { ...step, state, date };
                });
            }
            const timelineBody = (stepsToRender || []).map((step) => `
                <div class="timeline-step ${step.state}">
                    <div class="timeline-icon">
                        ${step.state === 'done' ? '<i class="fas fa-check"></i>' : 
                          step.state === 'cancelled' ? '<i class="fas fa-times"></i>' : 
                          step.key === 'posted' ? '<i class="fas fa-box"></i>' :
                          step.key === 'accepted' ? '<i class="fas fa-handshake"></i>' :
                          step.key === 'picked' ? '<i class="fas fa-truck-loading"></i>' :
                          step.key === 'transit' ? '<i class="fas fa-truck"></i>' :
                          step.key === 'delivered' ? '<i class="fas fa-check-double"></i>' : '<i class="fas fa-circle"></i>'}
                    </div>
                    <div class="timeline-content">
                        <div class="timeline-label">${step.label}</div>
                        ${step.date ? `<div class="timeline-date">${step.date}</div>` : ''}
                    </div>
                </div>
            `).join('');

            let actionsHTML = '';
            if (!isCancelled) {
                if (['active', 'accepted', 'in_transit', 'in-transit'].includes(status)) {
                    actionsHTML = `
                        <a href="track.html?loadId=${lid}" class="btn-action primary">
                            <i class="fas fa-map-marker-alt"></i> Track
                        </a>
                        <a href="pay-now.html?loadId=${lid}&amount=${price}&paymentFor=Load%20Payment&paymentType=Payment" class="btn-action success">
                            <i class="fas fa-credit-card"></i> Pay
                        </a>
                    `;
                } else if (['completed', 'delivered'].includes(status)) {
                    actionsHTML = `
                        <a href="pay-now.html?loadId=${lid}&amount=${price}&paymentFor=Load%20Payment&paymentType=Payment" class="btn-action success">
                            <i class="fas fa-credit-card"></i> Pay Now
                        </a>
                    `;
                } else {
                    actionsHTML = `
                        <a href="load-details.html?id=${lid}" class="btn-action secondary">
                            <i class="fas fa-eye"></i> View Details
                        </a>
                    `;
                }
            }

            document.getElementById('contentArea').innerHTML = `
                <div class="load-summary">
                    <div class="load-route">${pickup} â†’ ${delivery}</div>
                    <div class="load-meta">${load.cargoType || load.cargo || 'General'} â€¢ ${formatCurrency(price)}</div>
                </div>
                <div class="status-timeline">
                    <div class="timeline-title">Status Timeline</div>
                    ${timelineBody}
                </div>
                ${actionsHTML ? `<div class="actions-section">${actionsHTML}</div>` : ''}
            `;
        }

        async function load() {
            if (!loadId) {
                document.getElementById('loadRef').textContent = 'No load selected';
                renderContent(null);
                return;
            }

            const cached = getLoadFromCache();
            if (cached) renderContent(cached);

            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const snap = await db.ref('loads/' + loadId).once('value');
                const load = snap.val();
                if (load) {
                    load.loadId = loadId;
                    load.id = loadId;
                    renderContent(load);
                } else if (!cached) renderContent(null);
            } catch (e) {
                if (!cached) renderContent(null);
            }
        }

        document.addEventListener('DOMContentLoaded', load);
    </script>
</body>
