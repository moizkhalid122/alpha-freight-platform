    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

    <script>
        const alertSystem = new AlertSystem();
        const params = new URLSearchParams(location.search);
        const loadId = params.get('loadId') || params.get('id') || '';
        let loadData = null;
        let bids = [];
        let isBusy = false;

        function showError(msg) { alertSystem.show('error', msg); }
        function showSuccess(msg) { alertSystem.show('success', msg); }

        function escapeHtml(str) {
            return String(str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatCurrency(v) {
            const n = Number(v || 0) || 0;
            return '£' + n.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function getSupplierAuth() {
            try { return JSON.parse(localStorage.getItem('supplierAuth') || 'null'); } catch (e) { return null; }
        }

        function supplierKeyFromEmail(email) {
            return String(email || '').replace(/@/g, '_').replace(/\./g, '_');
        }

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return;
            if (authSdk.currentUser) return;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => { if (!done) { done = true; resolve(); } }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
        }

        function canAccessLoad(load, auth) {
            const supplierId = auth.supplierId || auth.id || supplierKeyFromEmail(auth.email);
            if (!supplierId) return false;
            const loadSupplierId = load.supplierId || load.postedBy || supplierKeyFromEmail(load.supplierEmail);
            return loadSupplierId === supplierId || load.supplierEmail === auth.email;
        }

        function getLoadRoute(load) {
            const p = load.pickupLocation || load.pickup_location || 'N/A';
            const d = load.deliveryLocation || load.delivery_location || 'N/A';
            return `${p} → ${d}`;
        }

        function getBasePrice(load) {
            const v = load.agreedPrice ?? load.price ?? load.budget ?? load.maxBudget ?? load.minBudget ?? 0;
            return Number(v || 0) || 0;
        }

        function getStatusPill(load) {
            const st = String(load.status || '').toLowerCase();
            if (st === 'accepted' || st === 'active') return { icon: 'fa-check', text: 'Accepted' };
            if (st.includes('transit')) return { icon: 'fa-truck', text: 'In transit' };
            if (st === 'completed' || st === 'delivered') return { icon: 'fa-clipboard-check', text: 'Completed' };
            if (st === 'cancelled' || st === 'canceled') return { icon: 'fa-ban', text: 'Cancelled' };
            return { icon: 'fa-hourglass-half', text: 'Pending' };
        }

        function confirmModal(opts) {
            return new Promise((resolve) => {
                const overlay = document.getElementById('confirmModalOverlay');
                const titleEl = document.getElementById('confirmModalTitle');
                const subEl = document.getElementById('confirmModalSub');
                const listEl = document.getElementById('confirmModalList');
                const noteEl = document.getElementById('confirmModalNote');
                const closeBtn = document.getElementById('confirmModalClose');
                const cancelBtn = document.getElementById('confirmModalCancel');
                const okBtn = document.getElementById('confirmModalOk');
                if (!overlay || !titleEl || !listEl || !cancelBtn || !okBtn) { resolve(false); return; }

                const o = opts || {};
                const items = Array.isArray(o.items) ? o.items : [];
                titleEl.textContent = String(o.title || 'Confirm');
                if (subEl) subEl.textContent = String(o.subtitle || 'Please review');
                listEl.innerHTML = items.map(it => {
                    const k = escapeHtml(it && it.k ? it.k : '');
                    const v = escapeHtml(it && it.v !== undefined ? it.v : '');
                    return `<div class="confirm-item"><div class="k">${k}</div><div class="v">${v}</div></div>`;
                }).join('');

                const note = String(o.note || '').trim();
                if (noteEl) {
                    if (note) {
                        noteEl.style.display = '';
                        noteEl.textContent = note;
                    } else {
                        noteEl.style.display = 'none';
                        noteEl.textContent = '';
                    }
                }

                okBtn.classList.remove('accept', 'danger');
                okBtn.classList.add(o.variant === 'danger' ? 'danger' : 'accept');
                okBtn.innerHTML = `<i class="fas ${o.variant === 'danger' ? 'fa-triangle-exclamation' : 'fa-check'}"></i> ${escapeHtml(o.confirmText || 'Confirm')}`;
                cancelBtn.innerHTML = `<i class="fas fa-arrow-left"></i> ${escapeHtml(o.cancelText || 'Cancel')}`;

                function close(val) {
                    overlay.classList.remove('show');
                    overlay.setAttribute('aria-hidden', 'true');
                    overlay.onclick = null;
                    cancelBtn.onclick = null;
                    okBtn.onclick = null;
                    if (closeBtn) closeBtn.onclick = null;
                    document.removeEventListener('keydown', onKey);
                    resolve(val);
                }
                function onKey(e) { if (e.key === 'Escape') close(false); }
                document.addEventListener('keydown', onKey);

                overlay.onclick = (e) => { if (e.target === overlay) close(false); };
                cancelBtn.onclick = () => close(false);
                okBtn.onclick = () => close(true);
                if (closeBtn) closeBtn.onclick = () => close(false);

                overlay.classList.add('show');
                overlay.setAttribute('aria-hidden', 'false');
            });
        }

        async function fetchCarrierStats(carrierId) {
            const db = window.AlphaBrokrage.firebaseDb;
            if (!db || !carrierId) return { completed: 0, onTimePct: null, vehicle: '—' };
            let vehicle = '—';
            try {
                const prof = await db.ref('carriers/' + carrierId).once('value');
                const v = prof.val() || {};
                vehicle = v.vehicleType || v.vehicle || v.fleetType || '—';
            } catch (e) {}

            try {
                const snap = await db.ref('loads').orderByChild('carrierId').equalTo(String(carrierId)).limitToLast(180).once('value');
                const loads = [];
                snap.forEach((ch) => loads.push(ch.val() || {}));
                const completed = loads.filter(l => ['completed', 'delivered'].includes(String(l.status || '').toLowerCase()));
                const n = completed.length;
                let onTimePct = null;
                if (n) {
                    let ok = 0;
                    let denom = 0;
                    completed.forEach((l) => {
                        const due = l.deliveryDate || l.deliveryBy || l.deliveryTime || '';
                        const done = l.completedAt || l.deliveredAt || l.podUploadedAt || '';
                        const dueT = due ? new Date(due).getTime() : 0;
                        const doneT = done ? new Date(done).getTime() : 0;
                        if (dueT && doneT) {
                            denom += 1;
                            if (doneT <= dueT) ok += 1;
                        }
                    });
                    if (denom) onTimePct = Math.round((ok / denom) * 100);
                }
                return { completed: n, onTimePct, vehicle };
            } catch (e) {
                return { completed: 0, onTimePct: null, vehicle };
            }
        }

        async function sendAutoChatMessage(auth, carrierId, carrierName, text) {
            const db = window.AlphaBrokrage.firebaseDb;
            if (!db) return;
            await ensureAuthReady();
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            const authUid = authSdk && authSdk.currentUser && authSdk.currentUser.uid ? String(authSdk.currentUser.uid) : '';
            const supplierId = auth.supplierId || auth.id || supplierKeyFromEmail(auth.email);
            const supplierName = auth.companyName || auth.company || auth.email || 'Supplier';
            const now = Date.now();
            const msg = {
                supplierId,
                supplierName,
                supplierEmail: auth.email || '',
                supplierUid: authUid,
                carrierId: String(carrierId),
                carrierName: String(carrierName || 'Carrier'),
                loadId: String(loadId || ''),
                message: String(text || '').trim(),
                senderType: 'supplier',
                senderId: supplierId,
                senderUid: authUid,
                recipientType: 'carrier',
                recipientId: String(carrierId),
                read: false,
                timestamp: now,
                createdAt: new Date().toISOString()
            };
            await db.ref('messages').push(msg);
            try {
                if (authUid && carrierId) {
                    const url = '/mobile-app/carrier/messages.html?supplierId=' + encodeURIComponent(supplierId) + '&supplierName=' + encodeURIComponent(supplierName) + (loadId ? ('&loadId=' + encodeURIComponent(loadId)) : '');
                    await db.ref('notificationQueue').push({
                        senderUid: String(authUid),
                        toUserId: String(carrierId),
                        toUserType: 'carrier',
                        title: 'New Message',
                        message: `New message from ${supplierName}`,
                        type: 'new_message',
                        data: { type: 'new_message', loadId: String(loadId || ''), supplierId: supplierId, url: url, icon: '/image-removebg-preview - 2026-03-04T141043.516.png' },
                        createdAt: new Date().toISOString()
                    });
                }
            } catch (e) {}
        }

        async function notifyCarrier(authUid, carrierId, title, message, data) {
            const db = window.AlphaBrokrage.firebaseDb;
            if (!db || !authUid || !carrierId) return;
            await db.ref('notificationQueue').push({
                senderUid: String(authUid),
                toUserId: String(carrierId),
                toUserType: 'carrier',
                title: String(title || 'Notification'),
                message: String(message || ''),
                type: String((data && data.type) ? data.type : 'notification'),
                data: data || {},
                createdAt: new Date().toISOString()
            });
        }

        function openChatWithCarrier(carrierId, carrierName) {
            try {
                localStorage.setItem('ab.messages.openCarrier', JSON.stringify({ carrierId: String(carrierId), carrierName: String(carrierName || 'Carrier'), at: Date.now(), loadId: String(loadId) }));
            } catch (e) {}
            window.location.href = 'messages.html';
        }

        async function awardBid(bid) {
            if (isBusy) return;
            if (!loadData) return;
            const auth = getSupplierAuth();
            if (!auth) { window.location.href = 'login.html'; return; }
            const db = window.AlphaBrokrage.firebaseDb;
            if (!db) return;

            const prev = getBasePrice(loadData);
            const next = Number(bid.amount || 0) || 0;
            const delta = Math.round((next - prev) * 100) / 100;
            const ok = await confirmModal({
                title: 'Confirm Award',
                subtitle: 'This will assign the load and notify the carrier',
                items: [
                    { k: 'Route', v: getLoadRoute(loadData) },
                    { k: 'Old Price', v: formatCurrency(prev) },
                    { k: 'Accepted Price', v: `${formatCurrency(next)}${delta !== 0 ? ` (${delta > 0 ? '+' : ''}${formatCurrency(delta)})` : ''}` },
                    { k: 'Carrier', v: bid.carrierName || 'Carrier' }
                ],
                note: 'After award: load status becomes accepted and chat will open.',
                confirmText: 'Award',
                cancelText: 'Cancel'
            });
            if (!ok) return;

            isBusy = true;
            renderBids();
            try {
                await ensureAuthReady();
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                if (!authSdk || !authSdk.currentUser) { window.location.href = 'login.html'; return; }
                const authUid = String(authSdk.currentUser.uid || '');
                const nowIso = new Date().toISOString();

                const updates = {};
                updates[`bids/${loadId}/${bid.carrierId}/status`] = 'accepted';
                updates[`bids/${loadId}/${bid.carrierId}/respondedAt`] = nowIso;
                updates[`carrierBids/${bid.carrierId}/${loadId}/status`] = 'accepted';
                updates[`carrierBids/${bid.carrierId}/${loadId}/seen`] = true;
                updates[`carrierBids/${bid.carrierId}/${loadId}/updatedAt`] = nowIso;

                updates[`loads/${loadId}/status`] = 'accepted';
                updates[`loads/${loadId}/carrierId`] = bid.carrierId;
                if (bid.carrierName) updates[`loads/${loadId}/carrierName`] = bid.carrierName;
                if (bid.carrierFirebaseUid) updates[`loads/${loadId}/carrierFirebaseUid`] = bid.carrierFirebaseUid;
                if (bid.carrierEmail) updates[`loads/${loadId}/carrierEmail`] = bid.carrierEmail;
                updates[`loads/${loadId}/acceptedAt`] = nowIso;
                updates[`loads/${loadId}/acceptedOffer`] = { type: 'bid', offerId: bid.carrierId, amount: Number(bid.amount || 0) || 0 };
                updates[`loads/${loadId}/agreedPrice`] = Number(bid.amount || 0) || 0;
                updates[`loads/${loadId}/agreedAt`] = nowIso;
                updates[`loads/${loadId}/agreedFrom`] = 'bid';

                const bidsSnap = await db.ref(`bids/${loadId}`).once('value');
                const all = bidsSnap.val() || {};
                Object.keys(all).forEach((cid) => {
                    if (String(cid) === String(bid.carrierId)) return;
                    updates[`bids/${loadId}/${cid}/status`] = 'rejected';
                    updates[`bids/${loadId}/${cid}/respondedAt`] = nowIso;
                    updates[`carrierBids/${cid}/${loadId}/status`] = 'rejected';
                    updates[`carrierBids/${cid}/${loadId}/seen`] = true;
                    updates[`carrierBids/${cid}/${loadId}/updatedAt`] = nowIso;
                });

                await db.ref().update(updates);

                await notifyCarrier(
                    authUid,
                    bid.carrierId,
                    'Load Awarded',
                    `Supplier awarded the load • ${getLoadRoute(loadData)}`,
                    { type: 'bid_accepted', loadId: String(loadId), url: '/mobile-app/carrier/load-details.html?id=' + encodeURIComponent(loadId), icon: '/image-removebg-preview - 2026-03-04T141043.516.png' }
                );

                await sendAutoChatMessage(auth, bid.carrierId, bid.carrierName || 'Carrier', `Load awarded: #${String(loadId).substring(0, 8)} • ${getLoadRoute(loadData)} • Agreed ${formatCurrency(next)}`);

                showSuccess('Load awarded');
                openChatWithCarrier(bid.carrierId, bid.carrierName);
            } catch (e) {
                console.error(e);
                showError('Failed to award load');
            } finally {
                isBusy = false;
                renderBids();
            }
        }

        async function rejectBid(bid) {
            if (isBusy) return;
            const auth = getSupplierAuth();
            if (!auth) { window.location.href = 'login.html'; return; }
            const db = window.AlphaBrokrage.firebaseDb;
            if (!db) return;

            const ok = await confirmModal({
                title: 'Reject Bid',
                subtitle: 'This will notify the carrier',
                items: [
                    { k: 'Carrier', v: bid.carrierName || 'Carrier' },
                    { k: 'Bid', v: formatCurrency(bid.amount || 0) },
                    { k: 'Route', v: loadData ? getLoadRoute(loadData) : '—' }
                ],
                note: 'Rejected bid will not be assigned.',
                confirmText: 'Reject',
                cancelText: 'Cancel',
                variant: 'danger'
            });
            if (!ok) return;

            isBusy = true;
            renderBids();
            try {
                await ensureAuthReady();
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                if (!authSdk || !authSdk.currentUser) { window.location.href = 'login.html'; return; }
                const authUid = String(authSdk.currentUser.uid || '');
                const nowIso = new Date().toISOString();

                const updates = {};
                updates[`bids/${loadId}/${bid.carrierId}/status`] = 'rejected';
                updates[`bids/${loadId}/${bid.carrierId}/respondedAt`] = nowIso;
                updates[`carrierBids/${bid.carrierId}/${loadId}/status`] = 'rejected';
                updates[`carrierBids/${bid.carrierId}/${loadId}/seen`] = true;
                updates[`carrierBids/${bid.carrierId}/${loadId}/updatedAt`] = nowIso;
                await db.ref().update(updates);

                await notifyCarrier(
                    authUid,
                    bid.carrierId,
                    'Bid Rejected',
                    `Supplier rejected your bid • ${loadData ? getLoadRoute(loadData) : ''}`,
                    { type: 'bid_rejected', loadId: String(loadId), url: '/mobile-app/carrier/my-bids.html', icon: '/image-removebg-preview - 2026-03-04T141043.516.png' }
                );

                showSuccess('Bid rejected');
                await loadBids();
            } catch (e) {
                console.error(e);
                showError('Failed to reject bid');
            } finally {
                isBusy = false;
                renderBids();
            }
        }

        function renderBids() {
            const grid = document.getElementById('bidsGrid');
            const count = bids.length;
            document.getElementById('bidsCountPill').innerHTML = `<i class="fas fa-gavel"></i> Bids: ${count}`;
            if (!count) {
                grid.innerHTML = `<div class="card"><div style="font-weight:1000;">No bids yet</div><div class="muted mt-1">Wait for carriers to place bids.</div></div>`;
                return;
            }
            grid.innerHTML = bids.map((b) => {
                const stats = b._stats || { completed: 0, onTimePct: null, vehicle: '—' };
                const onTimeText = stats.onTimePct == null ? '—' : (stats.onTimePct + '%');
                const canAct = !isBusy && (String(loadData && loadData.status || '').toLowerCase() === 'available' || String(loadData && loadData.status || '').toLowerCase() === 'pending');
                const disabled = canAct ? '' : 'disabled';
                const note = b.message ? `<div class="muted mt-2" style="white-space:pre-line;">${escapeHtml(b.message)}</div>` : '';
                const cid = encodeURIComponent(String(b.carrierId || ''));
                const cname = encodeURIComponent(String(b.carrierName || 'Carrier'));
                return `
                    <div class="bid-card">
                        <div class="bid-head">
                            <div>
                                <div class="bid-name">${escapeHtml(b.carrierName || 'Carrier')}</div>
                                <div class="muted mt-1">${escapeHtml(b.carrierId)}</div>
                            </div>
                            <div class="bid-price">${formatCurrency(b.amount || 0)}</div>
                        </div>
                        <div class="metrics">
                            <div class="metric"><div class="k">Completed</div><div class="v">${stats.completed}</div></div>
                            <div class="metric"><div class="k">On-time</div><div class="v">${onTimeText}</div></div>
                            <div class="metric"><div class="k">Vehicle</div><div class="v">${escapeHtml(stats.vehicle || '—')}</div></div>
                        </div>
                        ${note}
                        <div class="actions">
                            <button class="btn-action btn-award" type="button" ${disabled} onclick="awardBidById('${cid}')"><i class="fas fa-trophy"></i> Award</button>
                            <button class="btn-action btn-reject" type="button" ${disabled} onclick="rejectBidById('${cid}')"><i class="fas fa-times"></i> Reject</button>
                            <button class="btn-action btn-chat" type="button" onclick="openChatWithCarrierFromUi('${cid}','${cname}')"><i class="fas fa-comments"></i> Chat</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.awardBidById = function (carrierId) {
            const cid = decodeURIComponent(String(carrierId || ''));
            const b = bids.find(x => String(x.carrierId) === String(cid));
            if (b) awardBid(b);
        };
        window.rejectBidById = function (carrierId) {
            const cid = decodeURIComponent(String(carrierId || ''));
            const b = bids.find(x => String(x.carrierId) === String(cid));
            if (b) rejectBid(b);
        };
        window.openChatWithCarrierFromUi = function (carrierId, carrierName) {
            const cid = decodeURIComponent(String(carrierId || ''));
            const name = decodeURIComponent(String(carrierName || ''));
            openChatWithCarrier(cid, name);
        };

        async function loadBids() {
            const db = window.AlphaBrokrage.firebaseDb;
            const snap = await db.ref('bids/' + loadId).once('value');
            const raw = snap.val() || {};
            const out = Object.entries(raw).map(([cid, v]) => {
                const o = v || {};
                return {
                    carrierId: String(o.carrierId || cid),
                    carrierName: o.carrierName || o.companyName || 'Carrier',
                    carrierFirebaseUid: o.carrierFirebaseUid || '',
                    carrierEmail: o.carrierEmail || o.email || '',
                    amount: Number(o.amount || o.price || 0) || 0,
                    message: o.message || '',
                    status: o.status || 'sent',
                    createdAt: o.createdAt || o.timestamp || ''
                };
            }).filter(b => ['sent', 'seen', 'new', ''].includes(String(b.status || '').toLowerCase()) || String(b.status || '').toLowerCase() === 'revised');

            out.sort((a, b) => (a.amount || 0) - (b.amount || 0));
            bids = out;

            await Promise.allSettled(bids.map(async (b) => {
                b._stats = await fetchCarrierStats(b.carrierId);
            }));
        }

        async function init() {
            if (!loadId) { showError('Missing loadId'); return; }
            const auth = getSupplierAuth();
            if (!auth) { window.location.href = 'login.html'; return; }
            const db = window.AlphaBrokrage.firebaseDb;
            if (!db) { showError('Database not ready'); return; }

            document.getElementById('btnBack').href = 'load-details.html?id=' + encodeURIComponent(loadId);

            try {
                await ensureAuthReady();
                const snap = await db.ref('loads/' + loadId).once('value');
                const load = snap.val();
                if (!load || !canAccessLoad(load, auth)) { showError('Load not found'); return; }
                loadData = { ...(load || {}), loadId };

                const pill = getStatusPill(loadData);
                document.getElementById('statusPill').innerHTML = `<i class="fas ${pill.icon}"></i> ${pill.text}`;
                document.getElementById('subtitle').textContent = 'Compare bids • ' + getLoadRoute(loadData);
                document.getElementById('routeText').textContent = getLoadRoute(loadData);
                document.getElementById('currentPricePill').innerHTML = `<i class="fas fa-tag"></i> Price: ${formatCurrency(getBasePrice(loadData))}`;

                await loadBids();
                renderBids();
            } catch (e) {
                console.error(e);
                showError('Failed to load bids');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            init();
            const overlay = document.getElementById('confirmModalOverlay');
            const closeBtn = document.getElementById('confirmModalClose');
            const cancelBtn = document.getElementById('confirmModalCancel');
            if (closeBtn) closeBtn.addEventListener('click', () => { if (overlay) overlay.classList.remove('show'); });
            if (cancelBtn) cancelBtn.addEventListener('click', () => { if (overlay) overlay.classList.remove('show'); });
            if (overlay) overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('show'); });
        });
    </script>
</body>
</html>
