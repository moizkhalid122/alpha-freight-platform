<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <meta name="theme-color" content="#F6F7FB">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Alpha Freight">
    
    <title>Pay Now - Alpha Freight</title>
    
    <link rel="icon" type="image/png" href="../../image-removebg-preview - 2026-03-04T141043.516.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* —— Premium theme (matches supplier dashboard) —— */
        :root {
            --primary: #635bff;
            --primary-dark: #4f46e5;
            --primary-light: #8b5cf6;
            --accent: #06b6d4;
            --gold: #c9a227;
            --success: #059669;
            --error: #dc2626;
            --text-dark: #0f172a;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --bg-main: #F6F7FB;
            --card-bg: rgba(255,255,255,0.92);
            --border: rgba(15,23,42,0.10);
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08), 0 2px 8px rgba(15, 23, 42, 0.04);
            --shadow-card: 0 8px 32px rgba(15, 23, 42, 0.06), 0 2px 8px rgba(15, 23, 42, 0.03);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 22px;
            --radius-sm: 14px;
            --page-pad: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(15, 23, 42, 0.16); border-radius: 10px; transition: background 0.3s var(--ease); }
        ::-webkit-scrollbar-thumb:hover { background: rgba(15, 23, 42, 0.26); }
        * { scrollbar-width: thin; scrollbar-color: rgba(15, 23, 42, 0.16) transparent; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-main);
            min-height: 100vh;
            /* footer from supplier-bottom-nav.css */
            color: var(--text-dark);
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        body::before{
            content:"";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(900px 520px at 14% 8%, rgba(99, 91, 255, 0.10), rgba(246,247,251,0) 62%),
                radial-gradient(900px 520px at 88% 22%, rgba(6, 182, 212, 0.10), rgba(246,247,251,0) 62%);
            pointer-events:none;
            z-index: 0;
        }
        body > *{ position: relative; z-index: 1; }

        .page-header {
            background: transparent;
            color: rgba(15,23,42,0.92);
            padding: calc(18px + env(safe-area-inset-top, 0px)) var(--page-pad) 12px;
            border-radius: 0;
            margin-bottom: 12px;
            position: relative;
            box-shadow: none;
        }
        .page-header::after { display:none; }

        .page-title { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.03em; text-shadow: none; }
        .page-subtitle { font-size: 0.8125rem; opacity: 1; color: rgba(100,116,139,0.92); font-weight: 700; margin-top: 0.2rem; }

        .summary-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin: 0 var(--page-pad) 12px;
            border: 1px solid rgba(15,23,42,0.10);
            box-shadow: 0 14px 34px rgba(15,23,42,0.10);
            position: relative;
            overflow: hidden;
        }
        .summary-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 12px;
            bottom: 12px;
            width: 3px;
            background: linear-gradient(180deg, rgba(99,91,255,0.95), rgba(6,182,212,0.75));
            border-radius: 0 2px 2px 0;
            opacity: 0.9;
        }

        .summary-route { font-size: 1rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.02em; color: var(--text-dark); }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            font-size: 0.9375rem;
        }

        .summary-total {
            border-top: 1px solid rgba(15,23,42,0.10);
            margin-top: 0.75rem;
            padding-top: 1rem;
            font-size: 1.25rem;
            font-weight: 900;
            color: rgba(79,70,229,0.98);
            letter-spacing: -0.02em;
        }

        .section-title {
            font-size: 0.9375rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin: 12px var(--page-pad) 10px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .section-title i { color: rgba(99,91,255,0.95); }

        .option-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.25rem;
            margin: 0 var(--page-pad) 12px;
            border: 1px solid rgba(15,23,42,0.10);
            cursor: pointer;
            transition: transform 0.35s var(--ease), box-shadow 0.35s var(--ease), border-color 0.35s var(--ease);
            box-shadow: 0 14px 34px rgba(15,23,42,0.10);
            position: relative;
            overflow: hidden;
        }
        .option-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, rgba(99,91,255,0.55), rgba(6,182,212,0.35), rgba(99,91,255,0));
            opacity: 0.45;
        }

        .option-card:active { transform: scale(0.99); box-shadow: 0 10px 22px rgba(15,23,42,0.08); }
        .option-card.selected { border-color: rgba(99,91,255,0.25); box-shadow: 0 14px 34px rgba(99, 91, 255, 0.14); }

        .option-card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .option-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            background: rgba(99,91,255,0.14);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: rgba(79,70,229,0.98);
            box-shadow: 0 10px 22px rgba(15,23,42,0.08);
        }

        .option-title { font-size: 1rem; font-weight: 800; }
        .option-desc { font-size: 0.8125rem; color: var(--text-medium); margin-top: 0.25rem; }

        .bank-details {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.25rem;
            margin: 0 var(--page-pad) 12px;
            border: 1px solid rgba(15,23,42,0.10);
            box-shadow: 0 14px 34px rgba(15,23,42,0.10);
        }

        .bank-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            font-size: 0.875rem;
        }

        .bank-label { color: var(--text-medium); }
        .bank-value { font-weight: 500; }

        .confirm-btn {
            display: block;
            width: calc(100% - (var(--page-pad) * 2));
            margin: 10px var(--page-pad) 12px;
            padding: 1rem;
            background: linear-gradient(145deg, #10b981 0%, var(--success) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 14px 34px rgba(5, 150, 105, 0.22);
            transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
        }

        .confirm-btn:active { transform: scale(0.99); box-shadow: 0 10px 28px rgba(5, 150, 105, 0.18); }

        .pay-card-btn {
            display: block;
            width: 100%;
            margin: 10px 0 0;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 14px 34px rgba(99, 91, 255, 0.22);
            transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
        }

        .pay-card-btn:active { transform: scale(0.99); box-shadow: 0 10px 28px rgba(99, 91, 255, 0.18); }

        /* Official Apple Pay button styling - black background */
        .apple-pay-btn {
            background: #000 !important;
            color: #fff !important;
            -webkit-appearance: -apple-pay-button;
            appearance: -apple-pay-button;
        }

        .apple-pay-btn i { color: #fff !important; }

        /* Official Google Pay button - dark style (black bg) */
        .google-pay-btn {
            background: #000 !important;
            color: #fff !important;
            border: none !important;
        }

        .google-pay-icon {
            height: 1.25em;
            width: auto;
            vertical-align: middle;
            margin-right: 0.4rem;
        }

        /* Pay with Card - Stripe/card style */
        .card-pay-btn {
            background: linear-gradient(135deg, #635BFF 0%, #5454d4 100%) !important;
            color: #fff !important;
        }

        .card-pay-btn i { color: #fff !important; }

        .empty-state {
            text-align: center;
            padding: 3rem 1.5rem;
            color: var(--text-medium);
        }

        .empty-state i { font-size: 3rem; margin-bottom: 1rem; }

        @media (min-width: 768px) {
            body { max-width: 440px; margin: 0 auto; box-shadow: 0 0 48px rgba(15, 23, 42, 0.12); }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h1 class="page-title">Pay Now</h1>
        <p class="page-subtitle" id="loadRef">Loading...</p>
    </div>

    <div id="contentArea">
        <div class="empty-state">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading payment details...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="../../assets/js/firebase-init.js"></script>
    <script src="../../assets/js/alerts.js"></script>

    <script>
        const alertSystem = new AlertSystem();
        function showError(msg) { alertSystem.show('error', msg); }
        function showSuccess(msg) { alertSystem.show('success', msg); }

        const params = new URLSearchParams(window.location.search);
        const loadId = params.get('loadId');
        const amountParam = params.get('amount');
        const paymentFor = params.get('paymentFor') || 'Load Payment';
        const paymentType = params.get('paymentType') || 'Load Posting';
        const paymentTypeLower = String(paymentType || '').toLowerCase();
        const isCancellationFee = paymentTypeLower.includes('cancellation') || params.get('cancelFee') === '1';
        const isDeposit = paymentTypeLower === 'deposit';
        const isRemaining = paymentTypeLower === 'remaining';
        const isNonCommissionPayment = isCancellationFee || isDeposit || isRemaining;

        let loadData = null;
        let totalAmount = 0;
        let commission = 0;
        let amount = 0;

        function formatCurrency(val) {
            return '£' + parseFloat(val || 0).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function calcCommission(amt) {
            if (!amt || amt <= 0) return { commission: 0, rate: 0, total: 0 };
            let rate = 0.05;
            if (amt > 5000) rate = 0.03;
            else if (amt > 1000) rate = 0.04;
            const comm = amt * rate;
            return { commission: comm, rate, total: amt + comm };
        }

        function getWebPayNowUrl() {
            const q = new URLSearchParams({ loadId: loadId || '', amount: amount, paymentFor, paymentType });
            return `../../pages/supplier/paynow.html?${q}`;
        }

        function renderContent() {
            const container = document.getElementById('contentArea');

            if (!loadId) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Load ID missing. Go back and select a load to pay.</p></div>';
                return;
            }

            if (!loadData) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Load not found.</p></div>';
                return;
            }

            const route = `${loadData.pickupLocation || loadData.pickup_location || 'N/A'} → ${loadData.deliveryLocation || loadData.delivery_location || 'N/A'}`;
            const commData = isNonCommissionPayment ? { commission: 0, rate: 0, total: amount } : calcCommission(amount);
            commission = commData.commission;
            totalAmount = commData.total;
            const pickupDate = loadData.pickupDate || loadData.pickup_date || '';
            const cargoType = loadData.cargoType || loadData.cargo || 'General';

            document.getElementById('loadRef').textContent = `${route} • ${formatCurrency(totalAmount)}`;

            container.innerHTML = `
                <div class="summary-card">
                    <div class="summary-route">${route}</div>
                    <div class="summary-row"><span>Load ID</span><span>#${loadId.substring(0, 8)}</span></div>
                    <div class="summary-row"><span>Cargo</span><span>${cargoType}</span></div>
                    ${pickupDate ? `<div class="summary-row"><span>Pickup</span><span>${new Date(pickupDate).toLocaleDateString('en-GB')}</span></div>` : ''}
                    <div class="summary-row"><span>${isCancellationFee ? 'Cancellation Fee' : (isDeposit ? 'Deposit' : (isRemaining ? 'Remaining' : 'Load Amount'))}</span><span>${formatCurrency(amount)}</span></div>
                    ${isNonCommissionPayment ? '' : `<div class="summary-row"><span>Commission (${(commData.rate * 100).toFixed(0)}%)</span><span>${formatCurrency(commission)}</span></div>`}
                    <div class="summary-row summary-total"><span>Total to Pay</span><span>${formatCurrency(totalAmount)}</span></div>
                </div>

                <div class="section-title"><i class="fas fa-wallet"></i> ${isCancellationFee ? 'Pay Cancellation Fee' : (isDeposit ? 'Pay Deposit' : (isRemaining ? 'Pay Remaining' : 'Pay Now or Pay Later'))}</div>

                <div class="option-card" onclick="goToPayWithCard()">
                    <div class="option-card-header">
                        <div class="option-icon"><i class="fas fa-credit-card"></i></div>
                        <div>
                            <div class="option-title">Card Payment</div>
                            <div class="option-desc">Pay with debit or credit card</div>
                        </div>
                    </div>
                    <button class="pay-card-btn card-pay-btn" style="margin-top:1rem;" onclick="event.stopPropagation(); goToPayWithCard();">
                        <i class="fas fa-lock"></i> Pay with Card
                    </button>
                </div>

                <div class="option-card" onclick="goToPayWithCard()">
                    <div class="option-card-header">
                        <div class="option-icon" style="font-size:1.25rem;"><i class="fab fa-apple"></i></div>
                        <div>
                            <div class="option-title">Apple Pay</div>
                            <div class="option-desc">Pay quickly with Apple Pay</div>
                        </div>
                    </div>
                    <button class="pay-card-btn apple-pay-btn" style="margin-top:1rem;" onclick="event.stopPropagation(); goToPayWithCard();">
                        <i class="fab fa-apple"></i> Apple Pay
                    </button>
                </div>

                <div class="option-card" onclick="goToPayWithCard()">
                    <div class="option-card-header">
                        <div class="option-icon" style="font-size:1.25rem;"><img src="image-removebg-preview - 2026-03-08T182549.664.png" alt="Google" class="google-pay-icon" style="height:1.5rem;"></div>
                        <div>
                            <div class="option-title">Google Pay</div>
                            <div class="option-desc">Pay quickly with Google Pay</div>
                        </div>
                    </div>
                    <button class="pay-card-btn google-pay-btn" style="margin-top:1rem;" onclick="event.stopPropagation(); goToPayWithCard();">
                        <img src="image-removebg-preview - 2026-03-08T182549.664.png" alt="Google" class="google-pay-icon"> Google Pay
                    </button>
                </div>

                ${isNonCommissionPayment ? '' : `
                <div class="option-card" id="bankOption" onclick="selectOption('bank')">
                    <div class="option-card-header">
                        <div class="option-icon"><i class="fas fa-university"></i></div>
                        <div>
                            <div class="option-title">Bank Transfer</div>
                            <div class="option-desc">Transfer to Alpha Freight account</div>
                        </div>
                    </div>
                </div>

                <div id="bankDetailsSection" style="display:none;">
                    <div class="bank-details">
                        <div class="bank-row"><span class="bank-label">Account Name</span><span class="bank-value">Alpha Freight Solutions</span></div>
                        <div class="bank-row"><span class="bank-label">Account No</span><span class="bank-value">29894043</span></div>
                        <div class="bank-row"><span class="bank-label">Sort Code</span><span class="bank-value">040605</span></div>
                        <div class="bank-row"><span class="bank-label">IBAN</span><span class="bank-value">GB35CLRB04060529894043</span></div>
                        <div class="bank-row"><span class="bank-label">SWIFT</span><span class="bank-value">CLRBGB22</span></div>
                        <p style="font-size:0.75rem;color:var(--text-medium);margin-top:0.75rem;">Include Load ID as reference: ${loadId}</p>
                    </div>
                    <button class="confirm-btn" onclick="confirmBankTransfer()">
                        <i class="fas fa-check-circle"></i> I've Sent Payment
                    </button>
                </div>

                <div class="section-title" style="margin-top:12px;"><i class="fas fa-file-invoice"></i> Not ready to pay?</div>
                <div class="option-card" id="payLetterOption" onclick="addToPayLetter()">
                    <div class="option-card-header">
                        <div class="option-icon"><i class="fas fa-file-invoice-dollar"></i></div>
                        <div>
                            <div class="option-title">Pay Letter (Pay Later)</div>
                            <div class="option-desc">Add to Pay Letter and pay when ready</div>
                        </div>
                    </div>
                    <button class="pay-card-btn" style="background: rgba(15,23,42,0.86);" onclick="event.stopPropagation(); addToPayLetter();">
                        <i class="fas fa-plus"></i> Add to Pay Letter
                    </button>
                </div>
                `}
            `;
        }

        function selectOption(method) {
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
            document.getElementById('bankOption').classList.add('selected');
            document.getElementById('bankDetailsSection').style.display = 'block';
        }

        function goToPayWithCard() {
            const q = new URLSearchParams({
                loadId: loadId || '',
                amount: amount,
                paymentFor: paymentFor,
                paymentType: paymentType
            });
            window.location.href = `pay-with-card.html?${q}`;
        }

        async function autoAddToPayLetter() {
            const user = JSON.parse(localStorage.getItem('supplierAuth') || '{}');
            if (!user.supplierId && !user.email) return;
            if (!loadData || !loadId) return;

            const db = window.AlphaBrokrage.firebaseDb;
            if (!db) return;

            const supplierId = user.supplierId || user.id || user.email?.replace(/@/g, '_').replace(/\./g, '_');
            const supplierName = user.firstName ? `${user.firstName} ${user.lastName || ''}`.trim() : user.companyName || 'Supplier';

            const pendingOrder = {
                loadId,
                loadTitle: loadData.loadTitle || 'Untitled Load',
                pickupLocation: loadData.pickupLocation || loadData.pickup_location || '',
                deliveryLocation: loadData.deliveryLocation || loadData.delivery_location || '',
                amount,
                paymentFor: paymentFor || loadData.loadTitle || 'Load Payment',
                status: 'pending',
                paymentType: 'pay_letter',
                source: 'paynow_auto',
                createdAt: new Date().toISOString(),
                supplierId,
                supplierName
            };

            try {
                const snap = await db.ref('payLetterPending').orderByChild('supplierId').equalTo(supplierId).once('value');
                let exists = false;
                if (snap.exists()) {
                    snap.forEach((c) => {
                        if (c.val().loadId === loadId && !['paid', 'cancelled'].includes((c.val().status || '').toLowerCase())) exists = true;
                    });
                }
                if (!exists) {
                    const local = JSON.parse(localStorage.getItem('payLetterPendingLocal') || '[]');
                    if (!local.some(o => o.loadId === loadId)) {
                        local.push(pendingOrder);
                        localStorage.setItem('payLetterPendingLocal', JSON.stringify(local));
                    }
                    await db.ref('payLetterPending').push(pendingOrder).catch(() => {});
                }
            } catch (e) { /* silent */ }

            if (!window._payLetterListenersAdded) {
                window._payLetterListenersAdded = true;
                document.addEventListener('visibilitychange', () => {
                    if (document.visibilityState === 'hidden') autoAddToPayLetter();
                });
                window.addEventListener('pagehide', () => { autoAddToPayLetter(); });
            }
        }

        async function addToPayLetter() {
            const user = JSON.parse(localStorage.getItem('supplierAuth') || '{}');
            if (!user.supplierId && !user.email) {
                showError('Please sign in');
                return;
            }

            const db = window.AlphaBrokrage.firebaseDb;
            if (!db) {
                showError('Could not connect');
                return;
            }

            const supplierId = user.supplierId || user.id || user.email?.replace(/@/g, '_').replace(/\./g, '_');
            const supplierName = user.firstName ? `${user.firstName} ${user.lastName || ''}`.trim() : user.companyName || 'Supplier';

            const pendingOrder = {
                loadId,
                loadTitle: loadData.loadTitle || 'Untitled Load',
                pickupLocation: loadData.pickupLocation || loadData.pickup_location || '',
                deliveryLocation: loadData.deliveryLocation || loadData.delivery_location || '',
                amount: amount,
                paymentFor: paymentFor || loadData.loadTitle || 'Load Payment',
                status: 'pending',
                paymentType: 'pay_letter',
                createdAt: new Date().toISOString(),
                supplierId,
                supplierName
            };

            try {
                const snap = await db.ref('payLetterPending').orderByChild('supplierId').equalTo(supplierId).once('value');
                let count = 0;
                let exists = false;
                if (snap.exists()) {
                    snap.forEach((c) => {
                        const o = c.val();
                        if (['cancelled', 'paid'].includes((o.status || '').toLowerCase())) return;
                        count++;
                        if (o.loadId === loadId) exists = true;
                    });
                }
                if (exists) {
                    showSuccess('Already in Pay Letter. Redirecting...');
                    setTimeout(() => { window.location.href = 'pay-letter.html'; }, 1000);
                    return;
                }
                if (count >= 3) {
                    showError('Max 3 pending orders. Complete or cancel one first.');
                    return;
                }

                await db.ref('payLetterPending').push(pendingOrder);
                showSuccess('Added to Pay Letter!');
                setTimeout(() => { window.location.href = 'pay-letter.html'; }, 1200);
            } catch (e) {
                const local = JSON.parse(localStorage.getItem('payLetterPendingLocal') || '[]');
                if (!local.some(o => o.loadId === loadId)) {
                    local.push(pendingOrder);
                    localStorage.setItem('payLetterPendingLocal', JSON.stringify(local));
                }
                showSuccess('Saved locally. Redirecting...');
                setTimeout(() => { window.location.href = 'pay-letter.html'; }, 1000);
            }
        }

        async function confirmBankTransfer() {
            const user = JSON.parse(localStorage.getItem('supplierAuth') || '{}');
            if (!user.supplierId && !user.email) {
                showError('Please sign in');
                return;
            }

            const db = window.AlphaBrokrage.firebaseDb;
            if (!db) {
                showError('Could not connect');
                return;
            }

            const now = new Date().toISOString();
            const requestData = {
                loadId,
                amount: totalAmount,
                paymentFor: paymentFor || loadData.loadTitle || 'Load Payment',
                paymentType: 'Bank Transfer',
                supplierId: user.supplierId || user.id,
                supplierName: user.firstName ? `${user.firstName} ${user.lastName || ''}`.trim() : user.companyName || 'Supplier',
                supplierEmail: user.email || '',
                companyName: user.companyName || user.company || '',
                status: 'pending',
                createdAt: now
            };

            try {
                await db.ref('bankTransferRequests').push(requestData);

                const paymentStatus = loadData.paymentStatus || {};
                paymentStatus.bankTransfer = {
                    status: 'pending',
                    amount: totalAmount,
                    paymentType: 'bank',
                    reference: loadId,
                    submittedAt: now
                };
                await db.ref(`loads/${loadId}`).update({ paymentStatus });

                showSuccess('Payment submitted. We will confirm within 2 hours.');
                setTimeout(() => {
                    window.location.href = 'my-loads.html';
                }, 1500);
            } catch (e) {
                console.error(e);
                showError('Failed to submit. Try again.');
            }
        }

        async function loadDataAndRender() {
            if (!loadId) {
                renderContent();
                return;
            }

            const db = window.AlphaBrokrage.firebaseDb;
            if (!db) {
                document.getElementById('contentArea').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Could not connect</p></div>';
                return;
            }

            try {
                const snap = await db.ref(`loads/${loadId}`).once('value');
                loadData = snap.val();
                amount = parseFloat(amountParam) || parseFloat(loadData?.price || loadData?.budget || loadData?.maxBudget || loadData?.minBudget || 0);
                renderContent();
                if (!isNonCommissionPayment) autoAddToPayLetter();
            } catch (e) {
                document.getElementById('contentArea').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Failed to load</p></div>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadDataAndRender);
    </script>
</body>
</html>
