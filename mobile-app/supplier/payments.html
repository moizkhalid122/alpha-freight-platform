    <style>
        /* —— Premium theme (matches supplier dashboard) —— */
        :root {
            --primary: #635bff;
            --primary-dark: #4f46e5;
            --primary-light: #8b5cf6;
            --accent: #06b6d4;
            --success: #059669;
            --error: #dc2626;
            --warning: #d97706;
            --text-dark: #0f172a;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --bg-main: #F6F7FB;
            --card-bg: rgba(255,255,255,0.92);
            --border: rgba(15,23,42,0.10);
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08), 0 2px 8px rgba(15, 23, 42, 0.04);
            --shadow-card: 0 14px 44px rgba(15, 23, 42, 0.10), 0 2px 8px rgba(15, 23, 42, 0.03);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 22px;
            --radius-sm: 14px;
            --page-pad: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(15, 23, 42, 0.16); border-radius: 10px; transition: background 0.3s var(--ease); }
        ::-webkit-scrollbar-thumb:hover { background: rgba(15, 23, 42, 0.22); }
        * { scrollbar-width: thin; scrollbar-color: rgba(15, 23, 42, 0.16) transparent; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-main);
            min-height: 100vh;
            /* footer from supplier-bottom-nav.css */
            color: var(--text-dark);
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        body::before{
            content:"";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(900px 520px at 14% 8%, rgba(99, 91, 255, 0.12), rgba(246,247,251,0) 62%),
                radial-gradient(900px 520px at 88% 22%, rgba(6, 182, 212, 0.10), rgba(246,247,251,0) 62%);
            pointer-events:none;
            z-index: 0;
        }
        body > *{ position: relative; z-index: 1; }

        .header {
            padding: calc(18px + env(safe-area-inset-top, 0px)) var(--page-pad) 12px;
        }
        .header-card{
            background: rgba(255,255,255,0.92);
            border: 1px solid rgba(15,23,42,0.10);
            border-radius: 28px;
            box-shadow: 0 18px 55px rgba(15,23,42,0.10);
            padding: 16px 14px 14px;
            position: relative;
            overflow: hidden;
        }
        .header-card::before{
            content:"";
            position:absolute;
            inset:-120px -120px auto auto;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(99,91,255,0.12), rgba(246,247,251,0) 70%);
            transform: rotate(12deg);
            pointer-events:none;
        }
        .header-row{
            display:flex;
            align-items:flex-start;
            justify-content:space-between;
            gap: 12px;
            position: relative;
            z-index: 1;
        }
        .page-title { font-size: 1.2rem; font-weight: 950; letter-spacing: -0.03em; margin: 0; line-height: 1.2; }
        .page-subtitle { margin-top: 6px; font-size: 0.88rem; color: rgba(71,85,105,0.92); font-weight: 700; }
        .icon-btn{
            width: 44px;
            height: 44px;
            border-radius: 16px;
            border: 1px solid rgba(15,23,42,0.10);
            background: rgba(15,23,42,0.04);
            display:grid;
            place-items:center;
            color: rgba(15,23,42,0.86);
            box-shadow: 0 12px 28px rgba(15,23,42,0.10);
            cursor:pointer;
            flex-shrink:0;
        }
        .icon-btn:active { transform: scale(0.98); }

        .quick-row{
            margin-top: 12px;
            display:flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 2px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .quick-row::-webkit-scrollbar{ display:none; }
        .chip{
            display:inline-flex;
            align-items:center;
            gap: 8px;
            white-space: nowrap;
            border-radius: 999px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.92);
            border: 1px solid rgba(15,23,42,0.10);
            box-shadow: 0 10px 22px rgba(15,23,42,0.08);
            font-weight: 900;
            color: rgba(15,23,42,0.86);
            text-decoration:none;
            cursor:pointer;
        }
        .chip i { color: var(--primary); }
        .chip:active{ transform: scale(0.98); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 12px;
        }

        .stat-card {
            background: rgba(255,255,255,0.92);
            border-radius: var(--radius);
            padding: 14px 12px;
            border: 1px solid rgba(15,23,42,0.10);
            box-shadow: 0 14px 34px rgba(15,23,42,0.10);
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, rgba(99,91,255,0.55), rgba(6,182,212,0.35), rgba(99,91,255,0));
            opacity: 0.55;
        }

        .stat-label { font-size: 0.72rem; color: rgba(71,85,105,0.90); margin-bottom: 0.25rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.06em; }
        .stat-value { font-size: 1.25rem; font-weight: 950; letter-spacing: -0.03em; color: var(--text-dark); }

        .filter-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .filter-row::-webkit-scrollbar{ display:none; }

        .filter-btn {
            padding: 0.5rem 1rem;
            border-radius: 999px;
            border: 1px solid rgba(15,23,42,0.10);
            background: rgba(255,255,255,0.92);
            font-size: 0.875rem;
            font-weight: 950;
            color: rgba(15,23,42,0.86);
            cursor: pointer;
            white-space: nowrap;
            transition: transform 0.3s var(--ease), background 0.3s var(--ease), border-color 0.3s var(--ease), color 0.3s var(--ease);
            box-shadow: var(--shadow-sm);
        }

        .filter-btn.active {
            background: linear-gradient(145deg, rgba(99,91,255,0.98), rgba(139,92,246,0.92));
            border-color: rgba(99,91,255,0.65);
            color: white;
            box-shadow: 0 16px 34px rgba(99,91,255,0.22);
        }

        .filter-btn:active { transform: scale(0.96); }

        .content { padding: 0 var(--page-pad) 18px; }
        .payments-section { padding: 0; }

        .section-title {
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title i { color: var(--primary); }

        .payment-card {
            background: rgba(255,255,255,0.92);
            border-radius: var(--radius);
            padding: 14px 14px 12px;
            margin-bottom: 0.875rem;
            border: 1px solid rgba(15,23,42,0.10);
            box-shadow: var(--shadow-card);
            position: relative;
            overflow: hidden;
        }
        .payment-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 12px;
            bottom: 12px;
            width: 4px;
            background: linear-gradient(180deg, rgba(99,91,255,0.95), rgba(6,182,212,0.78));
            border-radius: 0 2px 2px 0;
            opacity: 0.9;
        }

        .payment-route { font-size: 0.9375rem; font-weight: 800; margin-bottom: 0.25rem; letter-spacing: -0.02em; color: var(--text-dark); }

        .payment-meta {
            font-size: 0.8125rem;
            color: var(--text-medium);
            margin-bottom: 0.75rem;
        }

        .payment-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
        }

        .payment-amount { font-weight: 900; color: var(--text-dark); letter-spacing: -0.02em; }
        .payment-status {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
            font-size: 0.6875rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .payment-status.completed { background: rgba(5,150,105,0.12); color: var(--success); }
        .payment-status.pending { background: rgba(217,119,6,0.12); color: var(--warning); }
        .payment-status.failed { background: rgba(220,38,38,0.12); color: var(--error); }

        /* Bottom nav: supplier-bottom-nav.css – same as dashboard */
        .empty-state {
            text-align: center;
            padding: 2.5rem 1.5rem;
            background: rgba(255,255,255,0.92);
            border-radius: var(--radius);
            margin: 0;
            border: 1px solid rgba(15,23,42,0.10);
            box-shadow: var(--shadow-sm);
        }

        .empty-state i { font-size: 2.5rem; color: var(--text-medium); margin-bottom: 0.75rem; }
        .empty-state h3 { font-size: 1rem; margin-bottom: 0.25rem; }
        .empty-state p { font-size: 0.875rem; color: var(--text-medium); }

        @media (min-width: 768px) {
            body { max-width: 440px; margin: 0 auto; box-shadow: 0 0 48px rgba(15, 23, 42, 0.12); }
        }
    </style>
</head>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="../../assets/js/firebase-init.js"></script>
    <script src="../../assets/js/alerts.js"></script>

    <script>
        const alertSystem = new AlertSystem();
        function showError(msg) { alertSystem.show('error', msg); }

        let allPayments = [];
        let currentFilter = 'all';

        function getUserData() {
            const auth = localStorage.getItem('supplierAuth');
            return auth ? JSON.parse(auth) : null;
        }

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return false;
            if (authSdk.currentUser) return true;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => { if (!done) { done = true; resolve(); } }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
            return !!authSdk.currentUser;
        }

        async function resolveSupplierIdByUid(db, authUid, fallbackId) {
            if (!db || !authUid) return fallbackId || '';
            if (fallbackId) {
                try {
                    const snap = await db.ref('suppliers/' + String(fallbackId)).once('value');
                    if (snap.exists()) {
                        const v = snap.val() || {};
                        if (v.firebaseUid && String(v.firebaseUid) === String(authUid)) return String(fallbackId);
                    }
                } catch (e) {}
            }
            try {
                const snap = await db.ref('suppliers').orderByChild('firebaseUid').equalTo(String(authUid)).limitToFirst(1).once('value');
                if (snap.exists()) {
                    let out = '';
                    snap.forEach((ch) => { if (!out) out = ch.key; });
                    if (out) return out;
                }
            } catch (e) {}
            return fallbackId || '';
        }

        function formatCurrency(val) {
            const n = Number(val || 0);
            const safe = Number.isFinite(n) ? n : 0;
            return '£' + safe.toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }

        function formatDate(str) {
            if (!str) return '-';
            return new Date(str).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function getPaymentStatus(load) {
            const s = (load.status || '').toLowerCase();
            const ps = load.paymentStatus || {};
            if (s === 'completed' || s === 'delivered' || ps.completed) return 'completed';
            if (ps.failed || ps.rejected) return 'failed';
            return 'pending';
        }

        async function loadPayments() {
            const user = getUserData();
            const container = document.getElementById('paymentsList');

            if (!user) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-sign-in-alt"></i><h3>Sign in required</h3><p>Sign in to view payments</p></div>';
                return;
            }

            const db = window.AlphaBrokrage.firebaseDb;

            if (!db) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Error</h3><p>Could not connect</p></div>';
                return;
            }

            const ok = await ensureAuthReady();
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!ok || !authSdk || !authSdk.currentUser) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-sign-in-alt"></i><h3>Sign in required</h3><p>Session expired. Please login again.</p></div>';
                return;
            }

            const authUid = String(authSdk.currentUser.uid || '');
            const authEmail = String(authSdk.currentUser.email || user.email || '');
            const fallbackSupplierId = user.supplierId || user.email?.replace(/@/g, '_').replace(/\./g, '_');
            const supplierId = await resolveSupplierIdByUid(db, authUid, fallbackSupplierId);

            const map = {};
            async function mergeQuery(q) {
                const snap = await q.once('value');
                if (!snap.exists()) return;
                snap.forEach((ch) => { map[ch.key] = ch.val() || {}; });
            }

            const jobs = [
                mergeQuery(db.ref('loads').orderByChild('supplierFirebaseUid').equalTo(authUid))
            ];
            if (authEmail) jobs.push(mergeQuery(db.ref('loads').orderByChild('supplierEmail').equalTo(authEmail)));
            if (supplierId) jobs.push(mergeQuery(db.ref('loads').orderByChild('supplierId').equalTo(supplierId)));
            await Promise.allSettled(jobs);

            allPayments = [];
            Object.entries(map).forEach(([loadId, load]) => {
                const ps = load.paymentStatus || {};
                const showPaidOrTracked = ps.completed || ps.status || ps.method || ps.paymentIntentId;
                if (showPaidOrTracked || load.carrierId || load.carrierName || ['posted', 'available', 'pending', 'completed', 'delivered', 'active', 'accepted', 'in_transit', 'in-transit'].includes((load.status || '').toLowerCase())) {
                    const amount = parseFloat(load.price || load.budget || load.maxBudget || load.minBudget || 0);

                    let commission = 0, rate = 0.05;
                    if (load.supplierCommission !== undefined) {
                        commission = parseFloat(load.supplierCommission) || 0;
                    } else {
                        if (amount > 5000) rate = 0.03;
                        else if (amount > 1000) rate = 0.04;
                        commission = amount * rate;
                    }

                    const totalAmount = amount + commission;
                    const status = getPaymentStatus(load);

                    allPayments.push({
                        id: loadId,
                        amount,
                        commission,
                        totalAmount,
                        status,
                        route: `${load.pickupLocation || load.pickup_location || 'N/A'} → ${load.deliveryLocation || load.delivery_location || 'N/A'}`,
                        carrierName: load.carrierName || load.carrier_name || 'Carrier',
                        completedAt: load.completedAt || load.deliveryDate || load.updatedAt || load.createdAt,
                        createdAt: load.createdAt || load.created_at
                    });
                }
            });

            allPayments.sort((a, b) => {
                const da = new Date(a.completedAt || a.createdAt || 0);
                const db2 = new Date(b.completedAt || b.createdAt || 0);
                return db2 - da;
            });

            updateStats();
            renderPayments();
        }

        function updateStats() {
            const completed = allPayments.filter(p => p.status === 'completed');
            const pending = allPayments.filter(p => p.status === 'pending');

            const now = new Date();
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
            const monthlySpent = completed
                .filter(p => new Date(p.completedAt || p.createdAt) >= monthStart)
                .reduce((s, p) => s + p.amount, 0);

            const pendingTotal = pending.reduce((s, p) => s + p.amount, 0);
            const avg = completed.length > 0
                ? completed.reduce((s, p) => s + p.amount, 0) / completed.length
                : 0;

            document.getElementById('monthlySpent').textContent = formatCurrency(monthlySpent);
            document.getElementById('pendingAmount').textContent = formatCurrency(pendingTotal);
            document.getElementById('completedCount').textContent = completed.length;
            document.getElementById('avgAmount').textContent = formatCurrency(avg);
        }

        function renderPayments() {
            const container = document.getElementById('paymentsList');
            let list = allPayments;
            if (currentFilter !== 'all') {
                list = allPayments.filter(p => p.status === currentFilter);
            }

            if (list.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-receipt"></i><h3>No payments found</h3><p>Payment history will appear when loads are completed</p></div>';
                return;
            }

            container.innerHTML = list.map(p => {
                const statusClass = p.status === 'completed' ? 'completed' : (p.status === 'failed' ? 'failed' : 'pending');
                const statusText = p.status === 'completed' ? 'Completed' : (p.status === 'failed' ? 'Failed' : 'Pending');
                const receiptHref = `receipt.html?loadId=${encodeURIComponent(p.id)}`;

                return `
                    <div class="payment-card" onclick="window.location.href='${receiptHref}'" style="cursor:pointer;">
                        <div class="payment-route">${p.route}</div>
                        <div class="payment-meta">${p.carrierName} • ${formatDate(p.completedAt || p.createdAt)}</div>
                        <div class="payment-row">
                            <span>Total: <span class="payment-amount">${formatCurrency(p.totalAmount)}</span></span>
                            <span class="payment-status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="payment-row" style="margin-top:0.5rem;font-size:0.75rem;color:var(--text-medium);">
                            <span>Budget: ${formatCurrency(p.amount)}</span>
                            <span>Commission: ${formatCurrency(p.commission)}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderPayments();
            });
        });

        const refreshBtn = document.getElementById('refreshBtn');
        if (refreshBtn) refreshBtn.addEventListener('click', () => loadPayments().catch(() => showError('Could not refresh')));

        document.addEventListener('DOMContentLoaded', loadPayments);
    </script>
</body>
</html>
