    <script>
      // Warm Firebase connection on load so sign-in is fast when user submits
      (function(){ try {
        var db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;

    <script src="../../assets/js/alerts.js"></script>
    <script>
        const alertSystem = new AlertSystem();
        function showError(msg, opts) { alertSystem.error(msg, { title: '', ...(opts || {}) }); }
        function showSuccess(msg, opts) { alertSystem.success(msg, { title: '', ...(opts || {}) }); }

        async function sha256Hex(text) {
            const enc = new TextEncoder();
            const data = enc.encode(text);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function isPinEnabled() {
            return localStorage.getItem('supplierPinEnabled') === '1';
        }

        function hasRememberedSupplierSession() {
            try {
                const raw = localStorage.getItem('supplierAuth');
                if (!raw) return false;
                const auth = JSON.parse(raw);
                let until = auth && auth.rememberUntil ? Number(auth.rememberUntil) : 0;
                const remembered = !!(auth && auth.rememberMe) || localStorage.getItem('rememberSupplier') === 'true';
                if (!remembered) return false;
                if (!until || !Number.isFinite(until)) {
                    const loginTs = auth && auth.loginTime ? Date.parse(auth.loginTime) : 0;
                    if (loginTs && Number.isFinite(loginTs)) until = loginTs + 30 * 24 * 60 * 60 * 1000;
                }
                if (!until || !Number.isFinite(until)) return false;
                if (Date.now() > until) return false;
                return !!(auth && auth.isLoggedIn && auth.userType === 'supplier');
            } catch (e) {
                return false;
            }
        }

        async function verifyPin(pin) {
            const salt = localStorage.getItem('supplierPinSalt');
            const hash = localStorage.getItem('supplierPinHash');
            if (!salt || !hash) return false;
            const computed = await sha256Hex(`${salt}:${String(pin || '')}`);
            return computed === hash;
        }

        function showPinModal(title) {
            return new Promise(function (resolve) {
                const overlay = document.getElementById('pinModal');
                const titleEl = document.getElementById('pinModalTitle');
                const input = document.getElementById('pinModalInput');
                const cancelBtn = document.getElementById('pinModalCancel');
                const okBtn = document.getElementById('pinModalOk');
                if (!overlay || !input) { resolve(null); return; }
                titleEl.textContent = title || 'Enter your 4-digit PIN';
                input.value = '';
                overlay.style.display = 'flex';
                input.focus();
                function close(val) {
                    overlay.style.display = 'none';
                    input.value = '';
                    cancelBtn.onclick = null;
                    okBtn.onclick = null;
                    overlay.onclick = null;
                    resolve(val);
                }
                cancelBtn.onclick = function () { close(null); };
                okBtn.onclick = function () { close(input.value); };
                overlay.onclick = function (e) { if (e.target === overlay) close(null); };
                input.onkeydown = function (e) {
                    if (e.key === 'Enter') close(input.value);
                    if (e.key === 'Escape') close(null);
                };
            });
        }

        async function tryPinGate() {
            try {
                if (!isPinEnabled()) return;
                if (!hasRememberedSupplierSession()) return;

                const pin = await showPinModal('Enter your 4-digit PIN');
                if (pin === null) return;
                const ok = await verifyPin(pin);
                if (!ok) { showError('Wrong PIN.', { title: 'Invalid PIN' }); return; }
                await attemptAutoLogin(true);
            } catch (e) {}
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('passwordToggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function clearFieldErrors() {
            document.querySelectorAll('.form-group').forEach(g => {
                g.classList.remove('error');
                const em = g.querySelector('.error-message');
                if (em && em.dataset && em.dataset.defaultText) em.textContent = em.dataset.defaultText;
            });
        }

        function setFieldError(inputId, message) {
            const input = document.getElementById(inputId);
            if (!input) return;
            const group = input.closest('.form-group');
            if (!group) return;
            group.classList.add('error');
            const em = group.querySelector('.error-message');
            if (em) {
                if (!em.dataset.defaultText) em.dataset.defaultText = em.textContent || '';
                em.textContent = message || em.textContent;
            }
        }

        function validateForm() {
            clearFieldErrors();
            const email = (document.getElementById('email').value || '').trim();
            const password = (document.getElementById('password').value || '');

            if (!email && !password) {
                setFieldError('email', 'Please enter your email address.');
                setFieldError('password', 'Please enter your password.');
                return false;
            }
            if (!email) {
                setFieldError('email', 'Please enter your email address.');
                return false;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                setFieldError('email', 'Please enter a valid email address.');
                return false;
            }
            if (!password) {
                setFieldError('password', 'Please enter your password.');
                return false;
            }
            if (password.length < 6) {
                setFieldError('password', 'Password must be at least 6 characters.');
                return false;
            }
            return true;
        }

        async function finishLogin(matched, rememberMe, emailUsed, passwordUsed) {
            const rememberDays = 30;
            const rememberUntil = rememberMe ? (Date.now() + rememberDays * 24 * 60 * 60 * 1000) : 0;
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            const uid = authSdk && authSdk.currentUser && authSdk.currentUser.uid ? String(authSdk.currentUser.uid) : '';
            const authData = {
                email: matched.email,
                firstName: matched.firstName || (matched.contactName && matched.contactName.split(' ')[0]) || '',
                lastName: matched.lastName || (matched.contactName && matched.contactName.split(' ').slice(1).join(' ')) || '',
                contactName: matched.contactName || '',
                companyName: matched.companyName || matched.businessName || '',
                businessName: matched.businessName || '',
                phone: matched.phone || '',
                supplierId: matched.supplierId || matched.id || '',
                firebaseUid: matched.firebaseUid || uid || '',
                country: matched.country || '',
                profileComplete: matched.profileComplete || false,
                isLoggedIn: true,
                loginTime: new Date().toISOString(),
                rememberMe: rememberMe,
                rememberUntil: rememberUntil,
                userType: 'supplier'
            };
            localStorage.setItem('supplierAuth', JSON.stringify(authData));
            try { localStorage.setItem('lastSupplierProfile', JSON.stringify(authData)); } catch (e) {}
            try { if (rememberMe) localStorage.setItem('rememberSupplier', 'true'); else localStorage.removeItem('rememberSupplier'); } catch (e) {}
            try { localStorage.setItem('ab.portal.lastRole', 'supplier'); } catch (e) {}

            // PIN lock uses localStorage only; nothing extra to save here.

            showSuccess('Welcome back! Redirecting...');
            const name = authData.firstName || authData.contactName || '';
            const next = authData.profileComplete === false ? '/mobile-app/supplier/edit-profile.html' : '/mobile-app/supplier/dashboard.html';
            setTimeout(function () {
                window.location.href = '/mobile-app/welcome.html?mode=back&role=supplier&name=' + encodeURIComponent(String(name || '')) + '&next=' + encodeURIComponent(next);
            }, 200);
        }

        // Gate dashboard access with PIN (if enabled)
        document.addEventListener('DOMContentLoaded', function () {
            (async function () {
                try {
                    const rememberBox = document.getElementById('rememberMe');
                    if (rememberBox) rememberBox.checked = hasRememberedSupplierSession() || localStorage.getItem('rememberSupplier') === 'true';
                } catch (e) {}
                try { await applyPreferredAuthPersistence(); } catch (e) {}
                tryPinGate();
                try { await attemptAutoLogin(false); } catch (e) {}
            })();
        });

        async function applyPreferredAuthPersistence() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.setPersistence !== 'function') return;
            const wantsRemember = hasRememberedSupplierSession() || localStorage.getItem('rememberSupplier') === 'true';
            try {
                await authSdk.setPersistence(wantsRemember ? 'local' : 'session');
            } catch (e) {}
        }

        async function attemptAutoLogin(fromPin) {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
            if (!authSdk || !db) return;
            if (!hasRememberedSupplierSession() && localStorage.getItem('rememberSupplier') !== 'true') return;

            await ensureAuthReady();
            const user = authSdk.currentUser;
            if (!user || !user.uid) return;
            const uid = String(user.uid);

            let matched = null;
            try {
                const cachedRaw = localStorage.getItem('supplierAuth') || localStorage.getItem('lastSupplierProfile');
                if (cachedRaw) {
                    const cached = JSON.parse(cachedRaw);
                    if (cached && cached.firebaseUid === uid) matched = cached;
                }
            } catch (e) {}

            if (!matched) {
                try {
                    const snap = await db.ref('suppliers').orderByChild('firebaseUid').equalTo(uid).limitToFirst(1).once('value');
                    if (snap && snap.exists()) {
                        snap.forEach(function (child) {
                            const supplier = child.val() || {};
                            if (!supplier.supplierId) supplier.supplierId = child.key;
                            if (!supplier.id) supplier.id = child.key;
                            matched = supplier;
                        });
                    }
                } catch (e) {}
            }

            if (!matched) return;
            try {
                if (!fromPin && isPinEnabled()) return;
            } catch (e) {}
            try { showSuccess('Signing you in...'); } catch (e) {}
            await finishLogin(matched, true, '', '');
        }

        async function loginWithCredentials(email, password, rememberMe, fromBiometric) {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
            if (!authSdk || !db) {
                if (!fromBiometric) showError('Login service unavailable. Try again later.');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            if (submitBtn) {
                submitBtn.classList.add('loading');
                submitBtn.disabled = true;
            }

            let legacyLookupPromise = null;
            try {
                legacyLookupPromise = db.ref('suppliers').orderByChild('email').equalTo(email).limitToFirst(1).once('value');
            } catch (e) {
                legacyLookupPromise = null;
            }

            try {
                try {
                    if (typeof authSdk.setPersistence === 'function') {
                        await authSdk.setPersistence(rememberMe ? 'local' : 'session');
                    }
                } catch (e) {}
                const authPromise = authSdk.signInWithEmailAndPassword(email, password);
                const timeoutPromise = new Promise(function (_, reject) {
                    setTimeout(function () { reject(new Error('timeout')); }, 12000);
                });
                const cred = await Promise.race([authPromise, timeoutPromise]);
                const uid = cred && cred.user ? cred.user.uid : null;
                if (!uid) throw new Error('auth_failed');

                let matched = null;
                try {
                    const cachedRaw = localStorage.getItem('supplierAuth') || localStorage.getItem('lastSupplierProfile');
                    if (cachedRaw) {
                        const cached = JSON.parse(cachedRaw);
                        if (cached && cached.firebaseUid === uid) matched = cached;
                    }
                } catch (e) {}

                if (!matched) {
                    const snap = await db.ref('suppliers').orderByChild('firebaseUid').equalTo(uid).limitToFirst(1).once('value');
                    if (snap && snap.exists()) {
                        snap.forEach(function (child) {
                            const supplier = child.val() || {};
                            if (!supplier.supplierId) supplier.supplierId = child.key;
                            if (!supplier.id) supplier.id = child.key;
                            matched = supplier;
                        });
                    }
                }

                if (!matched) {
                    try { await authSdk.signOut(); } catch (e) {}
                    if (!fromBiometric) showError('No supplier profile found. Please sign up first.', { title: 'Login Failed' });
                    return;
                }

                try { await enforceTwoFAIfEnabled('supplier'); } catch (e) { if (!fromBiometric) showError('Twoâ€‘Step Verification failed.', { title: 'Login Failed' }); return; }
                await finishLogin(matched, rememberMe, email, password);
            } catch (err) {
                console.error('Login error:', err);
                if (!fromBiometric) {
                    const code = err && err.code ? String(err.code) : '';
                    const msg = err && err.message ? String(err.message) : '';
                    const looksLikeInvalidCreds = msg.includes('INVALID_LOGIN_CREDENTIALS') || msg.includes('INVALID_PASSWORD') || msg.includes('invalid login credentials');
                    if (code === 'auth/user-not-found' || code === 'auth/invalid-login-credentials' || code === 'auth/invalid-credential' || (code === 'auth/internal-error' && looksLikeInvalidCreds)) {
                        try {
                            const legacySnap = legacyLookupPromise ? await legacyLookupPromise : await db.ref('suppliers').orderByChild('email').equalTo(email).limitToFirst(1).once('value');
                            let legacy = null;
                            let legacyKey = '';
                            if (legacySnap && legacySnap.exists()) {
                                legacySnap.forEach(function (child) {
                                    legacy = child.val() || {};
                                    legacyKey = child.key;
                                });
                            }
                            if (legacy && legacyKey) {
                                if (legacy.password && legacy.password === password) {
                                    const newCred = await authSdk.createUserWithEmailAndPassword(email, password);
                                    const uid = newCred && newCred.user ? newCred.user.uid : '';
                                    if (!uid) throw new Error('auth_failed');
                                    await db.ref('suppliers/' + legacyKey).update({ firebaseUid: uid });
                                    try { await db.ref('suppliers/' + legacyKey + '/password').remove(); } catch (e) {}
                                    legacy.firebaseUid = uid;
                                    if (!legacy.supplierId) legacy.supplierId = legacyKey;
                                    if (!legacy.id) legacy.id = legacyKey;
                                    await finishLogin(legacy, rememberMe, email, password);
                                    return;
                                }
                                showError('Wrong password.', { title: 'Login Failed' });
                                return;
                            }
                        } catch (e) {
                            console.error(e);
                        }
                        showError('Wrong email.', { title: 'Login Failed' });
                    }
                    else if (code === 'auth/wrong-password') showError('Wrong password.', { title: 'Login Failed' });
                    else if (code === 'auth/invalid-email') showError('Invalid email address.', { title: 'Login Failed' });
                    else showError(err && err.message === 'timeout' ? 'Connection slow. Check internet & try again.' : 'Login failed. Please try again.');
                }
            } finally {
                if (submitBtn) {
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                }
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            if (!validateForm()) return;
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            loginWithCredentials(email, password, rememberMe, false);
        });

        const TWO_FA_BASE = 'https://us-central1-alpha-brokerage.cloudfunctions.net';

        async function enforceTwoFAIfEnabled(role) {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || !authSdk.currentUser) return;
            let idToken = '';
            try {
                idToken = await authSdk.currentUser.getIdToken();
            } catch (e) {
                return;
            }
            try {
                const stResp = await fetch(TWO_FA_BASE + '/twoFAStatusPublic?role=' + encodeURIComponent(role), {
                    headers: { 'Authorization': 'Bearer ' + idToken }
                });
                if (!stResp || !stResp.ok) return;
                let st = null;
                try { st = await stResp.json(); } catch (e) {}
                if (!st || !st.enforce) return;
                await promptTwoFACode(role);
            } catch (e) {
                return;
            }
        }

        async function promptTwoFACode(role) {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            const idToken = authSdk && authSdk.currentUser ? await authSdk.currentUser.getIdToken() : '';
            return new Promise((resolve, reject) => {
                let overlay = document.getElementById('twoFAOverlay');
                if (!overlay) {
                    overlay = document.createElement('div');
                    overlay.id = 'twoFAOverlay';
                    overlay.style.position = 'fixed';
                    overlay.style.inset = '0';
                    overlay.style.background = 'rgba(15,23,42,0.55)';
                    overlay.style.backdropFilter = 'blur(6px)';
                    overlay.style.display = 'flex';
                    overlay.style.alignItems = 'center';
                    overlay.style.justifyContent = 'center';
                    overlay.style.zIndex = '9999';
                    overlay.innerHTML = '<div style="width:100%;max-width:420px;background:#fff;border-radius:18px;padding:1.25rem;border:1px solid rgba(148,163,184,0.18);box-shadow:0 14px 40px rgba(2,6,23,0.08);text-align:center;"><div style="font-weight:800;color:#0F172A;margin-bottom:0.5rem;">Twoâ€‘Step Verification</div><div style="color:#64748B;font-size:0.875rem;margin-bottom:0.75rem;">Enter the 6â€‘digit code from Google Authenticator</div><input id="twoFAToken" inputmode="numeric" pattern="\\d{6}" maxlength="6" style="width:100%;padding:0.75rem 1rem;border:1px solid rgba(148,163,184,0.25);border-radius:12px;font-size:1rem;letter-spacing:6px;text-align:center;" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢"/><div id="twoFAError" style="color:#EF4444;font-size:0.875rem;margin-top:0.5rem;"></div><button id="twoFABtn" style="margin-top:0.75rem;width:100%;padding:0.9rem;background:linear-gradient(135deg,#0B0F19,#111827);color:#fff;border:none;border-radius:12px;font-weight:800;">Verify</button></div>';
                    document.body.appendChild(overlay);
                } else {
                    overlay.style.display = 'flex';
                }
                const btn = document.getElementById('twoFABtn');
                const err = document.getElementById('twoFAError');
                const tokenInput = document.getElementById('twoFAToken');
                err.textContent = '';
                btn.onclick = async () => {
                    const token = (tokenInput.value || '').trim();
                    if (!/^[0-9]{6}$/.test(token)) { err.textContent = 'Enter 6â€‘digit code'; return; }
                    btn.disabled = true;
                    btn.textContent = 'Verifying...';
                    try {
                        const resp = await fetch(TWO_FA_BASE + '/twoFAVerifyPublic', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + idToken },
                            body: JSON.stringify({ role, token })
                        });
                        const js = await resp.json();
                        if (js && js.success) {
                            overlay.style.display = 'none';
                            resolve(true);
                        } else {
                            err.textContent = (js && js.error && js.error.message) ? js.error.message : 'Invalid code';
                        }
                    } catch (e) {
                        err.textContent = 'Verification failed. Try again.';
                    } finally {
                        btn.disabled = false;
                        btn.textContent = 'Verify';
                    }
                };
            });
        }

        var GOOGLE_CLIENT_ID = '834712514965-j9od0ea97k00nvkg92214eas912n8n5v.apps.googleusercontent.com';
        function signInWithGoogle() {
            if (typeof google === 'undefined' || !google.accounts || !google.accounts.id) {
                showError('Google Sign-In is not available. Use email login.');
                return;
            }
            google.accounts.id.prompt();
        }

        async function handleGoogleIdCredentialResponse(response) {
            try {
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
                if (!authSdk || !db) throw new Error('Auth/DB unavailable');

                const idToken = response && response.credential ? String(response.credential) : '';
                if (!idToken) throw new Error('Missing credential');

                const providerCred = firebase.auth.GoogleAuthProvider.credential(idToken);
                const userCred = await authSdk.signInWithCredential(providerCred);
                const uid = userCred && userCred.user ? userCred.user.uid : '';
                if (!uid) throw new Error('Google sign-in failed');

                const snap = await db.ref('suppliers').orderByChild('firebaseUid').equalTo(uid).limitToFirst(1).once('value');
                let matched = null;
                if (snap && snap.exists()) {
                    snap.forEach(function (child) {
                        var s = child.val() || {};
                        if (!s.supplierId) s.supplierId = child.key;
                        if (!s.id) s.id = child.key;
                        matched = s;
                    });
                }
                if (matched) {
                    try { await enforceTwoFAIfEnabled('supplier'); } catch (e) {
                        try { await authSdk.signOut(); } catch (e2) {}
                        showError('Twoâ€‘Step Verification failed.', { title: 'Login Failed' });
                        return;
                    }
                    finishLogin(matched, false);
                } else {
                    try { await authSdk.signOut(); } catch (e) {}
                    showError('No supplier account found for this email. Please sign up first.');
                }
            } catch (e) {
                console.error(e);
                showError('Google sign-in failed. Please try again.');
            }
        }

        function handleForgotPassword() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk) {
                showError('Password reset unavailable right now.');
                return;
            }
            const email = document.getElementById('email').value.trim().toLowerCase();
            if (!email) {
                showError('Please enter your email first.');
                return;
            }
            authSdk.sendPasswordResetEmail(email)
                .then(function () { showSuccess('Password reset email sent. Check your inbox.'); })
                .catch(function (err) {
                    const code = err && err.code ? String(err.code) : '';
                    if (code === 'auth/user-not-found') showError('No account found with this email.');
                    else if (code === 'auth/invalid-email') showError('Invalid email address.');
                    else showError('Failed to send reset email. Please try again.');
                });
        }

        window.addEventListener('load', function () {
            if (typeof google === 'undefined' || !google.accounts || !google.accounts.id) return;
            try {
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: handleGoogleIdCredentialResponse
                });
            } catch (e) {}
        });
    </script>
