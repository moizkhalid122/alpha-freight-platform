    <style>
        :root {
            --primary: #1d4ed8;
            --primary-dark: #1e3a8a;
            --primary-light: #60a5fa;
            --gold: #c9a227;
            --success: #059669;
            --error: #dc2626;
            --warning: #d97706;
            --text-dark: #0f172a;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --bg-main: #f1f5f9;
            --card-bg: #ffffff;

            --shadow-card: 0 8px 32px rgba(15, 23, 42, 0.06), 0 2px 8px rgba(15, 23, 42, 0.03);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 22px;
            --radius-sm: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }
        body {

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(29, 78, 216, 0.25); border-radius: 10px; transition: background 0.3s ease; }

        .scroll-container { padding-bottom: 2rem; min-height: 100vh; min-height: 100dvh; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-top: env(safe-area-inset-top, 0); }

        .welcome-section {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 48%, #1e3a8a 100%);
            color: white;
            padding: calc(1.15rem + env(safe-area-inset-top, 0px)) 1rem 1.75rem;
            border-radius: 0 0 36px 36px;

            position: relative;

            box-shadow: 0 16px 48px rgba(15, 23, 42, 0.3);
        }
        .welcome-section::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;

        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .welcome-title { font-size: 1.5rem; font-weight: 800; color: white; margin-bottom: 0.35rem; position: relative; z-index: 1; }
        .welcome-subtitle { font-size: 0.875rem; color: rgba(255,255,255,0.9); margin-bottom: 0; position: relative; z-index: 1; }

            display: flex;

        .form-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.5rem;

            top: 50%;

            background: none;
            border: none;

            font-size: 1.125rem;

        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }

        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-primary .spinner { display: none; }
        .btn-primary.loading .spinner { display: block; }
        .btn-primary.loading .btn-text { display: none; }
        .spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;

        @keyframes spin { to { transform: rotate(360deg); } }

        .google-signin-btn {
            width: 100%;
            padding: 0.875rem;
            font-size: 0.9375rem;
            font-weight: 700;
            color: var(--text-dark);
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease), background 0.3s var(--ease);
            min-height: 52px;

        .google-signin-btn:active { transform: scale(0.98); background: var(--bg-main); }

        .signup-link-text { font-size: 0.9375rem; color: var(--text-medium); }
        .signup-link-text a { color: var(--primary); text-decoration: none; font-weight: 600; }
        @media (min-width: 768px) {
            .app-container { max-width: 500px; margin: 0 auto; box-shadow: 0 0 30px rgba(0,0,0,0.1); }
            .login-container { padding: 1.5rem 2rem 2rem; }
            .welcome-section { padding: 2rem 1.5rem; padding-top: 2rem; }
            .welcome-title { font-size: 1.75rem; }
            .welcome-subtitle { font-size: 0.9375rem; margin-bottom: 0.5rem; }
        }
    </style>
</head>
<body>

                        <button type="button" class="google-signin-btn" onclick="signInWithGoogle()">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 262">

                                <path fill="#34A853" d="M130.55 261.1c35.248 0 64.839-11.605 86.453-31.622l-41.196-31.913c-11.024 7.688-25.82 13.055-45.257 13.055-34.523 0-63.824-22.773-74.269-54.25l-1.531.13-40.298 31.187-.527 1.465C35.393 231.798 79.49 261.1 130.55 261.1"/>
                                <path fill="#FBBC05" d="M56.281 156.37c-2.756-8.123-4.351-16.827-4.351-25.82 0-8.994 1.595-17.697 4.206-25.82l-.073-1.73L15.26 71.312l-1.335.635C5.077 89.644 0 109.517 0 130.55s5.077 40.905 13.925 58.602l42.356-32.782"/>

    <!-- PIN Modal -->
    <div id="pinModal" class="pin-modal-overlay" style="display:none;">
        <div class="pin-modal">
            <div class="pin-modal-title" id="pinModalTitle">Enter your 4-digit PIN</div>
            <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" class="pin-modal-input" id="pinModalInput" placeholder="••••" autocomplete="off">
            <div class="pin-modal-buttons">
                <button type="button" class="pin-modal-btn pin-modal-btn-cancel" id="pinModalCancel">Cancel</button>
                <button type="button" class="pin-modal-btn pin-modal-btn-ok" id="pinModalOk">OK</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
      // Warm Firebase connection on load so sign-in is fast when user submits
      (function(){ try {
        var db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
        if (db) db.ref('.info/connected').once('value', function(){});
      } catch(e){} })();
    </script>
    <script src="../../assets/js/alerts.js"></script>
    <script>
        const alertSystem = new AlertSystem();
        function showError(msg, opts) { alertSystem.error(msg, opts || {}); }
        function showSuccess(msg, opts) { alertSystem.success(msg, opts || {}); }

        async function sha256Hex(text) {
            const enc = new TextEncoder();
            const data = enc.encode(text);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function isPinEnabled() {
            return localStorage.getItem('supplierPinEnabled') === '1';
        }

        function hasRememberedSupplierSession() {
            try {
                const raw = localStorage.getItem('supplierAuth');
                if (!raw) return false;
                const auth = JSON.parse(raw);
                return !!(auth && auth.isLoggedIn && auth.userType === 'supplier');
            } catch (e) {
                return false;
            }
        }

        async function verifyPin(pin) {
            const salt = localStorage.getItem('supplierPinSalt');
            const hash = localStorage.getItem('supplierPinHash');
            if (!salt || !hash) return false;
            const computed = await sha256Hex(`${salt}:${String(pin || '')}`);
            return computed === hash;
        }

        function showPinModal(title) {
            return new Promise(function (resolve) {
                const overlay = document.getElementById('pinModal');
                const titleEl = document.getElementById('pinModalTitle');
                const input = document.getElementById('pinModalInput');
                const cancelBtn = document.getElementById('pinModalCancel');
                const okBtn = document.getElementById('pinModalOk');
                if (!overlay || !input) { resolve(null); return; }
                titleEl.textContent = title || 'Enter your 4-digit PIN';
                input.value = '';
                overlay.style.display = 'flex';
                input.focus();
                function close(val) {
                    overlay.style.display = 'none';
                    input.value = '';
                    cancelBtn.onclick = null;
                    okBtn.onclick = null;
                    overlay.onclick = null;
                    resolve(val);
                }
                cancelBtn.onclick = function () { close(null); };
                okBtn.onclick = function () { close(input.value); };
                overlay.onclick = function (e) { if (e.target === overlay) close(null); };
                input.onkeydown = function (e) {
                    if (e.key === 'Enter') close(input.value);
                    if (e.key === 'Escape') close(null);
                };
            });
        }

        async function tryPinGate() {
            try {
                if (!isPinEnabled()) return;
                if (!hasRememberedSupplierSession()) return;

                const pin = await showPinModal('Enter your 4-digit PIN');
                if (pin === null) return;
                const ok = await verifyPin(pin);
                if (!ok) { showError('Wrong PIN.', { title: 'Invalid PIN' }); return; }

                window.location.href = 'dashboard.html';
            } catch (e) {}
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('passwordToggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function validateForm() {
            document.querySelectorAll('.form-group').forEach(g => g.classList.remove('error'));
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email && !password) {
                showError('Please enter your email and password.', { title: 'Required' });
                document.getElementById('email').closest('.form-group').classList.add('error');
                document.getElementById('password').closest('.form-group').classList.add('error');
                return false;
            }
            if (!email) {
                showError('Please enter your email.', { title: 'Required' });
                document.getElementById('email').closest('.form-group').classList.add('error');
                return false;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('Please enter a valid email address.', { title: 'Invalid Email' });
                document.getElementById('email').closest('.form-group').classList.add('error');
                return false;
            }
            if (!password) {
                showError('Please enter your password.', { title: 'Required' });
                document.getElementById('password').closest('.form-group').classList.add('error');
                return false;
            }
            if (password.length < 6) {
                showError('Password must be at least 6 characters.', { title: 'Invalid Password' });
                document.getElementById('password').closest('.form-group').classList.add('error');
                return false;
            }
            return true;
        }

        async function finishLogin(matched, rememberMe, emailUsed, passwordUsed) {
            const authData = {
                email: matched.email,
                firstName: matched.firstName || (matched.contactName && matched.contactName.split(' ')[0]) || '',
                lastName: matched.lastName || (matched.contactName && matched.contactName.split(' ').slice(1).join(' ')) || '',
                contactName: matched.contactName || '',
                companyName: matched.companyName || matched.businessName || '',
                businessName: matched.businessName || '',
                phone: matched.phone || '',
                supplierId: matched.supplierId || matched.id || '',
                country: matched.country || '',
                profileComplete: matched.profileComplete || false,
                isLoggedIn: true,
                loginTime: new Date().toISOString(),
                rememberMe: rememberMe,
                userType: 'supplier'
            };
            localStorage.setItem('supplierAuth', JSON.stringify(authData));
            try { localStorage.setItem('ab.portal.lastRole', 'supplier'); } catch (e) {}

            // PIN lock uses localStorage only; nothing extra to save here.

            showSuccess('Welcome back! Redirecting...');
            setTimeout(function () { window.location.href = 'dashboard.html'; }, 200);
        }

        // Gate dashboard access with PIN (if enabled)
        document.addEventListener('DOMContentLoaded', function () {
            tryPinGate();
        });

        async function loginWithCredentials(email, password, rememberMe, fromBiometric) {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
            if (!authSdk || !db) {
                if (!fromBiometric) showError('Login service unavailable. Try again later.');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            if (submitBtn) {
                submitBtn.classList.add('loading');
                submitBtn.disabled = true;
            }

            let legacyLookupPromise = null;
            try {
                legacyLookupPromise = db.ref('suppliers').orderByChild('email').equalTo(email).limitToFirst(1).once('value');
            } catch (e) {
                legacyLookupPromise = null;
            }

            try {
                const authPromise = authSdk.signInWithEmailAndPassword(email, password);
                const timeoutPromise = new Promise(function (_, reject) {
                    setTimeout(function () { reject(new Error('timeout')); }, 12000);
                });
                const cred = await Promise.race([authPromise, timeoutPromise]);
                const uid = cred && cred.user ? cred.user.uid : null;
                if (!uid) throw new Error('auth_failed');

                let matched = null;
                try {
                    const cachedRaw = localStorage.getItem('supplierAuth') || localStorage.getItem('lastSupplierProfile');
                    if (cachedRaw) {
                        const cached = JSON.parse(cachedRaw);
                        if (cached && cached.firebaseUid === uid) matched = cached;
                    }
                } catch (e) {}

                if (!matched) {
                    const snap = await db.ref('suppliers').orderByChild('firebaseUid').equalTo(uid).limitToFirst(1).once('value');
                    if (snap && snap.exists()) {
                        snap.forEach(function (child) {
                            const supplier = child.val() || {};
                            if (!supplier.supplierId) supplier.supplierId = child.key;
                            if (!supplier.id) supplier.id = child.key;
                            matched = supplier;
                        });
                    }
                }

                if (!matched) {
                    try { await authSdk.signOut(); } catch (e) {}
                    if (!fromBiometric) showError('No supplier profile found. Please sign up first.', { title: 'Login Failed' });
                    return;
                }

                try { await enforceTwoFAIfEnabled('supplier'); } catch (e) { if (!fromBiometric) showError('Two‑Step Verification failed.', { title: 'Login Failed' }); return; }
                await finishLogin(matched, rememberMe, email, password);
            } catch (err) {
                console.error('Login error:', err);
                if (!fromBiometric) {
                    const code = err && err.code ? String(err.code) : '';
                    const msg = err && err.message ? String(err.message) : '';
                    const looksLikeInvalidCreds = msg.includes('INVALID_LOGIN_CREDENTIALS') || msg.includes('INVALID_PASSWORD') || msg.includes('invalid login credentials');
                    if (code === 'auth/user-not-found' || code === 'auth/invalid-login-credentials' || code === 'auth/invalid-credential' || (code === 'auth/internal-error' && looksLikeInvalidCreds)) {
                        try {
                            const legacySnap = legacyLookupPromise ? await legacyLookupPromise : await db.ref('suppliers').orderByChild('email').equalTo(email).limitToFirst(1).once('value');
                            let legacy = null;
                            let legacyKey = '';
                            if (legacySnap && legacySnap.exists()) {
                                legacySnap.forEach(function (child) {
                                    legacy = child.val() || {};
                                    legacyKey = child.key;
                                });
                            }
                            if (legacy && legacyKey) {
                                if (legacy.password && legacy.password === password) {
                                    const newCred = await authSdk.createUserWithEmailAndPassword(email, password);
                                    const uid = newCred && newCred.user ? newCred.user.uid : '';
                                    if (!uid) throw new Error('auth_failed');
                                    await db.ref('suppliers/' + legacyKey).update({ firebaseUid: uid });
                                    try { await db.ref('suppliers/' + legacyKey + '/password').remove(); } catch (e) {}
                                    legacy.firebaseUid = uid;
                                    if (!legacy.supplierId) legacy.supplierId = legacyKey;
                                    if (!legacy.id) legacy.id = legacyKey;
                                    await finishLogin(legacy, rememberMe, email, password);
                                    return;
                                }
                                showError('Wrong password.', { title: 'Login Failed' });
                                return;
                            }
                        } catch (e) {
                            console.error(e);
                        }
                        showError('Wrong email.', { title: 'Login Failed' });
                    }
                    else if (code === 'auth/wrong-password') showError('Wrong password.', { title: 'Login Failed' });
                    else if (code === 'auth/invalid-email') showError('Invalid email address.', { title: 'Login Failed' });
                    else showError(err && err.message === 'timeout' ? 'Connection slow. Check internet & try again.' : 'Login failed. Please try again.');
                }
            } finally {
                if (submitBtn) {
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                }
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            if (!validateForm()) return;
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            loginWithCredentials(email, password, rememberMe, false);
        });

        const TWO_FA_BASE = 'https://us-central1-alpha-brokerage.cloudfunctions.net';

        async function enforceTwoFAIfEnabled(role) {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || !authSdk.currentUser) return;
            let idToken = '';
            try {
                idToken = await authSdk.currentUser.getIdToken();
            } catch (e) {
                return;
            }
            try {
                const stResp = await fetch(TWO_FA_BASE + '/twoFAStatusPublic?role=' + encodeURIComponent(role), {
                    headers: { 'Authorization': 'Bearer ' + idToken }
                });
                if (!stResp || !stResp.ok) return;
                let st = null;
                try { st = await stResp.json(); } catch (e) {}
                if (!st || !st.enforce) return;
                await promptTwoFACode(role);
            } catch (e) {
                return;
            }
        }

        async function promptTwoFACode(role) {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            const idToken = authSdk && authSdk.currentUser ? await authSdk.currentUser.getIdToken() : '';
            return new Promise((resolve, reject) => {
                let overlay = document.getElementById('twoFAOverlay');
                if (!overlay) {
                    overlay = document.createElement('div');
                    overlay.id = 'twoFAOverlay';
                    overlay.style.position = 'fixed';
                    overlay.style.inset = '0';
                    overlay.style.background = 'rgba(15,23,42,0.55)';
                    overlay.style.backdropFilter = 'blur(6px)';
                    overlay.style.display = 'flex';
                    overlay.style.alignItems = 'center';
                    overlay.style.justifyContent = 'center';
                    overlay.style.zIndex = '9999';
                    overlay.innerHTML = '<div style="width:100%;max-width:420px;background:#fff;border-radius:18px;padding:1.25rem;border:1px solid rgba(148,163,184,0.18);box-shadow:0 14px 40px rgba(2,6,23,0.08);text-align:center;"><div style="font-weight:800;color:#0F172A;margin-bottom:0.5rem;">Two‑Step Verification</div><div style="color:#64748B;font-size:0.875rem;margin-bottom:0.75rem;">Enter the 6‑digit code from Google Authenticator</div><input id="twoFAToken" inputmode="numeric" pattern="\\d{6}" maxlength="6" style="width:100%;padding:0.75rem 1rem;border:1px solid rgba(148,163,184,0.25);border-radius:12px;font-size:1rem;letter-spacing:6px;text-align:center;" placeholder="••••••"/><div id="twoFAError" style="color:#EF4444;font-size:0.875rem;margin-top:0.5rem;"></div><button id="twoFABtn" style="margin-top:0.75rem;width:100%;padding:0.9rem;background:linear-gradient(135deg,#0B0F19,#111827);color:#fff;border:none;border-radius:12px;font-weight:800;">Verify</button></div>';
                    document.body.appendChild(overlay);
                } else {
                    overlay.style.display = 'flex';
                }
                const btn = document.getElementById('twoFABtn');
                const err = document.getElementById('twoFAError');
                const tokenInput = document.getElementById('twoFAToken');
                err.textContent = '';
                btn.onclick = async () => {
                    const token = (tokenInput.value || '').trim();
                    if (!/^[0-9]{6}$/.test(token)) { err.textContent = 'Enter 6‑digit code'; return; }
                    btn.disabled = true;
                    btn.textContent = 'Verifying...';
                    try {
                        const resp = await fetch(TWO_FA_BASE + '/twoFAVerifyPublic', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + idToken },
                            body: JSON.stringify({ role, token })
                        });
                        const js = await resp.json();
                        if (js && js.success) {
                            overlay.style.display = 'none';
                            resolve(true);
                        } else {
                            err.textContent = (js && js.error && js.error.message) ? js.error.message : 'Invalid code';
                        }
                    } catch (e) {
                        err.textContent = 'Verification failed. Try again.';
                    } finally {
                        btn.disabled = false;
                        btn.textContent = 'Verify';
                    }
                };
            });
        }

        var GOOGLE_CLIENT_ID = '834712514965-j9od0ea97k00nvkg92214eas912n8n5v.apps.googleusercontent.com';
        function signInWithGoogle() {
            if (typeof google === 'undefined' || !google.accounts || !google.accounts.id) {
                showError('Google Sign-In is not available. Use email login.');
                return;
            }
            google.accounts.id.prompt();
        }

        async function handleGoogleIdCredentialResponse(response) {
            try {
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
                if (!authSdk || !db) throw new Error('Auth/DB unavailable');

                const idToken = response && response.credential ? String(response.credential) : '';
                if (!idToken) throw new Error('Missing credential');

                const providerCred = firebase.auth.GoogleAuthProvider.credential(idToken);
                const userCred = await authSdk.signInWithCredential(providerCred);
                const uid = userCred && userCred.user ? userCred.user.uid : '';
                if (!uid) throw new Error('Google sign-in failed');

                const snap = await db.ref('suppliers').orderByChild('firebaseUid').equalTo(uid).limitToFirst(1).once('value');
                let matched = null;
                if (snap && snap.exists()) {
                    snap.forEach(function (child) {
                        var s = child.val() || {};
                        if (!s.supplierId) s.supplierId = child.key;
                        if (!s.id) s.id = child.key;
                        matched = s;
                    });
                }
                if (matched) {
                    try { await enforceTwoFAIfEnabled('supplier'); } catch (e) {
                        try { await authSdk.signOut(); } catch (e2) {}
                        showError('Two‑Step Verification failed.', { title: 'Login Failed' });
                        return;
                    }
                    finishLogin(matched, false);
                } else {
                    try { await authSdk.signOut(); } catch (e) {}
                    showError('No supplier account found for this email. Please sign up first.');
                }
            } catch (e) {
                console.error(e);
                showError('Google sign-in failed. Please try again.');
            }
        }

        function handleForgotPassword() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk) {
                showError('Password reset unavailable right now.');
                return;
            }
            const email = document.getElementById('email').value.trim().toLowerCase();
            if (!email) {
                showError('Please enter your email first.');
                return;
            }
            authSdk.sendPasswordResetEmail(email)
                .then(function () { showSuccess('Password reset email sent. Check your inbox.'); })
                .catch(function (err) {
                    const code = err && err.code ? String(err.code) : '';
                    if (code === 'auth/user-not-found') showError('No account found with this email.');
                    else if (code === 'auth/invalid-email') showError('Invalid email address.');
                    else showError('Failed to send reset email. Please try again.');
                });
        }

        window.addEventListener('load', function () {
            if (typeof google === 'undefined' || !google.accounts || !google.accounts.id) return;
            try {
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: handleGoogleIdCredentialResponse
                });
            } catch (e) {}
        });
    </script>
</body>
