    <script>
        let currentReceiptData = null;

        function formatCurrency(amount) {
            const num = parseFloat(amount) || 0;
            return 'Â£' + num.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatDate(value) {
            if (!value) return '-';
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return '-';
            return d.toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return;
            if (authSdk.currentUser) return;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => { if (!done) { done = true; resolve(); } }, 2500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (!done) { done = true; clearTimeout(timer); try { unsub(); } catch(e){}; resolve(); }
                });
            });
        }

        let pageMode = 'receipt';

        function parseParams() {
            const params = new URLSearchParams(location.search);
            pageMode = (params.get('mode') || 'receipt').toLowerCase();
            return {
                loadId: params.get('loadId') || '',
                paymentId: params.get('paymentId') || '',
                mode: pageMode
            };
        }

        function getReceiptShareText() {
            if (!currentReceiptData) return '';
            const r = currentReceiptData;
            const header = pageMode === 'invoice' ? 'Alpha Freight - Supplier Invoice' : 'Alpha Freight - Supplier Receipt';
            const lines = [
                header,
                `${pageMode === 'invoice' ? 'Invoice' : 'Receipt'}: ${r.paymentRef || '-'}`,
                `Load: ${r.loadShort}`,
                `Date: ${r.paidAt}`,
                `Route: ${r.route}`,
                `Budget: ${r.budget}`,
                `Commission: ${r.commission}`,
                `Total Paid: ${r.totalPaid}`
            ];
            return lines.join('\n');
        }

        function getQrDataString() {
            try {
                if (location && location.href && location.href.startsWith('http')) return location.href;
            } catch (e) {}
            return getReceiptShareText();
        }

        function getQrUrl(data, size) {
            const s = size || 220;
            return `https://api.qrserver.com/v1/create-qr-code/?size=${s}x${s}&margin=0&data=${encodeURIComponent(data || '')}`;
        }

        function loadImage(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error('Image failed'));
                img.src = url;
            });
        }

        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            const words = String(text || '').split(' ');
            let line = '';
            for (let i = 0; i < words.length; i++) {
                const testLine = line ? (line + ' ' + words[i]) : words[i];
                const metrics = ctx.measureText(testLine);
                if (metrics.width > maxWidth && line) {
                    ctx.fillText(line, x, y);
                    line = words[i];
                    y += lineHeight;
                } else {
                    line = testLine;
                }
            }
            if (line) {
                ctx.fillText(line, x, y);
                y += lineHeight;
            }
            return y;
        }

        async function generateReceiptImageBlob() {
            const r = currentReceiptData;
            const width = 1080;
            const padding = 64;
            const lineHeight = 46;

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = 1500;
            const ctx = canvas.getContext('2d');
            if (!ctx) throw new Error('Canvas not supported');

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            function roundRectPath(x, y, w, h, r) {
                const rr = Math.min(r, w / 2, h / 2);
                ctx.beginPath();
                ctx.moveTo(x + rr, y);
                ctx.arcTo(x + w, y, x + w, y + h, rr);
                ctx.arcTo(x + w, y + h, x, y + h, rr);
                ctx.arcTo(x, y + h, x, y, rr);
                ctx.arcTo(x, y, x + w, y, rr);
                ctx.closePath();
            }

            const headerH = 170;
            const head = ctx.createLinearGradient(0, 0, width, 0);
            head.addColorStop(0, '#0f172a');
            head.addColorStop(1, '#1e3a8a');
            ctx.fillStyle = head;
            ctx.fillRect(0, 0, width, headerH);

            ctx.fillStyle = '#ffffff';
            ctx.font = '950 54px system-ui, -apple-system, "Segoe UI", sans-serif';
            ctx.fillText('Alpha Freight', padding, 78);
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            ctx.font = '800 28px system-ui, -apple-system, "Segoe UI", sans-serif';
            ctx.fillText(pageMode === 'invoice' ? 'Invoice' : 'Payment Receipt', padding, 122);

            const badgeW = 140;
            const badgeH = 46;
            const state = currentReceiptData && currentReceiptData.paymentState ? String(currentReceiptData.paymentState).toLowerCase() : '';
            const badgeText = state === 'refunded' ? 'REFUND' : (state === 'paid' || state === 'completed' || state === 'success') ? 'PAID' : 'UNPAID';
            ctx.fillStyle = badgeText === 'PAID' ? 'rgba(5, 150, 105, 0.18)' : badgeText === 'REFUND' ? 'rgba(217, 119, 6, 0.18)' : 'rgba(220, 38, 38, 0.18)';
            roundRectPath(width - padding - badgeW, 56, badgeW, badgeH, 999);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.font = '950 24px system-ui, -apple-system, "Segoe UI", sans-serif';
            ctx.fillText(badgeText, width - padding - badgeW + 24, 86);

            const cardX = padding;
            const cardY = headerH + 42;
            const cardW = width - padding * 2;
            const cardR = 26;
            const cardH = 980;

            ctx.save();
            ctx.shadowColor = 'rgba(2, 6, 23, 0.14)';
            ctx.shadowBlur = 26;
            ctx.shadowOffsetY = 14;
            roundRectPath(cardX, cardY, cardW, cardH, cardR);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.restore();
            roundRectPath(cardX, cardY, cardW, cardH, cardR);
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 2;
            ctx.stroke();

            let y = cardY + 64;
            const tx = cardX + 44;
            const maxX = cardX + cardW - 44;

            ctx.fillStyle = '#0f172a';
            ctx.font = '950 38px system-ui, -apple-system, "Segoe UI", sans-serif';
            ctx.fillText('Details', tx, y);
            y += 44;

            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(tx, y);
            ctx.lineTo(maxX, y);
            ctx.stroke();
            y += 42;

            const details = [
                ['Load', r.loadShort],
                ['Date', r.paidAt],
                ['Reference', r.paymentRef || '-']
            ];
            details.forEach(([k, v]) => {
                ctx.fillStyle = '#475569';
                ctx.font = '900 26px system-ui, -apple-system, "Segoe UI", sans-serif';
                ctx.fillText(k, tx, y);
                ctx.fillStyle = '#0f172a';
                ctx.font = '950 26px system-ui, -apple-system, "Segoe UI", sans-serif';
                const val = String(v || '');
                const tw = ctx.measureText(val).width;
                ctx.fillText(val, maxX - tw, y);
                y += 48;
                ctx.strokeStyle = 'rgba(226,232,240,1)';
                ctx.beginPath();
                ctx.moveTo(tx, y);
                ctx.lineTo(maxX, y);
                ctx.stroke();
                y += 34;
            });

            y += 10;
            ctx.fillStyle = '#0f172a';
            ctx.font = '950 38px system-ui, -apple-system, "Segoe UI", sans-serif';
            ctx.fillText('Route', tx, y);
            y += 44;
            ctx.strokeStyle = '#e2e8f0';
            ctx.beginPath();
            ctx.moveTo(tx, y);
            ctx.lineTo(maxX, y);
            ctx.stroke();
            y += 44;

            ctx.fillStyle = '#334155';
            ctx.font = '900 26px system-ui, -apple-system, "Segoe UI", sans-serif';
            y = wrapText(ctx, String(r.route || ''), tx, y, maxX - tx, lineHeight) + 22;

            y += 8;
            ctx.fillStyle = '#0f172a';
            ctx.font = '950 38px system-ui, -apple-system, "Segoe UI", sans-serif';
            ctx.fillText('Amounts', tx, y);
            y += 44;
            ctx.strokeStyle = '#e2e8f0';
            ctx.beginPath();
            ctx.moveTo(tx, y);
            ctx.lineTo(maxX, y);
            ctx.stroke();
            y += 44;

            const rows = [
                ['Budget', r.budget, '#0f172a'],
                ['Commission', r.commission, '#0f172a'],
                ['Total Paid', r.totalPaid, '#059669']
            ];
            rows.forEach(([k, v, color], idx) => {
                ctx.fillStyle = '#475569';
                ctx.font = '900 26px system-ui, -apple-system, "Segoe UI", sans-serif';
                ctx.fillText(k, tx, y);
                ctx.fillStyle = color;
                ctx.font = idx === 2 ? '950 30px system-ui, -apple-system, "Segoe UI", sans-serif' : '950 26px system-ui, -apple-system, "Segoe UI", sans-serif';
                const val = String(v || '');
                const tw = ctx.measureText(val).width;
                ctx.fillText(val, maxX - tw, y);
                y += 48;
                if (idx < 2) {
                    ctx.strokeStyle = '#e2e8f0';
                    ctx.beginPath();
                    ctx.moveTo(tx, y);
                    ctx.lineTo(maxX, y);
                    ctx.stroke();
                    y += 34;
                }
            });

            const qrSize = 220;
            const qrData = r.qrData || getQrDataString();
            const qrUrl = getQrUrl(qrData, qrSize);
            try {
                const qrImg = await loadImage(qrUrl);
                const qrX = maxX - qrSize;
                const qrY = cardY + cardH - qrSize - 56;
                ctx.fillStyle = '#ffffff';
                roundRectPath(qrX - 18, qrY - 18, qrSize + 36, qrSize + 36, 22);
                ctx.fill();
                ctx.strokeStyle = '#e2e8f0';
                ctx.stroke();
                ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);
                ctx.fillStyle = '#475569';
                ctx.font = '900 22px system-ui, -apple-system, "Segoe UI", sans-serif';
                ctx.fillText('Scan', qrX, qrY + qrSize + 34);
            } catch (e) {}

            const finalHeight = Math.min(Math.max(cardY + cardH + 90, 1200), 2200);
            if (finalHeight !== canvas.height) {
                const out = document.createElement('canvas');
                out.width = canvas.width;
                out.height = finalHeight;
                const octx = out.getContext('2d');
                octx.drawImage(canvas, 0, 0);
                return await new Promise((resolve, reject) => {
                    out.toBlob((blob) => blob ? resolve(blob) : reject(new Error('Failed to create image')), 'image/png', 1);
                });
            }

            return await new Promise((resolve, reject) => {
                canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error('Failed to create image')), 'image/png', 1);
            });
        }

        async function downloadReceipt() {
            if (!currentReceiptData) return;
            const blob = await generateReceiptImageBlob();
            const name = `receipt-${currentReceiptData.loadShort}.png`;
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            document.body.appendChild(a);
            a.click();
            a.remove();
            setTimeout(() => { URL.revokeObjectURL(url); }, 1500);
        }

        async function sendWhatsApp() {
            if (!currentReceiptData) return;
            const btn = document.getElementById('btnWhatsApp');
            if (btn) btn.disabled = true;

            try {
                const blob = await generateReceiptImageBlob();
                const file = new File([blob], `receipt-${currentReceiptData.loadShort}.png`, { type: 'image/png' });

                if (navigator.share && (!navigator.canShare || navigator.canShare({ files: [file] }))) {
                    await navigator.share({
                        title: 'Receipt',
                        text: 'Alpha Freight Receipt',
                        files: [file]
                    });
                    return;
                }

                try {
                    if (navigator.clipboard && window.ClipboardItem) {
                        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                    }
                } catch (e) {}

                await downloadReceipt();
                const url = 'https://wa.me/?text=' + encodeURIComponent(getReceiptShareText());
                window.open(url, '_blank');
            } catch (e) {
                const url = 'https://wa.me/?text=' + encodeURIComponent(getReceiptShareText());
                window.open(url, '_blank');
            } finally {
                if (btn) btn.disabled = false;
            }
        }

        function renderReceipt(loadId, load, payment) {
            const amount = parseFloat(load.commissionBaseAmount || load.price || load.budget || load.maxBudget || load.minBudget || 0) || 0;
            const commission = parseFloat(load.supplierCommission || (load.supplierCommissionRate ? amount * parseFloat(load.supplierCommissionRate) : 0)) || 0;
            const total = parseFloat(load.totalAmount || load.totalCost || (amount + commission)) || (amount + commission);

            const pickup = load.pickupLocation || load.pickup_location || '-';
            const delivery = load.deliveryLocation || load.delivery_location || '-';
            const route = `${pickup} â†’ ${delivery}`;
            const paidAt = (load.paymentStatus && (load.paymentStatus.paidAt || load.paymentStatus.completedAt)) || load.paidAt || (payment && payment.createdAt) || load.updatedAt || load.createdAt;
            const method = (load.paymentStatus && load.paymentStatus.method) || (payment && payment.method) || '-';
            const intent = (load.paymentStatus && load.paymentStatus.paymentIntentId) || (payment && payment.paymentIntentId) || '-';
            const paymentRef = (payment && payment.paymentId) ? payment.paymentId : ((load.paymentStatus && load.paymentStatus.paymentId) ? load.paymentStatus.paymentId : '');
            const invoiceNumber = (load && (load.invoiceNumber || (load.paymentStatus && load.paymentStatus.invoiceNumber))) ? String(load.invoiceNumber || load.paymentStatus.invoiceNumber) : '';
            const paymentState = String((load.paymentStatus && load.paymentStatus.status) || (payment && payment.status) || '').toLowerCase();
            const refundState = String(load.refundStatus || (load.refundRequest && load.refundRequest.status) || '').toLowerCase();
            const docTitle = pageMode === 'invoice' ? 'Invoice' : 'Payment Receipt';
            const docSub = pageMode === 'invoice' ? 'Supplier Invoice' : 'Supplier Payment Receipt';
            const stateLabel = paymentState === 'refunded' ? 'Refunded' : (paymentState === 'paid' || paymentState === 'completed' || paymentState === 'success') ? 'Paid' : 'Unpaid';
            const statePill = paymentState === 'refunded' ? 'warning' : (stateLabel === 'Paid' ? 'success' : 'warning');
            const stateIcon = paymentState === 'refunded' ? 'fa-rotate-left' : (stateLabel === 'Paid' ? 'fa-circle-check' : 'fa-circle-exclamation');

            document.getElementById('subtitle').textContent = `Load #${loadId.slice(0, 10)}`;
            const content = document.getElementById('contentArea');
            const qrData = getQrDataString();
            const qrUrl = getQrUrl(qrData, 220);
            const docRefLabel = pageMode === 'invoice' ? (invoiceNumber || paymentRef) : paymentRef;
            const subRefText = pageMode === 'invoice'
              ? (invoiceNumber ? ` â€¢ Invoice #${escapeHtml(String(invoiceNumber))}` : (paymentRef ? ` â€¢ Invoice #${escapeHtml(String(paymentRef).slice(0, 10))}` : ''))
              : (paymentRef ? ` â€¢ Receipt #${escapeHtml(String(paymentRef).slice(0, 10))}` : '');

            content.innerHTML = `
                <div class="brand">
                    <h2>Alpha Freight</h2>
                    <p>${escapeHtml(docSub)}</p>
                </div>
                <div class="receipt-head">
                    <div>
                        <div class="receipt-title">${escapeHtml(docTitle)}</div>
                        <div class="receipt-sub">Load #${escapeHtml(String(loadId).slice(0, 10))}${subRefText}</div>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:0.5rem;align-items:flex-end;">
                        <span class="pill ${statePill}"><i class="fas ${stateIcon}"></i> ${stateLabel}</span>
                        <span class="pill primary"><i class="fas fa-credit-card"></i> ${escapeHtml(String(method).toUpperCase())}</span>
                        ${refundState === 'pending' ? `<span class="pill warning"><i class="fas fa-hourglass-half"></i> Refund Pending</span>` : ''}
                    </div>
                </div>
                <div class="box">
                    <div class="box-row"><div class="box-k">Date</div><div class="box-v">${escapeHtml(formatDate(paidAt))}</div></div>
                    <div class="box-row"><div class="box-k">Reference</div><div class="box-v">${escapeHtml(docRefLabel || intent || '-')}</div></div>
                    <div class="box-row"><div class="box-k">Intent</div><div class="box-v">${escapeHtml(intent || '-')}</div></div>
                </div>
                <div class="route">
                    <div class="route-row"><div class="route-label">From</div><div class="route-value">${escapeHtml(pickup)}</div></div>
                    <div class="route-row"><div class="route-label">To</div><div class="route-value">${escapeHtml(delivery)}</div></div>
                </div>
                <div class="box">
                    <div class="box-row"><div class="box-k">Budget</div><div class="box-v">${escapeHtml(formatCurrency(amount))}</div></div>
                    <div class="box-row"><div class="box-k">Commission</div><div class="box-v">${escapeHtml(formatCurrency(commission))}</div></div>
                    <div class="box-row"><div class="box-k">Total Paid</div><div class="box-v" style="color:var(--success);font-size:1.05rem;">${escapeHtml(formatCurrency(total))}</div></div>
                </div>
                <div class="status"><i class="fas fa-circle-check"></i> Payment Completed</div>
                <div class="qr-box">
                    <div>
                        <div class="qr-title">QR Receipt</div>
                        <div class="qr-sub">Scan to open this receipt</div>
                    </div>
                    <img class="qr-img" alt="QR" src="${escapeHtml(qrUrl)}">
                </div>
            `;

            currentReceiptData = {
                loadId: loadId,
                paymentState: paymentState || null,
                refundState: refundState || null,
                paymentRef: (pageMode === 'invoice' ? (invoiceNumber || paymentRef) : paymentRef) || null,
                loadShort: String(loadId).slice(0, 10),
                paidAt: formatDate(paidAt),
                route,
                budget: formatCurrency(amount),
                commission: formatCurrency(commission),
                totalPaid: formatCurrency(total),
                qrData: qrData
            };

            const waBtn = document.getElementById('btnWhatsApp');
            if (waBtn) waBtn.disabled = false;
            const refundBtn = document.getElementById('btnRefund');
            const canRefund = (paymentState === 'paid' || paymentState === 'completed' || paymentState === 'success') && refundState !== 'pending' && paymentState !== 'refunded';
            if (refundBtn) refundBtn.style.display = canRefund ? '' : 'none';
            document.getElementById('actions').style.display = 'grid';
        }

        async function requestRefund() {
            if (!currentReceiptData || !currentReceiptData.loadId) return;
            const loadId = currentReceiptData.loadId;
            const reason = (prompt('Refund reason (required):') || '').trim();
            if (reason.length < 3) return;
            if (!confirm('Confirm refund request?')) return;
            const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
            if (!db) return;
            try {
                await ensureAuthReady();
                let load = {};
                try {
                    const loadSnap = await db.ref('loads/' + loadId).once('value');
                    load = loadSnap.val() || {};
                } catch (e) {}

                let supplierAuth = null;
                try { supplierAuth = JSON.parse(localStorage.getItem('supplierAuth') || localStorage.getItem('lastSupplierProfile') || 'null'); } catch (e) { supplierAuth = null; }
                const supplierId = (supplierAuth && (supplierAuth.supplierId || supplierAuth.id)) ? (supplierAuth.supplierId || supplierAuth.id) : (load && load.supplierId ? load.supplierId : null);
                const carrierId = load && (load.carrierId || load.assignedCarrier) ? (load.carrierId || load.assignedCarrier) : null;

                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                const supplierFirebaseUid = (authSdk && authSdk.currentUser && authSdk.currentUser.uid) ? authSdk.currentUser.uid : (supplierAuth && supplierAuth.firebaseUid ? supplierAuth.firebaseUid : null);
                const carrierFirebaseUid = load && load.carrierFirebaseUid ? load.carrierFirebaseUid : null;

                const refundRef = db.ref('refunds').push();
                const refundId = refundRef.key;
                await refundRef.set({
                    refundId,
                    loadId,
                    supplierId: supplierId || null,
                    supplierFirebaseUid: supplierFirebaseUid || null,
                    carrierId: carrierId || null,
                    carrierFirebaseUid: carrierFirebaseUid || null,
                    reason,
                    status: 'pending',
                    requestedByRole: 'supplier',
                    createdAt: new Date().toISOString()
                });
                await db.ref('loads/' + loadId).update({
                    refundStatus: 'pending',
                    refundRequestId: refundId,
                    refundRequest: {
                        status: 'pending',
                        reason,
                        createdAt: new Date().toISOString()
                    }
                });
                const refundBtn = document.getElementById('btnRefund');
                if (refundBtn) refundBtn.style.display = 'none';
                alert('Refund request submitted.');
            } catch (e) {
                console.error(e);
                alert('Failed to request refund.');
            }
        }

        async function init() {
            const { loadId, paymentId } = parseParams();
            if (!loadId) {
                document.getElementById('contentArea').innerHTML = `
                    <div class="empty">
                        <i class="fas fa-receipt"></i>
                        <h3>Missing receipt</h3>
                        <p>Load ID not found</p>
                    </div>
                `;
                return;
            }

            const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
            if (!db) {
                document.getElementById('contentArea').innerHTML = `
                    <div class="empty">
                        <i class="fas fa-triangle-exclamation"></i>
                        <h3>Service unavailable</h3>
                        <p>Try again</p>
                    </div>
                `;
                return;
            }

            try {
                await ensureAuthReady();
                const loadSnap = await db.ref('loads/' + loadId).once('value');
                if (!loadSnap.exists()) {
                    document.getElementById('contentArea').innerHTML = `
                        <div class="empty">
                            <i class="fas fa-user-slash"></i>
                            <h3>Receipt not found</h3>
                            <p>Load does not exist</p>
                        </div>
                    `;
                    return;
                }
                const load = loadSnap.val() || {};

                let payment = null;
                if (paymentId) {
                    try {
                        const pSnap = await db.ref('payments/' + paymentId).once('value');
                        if (pSnap.exists()) payment = pSnap.val() || null;
                    } catch (e) {}
                }

                renderReceipt(loadId, load, payment);
            } catch (e) {
                document.getElementById('contentArea').innerHTML = `
                    <div class="empty">
                        <i class="fas fa-triangle-exclamation"></i>
                        <h3>Failed to load</h3>
                        <p>${escapeHtml((e && (e.code || e.message)) ? (e.code || e.message) : 'Try again')}</p>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
