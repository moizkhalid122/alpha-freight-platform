<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Step Verification - Alpha Freight</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary:#2563EB; --primary2:#1E40AF; --navy:#0B1220; --dark:#0F172A; --muted:#64748B; --bg:#F1F5F9; --card:#fff; --border:#E2E8F0; --shadow:0 18px 50px rgba(2,6,23,.10); --shadow2:0 10px 30px rgba(2,6,23,.10); --radius:22px; --radius2:16px; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(180deg,#E2E8F0 0%, var(--bg) 22%, #F8FAFC 100%);min-height:100vh;color:var(--dark);padding-bottom:24px}
        .wrap{max-width:520px;margin:0 auto}
        .header{background:linear-gradient(180deg,var(--navy) 0%, #111B31 55%, var(--primary2) 100%);color:#fff;padding:1.25rem 1.25rem 1.1rem;display:flex;gap:1rem;align-items:center;position:sticky;top:0;z-index:5;box-shadow:0 18px 40px rgba(2,6,23,.18)}
        .back{width:44px;height:44px;border-radius:14px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none}
        .title{font-weight:800;letter-spacing:-.02em}
        .sub{font-size:.875rem;opacity:.92}
        .card{background:var(--card);margin:1rem 1.25rem 0;padding:1.1rem;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow)}
        .opt{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1.05rem;border-radius:var(--radius2);border:1px solid rgba(148,163,184,.22);background:linear-gradient(180deg, rgba(241,245,249,.85), rgba(241,245,249,.55));width:100%;text-align:left}
        .opt + .opt{margin-top:.85rem}
        .opt:active{transform:translateY(1px)}
        .opt .left{display:flex;gap:.9rem;align-items:flex-start;min-width:0}
        .opt i{font-size:1.2rem;color:var(--primary);width:26px;text-align:center;margin-top:.12rem}
        .opt .h{font-weight:900;color:var(--dark);letter-spacing:-.01em}
        .opt .p{font-size:.875rem;color:var(--muted);margin-top:.1rem}
        .pill{display:inline-flex;align-items:center;gap:.35rem;padding:.28rem .55rem;border-radius:999px;border:1px solid rgba(37,99,235,.22);background:rgba(37,99,235,.10);color:#1E40AF;font-weight:800;font-size:.74rem}
        .cta{display:inline-flex;align-items:center;gap:.45rem;border:none;background:linear-gradient(135deg,#0B0F19,#111827);color:#fff;border-radius:14px;padding:.72rem .9rem;font-weight:900}
        .note{margin-top:.95rem;color:var(--muted);font-size:.875rem;display:flex;gap:.6rem;align-items:flex-start}
        .note i{color:var(--primary);margin-top:.1rem}
    </style>
    <link rel="stylesheet" href="../../assets/css/supplier-ultra-premium.css?v=1">
    <script src="../../assets/js/app-resume-fix.js"></script>
</head>
<body>
    <div class="wrap">
        <div class="header">
            <a href="profile.html" class="back" aria-label="Back"><i class="fas fa-arrow-left"></i></a>
            <div>
                <div class="title">Twoâ€‘Step Verification</div>
                <div class="sub">Secure your account with an authenticator app</div>
            </div>
        </div>
        <div class="card">
            <button class="opt" type="button" onclick="go('qr')" aria-label="Connect with QR code">
                <span class="left">
                    <i class="fas fa-qrcode"></i>
                    <span style="min-width:0">
                        <div class="h">Connect with QR <span class="pill"><i class="fas fa-bolt"></i> Recommended</span></div>
                        <div class="p">Scan in Google Authenticator and verify</div>
                    </span>
                </span>
                <span class="cta">Start <i class="fas fa-arrow-right"></i></span>
            </button>
            <button class="opt" type="button" onclick="go('key')" aria-label="Connect with secret key">
                <span class="left">
                    <i class="fas fa-key"></i>
                    <span style="min-width:0">
                        <div class="h">Connect with Key</div>
                        <div class="p">Manual setup using your secret key</div>
                    </span>
                </span>
                <span class="cta">Start <i class="fas fa-arrow-right"></i></span>
            </button>
            <div class="note"><i class="fas fa-shield-halved"></i><div><div style="font-weight:800;color:var(--dark);">Works with any TOTP app</div><div style="margin-top:.15rem;">Google Authenticator, Microsoft Authenticator, Authy, etc.</div></div></div>
        </div>
    </div>
    <script>
        function go(m) {
            if (m === 'qr') window.location.href = 'twofa-qr.html';
            else window.location.href = 'twofa-key.html';
        }
    </script>
</body>
</html>
