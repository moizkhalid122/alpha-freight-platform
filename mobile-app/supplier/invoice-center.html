    <style>
        :root {
            --primary: #635bff;
            --primary-dark: #4f46e5;
            --primary-light: #8b5cf6;
            --accent: #06b6d4;
            --success: #059669;
            --error: #dc2626;
            --warning: #d97706;
            --text-dark: #0f172a;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --bg-main: #F6F7FB;
            --card-bg: rgba(255,255,255,0.92);
            --border: rgba(15,23,42,0.10);
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08), 0 2px 8px rgba(15, 23, 42, 0.04);
            --shadow-card: 0 14px 44px rgba(15, 23, 42, 0.10), 0 2px 8px rgba(15, 23, 42, 0.03);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 22px;
            --radius-sm: 14px;
            --page-pad: 18px;

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-main);
            min-height: 100vh;
            color: var(--text-dark);
            line-height: 1.55;
            overflow-x: hidden;
        }
        body::before{
            content:"";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(900px 520px at 14% 8%, rgba(99, 91, 255, 0.12), rgba(246,247,251,0) 62%),
                radial-gradient(900px 520px at 88% 22%, rgba(6, 182, 212, 0.10), rgba(246,247,251,0) 62%);
            pointer-events:none;
            z-index: 0;
        }
        body > *{ position: relative; z-index: 1; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(15, 23, 42, 0.16); border-radius: 10px; transition: background 0.3s var(--ease); }
        * { scrollbar-width: thin; scrollbar-color: rgba(15, 23, 42, 0.16) transparent; }

        .header {

        }
        .header-card{
            background: rgba(255,255,255,0.92);
            border: 1px solid rgba(15,23,42,0.10);
            border-radius: 28px;
            box-shadow: 0 18px 55px rgba(15,23,42,0.10);

        .header-card::before{

            background: radial-gradient(circle, rgba(99,91,255,0.12), rgba(246,247,251,0) 70%);

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="../../assets/js/firebase-init.js"></script>
    <script src="../../assets/js/alerts.js"></script>

    <script>
        const alertSystem = new AlertSystem();
        function showError(msg) { alertSystem.show('error', msg); }

        let allInvoices = [];
        let currentFilter = 'all';

        function getUserData() {
            const auth = localStorage.getItem('supplierAuth');
            return auth ? JSON.parse(auth) : null;
        }

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return false;
            if (authSdk.currentUser) return true;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => { if (!done) { done = true; resolve(); } }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
            return !!authSdk.currentUser;
        }

        async function resolveSupplierIdByUid(db, authUid, fallbackId) {
            if (!db || !authUid) return fallbackId || '';
            if (fallbackId) {
                try {
                    const snap = await db.ref('suppliers/' + String(fallbackId)).once('value');
                    if (snap.exists()) {
                        const v = snap.val() || {};
                        if (v.firebaseUid && String(v.firebaseUid) === String(authUid)) return String(fallbackId);
                    }
                } catch (e) {}
            }
            try {
                const snap = await db.ref('suppliers').orderByChild('firebaseUid').equalTo(String(authUid)).limitToFirst(1).once('value');
                if (snap.exists()) {
                    let out = '';
                    snap.forEach((ch) => { if (!out) out = ch.key; });
                    if (out) return out;
                }
            } catch (e) {}
            return fallbackId || '';
        }

        function formatCurrency(val) {
            const n = Number(val || 0);
            const safe = Number.isFinite(n) ? n : 0;
            return '£' + safe.toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }

        function formatDate(str) {
            if (!str) return '-';
            const d = new Date(str);
            if (Number.isNaN(d.getTime())) return '-';
            return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function getInvoiceStatus(load) {
            const s = String(load.status || '').toLowerCase();
            const ps = load.paymentStatus || {};
            if (s === 'completed' || s === 'delivered' || ps.completed) return 'paid';
            if (ps.failed || ps.rejected) return 'pending';
            if (ps.status && String(ps.status).toLowerCase() === 'paid') return 'paid';
            return 'pending';
        }

        function getInvoiceAmount(load) {
            const raw = load.totalAmount !== undefined ? load.totalAmount : (load.totalCost !== undefined ? load.totalCost : (load.price || load.budget || load.maxBudget || load.minBudget || 0));
            const n = Number(raw);
            return Number.isFinite(n) ? n : 0;
        }

        function getInvoiceWhen(load) {
            return load.completedAt || load.deliveryDate || load.updatedAt || load.createdAt || '';
        }

        function escapeHtml(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        async function loadInvoices() {
            const user = getUserData();
            const list = document.getElementById('invoiceList');

            if (!user) {
                list.innerHTML = '<div class="empty"><i class="fas fa-sign-in-alt"></i><h3>Sign in required</h3><p>Login to view invoices</p></div>';
                return;
            }

            const db = window.AlphaBrokrage.firebaseDb;
            const ok = await ensureAuthReady();
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!db || !ok || !authSdk || !authSdk.currentUser) {
                list.innerHTML = '<div class="empty"><i class="fas fa-wifi"></i><h3>Not connected</h3><p>Please login again</p></div>';
                return;
            }

            const authUid = String(authSdk.currentUser.uid || '');
            const authEmail = String(authSdk.currentUser.email || user.email || '');
            const fallbackSupplierId = user.supplierId || user.id || user.email?.replace(/@/g, '_').replace(/\./g, '_');
            const supplierId = await resolveSupplierIdByUid(db, authUid, fallbackSupplierId);

            const map = {};
            async function mergeQuery(q) {
                const snap = await q.once('value');
                if (!snap.exists()) return;
                snap.forEach((ch) => { map[ch.key] = ch.val() || {}; });
            }

            const jobs = [mergeQuery(db.ref('loads').orderByChild('supplierFirebaseUid').equalTo(authUid))];
            if (authEmail) jobs.push(mergeQuery(db.ref('loads').orderByChild('supplierEmail').equalTo(authEmail)));
            if (supplierId) jobs.push(mergeQuery(db.ref('loads').orderByChild('supplierId').equalTo(supplierId)));
            await Promise.allSettled(jobs);

            allInvoices = [];
            Object.entries(map).forEach(([loadId, load]) => {
                const status = getInvoiceStatus(load);
                const amount = getInvoiceAmount(load);
                const when = getInvoiceWhen(load);
                const pickup = load.pickupLocation || load.pickup_location || 'N/A';
                const delivery = load.deliveryLocation || load.delivery_location || 'N/A';
                const carrierName = load.carrierName || load.carrier_name || 'Carrier';

                allInvoices.push({
                    loadId,
                    route: `${pickup} → ${delivery}`,
                    carrierName,
                    amount,
                    status,
                    when
                });
            });

            allInvoices.sort((a, b) => {
                const da = new Date(a.when || 0);
                const db2 = new Date(b.when || 0);
                return db2 - da;
            });

            updateStats();
            renderList();
        }

        function updateStats() {
            const now = new Date();
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

            const paid = allInvoices.filter(x => x.status === 'paid');
            const pending = allInvoices.filter(x => x.status === 'pending');

            const paidMonth = paid
                .filter(x => {
                    const d = new Date(x.when || 0);
                    return d >= monthStart;
                })
                .reduce((s, x) => s + (Number(x.amount) || 0), 0);
            const outstanding = pending.reduce((s, x) => s + (Number(x.amount) || 0), 0);

            document.getElementById('paidMonth').textContent = formatCurrency(paidMonth);
            document.getElementById('outstanding').textContent = formatCurrency(outstanding);
            document.getElementById('invoiceCount').textContent = String(allInvoices.length);
            document.getElementById('paidCount').textContent = String(paid.length);
        }

        function renderList() {
            const list = document.getElementById('invoiceList');
            let items = allInvoices;
            if (currentFilter !== 'all') items = allInvoices.filter(x => x.status === currentFilter);

            if (!items.length) {
                list.innerHTML = '<div class="empty"><i class="fas fa-inbox"></i><h3>No invoices</h3><p>Invoices will appear here after posting loads</p></div>';
                return;
            }

            list.innerHTML = items.slice(0, 60).map(inv => {
                const pillClass = inv.status === 'paid' ? 'success' : 'warning';
                const pillText = inv.status === 'paid' ? 'Paid' : 'Pending';
                const receiptHref = `receipt.html?loadId=${encodeURIComponent(inv.loadId)}&mode=invoice`;
                const detailsHref = `load-details.html?loadId=${encodeURIComponent(inv.loadId)}`;
                return `
                    <div class="item" role="button" tabindex="0" data-receipt-href="${escapeHtml(receiptHref)}">
                        <div class="item-head">
                            <div style="min-width:0;">
                                <p class="route">${escapeHtml(inv.route)}</p>
                                <div class="meta">${escapeHtml(inv.carrierName)} • ${escapeHtml(formatDate(inv.when))}</div>
                            </div>
                            <span class="pill ${pillClass}"><i class="fas fa-circle"></i>${pillText}</span>
                        </div>
                        <div class="row2">
                            <div class="amt">${escapeHtml(formatCurrency(inv.amount))}</div>
                            <div class="mini-actions">
                                <a class="btn-mini primary" href="${escapeHtml(receiptHref)}">Invoice</a>
                                <a class="btn-mini" href="${escapeHtml(detailsHref)}">Details</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            list.querySelectorAll('.item').forEach(el => {
                el.addEventListener('click', () => {
                    const href = el.dataset.receiptHref || '';
                    if (href) window.location.href = href;
                });
                el.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        const href = el.dataset.receiptHref || '';
                        if (href) window.location.href = href;
                    }
                });
            });
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter || 'all';
                renderList();
            });
        });

        document.getElementById('refreshBtn').addEventListener('click', () => loadInvoices().catch(() => showError('Could not refresh')));

        document.addEventListener('DOMContentLoaded', () => {
            loadInvoices().catch(() => showError('Failed to load invoices'));
        });
    </script>
</body>
</html>
