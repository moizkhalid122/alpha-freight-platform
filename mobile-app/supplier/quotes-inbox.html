    <script>
        const alertSystem = new AlertSystem();
        function showError(msg) { alertSystem.show('error', msg); }
        function showSuccess(msg) { alertSystem.show('success', msg); }

        function confirmModal(opts) {
            return new Promise((resolve) => {
                const overlay = document.getElementById('confirmModalOverlay');
                const titleEl = document.getElementById('confirmModalTitle');
                const subEl = document.getElementById('confirmModalSub');
                const listEl = document.getElementById('confirmModalList');
                const noteEl = document.getElementById('confirmModalNote');
                const closeBtn = document.getElementById('confirmModalClose');
                const cancelBtn = document.getElementById('confirmModalCancel');
                const okBtn = document.getElementById('confirmModalOk');
                if (!overlay || !titleEl || !listEl || !cancelBtn || !okBtn) { resolve(false); return; }

                const o = opts || {};
                const items = Array.isArray(o.items) ? o.items : [];
                titleEl.textContent = String(o.title || 'Confirm');
                if (subEl) subEl.textContent = String(o.subtitle || 'Please review');
                listEl.innerHTML = items.map(it => {
                    const k = escapeHtml(it && it.k ? it.k : '');
                    const v = escapeHtml(it && it.v !== undefined ? it.v : '');
                    return `<div class="confirm-item"><div class="k">${k}</div><div class="v">${v}</div></div>`;
                }).join('');

                const note = String(o.note || '').trim();
                if (noteEl) {
                    if (note) {
                        noteEl.style.display = '';
                        noteEl.textContent = note;
                    } else {
                        noteEl.style.display = 'none';
                        noteEl.textContent = '';
                    }
                }

                okBtn.classList.remove('accept', 'danger');
                okBtn.classList.add(o.variant === 'danger' ? 'danger' : 'accept');
                okBtn.innerHTML = `<i class="fas ${o.variant === 'danger' ? 'fa-triangle-exclamation' : 'fa-check'}"></i> ${escapeHtml(o.confirmText || 'Confirm')}`;
                cancelBtn.innerHTML = `<i class="fas fa-arrow-left"></i> ${escapeHtml(o.cancelText || 'Cancel')}`;

                function close(val) {
                    overlay.classList.remove('show');
                    overlay.setAttribute('aria-hidden', 'true');
                    overlay.onclick = null;
                    cancelBtn.onclick = null;
                    okBtn.onclick = null;
                    if (closeBtn) closeBtn.onclick = null;
                    document.removeEventListener('keydown', onKey);
                    resolve(val);
                }
                function onKey(e) {
                    if (e.key === 'Escape') close(false);
                }
                document.addEventListener('keydown', onKey);

                overlay.onclick = (e) => { if (e.target === overlay) close(false); };
                cancelBtn.onclick = () => close(false);
                okBtn.onclick = () => close(true);
                if (closeBtn) closeBtn.onclick = () => close(false);

                overlay.classList.add('show');
                overlay.setAttribute('aria-hidden', 'false');
            });
        }

        let allOffers = [];
        let currentFilter = 'all';
        let loadsById = {};

        function getUserData() {
            const auth = localStorage.getItem('supplierAuth');
            return auth ? JSON.parse(auth) : null;
        }

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return false;
            if (authSdk.currentUser) return true;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => { if (!done) { done = true; resolve(); } }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
            return !!authSdk.currentUser;
        }

        async function resolveSupplierIdByUid(db, authUid, fallbackId) {
            if (!db || !authUid) return fallbackId || '';
            if (fallbackId) {
                try {
                    const snap = await db.ref('suppliers/' + String(fallbackId)).once('value');
                    if (snap.exists()) {
                        const v = snap.val() || {};
                        if (v.firebaseUid && String(v.firebaseUid) === String(authUid)) return String(fallbackId);
                    }
                } catch (e) {}
            }
            try {
                const snap = await db.ref('suppliers').orderByChild('firebaseUid').equalTo(String(authUid)).limitToFirst(1).once('value');
                if (snap.exists()) {
                    let out = '';
                    snap.forEach((ch) => { if (!out) out = ch.key; });
                    if (out) return out;
                }
            } catch (e) {}
            return fallbackId || '';
        }

        function escapeHtml(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function formatCurrency(val) {
            const n = Number(val || 0);
            const safe = Number.isFinite(n) ? n : 0;
            return 'Â£' + safe.toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }

        function formatWhen(tsOrIso) {
            if (!tsOrIso) return '-';
            const d = typeof tsOrIso === 'number' ? new Date(tsOrIso) : new Date(String(tsOrIso));
            if (Number.isNaN(d.getTime())) return '-';
            return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        }

        function getLoadRoute(load) {
            const pickup = load?.pickupLocation || load?.pickup_location || 'N/A';
            const delivery = load?.deliveryLocation || load?.delivery_location || 'N/A';
            return pickup + ' â†’ ' + delivery;
        }

        function getOfferStatus(offer) {
            const s = String(offer.status || '').toLowerCase();
            if (s === 'accepted') return 'accepted';
            if (s === 'rejected') return 'rejected';
            if (offer.seen) return 'seen';
            return 'new';
        }

        async function loadOffers() {
            const user = getUserData();
            const list = document.getElementById('offerList');
            list.innerHTML = '<div class="empty"><i class="fas fa-inbox"></i><h3>Loadingâ€¦</h3><p>Please wait</p></div>';

            if (!user) {
                list.innerHTML = '<div class="empty"><i class="fas fa-sign-in-alt"></i><h3>Sign in required</h3><p>Login to view bids</p></div>';
                return;
            }

            const db = window.AlphaBrokrage.firebaseDb;
            const ok = await ensureAuthReady();
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!db || !ok || !authSdk || !authSdk.currentUser) {
                list.innerHTML = '<div class="empty"><i class="fas fa-wifi"></i><h3>Not connected</h3><p>Please login again</p></div>';
                return;
            }

            const authUid = String(authSdk.currentUser.uid || '');
            const authEmail = String(authSdk.currentUser.email || user.email || '');
            const fallbackSupplierId = user.supplierId || user.id || user.email?.replace(/@/g, '_').replace(/\./g, '_');
            const supplierId = await resolveSupplierIdByUid(db, authUid, fallbackSupplierId);

            const map = {};
            async function mergeQuery(q) {
                const snap = await q.once('value');
                if (!snap.exists()) return;
                snap.forEach((ch) => { map[ch.key] = ch.val() || {}; });
            }

            const jobs = [mergeQuery(db.ref('loads').orderByChild('supplierFirebaseUid').equalTo(authUid))];
            if (authEmail) jobs.push(mergeQuery(db.ref('loads').orderByChild('supplierEmail').equalTo(authEmail)));
            if (supplierId) jobs.push(mergeQuery(db.ref('loads').orderByChild('supplierId').equalTo(supplierId)));
            await Promise.allSettled(jobs);

            const loads = Object.entries(map).map(([loadId, load]) => ({ loadId, load: load || {} }));
            loads.sort((a, b) => new Date(b.load?.createdAt || 0) - new Date(a.load?.createdAt || 0));
            const recentLoads = loads.slice(0, 40);
            loadsById = {};
            recentLoads.forEach(x => { loadsById[x.loadId] = x.load; });

            const offerRows = [];
            const offerFetches = [];

            recentLoads.forEach(({ loadId }) => {
                const bidsRef = db.ref('bids/' + loadId);
                const quotesRef = db.ref('quotes/' + loadId);
                offerFetches.push(
                    bidsRef.once('value').then((snap) => ({ type: 'bid', loadId, snap })).catch(() => ({ type: 'bid', loadId, snap: null })),
                    quotesRef.once('value').then((snap) => ({ type: 'quote', loadId, snap })).catch(() => ({ type: 'quote', loadId, snap: null }))
                );
            });

            const results = await Promise.allSettled(offerFetches);
            results.forEach((r) => {
                if (r.status !== 'fulfilled') return;
                const { type, loadId, snap } = r.value || {};
                if (!snap || !snap.exists || !snap.exists()) return;
                snap.forEach((ch) => {
                    const v = ch.val() || {};
                    offerRows.push({
                        id: ch.key,
                        type,
                        loadId,
                        carrierId: v.carrierId || v.carrier_id || '',
                        carrierName: v.carrierName || v.carrier_name || 'Carrier',
                        carrierFirebaseUid: v.carrierFirebaseUid || v.carrierUid || '',
                        carrierEmail: v.carrierEmail || v.email || '',
                        amount: v.amount || v.price || v.bidAmount || v.quoteAmount || 0,
                        message: v.message || v.note || v.notes || '',
                        status: v.status || '',
                        seen: !!v.seen,
                        createdAt: v.createdAt || v.timestamp || v.time || 0
                    });
                });
            });

            offerRows.sort((a, b) => {
                const da = typeof a.createdAt === 'number' ? a.createdAt : new Date(a.createdAt || 0).getTime();
                const db2 = typeof b.createdAt === 'number' ? b.createdAt : new Date(b.createdAt || 0).getTime();
                return db2 - da;
            });

            allOffers = offerRows;
            updateStats();
            render();

            const mark = allOffers.filter(o => o.type === 'bid' && !o.seen && getOfferStatus(o) === 'new').slice(0, 40);
            const updates = {};
            mark.forEach(o => {
                const base = (o.type === 'bid' ? 'bids' : 'quotes') + '/' + o.loadId + '/' + o.id;
                updates[base + '/seen'] = true;
                updates[base + '/seenAt'] = new Date().toISOString();
                updates[base + '/status'] = 'seen';
                const carrierKey = String(o.carrierId || o.id || '');
                if (carrierKey) {
                    updates['carrierBids/' + carrierKey + '/' + o.loadId + '/seen'] = true;
                    updates['carrierBids/' + carrierKey + '/' + o.loadId + '/status'] = 'seen';
                    updates['carrierBids/' + carrierKey + '/' + o.loadId + '/updatedAt'] = new Date().toISOString();
                }
            });
            if (Object.keys(updates).length) {
                try { await db.ref().update(updates); } catch (e) {}
            }
        }

        function updateStats() {
            const newCount = allOffers.filter(o => getOfferStatus(o) === 'new').length;
            const acceptedCount = allOffers.filter(o => getOfferStatus(o) === 'accepted').length;
            const priced = allOffers.map(o => Number(o.amount || 0)).filter(n => Number.isFinite(n) && n > 0);
            const avg = priced.length ? (priced.reduce((s, x) => s + x, 0) / priced.length) : 0;

            document.getElementById('statNew').textContent = String(newCount);
            document.getElementById('statAccepted').textContent = String(acceptedCount);
            document.getElementById('statAvg').textContent = formatCurrency(avg);
        }

        function render() {
            const list = document.getElementById('offerList');
            let items = allOffers;
            if (currentFilter !== 'all') {
                items = allOffers.filter(o => getOfferStatus(o) === currentFilter);
            }

            if (!items.length) {
                list.innerHTML = '<div class="empty"><i class="fas fa-inbox"></i><h3>No offers</h3><p>Carrier bids and quotes will appear here</p></div>';
                return;
            }

            list.innerHTML = items.slice(0, 80).map(o => {
                const load = loadsById[o.loadId] || {};
                const route = getLoadRoute(load);
                const when = formatWhen(o.createdAt);
                const st = getOfferStatus(o);
                const pillClass = st === 'accepted' ? 'success' : (st === 'rejected' ? 'danger' : 'warning');
                const pillText = st === 'accepted' ? 'Accepted' : (st === 'rejected' ? 'Rejected' : (st === 'new' ? 'New' : 'Seen'));
                const amount = formatCurrency(o.amount);
                const msg = String(o.message || '').trim();
                const msgBlock = msg ? `<div class="msg">${escapeHtml(msg)}</div>` : '';
                const detailsHref = `load-details.html?loadId=${encodeURIComponent(o.loadId)}`;
                return `
                    <div class="card">
                        <div class="card-head">
                            <div style="min-width:0;">
                                <p class="route">${escapeHtml(route)}</p>
                                <div class="meta">${escapeHtml(o.carrierName)} â€¢ ${escapeHtml(when)} â€¢ ${escapeHtml(o.type.toUpperCase())}</div>
                            </div>
                            <span class="pill ${pillClass}"><i class="fas fa-circle"></i>${pillText}</span>
                        </div>
                        ${msgBlock}
                        <div class="row2">
                            <div class="amt">${escapeHtml(amount)}</div>
                            <div class="mini-actions">
                                <button type="button" class="btn-mini success" data-act="accept" data-load="${escapeHtml(o.loadId)}" data-type="${escapeHtml(o.type)}" data-id="${escapeHtml(o.id)}"><i class="fas fa-check"></i> Accept</button>
                                <button type="button" class="btn-mini danger" data-act="reject" data-load="${escapeHtml(o.loadId)}" data-type="${escapeHtml(o.type)}" data-id="${escapeHtml(o.id)}"><i class="fas fa-xmark"></i> Reject</button>
                                <button type="button" class="btn-mini primary" data-act="message" data-load="${escapeHtml(o.loadId)}" data-carrier="${escapeHtml(o.carrierId)}" data-carrier-name="${escapeHtml(o.carrierName)}"><i class="fas fa-comments"></i> Message</button>
                                <a class="btn-mini" href="${escapeHtml(detailsHref)}"><i class="fas fa-eye"></i> Load</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            list.querySelectorAll('button[data-act]').forEach(btn => {
                const act = btn.dataset.act || '';
                btn.addEventListener('click', async () => {
                    if (act === 'message') {
                        const carrierId = btn.dataset.carrier || '';
                        const carrierName = btn.dataset.carrierName || 'Carrier';
                            const loadId = btn.dataset.load || '';
                        if (!carrierId) {
                            showError('Carrier not found');
                            return;
                        }
                            localStorage.setItem('ab.messages.openCarrier', JSON.stringify({ carrierId, carrierName, loadId }));
                        window.location.href = 'messages.html';
                        return;
                    }

                    const loadId = btn.dataset.load || '';
                    const type = btn.dataset.type || '';
                    const offerId = btn.dataset.id || '';
                    if (!loadId || !type || !offerId) return;

                    if (act === 'accept') await acceptOffer(loadId, type, offerId).catch(() => showError('Failed to accept'));
                    if (act === 'reject') await rejectOffer(loadId, type, offerId).catch(() => showError('Failed to reject'));
                });
            });
        }

        async function acceptOffer(loadId, type, offerId) {
            const db = window.AlphaBrokrage.firebaseDb;
            if (!db) throw new Error('no-db');
            const offer = allOffers.find(o => o.loadId === loadId && o.type === type && o.id === offerId);
            if (!offer) throw new Error('no-offer');

            const load = loadsById[loadId] || {};
            if (type === 'bid') {
                const prevRaw = load.agreedPrice ?? load.price ?? load.budget ?? load.maxBudget ?? load.minBudget ?? 0;
                const prev = Number(prevRaw || 0) || 0;
                const next = Number(offer.amount || 0) || 0;
                const delta = Math.round((next - prev) * 100) / 100;
                const ok = await confirmModal({
                    title: 'Confirm Accept Bid',
                    subtitle: 'This will accept the load and notify the carrier',
                    items: [
                        { k: 'Route', v: getLoadRoute(load) },
                        { k: 'Old Price', v: formatCurrency(prev) },
                        { k: 'Accepted Price', v: `${formatCurrency(next)}${Number.isFinite(delta) && delta !== 0 ? ` (${delta > 0 ? '+' : ''}${formatCurrency(delta)})` : ''}` }
                    ],
                    note: 'After accept: carrier payout updates and load becomes assigned.',
                    confirmText: 'Accept',
                    cancelText: 'Cancel'
                });
                if (!ok) return;
            }

            const base = (type === 'bid' ? 'bids' : 'quotes') + '/' + loadId + '/' + offerId;
            const updates = {};
            updates[base + '/status'] = 'accepted';
            updates[base + '/respondedAt'] = new Date().toISOString();
            updates['loads/' + loadId + '/status'] = 'accepted';
            if (offer.carrierId) updates['loads/' + loadId + '/carrierId'] = offer.carrierId;
            if (offer.carrierName) updates['loads/' + loadId + '/carrierName'] = offer.carrierName;
            if (offer.carrierFirebaseUid) updates['loads/' + loadId + '/carrierFirebaseUid'] = offer.carrierFirebaseUid;
            if (offer.carrierEmail) updates['loads/' + loadId + '/carrierEmail'] = offer.carrierEmail;
            updates['loads/' + loadId + '/acceptedAt'] = new Date().toISOString();
            updates['loads/' + loadId + '/acceptedOffer'] = { type, offerId, amount: offer.amount || 0 };
            if (type === 'bid') {
                updates['loads/' + loadId + '/agreedPrice'] = Number(offer.amount || 0) || 0;
                updates['loads/' + loadId + '/agreedAt'] = new Date().toISOString();
                updates['loads/' + loadId + '/agreedFrom'] = 'bid';
                const carrierKey = String(offer.carrierId || offerId || '');
                if (carrierKey) {
                    updates['carrierBids/' + carrierKey + '/' + loadId + '/status'] = 'accepted';
                    updates['carrierBids/' + carrierKey + '/' + loadId + '/seen'] = true;
                    updates['carrierBids/' + carrierKey + '/' + loadId + '/updatedAt'] = new Date().toISOString();
                }
            }

            try {
                await db.ref().update(updates);
            } catch (e) {
                const msg = String((e && e.message) ? e.message : e || '');
                console.error('Accept failed:', e);
                showError(msg || 'Failed to accept');
                throw e;
            }

            try {
                if (type === 'bid') {
                    const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                    const senderUid = authSdk && authSdk.currentUser && authSdk.currentUser.uid ? String(authSdk.currentUser.uid) : '';
                    const carrierId = String(offer.carrierId || offerId || '');
                    if (senderUid && carrierId) {
                        const route = getLoadRoute(load);
                        await db.ref('notificationQueue').push({
                            senderUid,
                            toUserId: carrierId,
                            toUserType: 'carrier',
                            title: 'Bid Accepted',
                            message: `Your bid ${formatCurrency(offer.amount || 0)} was accepted â€¢ ${route}`,
                            type: 'bid_accepted',
                            data: {
                                type: 'bid_accepted',
                                loadId: String(loadId),
                                url: '/mobile-app/carrier/my-bids.html',
                                icon: '/image-removebg-preview - 2026-03-04T141043.516.png'
                            },
                            createdAt: new Date().toISOString()
                        });
                    }
                }
            } catch (e) {}

            showSuccess('Offer accepted');
            await loadOffers();
        }

        async function rejectOffer(loadId, type, offerId) {
            const db = window.AlphaBrokrage.firebaseDb;
            if (!db) throw new Error('no-db');
            const base = (type === 'bid' ? 'bids' : 'quotes') + '/' + loadId + '/' + offerId;
            const offer = allOffers.find(o => o.loadId === loadId && o.type === type && o.id === offerId);
            if (type === 'bid') {
                const load = loadsById[loadId] || {};
                const ok = await confirmModal({
                    title: 'Confirm Reject Bid',
                    subtitle: 'This will mark the bid rejected',
                    items: [
                        { k: 'Route', v: getLoadRoute(load) },
                        { k: 'Carrier', v: String((offer && offer.carrierName) || 'Carrier') },
                        { k: 'Bid', v: formatCurrency((offer && offer.amount) || 0) }
                    ],
                    note: 'After reject: load will not be assigned to this carrier.',
                    confirmText: 'Reject',
                    cancelText: 'Cancel',
                    variant: 'danger'
                });
                if (!ok) return;
            }
            const updates = {};
            updates[base + '/status'] = 'rejected';
            updates[base + '/respondedAt'] = new Date().toISOString();
            if (type === 'bid') {
                const carrierKey = String((offer && offer.carrierId) || offerId || '');
                if (carrierKey) {
                    updates['carrierBids/' + carrierKey + '/' + loadId + '/status'] = 'rejected';
                    updates['carrierBids/' + carrierKey + '/' + loadId + '/seen'] = true;
                    updates['carrierBids/' + carrierKey + '/' + loadId + '/updatedAt'] = new Date().toISOString();
                }
            }
            try {
                await db.ref().update(updates);
            } catch (e) {
                const msg = String((e && e.message) ? e.message : e || '');
                console.error('Reject failed:', e);
                showError(msg || 'Failed to reject');
                throw e;
            }

            try {
                if (type === 'bid') {
                    const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                    const senderUid = authSdk && authSdk.currentUser && authSdk.currentUser.uid ? String(authSdk.currentUser.uid) : '';
                    const carrierId = String(((offer && offer.carrierId) ? offer.carrierId : '') || offerId || '');
                    const load = loadsById[loadId] || {};
                    if (senderUid && carrierId) {
                        const route = getLoadRoute(load);
                        await db.ref('notificationQueue').push({
                            senderUid,
                            toUserId: carrierId,
                            toUserType: 'carrier',
                            title: 'Bid Rejected',
                            message: `Your bid was rejected â€¢ ${route}`,
                            type: 'bid_rejected',
                            data: {
                                type: 'bid_rejected',
                                loadId: String(loadId),
                                url: '/mobile-app/carrier/my-bids.html',
                                icon: '/image-removebg-preview - 2026-03-04T141043.516.png'
                            },
                            createdAt: new Date().toISOString()
                        });
                    }
                }
            } catch (e) {}

            showSuccess('Offer rejected');
            await loadOffers();
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter || 'all';
                render();
            });
        });

        document.getElementById('refreshBtn').addEventListener('click', () => loadOffers().catch(() => showError('Could not refresh')));

        document.addEventListener('DOMContentLoaded', () => {
            loadOffers().catch(() => showError('Failed to load offers'));
        });
    </script>
</body>
</html>
