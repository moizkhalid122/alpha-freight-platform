    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="../../assets/js/firebase-init.js"></script>
    <script src="../../assets/js/alerts.js"></script>

    <script>
        const alertSystem = new AlertSystem();
        const PAY_REMINDERS_KEY_PREFIX = 'ab.payletter.reminders.supplier.';
        let payLetterOrders = [];
        let payLetterOrdersByLoadId = {};
        let payLetterSupplierId = '';

        function formatCurrency(val) {
            return '£' + parseFloat(val || 0).toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }

        function formatDate(str) {
            if (!str) return '-';
            return new Date(str).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function getUserData() {
            const auth = localStorage.getItem('supplierAuth');
            return auth ? JSON.parse(auth) : null;
        }

        function normalizeCity(v) {
            return String(v || '').trim();
        }

        function formatIdShort(id) {
            const s = String(id || '');
            if (!s) return '';
            return s.substring(0, 8).toUpperCase();
        }

        function openPayLetterAi(title, html) {
            const overlay = document.getElementById('payLetterAiOverlay');
            const head = document.getElementById('payLetterAiTitle');
            const body = document.getElementById('payLetterAiBody');
            if (!overlay || !head || !body) return;
            head.textContent = title || 'AI';
            body.innerHTML = html || '';
            overlay.style.display = 'flex';
            overlay.setAttribute('aria-hidden', 'false');
            setTimeout(() => {
                try { document.getElementById('payLetterAiClose')?.focus(); } catch (e) {}
            }, 0);
        }

        function closePayLetterAi() {
            const overlay = document.getElementById('payLetterAiOverlay');
            if (!overlay) return;
            overlay.style.display = 'none';
            overlay.setAttribute('aria-hidden', 'true');
        }

        async function copyToClipboard(text) {
            const t = String(text || '');
            if (!t) return false;
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(t);
                    return true;
                }
            } catch (e) {}
            try {
                const el = document.createElement('textarea');
                el.value = t;
                el.style.position = 'fixed';
                el.style.left = '-9999px';
                document.body.appendChild(el);
                el.select();
                const ok = document.execCommand('copy');
                document.body.removeChild(el);
                return !!ok;
            } catch (e) {}
            return false;
        }

        function getReminderStoreKey() {
            return PAY_REMINDERS_KEY_PREFIX + String(payLetterSupplierId || 'unknown');
        }

        function getReminderState() {
            try { return JSON.parse(localStorage.getItem(getReminderStoreKey()) || '{}') || {}; } catch (e) { return {}; }
        }

        function setReminderState(state) {
            try { localStorage.setItem(getReminderStoreKey(), JSON.stringify(state || {})); } catch (e) {}
        }

        function computeReminderSchedule(createdAtIso, stage) {
            const base = createdAtIso ? new Date(createdAtIso) : new Date();
            const t = new Date(base.getTime());
            const s = Math.max(0, Math.min(3, parseInt(stage || 0, 10) || 0));
            if (s === 0) t.setDate(t.getDate() + 1);
            else if (s === 1) t.setDate(t.getDate() + 3);
            else if (s === 2) t.setDate(t.getDate() + 7);
            else t.setDate(t.getDate() + 14);
            return t.toISOString();
        }

        function buildFollowUpMessage(order, stage) {
            const id = order.id || order.loadId || '';
            const lid = order.loadId || id;
            const shortId = formatIdShort(lid || id);
            const title = String(order.loadTitle || 'Load');
            const pickup = normalizeCity(order.pickupLocation || order.pickup_location || 'N/A');
            const delivery = normalizeCity(order.deliveryLocation || order.delivery_location || 'N/A');
            const amt = formatCurrency(parseFloat(order.amount || 0));
            const lines = [
                `Hi, quick follow‑up regarding pending payment for ${title} (LOAD-${shortId}).`,
                `Route: ${pickup} → ${delivery}`,
                `Amount: ${amt}`,
                stage === 0 ? 'Please confirm when payment will be completed.' :
                stage === 1 ? 'Can you please share an update on the payment status?' :
                stage === 2 ? 'This is a reminder to complete payment or let us know if there is any issue.' :
                'Final reminder: please complete payment or we may need to close this request.'
            ];
            return lines.join('\n');
        }

        function buildPaymentBreakdown(order) {
            const id = order.id || order.loadId || '';
            const lid = order.loadId || id;
            const shortId = formatIdShort(lid || id);
            const title = String(order.loadTitle || 'Load');
            const pickup = normalizeCity(order.pickupLocation || order.pickup_location || 'N/A');
            const delivery = normalizeCity(order.deliveryLocation || order.delivery_location || 'N/A');
            const createdAt = order.createdAt || order.created_at || '';
            const amount = parseFloat(order.amount || 0);
            const parts = [];
            const candidates = [
                ['Base Amount', order.baseAmount || order.subtotal || order.subTotal],
                ['Service Fee', order.serviceFee || order.fee || order.alphaFee || order.commission],
                ['VAT', order.vat || order.tax]
            ];
            candidates.forEach(([label, val]) => {
                const n = parseFloat(val);
                if (Number.isFinite(n) && n > 0) parts.push({ label, value: n });
            });

            const reason = 'This payment is for your posted load. Paying confirms/settles the order through Alpha Freight.';
            const breakdownText = parts.length
                ? parts.map(p => `${p.label}: ${formatCurrency(p.value)}`).join(' • ')
                : `Total: ${formatCurrency(amount)}`;

            const html = `
                <div class="ai-box">
                    <div class="ai-h">What is this payment for?</div>
                    <div class="ai-p">${reason}</div>
                </div>
                <div style="height:10px;"></div>
                <div class="ai-box">
                    <div class="ai-h">Breakdown</div>
                    <div class="ai-p">${title} (LOAD-${shortId})</div>
                    <div class="ai-p">Route: ${pickup} → ${delivery}</div>
                    <div class="ai-p">Created: ${formatDate(createdAt)}</div>
                    <div class="ai-p">${breakdownText}</div>
                    <div class="ai-actions">
                        <button type="button" class="ai-btn" id="payLetterAiCopyBreakdown"><i class="fas fa-copy"></i>Copy</button>
                        <button type="button" class="ai-btn primary" onclick="payOrder('${String(lid || '').replace(/'/g, '\\\\\'')}', '${String(amount || 0).replace(/'/g, '\\\\\'')}')"><i class="fas fa-credit-card"></i>Pay Now</button>
                    </div>
                </div>
            `;
            const copyText = `Payment breakdown\n${title} (LOAD-${shortId})\nRoute: ${pickup} → ${delivery}\nCreated: ${formatDate(createdAt)}\n${breakdownText}\n`;
            return { html, copyText };
        }

        function loadOrders() {
            const user = getUserData();
            const container = document.getElementById('ordersList');

            if (!user) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-sign-in-alt"></i><h3>Sign in required</h3></div>';
                return;
            }

            const supplierId = user.supplierId || user.id || user.email?.replace(/@/g, '_').replace(/\./g, '_');
            payLetterSupplierId = supplierId || '';
            const db = window.AlphaBrokrage.firebaseDb;

            function render(orders) {
                const filtered = orders.filter(o => !['paid', 'cancelled'].includes((o.status || '').toLowerCase()));
                payLetterOrders = orders || [];
                payLetterOrdersByLoadId = {};
                try {
                    (orders || []).forEach(o => {
                        const id = o.id || o.loadId || '';
                        const lid = o.loadId || id;
                        if (lid) payLetterOrdersByLoadId[String(lid)] = o;
                    });
                } catch (e) {}

                if (filtered.length === 0) {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-file-invoice"></i><h3>No pending orders</h3><p>Add loads from Pay Now page</p></div>';
                    return;
                }

                container.innerHTML = filtered.map((o, idx) => {
                    const id = o.id || o.loadId || '';
                    const lid = o.loadId || id;
                    const route = `${o.pickupLocation || o.pickup_location || 'N/A'} → ${o.deliveryLocation || o.delivery_location || 'N/A'}`;
                    const amt = parseFloat(o.amount || 0);
                    const status = (o.status || 'pending').toLowerCase();
                    const hasPaymentSent = !!(o.paymentSentAt || o.paymentSource);
                    const statusClass = status === 'paid' ? 'paid' : hasPaymentSent ? 'sent' : 'pending';
                    const statusText = status === 'paid' ? 'Paid' : hasPaymentSent ? 'Payment Sent' : 'Pending';

                    return `
                        <div class="order-card">
                            <div class="order-route">${(o.loadTitle || 'Load').replace(/</g, '&lt;')} #${id.substring(0, 8)}</div>
                            <div class="order-meta">${route} • ${formatDate(o.createdAt)}</div>
                            <div class="order-row">
                                <span class="order-amount">${formatCurrency(amt)}</span>
                                <span class="status-badge ${statusClass}">${statusText}</span>
                            </div>
                            ${!hasPaymentSent && status !== 'paid' ? `
                            <div class="order-actions">
                                <button class="btn-pay" data-load-id="${lid}" data-amount="${amt}">
                                    <i class="fas fa-credit-card"></i> Pay Now
                                </button>
                                <button class="btn-ai" data-ai-order="${lid}">
                                    <i class="fas fa-wand-magic-sparkles"></i> AI
                                </button>
                                <button class="btn-view" onclick="window.location.href='my-loads.html'">
                                    <i class="fas fa-eye"></i> View
                                </button>
                            </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');

                container.querySelectorAll('.btn-pay').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const loadId = btn.dataset.loadId;
                        const amount = btn.dataset.amount;
                        payOrder(loadId, amount);
                    });
                });

                container.querySelectorAll('.btn-ai').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const lid = String(btn.dataset.aiOrder || '');
                        const o = payLetterOrdersByLoadId[lid] || null;
                        if (!o) return;
                        const { html, copyText } = buildPaymentBreakdown(o);
                        openPayLetterAi('AI Payment Assistant', html);
                        try {
                            const copyBtn = document.getElementById('payLetterAiCopyBreakdown');
                            if (copyBtn) copyBtn.onclick = async function () {
                                const ok = await copyToClipboard(copyText);
                                if (ok) alertSystem.show('success', 'Copied');
                                else alertSystem.show('error', 'Copy failed');
                            };
                        } catch (e) {}
                    });
                });

                updateReminderBanner(filtered);
            }

            let orders = [];

            if (db) {
                const baseRef = db.ref('payLetterPending').orderByChild('supplierId').equalTo(supplierId).limitToLast(200);
                baseRef.on('value', (snap) => {
                    orders = [];
                    if (snap.exists()) {
                        snap.forEach((c) => {
                            const o = c.val();
                            o.id = c.key;
                            orders.push(o);
                        });
                    }
                    const local = JSON.parse(localStorage.getItem('payLetterPendingLocal') || '[]');
                    const localFiltered = local.filter(l => l.supplierId === supplierId);
                    const merged = [...orders];
                    localFiltered.forEach(l => {
                        if (!merged.some(m => m.loadId === l.loadId)) merged.push(l);
                    });
                    merged.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
                    render(merged);
                    try { localStorage.setItem('payLetterPendingCache:' + supplierId, JSON.stringify(merged.slice(0, 200))); } catch (e) {}
                });
            } else {
                const local = JSON.parse(localStorage.getItem('payLetterPendingLocal') || '[]');
                render(local.filter(l => l.supplierId === supplierId));
            }
        }

        function payOrder(loadId, amount) {
            window.location.href = `pay-now.html?loadId=${encodeURIComponent(loadId || '')}&amount=${encodeURIComponent(amount || 0)}&paymentFor=Load%20Payment&paymentType=Pay%20Letter`;
        }

        function updateReminderBanner(pendingOrders) {
            const banner = document.getElementById('aiReminderBanner');
            const text = document.getElementById('aiReminderBannerText');
            if (!banner || !text) return;
            if (!payLetterSupplierId) { banner.classList.remove('show'); return; }
            const state = getReminderState();
            const now = Date.now();
            let due = 0;
            (pendingOrders || []).forEach(o => {
                const id = o.id || o.loadId || '';
                const lid = o.loadId || id;
                const key = String(lid || '');
                const st = state[key] || { stage: 0, nextAt: '' };
                const stage = Math.max(0, Math.min(3, parseInt(st.stage || 0, 10) || 0));
                const nextAt = st.nextAt || computeReminderSchedule(o.createdAt || o.created_at || '', stage);
                const ts = Date.parse(nextAt);
                if (Number.isFinite(ts) && ts <= now) due += 1;
            });
            if (due > 0) {
                text.textContent = `You have ${due} follow‑up reminder(s) due. Open AI Reminders to copy messages.`;
                banner.classList.add('show');
            } else {
                banner.classList.remove('show');
            }
        }

        function openAiReminders() {
            const pending = (payLetterOrders || []).filter(o => !['paid', 'cancelled'].includes((o.status || '').toLowerCase()));
            if (!pending.length) {
                openPayLetterAi('AI Reminders', `<div class="ai-box"><div class="ai-h">No pending payments</div><div class="ai-p">You have no pending items in Pay Letter right now.</div></div>`);
                return;
            }
            const state = getReminderState();
            const now = Date.now();
            const rows = pending.map(o => {
                const id = o.id || o.loadId || '';
                const lid = o.loadId || id;
                const key = String(lid || '');
                const st = state[key] || { stage: 0, nextAt: '' };
                const stage = Math.max(0, Math.min(3, parseInt(st.stage || 0, 10) || 0));
                const nextAt = st.nextAt || computeReminderSchedule(o.createdAt || o.created_at || '', stage);
                const ts = Date.parse(nextAt);
                const due = Number.isFinite(ts) ? ts <= now : false;
                const title = String(o.loadTitle || 'Load');
                const pickup = normalizeCity(o.pickupLocation || o.pickup_location || 'N/A');
                const delivery = normalizeCity(o.deliveryLocation || o.delivery_location || 'N/A');
                const amt = formatCurrency(parseFloat(o.amount || 0));
                return { key, stage, nextAt, due, title, pickup, delivery, amt, order: o };
            });

            const html = `
                <div class="ai-box">
                    <div class="ai-h">Auto follow‑up schedule (no spam)</div>
                    <div class="ai-p">We suggest at most 3 reminders per payment: Day 1 → Day 3 → Day 7. Nothing is sent automatically; you copy and send only when needed.</div>
                </div>
                <div style="height:10px;"></div>
                ${rows.map(r => {
                    const label = r.due ? 'Due now' : `Next: ${formatDate(r.nextAt)}`;
                    const shortId = formatIdShort(r.key);
                    return `
                        <div class="ai-box" style="margin-bottom:10px;">
                            <div class="ai-h">${r.title} (LOAD-${shortId})</div>
                            <div class="ai-p">${r.pickup} → ${r.delivery} • ${r.amt}</div>
                            <div class="ai-p"><strong>${label}</strong></div>
                            <div class="ai-actions">
                                <button type="button" class="ai-btn" data-reminder-copy="${r.key}"><i class="fas fa-copy"></i>Copy Msg</button>
                                <button type="button" class="ai-btn primary" data-reminder-done="${r.key}"><i class="fas fa-check"></i>Mark Sent</button>
                            </div>
                        </div>
                    `;
                }).join('')}
            `;
            openPayLetterAi('AI Reminders', html);

            try {
                document.querySelectorAll('[data-reminder-copy]').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const key = String(btn.getAttribute('data-reminder-copy') || '');
                        const r = rows.find(x => x.key === key);
                        if (!r) return;
                        const msg = buildFollowUpMessage(r.order, r.stage);
                        const ok = await copyToClipboard(msg);
                        if (ok) alertSystem.show('success', 'Copied');
                        else alertSystem.show('error', 'Copy failed');
                    });
                });
                document.querySelectorAll('[data-reminder-done]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const key = String(btn.getAttribute('data-reminder-done') || '');
                        const r = rows.find(x => x.key === key);
                        if (!r) return;
                        const state = getReminderState();
                        const nextStage = Math.max(0, Math.min(3, (r.stage || 0) + 1));
                        const nextAt = computeReminderSchedule(r.order.createdAt || r.order.created_at || '', nextStage);
                        state[key] = { stage: nextStage, nextAt: nextAt, updatedAt: new Date().toISOString() };
                        setReminderState(state);
                        alertSystem.show('success', 'Reminder scheduled');
                        closePayLetterAi();
                        updateReminderBanner((payLetterOrders || []).filter(o => !['paid', 'cancelled'].includes((o.status || '').toLowerCase())));
                    });
                });
            } catch (e) {}
        }

        document.addEventListener('DOMContentLoaded', async function () {
            const user = getUserData();
            const supplierId = user ? (user.supplierId || user.id || user.email?.replace(/@/g, '_').replace(/\./g, '_')) : '';
            payLetterSupplierId = supplierId || '';
            if (supplierId) {
                try {
                    const cached = JSON.parse(localStorage.getItem('payLetterPendingCache:' + supplierId) || '[]');
                    if (Array.isArray(cached) && cached.length) {
                        const container = document.getElementById('ordersList');
                        if (container) {
                            const filtered = cached.filter(o => !['paid', 'cancelled'].includes((o.status || '').toLowerCase()));
                            if (filtered.length > 0) {
                                container.innerHTML = filtered.map((o) => {
                                    const id = o.id || o.loadId || '';
                                    const lid = o.loadId || id;
                                    const route = `${o.pickupLocation || o.pickup_location || 'N/A'} → ${o.deliveryLocation || o.delivery_location || 'N/A'}`;
                                    const amt = parseFloat(o.amount || 0);
                                    const status = (o.status || 'pending').toLowerCase();
                                    const hasPaymentSent = !!(o.paymentSentAt || o.paymentSource);
                                    const statusClass = status === 'paid' ? 'paid' : hasPaymentSent ? 'sent' : 'pending';
                                    const statusText = status === 'paid' ? 'Paid' : hasPaymentSent ? 'Payment Sent' : 'Pending';
                                    return `
                                        <div class="order-card">
                                            <div class="order-route">${(o.loadTitle || 'Load').replace(/</g, '&lt;')} #${id.substring(0, 8)}</div>
                                            <div class="order-meta">${route} • ${formatDate(o.createdAt)}</div>
                                            <div class="order-row">
                                                <span class="order-amount">${formatCurrency(amt)}</span>
                                                <span class="status-badge ${statusClass}">${statusText}</span>
                                            </div>
                                            ${!hasPaymentSent && status !== 'paid' ? `
                                            <div class="order-actions">
                                                <button class="btn-pay" data-load-id="${lid}" data-amount="${amt}">
                                                    <i class="fas fa-credit-card"></i> Pay Now
                                                </button>
                                                <button class="btn-ai" data-ai-order="${lid}">
                                                    <i class="fas fa-wand-magic-sparkles"></i> AI
                                                </button>
                                                <button class="btn-view" onclick="window.location.href='my-loads.html'">
                                                    <i class="fas fa-eye"></i> View
                                                </button>
                                            </div>
                                            ` : ''}
                                        </div>
                                    `;
                                }).join('');

                                container.querySelectorAll('.btn-pay').forEach(btn => {
                                    btn.addEventListener('click', () => {
                                        const loadId = btn.dataset.loadId;
                                        const amount = btn.dataset.amount;
                                        payOrder(loadId, amount);
                                    });
                                });

                                container.querySelectorAll('.btn-ai').forEach(btn => {
                                    btn.addEventListener('click', async () => {
                                        const lid = String(btn.dataset.aiOrder || '');
                                        const o = (cached || []).find(x => String((x.loadId || x.id || '')) === lid) || null;
                                        if (!o) return;
                                        const { html, copyText } = buildPaymentBreakdown(o);
                                        openPayLetterAi('AI Payment Assistant', html);
                                        try {
                                            const copyBtn = document.getElementById('payLetterAiCopyBreakdown');
                                            if (copyBtn) copyBtn.onclick = async function () {
                                                const ok = await copyToClipboard(copyText);
                                                if (ok) alertSystem.show('success', 'Copied');
                                                else alertSystem.show('error', 'Copy failed');
                                            };
                                        } catch (e) {}
                                    });
                                });

                                payLetterOrders = cached;
                                payLetterOrdersByLoadId = {};
                                try {
                                    cached.forEach(o => {
                                        const id = o.id || o.loadId || '';
                                        const lid = o.loadId || id;
                                        if (lid) payLetterOrdersByLoadId[String(lid)] = o;
                                    });
                                } catch (e) {}
                                updateReminderBanner(filtered);
                            }
                        }
                    }
                } catch (e) {}
            }

            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (authSdk && typeof authSdk.onAuthStateChanged === 'function') {
                await new Promise((resolve) => {
                    let done = false;
                    const timer = setTimeout(() => {
                        if (done) return;
                        done = true;
                        resolve();
                    }, 2500);
                    const unsub = authSdk.onAuthStateChanged(() => {
                        if (done) return;
                        done = true;
                        clearTimeout(timer);
                        try { unsub(); } catch (e) {}
                        resolve();
                    });
                });
            }

            loadOrders();

            const overlay = document.getElementById('payLetterAiOverlay');
            const closeBtn = document.getElementById('payLetterAiClose');
            const remindersBtn = document.getElementById('aiRemindersBtn');
            const bannerClose = document.getElementById('aiReminderBannerClose');
            if (closeBtn) closeBtn.addEventListener('click', closePayLetterAi);
            if (overlay) overlay.addEventListener('click', (e) => { if (e.target === overlay) closePayLetterAi(); });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePayLetterAi(); });
            if (remindersBtn) remindersBtn.addEventListener('click', openAiReminders);
            if (bannerClose) bannerClose.addEventListener('click', () => {
                const banner = document.getElementById('aiReminderBanner');
                if (banner) banner.classList.remove('show');
            });
        });
    </script>
</body>
</html>
