    <style>
        /* —— Premium theme (matches dashboard) —— */
        :root {
            --primary: #1d4ed8;
            --primary-dark: #1e3a8a;
            --primary-light: #60a5fa;
            --gold: #c9a227;
            --success: #059669;
            --error: #dc2626;
            --warning: #d97706;
            --text-dark: #0f172a;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --bg-main: #f1f5f9;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08), 0 2px 8px rgba(15, 23, 42, 0.04);
            --shadow-card: 0 8px 32px rgba(15, 23, 42, 0.06), 0 2px 8px rgba(15, 23, 42, 0.03);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 22px;
            --radius-sm: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #e2e8f0 0%, #f1f5f9 18%, #f8fafc 100%);
            min-height: 100vh;
            color: var(--text-dark);
            line-height: 1.55;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            /* footer from supplier-bottom-nav.css */
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(29, 78, 216, 0.25); border-radius: 10px; transition: background 0.3s var(--ease); }
        * { scrollbar-width: thin; scrollbar-color: rgba(29, 78, 216, 0.25) transparent; }

        /* Page Header – premium navy + gold */
        .page-header {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 48%, #1e3a8a 100%);
            color: #fff;
            padding: 1.5rem 1.25rem 1.75rem;
            border-radius: 0 0 36px 36px;
            margin-bottom: 1.5rem;
            position: relative;
            box-shadow: 0 16px 48px rgba(15, 23, 42, 0.3);
        }
        .page-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            border-radius: 0 0 36px 36px;
            opacity: 0.7;
        }

        .header-content { position: relative; z-index: 1; }
        .page-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 0.375rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .page-subtitle { font-size: 0.875rem; opacity: 0.92; }

        /* Filters – premium chips */
        .filters-section { padding: 0 1.25rem; margin-bottom: 1.25rem; }
        .filters-row {
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding-bottom: 0.5rem;
        }
        .filters-row::-webkit-scrollbar { display: none; }

        .filter-chip {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 999px;
            padding: 0.625rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            transition: transform 0.3s var(--ease), background 0.3s var(--ease), border-color 0.3s var(--ease), color 0.3s var(--ease);
            white-space: nowrap;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }
        .filter-chip.active {
            background: linear-gradient(145deg, #2563eb 0%, var(--primary) 100%);
            border-color: var(--primary);
            color: #fff;
            box-shadow: 0 4px 14px rgba(29, 78, 216, 0.35);
        }
        .filter-chip:active { transform: scale(0.96); }

        /* Loads List – premium cards */
        .loads-section { padding: 0 1.25rem; margin-bottom: 2rem; }

        .load-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border);
            transition: transform 0.35s var(--ease), box-shadow 0.35s var(--ease);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .load-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 12px;
            bottom: 12px;
            width: 4px;
            background: linear-gradient(180deg, var(--primary), var(--primary-dark));
            border-radius: 0 2px 2px 0;
        }
        .load-card:active {
            transform: scale(0.99);
            box-shadow: var(--shadow-sm);
        }

        .load-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .load-route { flex: 1; min-width: 0; }

        .route-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .route-title i { color: var(--primary); font-size: 1.125rem; }
        .route-subtitle { font-size: 0.8125rem; color: var(--text-medium); }

        .load-status {
            padding: 0.375rem 0.75rem;
            border-radius: var(--radius-sm);
            font-size: 0.6875rem;
            font-weight: 700;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .load-status.available { background: rgba(29, 78, 216, 0.12); color: var(--primary); }
        .load-status.active { background: rgba(5, 150, 105, 0.12); color: var(--success); }
        .load-status.in-transit { background: rgba(217, 119, 6, 0.12); color: var(--warning); }
        .load-status.completed { background: rgba(5, 150, 105, 0.12); color: var(--success); }
        .load-status.pending { background: rgba(217, 119, 6, 0.12); color: var(--warning); }
        .load-status.cancelled { background: rgba(220, 38, 38, 0.12); color: var(--error); }

        .load-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }
        .load-detail-item { display: flex; align-items: center; gap: 0.5rem; }
        .load-detail-item i { color: var(--primary); font-size: 0.875rem; width: 16px; }
        .load-detail-item span { font-size: 0.8125rem; font-weight: 500; color: var(--text-dark); }

        .load-price {
            font-size: 1.125rem;
            font-weight: 800;
            color: var(--success);
            text-align: right;
            letter-spacing: -0.02em;
        }

        .load-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .btn-action {
            flex: 1;
            padding: 0.75rem;
            background: linear-gradient(145deg, #2563eb 0%, var(--primary) 100%);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 0.875rem;
            cursor: pointer;
            transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 4px 12px rgba(29, 78, 216, 0.3);
        }
        .btn-action:active { transform: scale(0.98); box-shadow: 0 2px 8px rgba(29, 78, 216, 0.25); }
        .btn-action.secondary {
            background: var(--card-bg);
            color: var(--primary);
            border: 2px solid var(--primary);
            box-shadow: var(--shadow-sm);
        }
        .btn-action.success {
            background: linear-gradient(145deg, #10b981 0%, var(--success) 100%);
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
        }
        .btn-action.danger {
            background: linear-gradient(145deg, #ef4444 0%, var(--error) 100%);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }
        .btn-action:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1.5rem;
            background: var(--card-bg);
            border-radius: var(--radius);
            margin: 0 1.25rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        .empty-state i { font-size: 2.75rem; color: var(--text-light); margin-bottom: 1rem; }
        .empty-state h3 { font-size: 1.125rem; font-weight: 700; color: var(--text-dark); margin-bottom: 0.5rem; }
        .empty-state p { font-size: 0.875rem; color: var(--text-medium); }
        .empty-state .btn {
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(145deg, #2563eb 0%, var(--primary) 100%);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 14px rgba(29, 78, 216, 0.35);
            transition: transform 0.3s var(--ease);
        }
        .empty-state .btn:active { transform: scale(0.98); }

        /* Loading */
        .loading { display: flex; justify-content: center; align-items: center; padding: 3rem; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s var(--ease) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Bottom nav: supplier-bottom-nav.css – same as dashboard */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .load-card { animation: fadeInUp 0.45s var(--ease) backwards; }

        @media (min-width: 768px) {
            body { max-width: 440px; margin: 0 auto; box-shadow: 0 0 48px rgba(15, 23, 42, 0.12); }
        }
    </style>
</head>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <!-- Firebase Init -->

    <!-- Alerts -->

    <!-- Main Script -->
    <script>
        // Initialize alerts
        const alertSystem = new AlertSystem();

        // Helper functions
        function showError(message) {
            alertSystem.show('error', message);
        }

        function showSuccess(message) {
            alertSystem.show('success', message);
        }

        // Global variables
        let allLoads = [];
        let filteredLoads = [];
        let currentFilter = 'all';

        // Format currency
        function formatCurrency(amount) {
            const num = parseFloat(amount) || 0;
            return '£' + num.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function getSupplierTotalCost(load) {
            const total = parseFloat(load.totalAmount || load.totalCost || 0);
            if (!isNaN(total) && total > 0) return total;
            const base = parseFloat(load.price || load.budget || load.maxBudget || load.minBudget || 0);
            const commission = parseFloat(load.supplierCommission || 0);
            return (isNaN(base) ? 0 : base) + (isNaN(commission) ? 0 : commission);
        }

        // Format date
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
            } catch {
                return dateString;
            }
        }

        // Get user data
        function getUserData() {
            const supplierAuth = localStorage.getItem('supplierAuth');
            if (!supplierAuth) return null;
            return JSON.parse(supplierAuth);
        }

        // Get status badge class
        function getStatusBadgeClass(status) {
            const statusLower = (status || '').toLowerCase();
            if (statusLower === 'available' || statusLower === 'pending') return 'available';
            if (statusLower === 'active' || statusLower === 'accepted') return 'active';
            if (statusLower === 'in_transit' || statusLower === 'in-transit') return 'in-transit';
            if (statusLower === 'completed' || statusLower === 'delivered') return 'completed';
            if (statusLower === 'cancelled' || statusLower === 'canceled') return 'cancelled';
            return 'pending';
        }

        // Get status text
        function getStatusText(status) {
            const statusLower = (status || '').toLowerCase();
            if (statusLower === 'available') return 'Available';
            if (statusLower === 'active' || statusLower === 'accepted') return 'Active';
            if (statusLower === 'in_transit' || statusLower === 'in-transit') return 'In Transit';
            if (statusLower === 'completed' || statusLower === 'delivered') return 'Completed';
            if (statusLower === 'pending') return 'Pending';
            if (statusLower === 'cancelled' || statusLower === 'canceled') return 'Cancelled';
            return status.charAt(0).toUpperCase() + status.slice(1).replace('-', ' ').replace('_', ' ');
        }

        // Cache for instant display
        const MY_LOADS_CACHE = 'supplier_my_loads';
        const CACHE_MAX_AGE = 60000; // 1 min

        function getCachedLoads(supplierId) {
            try {
                const raw = sessionStorage.getItem(MY_LOADS_CACHE);
                if (!raw) return null;
                const { data, supplierId: cachedId, ts } = JSON.parse(raw);
                if (cachedId !== supplierId || Date.now() - ts > CACHE_MAX_AGE) return null;
                return data;
            } catch (e) { return null; }
        }

        function setCachedLoads(supplierId, loads) {
            try {
                sessionStorage.setItem(MY_LOADS_CACHE, JSON.stringify({
                    supplierId,
                    data: loads,
                    ts: Date.now()
                }));
            } catch (e) { /* ignore */ }
        }

        function applyLoadsToUI(loads) {
            allLoads = loads;
            document.getElementById('loadsCount').textContent = `${allLoads.length} load${allLoads.length !== 1 ? 's' : ''}`;
            filterLoads(currentFilter);
        }

        // Load my loads
        async function loadMyLoads() {
            const user = getUserData();
            if (!user) {
                document.getElementById('loadsSection').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-sign-in-alt"></i>
                        <h3>Please Sign In</h3>
                        <p>Sign in to view your loads</p>
                    </div>
                `;
                return;
            }

            const supplierId = user.supplierId || user.email?.replace('@', '_').replace('.', '_');

            // 1. Show cache instantly
            const cached = getCachedLoads(supplierId);
            if (cached && Array.isArray(cached)) {
                applyLoadsToUI(cached);
            }

            try {
                const db = window.AlphaBrokrage.firebaseDb;
                let supplierLoads = [];

                // 2. Fast query - only this supplier's loads
                try {
                    const snapshot = await db.ref('loads').orderByChild('supplierId').equalTo(supplierId).once('value');
                    const val = snapshot.val() || {};
                    supplierLoads = Object.entries(val).map(([id, load]) => ({
                        ...load,
                        loadId: id,
                        id: id
                    }));
                } catch (qErr) {
                    const loadsRef = db.ref('loads');
                    const snapshot = await loadsRef.once('value');
                    const allLoadsData = snapshot.val() || {};
                    supplierLoads = Object.entries(allLoadsData).map(([id, load]) => ({
                        ...load,
                        loadId: id,
                        id: id
                    })).filter(load => {
                        return load.supplierId === supplierId ||
                               load.supplierEmail === user.email ||
                               load.postedBy === supplierId;
                    });
                }

                supplierLoads.sort((a, b) => {
                    const dateA = new Date(a.createdAt || a.created_at || 0);
                    const dateB = new Date(b.createdAt || b.created_at || 0);
                    return dateB - dateA;
                });

                setCachedLoads(supplierId, supplierLoads);
                applyLoadsToUI(supplierLoads);

            } catch (error) {
                console.error('Error loading loads:', error);
                showError('Failed to load loads');
                document.getElementById('loadsSection').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error</h3>
                        <p>Failed to load loads. Please try again.</p>
                    </div>
                `;
            }
        }

        // Filter loads
        function filterLoads(filter) {
            currentFilter = filter;

            // Update filter chips
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.classList.remove('active');
                if (chip.dataset.filter === filter) {
                    chip.classList.add('active');
                }
            });

            // Filter loads
            if (filter === 'all') {
                filteredLoads = allLoads;
            } else {
                filteredLoads = allLoads.filter(load => {
                    const status = (load.status || '').toLowerCase();
                    if (filter === 'available') {
                        return status === 'available' || status === 'pending';
                    } else if (filter === 'active') {
                        return status === 'active' || status === 'accepted';
                    } else if (filter === 'in-transit') {
                        return status === 'in_transit' || status === 'in-transit';
                    } else if (filter === 'completed') {
                        return status === 'completed' || status === 'delivered';
                    }
                    return false;
                });
            }

            // Display loads
            displayLoads();
        }

        // Display loads
        function displayLoads() {
            const loadsSection = document.getElementById('loadsSection');

            if (filteredLoads.length === 0) {
                loadsSection.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>No Loads Found</h3>
                        <p>${currentFilter === 'all' ? 'You haven\'t posted any loads yet.' : `No ${currentFilter} loads found.`}</p>
                        ${currentFilter === 'all' ? '<a href="post-load.html" class="btn"><i class="fas fa-plus"></i> Post Your First Load</a>' : ''}
                    </div>
                `;
                return;
            }

            loadsSection.innerHTML = filteredLoads.map(load => {
                const status = getStatusBadgeClass(load.status);
                const statusText = getStatusText(load.status);
                const pickupLocation = load.pickupLocation || load.from || 'N/A';
                const deliveryLocation = load.deliveryLocation || load.to || 'N/A';
                const price = formatCurrency(getSupplierTotalCost(load));
                const pickupDate = formatDate(load.pickupDate);
                const cargoType = load.cargoType || load.cargo || 'General';
                const loadId = load.loadId || load.id || 'N/A';
                const formattedLoadId = load.formattedLoadId || `LOAD-${loadId.substring(0, 8).toUpperCase()}`;

                // Determine actions based on status
                const statusLower = (load.status || '').toLowerCase();
                let actionsHTML = '';
                
                if (statusLower === 'available' || statusLower === 'pending') {
                    actionsHTML = `
                        <button class="btn-action secondary" onclick="viewLoad('${loadId}')">
                            <i class="fas fa-eye"></i>
                            View
                        </button>
                        <button class="btn-action danger" onclick="cancelLoad('${loadId}')">
                            <i class="fas fa-times"></i>
                            Cancel
                        </button>
                    `;
                } else if (statusLower === 'active' || statusLower === 'accepted') {
                    actionsHTML = `
                        <button class="btn-action" onclick="viewLoad('${loadId}')">
                            <i class="fas fa-eye"></i>
                            View
                        </button>
                        <button class="btn-action secondary" onclick="trackLoad('${loadId}')">
                            <i class="fas fa-map-marker-alt"></i>
                            Track
                        </button>
                    `;
                } else if (statusLower === 'in_transit' || statusLower === 'in-transit') {
                    actionsHTML = `
                        <button class="btn-action" onclick="viewLoad('${loadId}')">
                            <i class="fas fa-eye"></i>
                            View
                        </button>
                        <button class="btn-action success" onclick="trackLoad('${loadId}')">
                            <i class="fas fa-map-marker-alt"></i>
                            Track
                        </button>
                    `;
                } else if (statusLower === 'completed' || statusLower === 'delivered') {
                    actionsHTML = `
                        <button class="btn-action" onclick="viewLoad('${loadId}')">
                            <i class="fas fa-eye"></i>
                            View Details
                        </button>
                    `;
                } else {
                    actionsHTML = `
                        <button class="btn-action" onclick="viewLoad('${loadId}')">
                            <i class="fas fa-eye"></i>
                            View
                        </button>
                    `;
                }

                return `
                    <div class="load-card" onclick="viewLoad('${loadId}')">
                        <div class="load-header">
                            <div class="load-route">
                                <div class="route-title">
                                    <i class="fas fa-route"></i>
                                    ${pickupLocation} → ${deliveryLocation}
                                </div>
                                <div class="route-subtitle">${formattedLoadId}</div>
                            </div>
                            <div class="load-status ${status}">${statusText}</div>
                        </div>
                        <div class="load-details">
                            <div class="load-detail-item">
                                <i class="fas fa-calendar"></i>
                                <span>Pickup: ${pickupDate}</span>
                            </div>
                            <div class="load-detail-item">
                                <i class="fas fa-box"></i>
                                <span>${cargoType}</span>
                            </div>
                        </div>
                        <div class="load-price">${price}</div>
                        <div class="load-actions" onclick="event.stopPropagation()">
                            ${actionsHTML}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // View load details
        function viewLoad(loadId) {
            if (loadId && loadId !== 'N/A') {
                window.location.href = `load-details.html?id=${loadId}`;
            }
        }

        // Track load
        function trackLoad(loadId) {
            if (loadId && loadId !== 'N/A') {
                window.location.href = `track.html?loadId=${loadId}`;
            }
        }

        // Cancel load
        async function cancelLoad(loadId) {
            if (!confirm('Are you sure you want to cancel this load?')) {
                return;
            }

            try {
                const db = window.AlphaBrokrage.firebaseDb;
                await db.ref(`loads/${loadId}`).update({
                    status: 'cancelled',
                    cancelledAt: new Date().toISOString()
                });

                showSuccess('Load cancelled successfully');
                
                // Reload loads
                setTimeout(() => {
                    loadMyLoads();
                }, 1000);

            } catch (error) {
                console.error('Error cancelling load:', error);
                showError('Failed to cancel load');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadMyLoads();
        });
    </script>
</body>
</html>
