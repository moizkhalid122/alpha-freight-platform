        /* —— Premium theme (matches dashboard) —— */
        :root {
            --primary: #635bff;
            --primary-dark: #4f46e5;
            --primary-light: #8b5cf6;
            --accent: #06b6d4;
            --gold: #c9a227;
            --success: #059669;

            --warning: #d97706;
            --text-dark: #0f172a;
            --text-medium: #475569;
            --text-light: #94a3b8;

            --card-bg: rgba(255,255,255,0.92);

            --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08), 0 2px 8px rgba(15, 23, 42, 0.04);

            --radius: 22px;
            --radius-sm: 14px;
            --page-pad: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-main);
            min-height: 100vh;
            color: var(--text-dark);
            line-height: 1.55;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            /* footer from supplier-bottom-nav.css */
        }
        body::before{
            content:"";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(900px 520px at 14% 8%, rgba(99, 91, 255, 0.10), rgba(246,247,251,0) 62%),

        body > *{ position: relative; z-index: 1; }

        .header-content { position: relative; z-index: 1; }

    <!-- Main Script -->
    <script>
        // Initialize alerts
        const alertSystem = new AlertSystem();

        // Helper functions
        function showError(message) {
            alertSystem.show('error', message);
        }

        function showSuccess(message) {
            alertSystem.show('success', message);
        }

        // Global variables
        let allLoads = [];
        let filteredLoads = [];
        let currentFilter = 'all';

        // Format currency
        function formatCurrency(amount) {
            const num = parseFloat(amount) || 0;
            return '£' + num.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function getSupplierTotalCost(load) {
            const total = parseFloat(load.totalAmount || load.totalCost || 0);
            if (!isNaN(total) && total > 0) return total;
            const base = parseFloat(load.price || load.budget || load.maxBudget || load.minBudget || 0);
            const commission = parseFloat(load.supplierCommission || 0);
            return (isNaN(base) ? 0 : base) + (isNaN(commission) ? 0 : commission);
        }

        // Format date
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
            } catch {
                return dateString;
            }
        }

        // Get user data
        function getUserData() {
            const supplierAuth = localStorage.getItem('supplierAuth');
            if (!supplierAuth) return null;
            return JSON.parse(supplierAuth);
        }

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return false;
            if (authSdk.currentUser) return true;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => { if (!done) { done = true; resolve(); } }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
            return !!authSdk.currentUser;
        }

        async function resolveSupplierIdByUid(db, authUid, fallbackId) {
            if (!db || !authUid) return fallbackId || '';
            if (fallbackId) {
                try {
                    const snap = await db.ref('suppliers/' + String(fallbackId)).once('value');
                    if (snap.exists()) {
                        const v = snap.val() || {};
                        if (v.firebaseUid && String(v.firebaseUid) === String(authUid)) return String(fallbackId);
                    }
                } catch (e) {}
            }
            try {
                const snap = await db.ref('suppliers').orderByChild('firebaseUid').equalTo(String(authUid)).limitToFirst(1).once('value');
                if (snap.exists()) {
                    let out = '';
                    snap.forEach((ch) => { if (!out) out = ch.key; });
                    if (out) return out;
                }
            } catch (e) {}
            return fallbackId || '';
        }

        // Get status badge class
        function getStatusBadgeClass(status) {
            const statusLower = (status || '').toLowerCase();
            if (statusLower === 'available' || statusLower === 'pending') return 'available';
            if (statusLower === 'active' || statusLower === 'accepted') return 'active';
            if (statusLower === 'in_transit' || statusLower === 'in-transit') return 'in-transit';
            if (statusLower === 'completed' || statusLower === 'delivered') return 'completed';
            if (statusLower === 'cancelled' || statusLower === 'canceled') return 'cancelled';
            return 'pending';
        }

        // Get status text
        function getStatusText(status) {
            const statusLower = (status || '').toLowerCase();
            if (statusLower === 'available') return 'Available';
            if (statusLower === 'active' || statusLower === 'accepted') return 'Active';
            if (statusLower === 'in_transit' || statusLower === 'in-transit') return 'In Transit';
            if (statusLower === 'completed' || statusLower === 'delivered') return 'Completed';
            if (statusLower === 'pending') return 'Pending';
            if (statusLower === 'cancelled' || statusLower === 'canceled') return 'Cancelled';
            return status.charAt(0).toUpperCase() + status.slice(1).replace('-', ' ').replace('_', ' ');
        }

        // Cache for instant display
        const MY_LOADS_CACHE = 'supplier_my_loads';
        const CACHE_MAX_AGE = 60000; // 1 min

        function getCachedLoads(supplierId) {
            try {
                const raw = sessionStorage.getItem(MY_LOADS_CACHE);
                if (!raw) return null;
                const { data, supplierId: cachedId, ts } = JSON.parse(raw);
                if (cachedId !== supplierId || Date.now() - ts > CACHE_MAX_AGE) return null;
                return data;
            } catch (e) { return null; }
        }

        function setCachedLoads(supplierId, loads) {
            try {
                sessionStorage.setItem(MY_LOADS_CACHE, JSON.stringify({
                    supplierId,
                    data: loads,
                    ts: Date.now()
                }));
            } catch (e) { /* ignore */ }
        }

        function applyLoadsToUI(loads) {
            allLoads = loads;
            document.getElementById('loadsCount').textContent = `${allLoads.length} load${allLoads.length !== 1 ? 's' : ''}`;
            filterLoads(currentFilter);
        }

        // Load my loads
        async function loadMyLoads() {
            const user = getUserData();
            if (!user) {
                document.getElementById('loadsSection').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-sign-in-alt"></i>
                        <h3>Please Sign In</h3>
                        <p>Sign in to view your loads</p>
                    </div>
                `;
                return;
            }

            const supplierId = user.supplierId || user.email?.replace('@', '_').replace('.', '_');

            // 1. Show cache instantly
            const cached = getCachedLoads(supplierId);
            if (cached && Array.isArray(cached)) {
                applyLoadsToUI(cached);
            }

            try {
                const db = window.AlphaBrokrage.firebaseDb;
                let supplierLoads = [];

                const ok = await ensureAuthReady();
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                if (!ok || !authSdk || !authSdk.currentUser) {
                    document.getElementById('loadsSection').innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-sign-in-alt"></i>
                            <h3>Please Sign In</h3>
                            <p>Session expired. Please login again.</p>
                        </div>
                    `;
                    return;
                }

                const authUid = String(authSdk.currentUser.uid || '');
                const authEmail = String(authSdk.currentUser.email || user.email || '');
                const resolvedSupplierId = await resolveSupplierIdByUid(db, authUid, supplierId);

                const map = {};
                async function mergeQuery(q) {
                    const snap = await q.once('value');
                    if (!snap.exists()) return;
                    snap.forEach((ch) => {
                        const v = ch.val() || {};
                        map[ch.key] = { ...v, loadId: ch.key, id: ch.key };
                    });
                }

                const jobs = [
                    mergeQuery(db.ref('loads').orderByChild('supplierFirebaseUid').equalTo(authUid))
                ];
                if (authEmail) jobs.push(mergeQuery(db.ref('loads').orderByChild('supplierEmail').equalTo(authEmail)));
                if (resolvedSupplierId) jobs.push(mergeQuery(db.ref('loads').orderByChild('supplierId').equalTo(resolvedSupplierId)));
                await Promise.allSettled(jobs);

                supplierLoads = Object.values(map);

                supplierLoads.sort((a, b) => {
                    const dateA = new Date(a.createdAt || a.created_at || 0);
                    const dateB = new Date(b.createdAt || b.created_at || 0);
                    return dateB - dateA;
                });

                setCachedLoads(supplierId, supplierLoads);
                applyLoadsToUI(supplierLoads);

            } catch (error) {
                console.error('Error loading loads:', error);
                showError('Failed to load loads');
                document.getElementById('loadsSection').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error</h3>
                        <p>Failed to load loads. Please try again.</p>
                    </div>
                `;
            }
        }

        // Filter loads
        function filterLoads(filter) {
            currentFilter = filter;

            // Update filter chips
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.classList.remove('active');
                if (chip.dataset.filter === filter) {
                    chip.classList.add('active');
                }
            });

            // Filter loads
            if (filter === 'all') {
                filteredLoads = allLoads;
            } else {
                filteredLoads = allLoads.filter(load => {
                    const status = (load.status || '').toLowerCase();
                    if (filter === 'available') {
                        return status === 'available' || status === 'pending';
                    } else if (filter === 'active') {
                        return status === 'active' || status === 'accepted';
                    } else if (filter === 'in-transit') {
                        return status === 'in_transit' || status === 'in-transit';
                    } else if (filter === 'completed') {
                        return status === 'completed' || status === 'delivered';
                    }
                    return false;
                });
            }

            // Display loads
            displayLoads();
        }

        // Display loads
        function displayLoads() {
            const loadsSection = document.getElementById('loadsSection');

            if (filteredLoads.length === 0) {
                loadsSection.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>No Loads Found</h3>
                        <p>${currentFilter === 'all' ? 'You haven\'t posted any loads yet.' : `No ${currentFilter} loads found.`}</p>
                        ${currentFilter === 'all' ? '<a href="post-load.html" class="btn"><i class="fas fa-plus"></i> Post Your First Load</a>' : ''}
                    </div>
                `;
                return;
            }

            loadsSection.innerHTML = filteredLoads.map(load => {
                const status = getStatusBadgeClass(load.status);
                const statusText = getStatusText(load.status);
                const pickupLocation = load.pickupLocation || load.from || 'N/A';
                const deliveryLocation = load.deliveryLocation || load.to || 'N/A';
                const price = formatCurrency(getSupplierTotalCost(load));
                const pickupDate = formatDate(load.pickupDate);
                const cargoType = load.cargoType || load.cargo || 'General';
                const loadId = load.loadId || load.id || 'N/A';
                const formattedLoadId = load.formattedLoadId || `LOAD-${loadId.substring(0, 8).toUpperCase()}`;

                // Determine actions based on status
                const statusLower = (load.status || '').toLowerCase();
                let actionsHTML = '';
                
                if (statusLower === 'available' || statusLower === 'pending') {
                    actionsHTML = `
                        <button class="btn-action secondary" onclick="viewLoad('${loadId}')">
                            <i class="fas fa-eye"></i>
                            View
                        </button>
                        <button class="btn-action danger" onclick="cancelLoad('${loadId}')">
                            <i class="fas fa-times"></i>
                            Cancel
                        </button>
                    `;
                } else if (statusLower === 'active' || statusLower === 'accepted') {
                    actionsHTML = `
                        <button class="btn-action" onclick="viewLoad('${loadId}')">
                            <i class="fas fa-eye"></i>
                            View
                        </button>
                        <button class="btn-action secondary" onclick="trackLoad('${loadId}')">
                            <i class="fas fa-map-marker-alt"></i>
                            Track
                        </button>
                    `;
                } else if (statusLower === 'in_transit' || statusLower === 'in-transit') {
                    actionsHTML = `
                        <button class="btn-action" onclick="viewLoad('${loadId}')">
                            <i class="fas fa-eye"></i>
                            View
                        </button>
                        <button class="btn-action success" onclick="trackLoad('${loadId}')">
                            <i class="fas fa-map-marker-alt"></i>
                            Track
                        </button>
                    `;
                } else if (statusLower === 'completed' || statusLower === 'delivered') {
                    actionsHTML = `
                        <button class="btn-action" onclick="viewLoad('${loadId}')">
                            <i class="fas fa-eye"></i>
                            View Details
                        </button>
                    `;
                } else {
                    actionsHTML = `
                        <button class="btn-action" onclick="viewLoad('${loadId}')">
                            <i class="fas fa-eye"></i>
                            View
                        </button>
                    `;
                }

                return `
                    <div class="load-card" onclick="viewLoad('${loadId}')">
                        <div class="load-header">
                            <div class="load-route">
                                <div class="route-title">
                                    <i class="fas fa-route"></i>
                                    ${pickupLocation} → ${deliveryLocation}
                                </div>
                                <div class="route-subtitle">${formattedLoadId}</div>
                            </div>
                            <div class="load-status ${status}">${statusText}</div>
                        </div>
                        <div class="load-details">
                            <div class="load-detail-item">
                                <i class="fas fa-calendar"></i>
                                <span>Pickup: ${pickupDate}</span>
                            </div>
                            <div class="load-detail-item">
                                <i class="fas fa-box"></i>
                                <span>${cargoType}</span>
                            </div>
                        </div>
                        <div class="load-price">${price}</div>
                        <div class="load-actions" onclick="event.stopPropagation()">
                            ${actionsHTML}
                        </div>
                        <div class="ai-tools" onclick="event.stopPropagation()">
                            <button class="btn-ai primary" onclick="openAiStatusExplain('${loadId}')"><i class="fas fa-wand-magic-sparkles"></i>AI Explain</button>
                            <button class="btn-ai" onclick="openAiDisputeHelper('${loadId}')"><i class="fas fa-file-signature"></i>AI Dispute</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        let myLoadsAiCopyText = '';
        let myLoadsAiCurrentLoadId = '';

        function getLoadById(loadId) {
            const id = String(loadId || '');
            if (!id) return null;
            return (allLoads || []).find(l => String(l.loadId || l.id || '') === id) || null;
        }

        function normalizeStatusKey(status) {
            const s = String(status || '').toLowerCase().replace(/_/g, '-');
            if (s === 'delivered') return 'completed';
            if (s === 'in-transit') return 'in-transit';
            if (s === 'intransit') return 'in-transit';
            if (s === 'picked-up') return 'in-transit';
            if (s === 'accepted') return 'active';
            return s || 'unknown';
        }

        function openMyLoadsAi(title, html, { copyText } = {}) {
            const overlay = document.getElementById('myLoadsAiOverlay');
            const head = document.getElementById('myLoadsAiTitle');
            const body = document.getElementById('myLoadsAiBody');
            if (!overlay || !head || !body) return;
            head.textContent = title || 'AI';
            body.innerHTML = html || '';
            myLoadsAiCopyText = String(copyText || '');
            overlay.style.display = 'flex';
            overlay.setAttribute('aria-hidden', 'false');
            setTimeout(() => {
                try { document.getElementById('myLoadsAiClose')?.focus(); } catch (e) {}
            }, 0);
        }

        function closeMyLoadsAi() {
            const overlay = document.getElementById('myLoadsAiOverlay');
            if (!overlay) return;
            overlay.style.display = 'none';
            overlay.setAttribute('aria-hidden', 'true');
            myLoadsAiCopyText = '';
            myLoadsAiCurrentLoadId = '';
        }

        async function copyToClipboard(text) {
            const t = String(text || '');
            if (!t) return false;
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(t);
                    return true;
                }
            } catch (e) {}
            try {
                const el = document.createElement('textarea');
                el.value = t;
                el.style.position = 'fixed';
                el.style.left = '-9999px';
                document.body.appendChild(el);
                el.select();
                const ok = document.execCommand('copy');
                document.body.removeChild(el);
                return !!ok;
            } catch (e) {}
            return false;
        }

        function getStatusExplain(statusKey) {
            const m = {
                available: {
                    meaning: 'Your load is posted and waiting for a carrier to accept.',
                    next: 'Review your price and details. If you need it fast, increase budget or mark urgent.',
                    msg: 'Hi, please confirm if you can accept this load and your earliest pickup time. Thanks.'
                },
                pending: {
                    meaning: 'Your load is pending (not yet accepted or still being reviewed).',
                    next: 'Wait for carrier acceptance. You can update details or cancel if needed.',
                    msg: 'Hi, any update on accepting this load? Please confirm pickup time if possible.'
                },
                active: {
                    meaning: 'A carrier has accepted the load and it is active.',
                    next: 'Confirm pickup details and keep an eye on tracking updates.',
                    msg: 'Hi, please confirm pickup address and time for this load. Thank you.'
                },
                'in-transit': {
                    meaning: 'The load is in transit (picked up and on the way).',
                    next: 'Ensure delivery site is ready. If delayed, request an ETA update.',
                    msg: 'Hi, can you share the latest ETA for delivery? Thanks.'
                },
                completed: {
                    meaning: 'The delivery is completed.',
                    next: 'Confirm POD/documents and proceed with payment if required.',
                    msg: 'Hi, please share POD/invoice so we can close this load. Thanks.'
                },
                cancelled: {
                    meaning: 'This load is cancelled.',
                    next: 'If you still need shipment, repost with updated details. If cancelled by carrier, raise a dispute.',
                    msg: 'Hi, I would like to understand the reason for cancellation and discuss next steps.'
                },
                unknown: {
                    meaning: 'Status is not recognized.',
                    next: 'Open the load to see full details and latest updates.',
                    msg: 'Hi, please confirm the latest status update for this load.'
                }
            };
            return m[statusKey] || m.unknown;
        }

        function openAiStatusExplain(loadId) {
            myLoadsAiCurrentLoadId = String(loadId || '');
            const load = getLoadById(loadId) || {};
            const statusKey = normalizeStatusKey(load.status);
            const info = getStatusExplain(statusKey);
            const loadIdText = load.formattedLoadId || (loadId ? `LOAD-${String(loadId).slice(0, 8).toUpperCase()}` : 'LOAD');
            const pickup = load.pickupLocation || load.from || 'Pickup';
            const delivery = load.deliveryLocation || load.to || 'Delivery';
            const html = `
                <div class="ai-box">
                    <div class="ai-h">Status: ${getStatusText(load.status || statusKey)}</div>
                    <div class="ai-p">${info.meaning}</div>
                </div>
                <div style="height:10px;"></div>
                <div class="ai-box">
                    <div class="ai-h">Next Step</div>
                    <div class="ai-p">${info.next}</div>
                </div>
                <div style="height:10px;"></div>
                <div class="ai-box">
                    <div class="ai-h">Message Template</div>
                    <div class="ai-p">${loadIdText} • ${pickup} → ${delivery}</div>
                    <div class="ai-p" id="myLoadsAiMsgPreview"></div>
                    <div class="ai-actions">
                        <button type="button" class="ai-btn" id="myLoadsAiCopyBtn"><i class="fas fa-copy"></i>Copy</button>
                        <button type="button" class="ai-btn primary" onclick="viewLoad('${String(loadId || '').replace(/'/g, '\\\\\'')}')"><i class="fas fa-eye"></i>Open Load</button>
                    </div>
                </div>
            `;
            const msg = `${info.msg} (${loadIdText})`;
            openMyLoadsAi('AI Status Explainer', html, { copyText: msg });
            try {
                const prev = document.getElementById('myLoadsAiMsgPreview');
                if (prev) prev.textContent = msg;
                const copyBtn = document.getElementById('myLoadsAiCopyBtn');
                if (copyBtn) copyBtn.onclick = async function () {
                    const ok = await copyToClipboard(myLoadsAiCopyText);
                    if (ok) showSuccess('Copied to clipboard');
                    else showError('Copy failed');
                };
            } catch (e) {}
        }

        function generateDisputeDraft(load, type, extra) {
            const user = getUserData() || {};
            const supplierName = (user && (user.contactName || user.firstName || user.email)) ? String(user.contactName || user.firstName || user.email) : 'Supplier';
            const loadId = String(load.loadId || load.id || '');
            const loadIdText = load.formattedLoadId || (loadId ? `LOAD-${loadId.slice(0, 8).toUpperCase()}` : 'LOAD');
            const pickup = load.pickupLocation || load.from || 'N/A';
            const delivery = load.deliveryLocation || load.to || 'N/A';
            const status = getStatusText(load.status || '');
            const price = formatCurrency(getSupplierTotalCost(load));
            const base = `Hello Alpha Freight Support,\n\nI would like to raise a dispute for the following load:\n- Load: ${loadIdText}\n- Route: ${pickup} → ${delivery}\n- Status: ${status}\n- Amount: ${price}\n\nIssue:\n`;
            const tail = `\n\nRequested resolution:\n${type === 'Refund request' ? 'Please process a refund or advise next steps.' : 'Please review and advise next steps.'}\n\nThanks,\n${supplierName}`;
            const details = extra ? `- ${extra}\n` : '';
            if (type === 'Cancellation dispute') {
                return base + `The load was cancelled and I need clarification and resolution.\n${details}` + tail;
            }
            if (type === 'Refund request') {
                return base + `I am requesting a refund due to service/delivery issue.\n${details}` + tail;
            }
            return base + `Please review this issue.\n${details}` + tail;
        }

        function openAiDisputeHelper(loadId) {
            myLoadsAiCurrentLoadId = String(loadId || '');
            const load = getLoadById(loadId) || {};
            const loadIdText = load.formattedLoadId || (loadId ? `LOAD-${String(loadId).slice(0, 8).toUpperCase()}` : 'LOAD');
            const html = `
                <div class="ai-box">
                    <div class="ai-h">AI Dispute Helper</div>
                    <div class="ai-p">Select dispute type and generate a professional cancellation/refund draft for ${loadIdText}.</div>
                    <select class="ai-select" id="aiDisputeType">
                        <option value="Cancellation dispute">Cancellation dispute</option>
                        <option value="Refund request">Refund request</option>
                    </select>
                    <select class="ai-select" id="aiDisputeReason">
                        <option value="">Reason (optional)</option>
                        <option value="Carrier cancelled last minute">Carrier cancelled last minute</option>
                        <option value="Late pickup/delivery">Late pickup/delivery</option>
                        <option value="Damaged goods">Damaged goods</option>
                        <option value="Service not delivered">Service not delivered</option>
                        <option value="Overcharged / wrong amount">Overcharged / wrong amount</option>
                    </select>
                    <textarea class="ai-textarea" id="aiDisputeDraft" placeholder="Draft will appear here…"></textarea>
                    <div class="ai-actions">
                        <button type="button" class="ai-btn" id="aiDisputeCopy"><i class="fas fa-copy"></i>Copy</button>
                        <button type="button" class="ai-btn primary" id="aiDisputeGen"><i class="fas fa-sparkles"></i>Generate</button>
                    </div>
                </div>
            `;
            openMyLoadsAi('AI Dispute Helper', html);
            try {
                const typeEl = document.getElementById('aiDisputeType');
                const reasonEl = document.getElementById('aiDisputeReason');
                const draftEl = document.getElementById('aiDisputeDraft');
                const genBtn = document.getElementById('aiDisputeGen');
                const copyBtn = document.getElementById('aiDisputeCopy');
                function gen() {
                    const type = typeEl ? typeEl.value : 'Cancellation dispute';
                    const reason = reasonEl ? reasonEl.value : '';
                    const draft = generateDisputeDraft(load, type, reason);
                    if (draftEl) draftEl.value = draft;
                    myLoadsAiCopyText = draft;
                }
                if (genBtn) genBtn.onclick = gen;
                gen();
                if (copyBtn) copyBtn.onclick = async function () {
                    const ok = await copyToClipboard(myLoadsAiCopyText || (draftEl ? draftEl.value : ''));
                    if (ok) showSuccess('Copied to clipboard');
                    else showError('Copy failed');
                };
            } catch (e) {}
        }

        // View load details
        function viewLoad(loadId) {
            if (loadId && loadId !== 'N/A') {
                window.location.href = `load-details.html?id=${loadId}`;
            }
        }

        // Track load
        function trackLoad(loadId) {
            if (loadId && loadId !== 'N/A') {
                window.location.href = `track.html?loadId=${loadId}`;
            }
        }

        // Cancel load
        async function cancelLoad(loadId) {
            if (!confirm('Are you sure you want to cancel this load?')) {
                return;
            }

            try {
                const db = window.AlphaBrokrage.firebaseDb;
                await db.ref(`loads/${loadId}`).update({
                    status: 'cancelled',
                    cancelledAt: new Date().toISOString()
                });

                showSuccess('Load cancelled successfully');
                
                // Reload loads
                setTimeout(() => {
                    loadMyLoads();
                }, 1000);

            } catch (error) {
                console.error('Error cancelling load:', error);
                showError('Failed to cancel load');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            const overlay = document.getElementById('myLoadsAiOverlay');
            const closeBtn = document.getElementById('myLoadsAiClose');
            if (closeBtn) closeBtn.addEventListener('click', closeMyLoadsAi);
            if (overlay) overlay.addEventListener('click', (e) => { if (e.target === overlay) closeMyLoadsAi(); });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeMyLoadsAi(); });
            loadMyLoads();
        });
    </script>
</body>
</html>
