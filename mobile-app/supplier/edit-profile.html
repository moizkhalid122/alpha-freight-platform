    <style>
        :root {
            --primary: #1d4ed8;
            --primary-dark: #1e3a8a;
            --primary-light: #60a5fa;
            --success: #059669;
            --error: #dc2626;
            --warning: #d97706;
            --text-dark: #0f172a;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --bg-main: #f1f5f9;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08), 0 2px 8px rgba(15, 23, 42, 0.04);
            --shadow-card: 0 8px 32px rgba(15, 23, 42, 0.06), 0 2px 8px rgba(15, 23, 42, 0.03);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --radius: 22px;
            --radius-sm: 14px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #e2e8f0 0%, #f1f5f9 18%, #f8fafc 100%);
            min-height: 100vh;
            color: var(--text-dark);
            line-height: 1.55;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .page-header {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 50%, #1e3a8a 100%);
            color: #fff;
            padding: 1.75rem 1.25rem 1.5rem;
            border-radius: 0 0 32px 32px;
            margin-bottom: 1.25rem;
            position: relative;
            overflow: hidden;
        }
        .page-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(600px 220px at 10% 10%, rgba(96, 165, 250, 0.22) 0%, transparent 60%),
                radial-gradient(520px 220px at 90% 30%, rgba(29, 78, 216, 0.18) 0%, transparent 62%);
            pointer-events: none;
        }
        .header-row { position: relative; z-index: 1; display:flex; align-items:center; gap: 0.9rem; }
        .back-btn {
            background: rgba(255,255,255,0.16);
            border: 1px solid rgba(255,255,255,0.22);
            color: #fff;
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            text-decoration:none;
            transition: transform 0.25s var(--ease), background 0.25s var(--ease);
        }
        .back-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.22); }
        .page-title { font-size:1.25rem; font-weight:800; }
        .page-sub { font-size:0.875rem; opacity:0.9; margin-top:0.25rem; color: rgba(255,255,255,0.9); }

        .form-card {
            background: var(--card-bg);
            margin: 0 1.25rem 1.25rem;
            padding: 1.25rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            position: relative;
            overflow: hidden;
        }
        .form-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary-light), var(--primary));
            opacity: 0.7;
        }
        .form-group { margin-bottom: 1rem; }
        .form-label { display:flex; align-items:center; justify-content:space-between; gap:0.75rem; font-size:0.8125rem; font-weight:800; color:var(--text-medium); margin-bottom:0.55rem; text-transform: uppercase; letter-spacing: 0.04em; }
        .form-label small { font-weight:700; color:var(--text-light); text-transform: none; letter-spacing: 0; }
        .input {
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            background: rgba(241, 245, 249, 0.8);
            color: var(--text-dark);
            transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease), background 0.25s var(--ease);
        }
        .input:focus { outline:none; border-color: rgba(29, 78, 216, 0.85); box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.14); background:#fff; }
        .input:disabled { background: rgba(241, 245, 249, 0.75); color: var(--text-medium); }
        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }

        .submit-btn {
            width:100%;
            padding: 0.95rem 1rem;
            background: linear-gradient(145deg, #2563eb 0%, var(--primary) 60%, #1e3a8a 100%);
            color:white;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 999px;
            font-size:1rem;
            font-weight:900;
            cursor:pointer;
            box-shadow: 0 16px 32px rgba(29, 78, 216, 0.22);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
        }
        .submit-btn:active { transform: scale(0.99); }
        .submit-btn:disabled { opacity:0.6; cursor:not-allowed; }
        .note { font-size:0.75rem; color:var(--text-medium); margin-top:0.75rem; text-align:center; }

        .wizard {
            margin: -0.25rem 1.25rem 1.15rem;
            padding: 0.9rem 1rem;
            border-radius: var(--radius);
            border: 1px solid rgba(15, 23, 42, 0.08);
            background: rgba(255, 255, 255, 0.75);
            box-shadow: var(--shadow-sm);
            backdrop-filter: blur(10px);
        }
        .wizard-top { display:flex; align-items:center; justify-content:flex-start; gap:0.75rem; margin-bottom:0.65rem; }
        .wizard-step { font-weight: 900; letter-spacing: -0.02em; color: var(--text-dark); font-size: 0.95rem; }
        .wizard-sub { font-size: 0.8rem; color: var(--text-medium); }
        .wizard-bar { height: 8px; border-radius: 999px; background: rgba(15, 23, 42, 0.08); overflow:hidden; }
        .wizard-bar > div { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary-light), var(--primary)); border-radius: 999px; transition: width 0.25s var(--ease); }

        .step { display:none; }
        .step.active { display:block; }
        .step-actions { display:flex; gap:0.75rem; margin-top: 1rem; }
        .step-actions .submit-btn { flex: 1; }
        .step-secondary {
            flex: 1;
            padding: 0.95rem 1rem;
            border-radius: 999px;
            border: 1px solid rgba(15, 23, 42, 0.14);
            background: rgba(255,255,255,0.6);
            color: var(--text-dark);
            font-weight: 900;
            cursor: pointer;
        }
        .step-secondary:active { transform: scale(0.99); }

        @media (min-width: 768px) { body { max-width: 500px; margin: 0 auto; } }
        @media (max-width: 480px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>

    <script>
        const alertSystem = new AlertSystem();
        const WIZ_KEY = 'ab.supplier.editprofile.step.v1';

        function setWizardUI(stepIndex, stepsTotal) {
            const title = document.getElementById('wizStepTitle');
            const sub = document.getElementById('wizStepSub');
            const bar = document.getElementById('wizBar');
            const labels = ['Personal details', 'Business details', 'Address & verification'];
            if (title) title.textContent = `Step ${stepIndex + 1} of ${stepsTotal}`;
            if (sub) sub.textContent = labels[stepIndex] || '';
            if (bar) bar.style.width = `${Math.round(((stepIndex + 1) / stepsTotal) * 100)}%`;
        }

        function showStep(stepIndex) {
            const steps = [document.getElementById('step1'), document.getElementById('step2'), document.getElementById('step3')].filter(Boolean);
            const total = steps.length || 3;
            steps.forEach((el, i) => {
                if (!el) return;
                if (i === stepIndex) el.classList.add('active');
                else el.classList.remove('active');
            });
            setWizardUI(stepIndex, total);
            try { sessionStorage.setItem(WIZ_KEY, String(stepIndex)); } catch (e) {}
            try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) { window.scrollTo(0, 0); }
        }

        function getSavedStep() {
            try {
                const raw = sessionStorage.getItem(WIZ_KEY);
                const n = raw ? parseInt(raw, 10) : 0;
                return Number.isFinite(n) ? Math.max(0, Math.min(2, n)) : 0;
            } catch (e) {
                return 0;
            }
        }

        function isFilled(id) {
            const el = document.getElementById(id);
            if (!el) return false;
            const v = String(el.value || '').trim();
            return v.length > 0;
        }

        function validateStep(stepIndex) {
            if (stepIndex === 0) {
                if (!isFilled('firstName') || !isFilled('lastName') || !isFilled('phone')) {
                    alertSystem.show('error', 'Please complete: First name, Last name, Phone');
                    return false;
                }
            }
            if (stepIndex === 1) {
                if (!isFilled('companyName') || !isFilled('businessType') || !isFilled('yearsOperation')) {
                    alertSystem.show('error', 'Please complete: Company name, Business type, Years of operation');
                    return false;
                }
            }
            if (stepIndex === 2) {
                if (!isFilled('address') || !isFilled('city') || !isFilled('postcode') || !isFilled('country')) {
                    alertSystem.show('error', 'Please complete: Address, City, Postcode, Country');
                    return false;
                }
            }
            return true;
        }

        function getSupplierAuth() {
            try {
                const raw = localStorage.getItem('supplierAuth') || localStorage.getItem('lastSupplierProfile');
                return raw ? JSON.parse(raw) : null;
            } catch (e) { return null; }
        }

        function prefill() {
            const user = getSupplierAuth();
            if (!user) return;
            document.getElementById('firstName').value = user.firstName || '';
            document.getElementById('lastName').value = user.lastName || '';
            document.getElementById('email').value = user.email || '';
            document.getElementById('companyName').value = user.companyName || user.company || '';
            document.getElementById('businessType').value = user.businessType || '';
            document.getElementById('yearsOperation').value = user.yearsOperation || '';
            document.getElementById('phone').value = user.phone || '';
            document.getElementById('address').value = user.address || user.address1 || '';
            document.getElementById('city').value = user.city || '';
            document.getElementById('postcode').value = user.postcode || user.zip || '';
            document.getElementById('country').value = user.country || 'United Kingdom';

            const titleEl = document.getElementById('pageTitle');
            const subEl = document.getElementById('pageSubtitle');
            if (titleEl && subEl) {
                const isComplete = !!user.profileComplete;
                titleEl.textContent = isComplete ? 'Edit Profile' : 'Complete Profile';
                subEl.textContent = isComplete ? 'Update your business details' : 'Finish setup to unlock full features';
            }
        }

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return false;
            if (authSdk.currentUser) return true;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => { if (!done) { done = true; resolve(); } }, 6500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (!done) { done = true; clearTimeout(timer); try { unsub(); } catch(e){}; resolve(); }
                });
            });
            return !!authSdk.currentUser;
        }

        async function resolveSupplierIdByUid(db, authUid, fallbackId) {
            if (!db || !authUid) return fallbackId || '';
            if (fallbackId) {
                try {
                    const snap = await db.ref('suppliers/' + String(fallbackId)).once('value');
                    if (snap.exists()) {
                        const v = snap.val() || {};
                        if (v.firebaseUid && String(v.firebaseUid) === String(authUid)) return String(fallbackId);
                    }
                } catch (e) {}
            }
            try {
                const snap = await db.ref('suppliers').orderByChild('firebaseUid').equalTo(String(authUid)).limitToFirst(1).once('value');
                if (snap.exists()) {
                    let out = '';
                    snap.forEach((ch) => { if (!out) out = ch.key; });
                    if (out) return out;
                }
            } catch (e) {}
            return fallbackId || '';
        }

        async function loadFromFirebase() {
            const user = getSupplierAuth();
            const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
            if (!user || !db) return;
            const ok = await ensureAuthReady();
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            const authUid = ok && authSdk && authSdk.currentUser ? String(authSdk.currentUser.uid || '') : '';

            const fallbackSupplierId = user.supplierId || user.id || (user.email || '').replace(/@/g, '_').replace(/\./g, '_');
            const supplierId = await resolveSupplierIdByUid(db, authUid, fallbackSupplierId);
            try {
                const snap = await db.ref('suppliers/' + supplierId).once('value');
                if (!snap.exists()) return;
                const data = snap.val() || {};

                if (data.firstName && !document.getElementById('firstName').value) document.getElementById('firstName').value = data.firstName;
                if (data.lastName && !document.getElementById('lastName').value) document.getElementById('lastName').value = data.lastName;
                if (data.email && !document.getElementById('email').value) document.getElementById('email').value = data.email;
                if (data.companyName && !document.getElementById('companyName').value) document.getElementById('companyName').value = data.companyName;
                if (data.businessType && !document.getElementById('businessType').value) document.getElementById('businessType').value = data.businessType;
                if (data.yearsOperation && !document.getElementById('yearsOperation').value) document.getElementById('yearsOperation').value = data.yearsOperation;
                if (data.phone && !document.getElementById('phone').value) document.getElementById('phone').value = data.phone;
                if (data.address && !document.getElementById('address').value) document.getElementById('address').value = data.address;
                if (data.city && !document.getElementById('city').value) document.getElementById('city').value = data.city;
                if (data.postcode && !document.getElementById('postcode').value) document.getElementById('postcode').value = data.postcode;
                if (data.country && !document.getElementById('country').value) document.getElementById('country').value = data.country;

                const merged = { ...user, ...data };
                localStorage.setItem('supplierAuth', JSON.stringify(merged));
                localStorage.setItem('lastSupplierProfile', JSON.stringify(merged));

                try {
                    const statusRaw = String(merged.status || 'pending').toLowerCase();
                    const statusLabel = (statusRaw === 'verified' || statusRaw === 'approved' || statusRaw === 'active') ? 'Verified' : 'Pending';
                    const el = document.getElementById('kycStatusText');
                    if (el) el.textContent = statusLabel;
                } catch (e) {}
                try {
                    const docs = merged.verificationDocs || {};
                    if (docs.companyRegistration && docs.companyRegistration.url) {
                        document.getElementById('docCompanyRegHelp').innerHTML = `<i class="fas fa-circle-check"></i> Uploaded • <a href="${String(docs.companyRegistration.url).replace(/\"/g, '&quot;')}" target="_blank" rel="noopener">View</a>`;
                    }
                    if (docs.proofOfAddress && docs.proofOfAddress.url) {
                        document.getElementById('docProofAddressHelp').innerHTML = `<i class="fas fa-circle-check"></i> Uploaded • <a href="${String(docs.proofOfAddress.url).replace(/\"/g, '&quot;')}" target="_blank" rel="noopener">View</a>`;
                    }
                } catch (e) {}

                const titleEl = document.getElementById('pageTitle');
                const subEl = document.getElementById('pageSubtitle');
                if (titleEl && subEl) {
                    const isComplete = !!merged.profileComplete;
                    titleEl.textContent = isComplete ? 'Edit Profile' : 'Complete Profile';
                    subEl.textContent = isComplete ? 'Update your business details' : 'Finish setup to unlock full features';
                }
            } catch (e) {}
        }

        async function saveProfile() {
            const user = getSupplierAuth();
            if (!user) { alertSystem.show('error', 'Please sign in first'); return; }
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
            if (!db) { alertSystem.show('error', 'Service unavailable. Try again later.'); return; }
            const ok = await ensureAuthReady();
            if (!ok || !authSdk || !authSdk.currentUser) { alertSystem.show('error', 'Session expired. Please login again.'); return; }

            const authUid = String(authSdk.currentUser.uid || '');
            const fallbackSupplierId = user.supplierId || user.id || (user.email || '').replace(/@/g, '_').replace(/\./g, '_');
            const supplierId = await resolveSupplierIdByUid(db, authUid, fallbackSupplierId);
            const payload = {
                firstName: document.getElementById('firstName').value.trim(),
                lastName: document.getElementById('lastName').value.trim(),
                companyName: document.getElementById('companyName').value.trim(),
                businessType: document.getElementById('businessType').value,
                yearsOperation: document.getElementById('yearsOperation').value,
                phone: document.getElementById('phone').value.trim(),
                address: document.getElementById('address').value.trim(),
                city: document.getElementById('city').value.trim(),
                postcode: document.getElementById('postcode').value.trim(),
                country: document.getElementById('country').value,
                updatedAt: new Date().toISOString()
            };

            const requiredMissing = [];
            if (!payload.firstName) requiredMissing.push('First name');
            if (!payload.lastName) requiredMissing.push('Last name');
            if (!payload.companyName) requiredMissing.push('Company name');
            if (!payload.phone) requiredMissing.push('Phone');
            if (!payload.businessType) requiredMissing.push('Business type');
            if (!payload.yearsOperation && payload.yearsOperation !== 0 && payload.yearsOperation !== '0') requiredMissing.push('Years of operation');
            if (!payload.address) requiredMissing.push('Address');
            if (!payload.city) requiredMissing.push('City');
            if (!payload.postcode) requiredMissing.push('Postcode');
            if (!payload.country) requiredMissing.push('Country');

            payload.profileComplete = requiredMissing.length === 0;
            if (requiredMissing.length) {
                try {
                    const step = (!payload.firstName || !payload.lastName || !payload.phone) ? 0
                        : (!payload.companyName || !payload.businessType || (!payload.yearsOperation && payload.yearsOperation !== 0 && payload.yearsOperation !== '0')) ? 1
                        : 2;
                    showStep(step);
                } catch (e) {}
                alertSystem.show('error', 'Please complete: ' + requiredMissing.slice(0, 4).join(', ') + (requiredMissing.length > 4 ? '…' : ''));
                return;
            }

            const btn = document.getElementById('saveBtn');
            const originalBtnHtml = btn ? btn.innerHTML : '';
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

            try {
                let existingDocs = {};
                try {
                    const ds = await db.ref('suppliers/' + supplierId + '/verificationDocs').once('value');
                    if (ds.exists()) existingDocs = ds.val() || {};
                } catch (e) {}

                const storage = (typeof firebase !== 'undefined' && firebase.storage) ? firebase.storage() : null;
                const newDocs = {};

                async function uploadDoc(inputId, docKey) {
                    const input = document.getElementById(inputId);
                    const file = input && input.files && input.files[0] ? input.files[0] : null;
                    if (!file || !storage) return;
                    const ts = Date.now();
                    const safeName = String(file.name || '').replace(/[^\w.\-]+/g, '_').slice(0, 80) || (docKey + '_' + ts);
                    const ref = storage.ref().child(`kyc/suppliers/${supplierId}/${docKey}_${ts}_${safeName}`);
                    await ref.put(file);
                    const url = await ref.getDownloadURL();
                    newDocs[docKey] = { url, name: file.name || null, type: file.type || null, size: file.size || null, uploadedAt: new Date().toISOString() };
                }

                try {
                    await uploadDoc('docCompanyReg', 'companyRegistration');
                    await uploadDoc('docProofAddress', 'proofOfAddress');
                } catch (e) {
                    alertSystem.show('error', 'Failed to upload document(s). Please try again.');
                    btn.disabled = false;
                    btn.innerHTML = originalBtnHtml || '<i class="fas fa-save"></i> Finish & Save';
                    return;
                }

                if (Object.keys(newDocs).length) {
                    payload.verificationDocs = Object.assign({}, existingDocs, newDocs);
                    payload.kycSubmittedAt = payload.kycSubmittedAt || new Date().toISOString();
                    payload.kycUpdatedAt = new Date().toISOString();
                    payload.kycStatus = 'submitted';
                }

                await db.ref('suppliers/' + supplierId).update(payload);
                const updated = { ...user, ...payload };
                localStorage.setItem('supplierAuth', JSON.stringify(updated));
                localStorage.setItem('lastSupplierProfile', JSON.stringify(updated));
                alertSystem.show('success', 'Profile updated');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
            } catch (e) {
                alertSystem.show('error', 'Failed to save. Please try again.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalBtnHtml || '<i class="fas fa-save"></i> Finish & Save';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            prefill();
            loadFromFirebase();
            setTimeout(() => {
                const n1 = (!isFilled('firstName') || !isFilled('lastName') || !isFilled('phone')) ? 0
                    : (!isFilled('companyName') || !isFilled('businessType') || !isFilled('yearsOperation')) ? 1
                    : (!isFilled('address') || !isFilled('city') || !isFilled('postcode') || !isFilled('country')) ? 2
                    : 2;
                const start = Math.max(n1, getSavedStep());
                showStep(start);

                const b1 = document.getElementById('next1');
                const b2 = document.getElementById('next2');
                const back2 = document.getElementById('back2');
                const back3 = document.getElementById('back3');

                if (b1) b1.onclick = () => { if (validateStep(0)) showStep(1); };
                if (b2) b2.onclick = () => { if (validateStep(1)) showStep(2); };
                if (back2) back2.onclick = () => showStep(0);
                if (back3) back3.onclick = () => showStep(1);
            }, 350);
        });
    </script>
</body>
</html>
