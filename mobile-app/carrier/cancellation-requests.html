    <style>

<body class="has-bottom-nav">
    <div class="page-header">
        <div class="header-content">
            <h1 class="page-title">Cancellation Requests</h1>
            <p class="page-subtitle" id="subtitle">Loading…</p>
        </div>
    </div>

    <div class="wrap" id="listArea"></div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="loads.html" class="bottom-nav-item active"><i class="fas fa-clipboard-list"></i><span>Loads</span></a>
        <a href="messages.html" class="bottom-nav-item"><i class="fas fa-comments"></i><span>Messages</span></a>
        <a href="wallet.html" class="bottom-nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <a href="profile.html" class="bottom-nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="../../assets/js/firebase-init.js"></script>
    <script src="../../assets/js/alerts.js"></script>
    <script>
        const alertSystem = new AlertSystem();

        function getCarrierAuth() {
            try {
                const raw = localStorage.getItem('carrierAuth') || localStorage.getItem('lastCarrierProfile') || 'null';
                return JSON.parse(raw);
            } catch { return null; }
        }

        function isCarrierSessionValid(user) {
            return !!(user && (user.isLoggedIn === true || user.carrierId || user.id || user.email));
        }

        function getCarrierId(user) {
            if (!user) return '';
            return user.carrierId || user.id || (user.email || '').replace(/@/g, '_').replace(/\./g, '_');
        }

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return;
            if (authSdk.currentUser) return;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => { if (!done) { done = true; resolve(); } }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
            if (!authSdk.currentUser && typeof authSdk.signInAnonymously === 'function') {
                try { await authSdk.signInAnonymously(); } catch (e) {}
            }
            if (!authSdk.currentUser) {
                await new Promise((resolve) => {
                    let done = false;
                    const timer = setTimeout(() => { if (!done) { done = true; resolve(); } }, 2500);
                    const unsub = authSdk.onAuthStateChanged(() => {
                        if (done) return;
                        done = true;
                        clearTimeout(timer);
                        try { unsub(); } catch (e) {}
                        resolve();
                    });
                });
            }
        }

        function normalizeStatus(s) {
            const t = String(s || '').toLowerCase().replace(/_/g, '-');
            if (t === 'complete') return 'completed';
            if (t === 'intransit') return 'in-transit';
            return t;
        }

        function getOrderRef(loadId, load) {
            if (load && load.formattedOrderId) return String(load.formattedOrderId);
            if (load && load.orderRef) return String(load.orderRef);
            const id = String(loadId || '');
            const shortId = id ? id.substring(0, 8).toUpperCase() : '--------';
            return 'ORD-' + shortId;
        }

        function calculateCancelFee(load) {
            const amt = parseFloat(load && (load.totalCost || load.totalAmount || load.price || load.budget || load.maxBudget || load.minBudget || 0)) || 0;
            return Math.round(Math.min(50, amt * 0.1) * 100) / 100;
        }

        function getSupplierIdFromLoad(load) {
            if (!load) return '';
            return load.supplierId || load.postedBy || (load.supplierEmail || '').replace(/@/g, '_').replace(/\./g, '_') || '';
        }

        async function createDbNotification(userId, userType, title, message, data) {
            try {
                const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
                if (!db || !userId || !userType) return null;
                const payload = {
                    user_id: userId,
                    user_type: userType,
                    type: (data && data.type) ? data.type : 'system',
                    title: title,
                    message: message,
                    data: data || {},
                    read: false,
                    created_at: new Date().toISOString()
                };
                const ref = db.ref('notifications').push();
                await ref.set(payload).catch(() => {});
                try {
                    if (userType === 'supplier') {
                        await db.ref(`notifications/suppliers/${userId}`).push({ title, message, type: payload.type, data: payload.data, read: false, createdAt: new Date().toISOString() }).catch(() => {});
                    } else if (userType === 'carrier') {
                        await db.ref(`notifications/carriers/${userId}`).push({ title, message, type: payload.type, data: payload.data, read: false, createdAt: new Date().toISOString() }).catch(() => {});
                    }
                } catch (e) {}
                return ref.key || null;
            } catch (e) {
                return null;
            }
        }

        async function approveCancellation(loadId, load) {
            try {
                const db = window.AlphaBrokrage.firebaseDb;
                await ensureAuthReady();
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                if (!authSdk || !authSdk.currentUser) { alertSystem.show('error', 'Session expired. Please refresh.'); return; }
                const req = (load && load.cancellationRequest) ? load.cancellationRequest : {};
                const fee = typeof req.proposedFee === 'number' ? req.proposedFee : calculateCancelFee(load);
                const feePaid = fee <= 0 || req.feePaid === true || !!req.feePaymentId || !!req.feePaymentIntentId;
                if (fee > 0 && !feePaid) {
                    alertSystem.show('error', 'Fee not paid yet.');
                    return;
                }
                await db.ref('loads/' + loadId).update({
                    status: 'cancelled',
                    cancelledAt: new Date().toISOString(),
                    cancelledByRole: 'supplier',
                    cancelledBy: 'supplier',
                    cancelledReason: req.reason || '',
                    cancellationFee: fee,
                    cancellationPolicyVersion: 1,
                    cancellationStatus: 'approved',
                    cancellationRequest: {
                        ...(req || {}),
                        status: 'approved',
                        approvedAt: new Date().toISOString(),
                        approvedByRole: 'carrier'
                    }
                });
                try {
                    const supplierId = getSupplierIdFromLoad(load);
                    if (supplierId) {
                        await createDbNotification(
                            supplierId,
                            'supplier',
                            'Cancellation Approved',
                            'Carrier approved your cancellation. Your order is now cancelled.',
                            { type: 'cancel_approved', loadId: loadId, url: '/mobile-app/supplier/load-details.html?id=' + encodeURIComponent(loadId) }
                        );
                    }
                } catch (e) {}
                alertSystem.show('success', 'Approved');
                await loadAndRender();
            } catch (e) {
                console.error(e);
                alertSystem.show('error', (e && (e.code || e.message)) ? (e.code || e.message) : 'Failed to approve');
            }
        }

        async function rejectCancellation(loadId, load) {
            const note = (prompt('Reason for rejecting cancellation?') || '').trim();
            try {
                const db = window.AlphaBrokrage.firebaseDb;
                await ensureAuthReady();
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                if (!authSdk || !authSdk.currentUser) { alertSystem.show('error', 'Session expired. Please refresh.'); return; }
                const req = (load && load.cancellationRequest) ? load.cancellationRequest : {};
                const fee = typeof req.proposedFee === 'number' ? req.proposedFee : calculateCancelFee(load);
                const feePaid = fee <= 0 || req.feePaid === true || !!req.feePaymentId || !!req.feePaymentIntentId;
                const refundDueAt = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString();
                await db.ref('loads/' + loadId).update({
                    cancellationStatus: 'rejected',
                    cancellationRequest: {
                        ...(req || {}),
                        status: 'rejected',
                        rejectedAt: new Date().toISOString(),
                        rejectedByRole: 'carrier',
                        rejectionReason: note
                    },
                    cancellationRefund: feePaid ? { status: 'pending', amount: fee, dueAt: refundDueAt, createdAt: new Date().toISOString() } : null
                });
                try {
                    const supplierId = getSupplierIdFromLoad(load);
                    if (supplierId) {
                        const msg = feePaid
                            ? 'Carrier rejected your cancellation. You must complete the order. Refund will be processed within 7 days.'
                            : 'Carrier rejected your cancellation. You must complete the order.';
                        await createDbNotification(
                            supplierId,
                            'supplier',
                            'Cancellation Rejected',
                            msg,
                            { type: 'cancel_rejected', loadId: loadId, url: '/mobile-app/supplier/load-details.html?id=' + encodeURIComponent(loadId) }
                        );
                    }
                } catch (e) {}
                alertSystem.show('success', 'Rejected');
                await loadAndRender();
            } catch (e) {
                console.error(e);
                alertSystem.show('error', (e && (e.code || e.message)) ? (e.code || e.message) : 'Failed to reject');
            }
        }

        async function fetchMyLoadsWithCancellation(carrierId) {
            const db = window.AlphaBrokrage.firebaseDb;
            const snap = await db.ref('loads').orderByChild('carrierId').equalTo(carrierId).once('value');
            const out = [];
            if (snap.exists()) {
                snap.forEach((ch) => {
                    const v = ch.val() || {};
                    if (v.cancellationRequest) out.push({ id: ch.key, ...v });
                });
            }
            return out;
        }

        function getEffectiveCancelStatus(req) {
            if (!req) return '';
            const raw = String(req.status || '').toLowerCase();
            const fee = typeof req.proposedFee === 'number' ? req.proposedFee : 0;
            const feePaid = fee <= 0 || req.feePaid === true || !!req.feePaymentId || !!req.feePaymentIntentId;
            if (raw === 'pending') return feePaid ? 'pending_approval' : 'fee_pending';
            return raw;
        }

        function renderList(items) {
            const el = document.getElementById('listArea');
            if (!items.length) {
                document.getElementById('subtitle').textContent = 'No requests';
                el.innerHTML = `<div class="empty"><div class="fw-bold">No cancellation requests</div><div style="margin-top:0.35rem;">When suppliers request cancellation, it will appear here.</div></div>`;
                return;
            }
            document.getElementById('subtitle').textContent = `${items.length} requests`;
            el.innerHTML = items.map((l) => {
                const rid = l.id || l.loadId || '';
                const req = l.cancellationRequest || {};
                const eff = getEffectiveCancelStatus(req);
                const fee = typeof req.proposedFee === 'number' ? req.proposedFee : calculateCancelFee(l);
                const route = `${l.pickupLocation || ''} → ${l.deliveryLocation || ''}`;
                const badge = eff === 'pending_approval' ? 'danger' : eff === 'fee_pending' ? 'warn' : 'warn';
                const badgeText = eff === 'pending_approval' ? 'Pending Approval' : eff === 'fee_pending' ? 'Fee Pending' : (eff || 'Pending');
                return `
                    <div class="card">
                        <div class="topbar">
                            <div style="min-width:0;">
                                <div class="title2">${getOrderRef(rid, l)} • Load #${String(rid).slice(0, 8)}</div>
                                <div class="sub2">${route}</div>
                            </div>
                            <div class="pill ${badge}"><i class="fas fa-ban"></i> ${badgeText}</div>
                        </div>
                        <div class="kv"><div class="k">Fee</div><div class="v">£${fee.toFixed(2)}</div></div>
                        <div class="kv"><div class="k">Reason</div><div class="v" style="text-align:left; font-weight:800;">${String(req.reason || '—').replace(/</g, '&lt;')}</div></div>
                        <div class="actions">
                            <a class="btn-action secondary" href="load-details.html?id=${encodeURIComponent(rid)}"><i class="fas fa-eye"></i> Open</a>
                            ${eff === 'pending_approval' ? `
                                <button class="btn-action success js-approve" type="button" data-id="${encodeURIComponent(rid)}"><i class="fas fa-check"></i> Approve</button>
                                <button class="btn-action danger js-reject" type="button" data-id="${encodeURIComponent(rid)}"><i class="fas fa-times"></i> Reject</button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            el.querySelectorAll('.js-approve').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    const id = decodeURIComponent(btn.getAttribute('data-id') || '');
                    const load = window._reqMap ? window._reqMap[id] : null;
                    if (!id || !load) return;
                    await approveCancellation(id, load);
                });
            });
            el.querySelectorAll('.js-reject').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    const id = decodeURIComponent(btn.getAttribute('data-id') || '');
                    const load = window._reqMap ? window._reqMap[id] : null;
                    if (!id || !load) return;
                    await rejectCancellation(id, load);
                });
            });
        }

        async function loadAndRender() {
            const user = getCarrierAuth();
            if (!isCarrierSessionValid(user)) {
                window.location.href = 'login.html';
                return;
            }
            const carrierId = getCarrierId(user);
            try {
                await ensureAuthReady();
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                if (!authSdk || !authSdk.currentUser) { alertSystem.show('error', 'Unable to start session'); }
                const loads = await fetchMyLoadsWithCancellation(carrierId);
                const filtered = loads.filter((l) => {
                    const req = l.cancellationRequest || null;
                    if (!req || String(req.requestedByRole || '').toLowerCase() !== 'supplier') return false;
                    const eff = getEffectiveCancelStatus(req);
                    return eff === 'fee_pending' || eff === 'pending_approval';
                }).sort((a, b) => {
                    const atA = (a.cancellationRequest && a.cancellationRequest.requestedAt) ? new Date(a.cancellationRequest.requestedAt).getTime() : 0;
                    const atB = (b.cancellationRequest && b.cancellationRequest.requestedAt) ? new Date(b.cancellationRequest.requestedAt).getTime() : 0;
                    return atB - atA;
                });
                window._reqMap = {};
                filtered.forEach((l) => { window._reqMap[String(l.id || l.loadId || '')] = l; });
                renderList(filtered);
            } catch (e) {
                console.error(e);
                document.getElementById('subtitle').textContent = 'Error';
                document.getElementById('listArea').innerHTML = `<div class="empty"><div class="fw-bold">Failed to load</div><div style="margin-top:0.35rem;">Please refresh and try again.</div></div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', loadAndRender);
    </script>
