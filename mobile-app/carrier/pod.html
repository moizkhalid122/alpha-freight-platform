    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script src="../../assets/js/alerts.js"></script>
    <script>
        const alertSystem = new AlertSystem();
        const params = new URLSearchParams(location.search);
        const loadId = params.get('id') || params.get('loadId') || '';
        const mode = (params.get('mode') || '').toLowerCase();

        let loadData = null;
        let photoDataUrl = '';
        let signatureDataUrl = '';
        let gps = null;
        let sig = null;
        let editLocked = false;

        function getUser() {
            try {
                const raw = localStorage.getItem('carrierAuth');
                return raw ? JSON.parse(raw) : null;
            } catch { return null; }
        }

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return;
            if (authSdk.currentUser) return;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => {
                    if (done) return;
                    done = true;
                    resolve();
                }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
        }

        function canEdit() {
            return mode !== 'view' && !editLocked;
        }

        function safeText(v) {
            return (v == null ? '' : String(v));
        }

        function buildSubtitle(load) {
            const lid = (load && (load.loadId || load.id || loadId)) || loadId;
            const pickup = (load && (load.pickupLocation || load.from)) || '';
            const delivery = (load && (load.deliveryLocation || load.to)) || '';
            const route = [pickup, delivery].filter(Boolean).join(' → ');
            return 'Load #' + safeText(lid).substring(0, 8) + (route ? ' • ' + route : '');
        }

        function renderNotFound() {
            document.getElementById('pageSubtitle').textContent = 'Load not found';
            document.getElementById('contentArea').innerHTML = `
                <div class="card">
                    <div class="text-center">
                        <div class="mb-2"><i class="fas fa-exclamation-triangle" style="font-size:2.2rem;color:var(--text-medium);"></i></div>
                        <div class="fw-bold">Load Not Found</div>
                        <div class="muted mt-1">This load may be invalid or not assigned to you.</div>
                        <a class="btn-action secondary mt-3" href="my-loads.html"><i class="fas fa-arrow-left"></i> Back</a>
                    </div>
                </div>
            `;
        }

        function renderView(load) {
            const pod = (load && (load.pod || {})) || {};
            const receiverName = pod.receiverName || load.podReceiverName || '';
            const submittedAt = pod.submittedAt || load.podUploadedAt || '';
            const lat = pod.gps && pod.gps.lat != null ? pod.gps.lat : null;
            const lng = pod.gps && pod.gps.lng != null ? pod.gps.lng : null;
            const acc = pod.gps && pod.gps.accuracy != null ? pod.gps.accuracy : null;
            const photo = pod.photoDataUrl || load.podUrl || '';
            const sigUrl = pod.signatureDataUrl || '';

            document.getElementById('pageTitle').textContent = 'POD';
            document.getElementById('pageSubtitle').textContent = buildSubtitle(load);
            const hasPhoto = !!photo;
            const hasSig = !!sigUrl;

            document.getElementById('contentArea').innerHTML = `
                <div class="card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="fw-bold">Proof of Delivery</div>
                        <div class="pill ${hasPhoto && hasSig ? 'good' : 'bad'}">
                            <i class="fas ${hasPhoto && hasSig ? 'fa-check' : 'fa-info-circle'}"></i>
                            ${hasPhoto && hasSig ? 'Complete' : 'Partial'}
                        </div>
                    </div>
                    <div class="grid2">
                        <div>
                            <div class="field-label">Receiver</div>
                            <div class="fw-semibold">${receiverName ? safeText(receiverName) : 'N/A'}</div>
                        </div>
                        <div>
                            <div class="field-label">Submitted</div>
                            <div class="fw-semibold">${submittedAt ? new Date(submittedAt).toLocaleString('en-GB') : 'N/A'}</div>
                        </div>
                    </div>
                    <div class="mt-3">
                        <div class="field-label">Location</div>
                        <div class="muted">${lat != null && lng != null ? (lat.toFixed(6) + ', ' + lng.toFixed(6) + (acc != null ? (' (±' + Math.round(acc) + 'm)') : '')) : 'N/A'}</div>
                    </div>
                </div>
                ${hasPhoto ? `
                <div class="card">
                    <div class="fw-bold mb-2">Delivery Photo</div>
                    <img class="thumb" src="${photo}" alt="POD Photo">
                </div>
                ` : ''}
                ${hasSig ? `
                <div class="card">
                    <div class="fw-bold mb-2">Receiver Signature</div>
                    <img class="thumb" src="${sigUrl}" alt="Signature">
                </div>
                ` : ''}
                <div class="card">
                    <div class="btn-row">
                        <a class="btn-action secondary" href="load-details.html?id=${encodeURIComponent(loadId)}"><i class="fas fa-arrow-left"></i> Back</a>
                    </div>
                </div>
            `;
        }

        function createSignaturePad(canvas) {
            const ctx = canvas.getContext('2d');
            let drawing = false;
            let last = null;

            function resize() {
                const rect = canvas.getBoundingClientRect();
                const scale = window.devicePixelRatio || 1;
                const w = Math.max(1, Math.floor(rect.width * scale));
                const h = Math.max(1, Math.floor(rect.height * scale));
                if (canvas.width !== w || canvas.height !== h) {
                    const prev = canvas.toDataURL('image/png');
                    canvas.width = w;
                    canvas.height = h;
                    ctx.lineWidth = 3 * scale;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.strokeStyle = '#0f172a';
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    if (prev && prev !== 'data:,' && prev.indexOf('data:image') === 0) {
                        const img = new Image();
                        img.onload = () => {
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        };
                        img.src = prev;
                    }
                }
            }

            function pointFromEvent(e) {
                const rect = canvas.getBoundingClientRect();
                const scale = canvas.width / rect.width;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: (clientX - rect.left) * scale, y: (clientY - rect.top) * scale };
            }

            function start(e) {
                if (!canEdit()) return;
                drawing = true;
                last = pointFromEvent(e);
                e.preventDefault();
            }

            function move(e) {
                if (!drawing || !canEdit()) return;
                const p = pointFromEvent(e);
                ctx.beginPath();
                ctx.moveTo(last.x, last.y);
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
                last = p;
                e.preventDefault();
                scheduleSignatureExport();
            }

            function end() {
                drawing = false;
                last = null;
                scheduleSignatureExport();
            }

            function clear() {
                resize();
                scheduleSignatureExport();
            }

            window.addEventListener('resize', resize);
            resize();

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', move);
            window.addEventListener('mouseup', end);
            canvas.addEventListener('touchstart', start, { passive: false });
            canvas.addEventListener('touchmove', move, { passive: false });
            window.addEventListener('touchend', end);
            window.addEventListener('touchcancel', end);

            return { clear, getDataUrl: () => canvas.toDataURL('image/png') };
        }

        let signatureExportTimer = null;
        function scheduleSignatureExport() {
            if (!sig) return;
            if (signatureExportTimer) clearTimeout(signatureExportTimer);
            signatureExportTimer = setTimeout(() => {
                signatureDataUrl = sig.getDataUrl();
                updateChecks();
            }, 120);
        }

        function isSignatureEmpty(dataUrl) {
            if (!dataUrl || dataUrl.indexOf('data:image/png') !== 0) return true;
            const img = new Image();
            return new Promise(resolve => {
                img.onload = () => {
                    const c = document.createElement('canvas');
                    const ctx = c.getContext('2d');
                    c.width = img.width;
                    c.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    const pixels = ctx.getImageData(0, 0, c.width, c.height).data;
                    let nonWhite = 0;
                    for (let i = 0; i < pixels.length; i += 4) {
                        const r = pixels[i], g = pixels[i + 1], b = pixels[i + 2], a = pixels[i + 3];
                        if (a > 0 && (r < 250 || g < 250 || b < 250)) {
                            nonWhite++;
                            if (nonWhite > 50) break;
                        }
                    }
                    resolve(nonWhite <= 50);
                };
                img.onerror = () => resolve(true);
                img.src = dataUrl;
            });
        }

        async function compressImageToJpeg(file, opts) {
            const maxSize = opts && opts.maxSize ? opts.maxSize : 1280;
            const quality = opts && opts.quality ? opts.quality : 0.75;
            const dataUrl = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(new Error('Failed to read image'));
                reader.readAsDataURL(file);
            });
            const img = await new Promise((resolve, reject) => {
                const i = new Image();
                i.onload = () => resolve(i);
                i.onerror = () => reject(new Error('Invalid image'));
                i.src = dataUrl;
            });
            const w = img.width || 1;
            const h = img.height || 1;
            const scale = Math.min(1, maxSize / Math.max(w, h));
            const outW = Math.max(1, Math.round(w * scale));
            const outH = Math.max(1, Math.round(h * scale));
            const canvas = document.createElement('canvas');
            canvas.width = outW;
            canvas.height = outH;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, outW, outH);
            ctx.drawImage(img, 0, 0, outW, outH);
            return {
                dataUrl: canvas.toDataURL('image/jpeg', quality),
                width: outW,
                height: outH
            };
        }

        function approxBytesFromDataUrl(dataUrl) {
            if (!dataUrl) return 0;
            const idx = dataUrl.indexOf(',');
            if (idx < 0) return 0;
            const base64 = dataUrl.slice(idx + 1);
            const padding = (base64.endsWith('==') ? 2 : base64.endsWith('=') ? 1 : 0);
            return Math.max(0, Math.floor((base64.length * 3) / 4) - padding);
        }

        function updateChecks() {
            const receiverInput = document.getElementById('receiverName');
            const photoOkEl = document.getElementById('photoOk');
            const sigOkEl = document.getElementById('sigOk');
            const gpsOkEl = document.getElementById('gpsOk');
            const submitBtn = document.getElementById('submitBtn');

            if (!receiverInput || !submitBtn) return;

            const receiverOk = (receiverInput.value || '').trim().length >= 2;
            const photoOk = !!photoDataUrl;
            const sigOk = !!signatureDataUrl;
            const gpsOk = !!gps;

            if (photoOkEl) {
                photoOkEl.className = 'pill ' + (photoOk ? 'good' : 'bad');
                photoOkEl.innerHTML = '<i class="fas ' + (photoOk ? 'fa-check' : 'fa-times') + '"></i>' + (photoOk ? 'Photo OK' : 'Photo Missing');
            }
            if (sigOkEl) {
                sigOkEl.className = 'pill ' + (sigOk ? 'good' : 'bad');
                sigOkEl.innerHTML = '<i class="fas ' + (sigOk ? 'fa-check' : 'fa-times') + '"></i>' + (sigOk ? 'Signature OK' : 'Signature Missing');
            }
            if (gpsOkEl) {
                gpsOkEl.className = 'pill ' + (gpsOk ? 'good' : 'bad');
                gpsOkEl.innerHTML = '<i class="fas ' + (gpsOk ? 'fa-check' : 'fa-times') + '"></i>' + (gpsOk ? 'Location OK' : 'Location Missing');
            }

            submitBtn.disabled = !(receiverOk && photoOk && sigOk);
        }

        async function captureLocation() {
            const statusEl = document.getElementById('gpsStatus');
            if (!navigator.geolocation) {
                if (statusEl) statusEl.textContent = 'Geolocation not supported';
                alertSystem.show('Geolocation not supported on this device', 'error');
                return;
            }
            if (statusEl) statusEl.textContent = 'Getting location…';
            try {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 12000, maximumAge: 30000 });
                });
                gps = {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    accuracy: pos.coords.accuracy,
                    capturedAt: new Date().toISOString()
                };
                if (statusEl) statusEl.textContent = gps.lat.toFixed(6) + ', ' + gps.lng.toFixed(6) + ' (±' + Math.round(gps.accuracy || 0) + 'm)';
                updateChecks();
            } catch (e) {
                if (statusEl) statusEl.textContent = 'Location denied/unavailable';
                alertSystem.show('Unable to capture location. You can still submit POD.', 'warning');
                gps = null;
                updateChecks();
            }
        }

        function renderSubmit(load) {
            document.getElementById('pageTitle').textContent = mode === 'complete' ? 'Deliver & POD' : 'Submit POD';
            document.getElementById('pageSubtitle').textContent = buildSubtitle(load);

            const existingPod = !!(load && (load.hasPOD || load.podUrl || (load.pod && (load.pod.photoDataUrl || load.pod.signatureDataUrl))));
            editLocked = existingPod;
            const disabledEdit = !canEdit();

            document.getElementById('contentArea').innerHTML = `
                ${existingPod ? `
                <div class="card">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <div class="fw-bold">POD already exists</div>
                            <div class="muted mt-1">You can view the existing POD evidence.</div>
                        </div>
                        <a class="btn-action secondary" href="pod.html?id=${encodeURIComponent(loadId)}&mode=view"><i class="fas fa-eye"></i> View</a>
                    </div>
                </div>
                ` : ''}

                <div class="card">
                    <div class="fw-bold mb-3">Receiver Details</div>
                    <div class="mb-3">
                        <div class="field-label">Receiver Name</div>
                        <input id="receiverName" class="input" type="text" placeholder="e.g. John Smith" ${disabledEdit ? 'disabled' : ''}>
                    </div>
                    <div class="mb-2 muted">Minimum: receiver name + photo + signature</div>
                    <div class="d-flex gap-2 flex-wrap">
                        <div id="photoOk" class="pill bad"><i class="fas fa-times"></i>Photo Missing</div>
                        <div id="sigOk" class="pill bad"><i class="fas fa-times"></i>Signature Missing</div>
                        <div id="gpsOk" class="pill bad"><i class="fas fa-times"></i>Location Missing</div>
                    </div>
                </div>

                <div class="card">
                    <div class="fw-bold mb-2">Delivery Photo</div>
                    <div class="muted mb-3">Take a clear photo at delivery.</div>
                    <input id="photoInput" class="input" style="padding:0.75rem 1rem" type="file" accept="image/*" capture="environment" ${disabledEdit ? 'disabled' : ''}>
                    <div class="mt-3" id="photoPreviewWrap" style="display:none">
                        <img id="photoPreview" class="thumb" alt="POD Photo Preview">
                        <div class="muted mt-2" id="photoMeta"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="fw-bold mb-2">Receiver Signature</div>
                    <div class="muted mb-3">Ask receiver to sign below.</div>
                    <div class="sig-wrap">
                        <canvas id="signatureCanvas"></canvas>
                    </div>
                    <div class="btn-row mt-3">
                        <button class="btn-action secondary" type="button" id="clearSigBtn" ${disabledEdit ? 'disabled' : ''}><i class="fas fa-eraser"></i> Clear</button>
                        <button class="btn-action secondary" type="button" id="captureGpsBtn" ${disabledEdit ? 'disabled' : ''}><i class="fas fa-location-dot"></i> Location</button>
                    </div>
                    <div class="muted mt-2" id="gpsStatus">Not captured</div>
                </div>

                <div class="card">
                    <div class="btn-row">
                        <a class="btn-action secondary" href="load-details.html?id=${encodeURIComponent(loadId)}"><i class="fas fa-arrow-left"></i> Back</a>
                        <button class="btn-action primary" id="submitBtn" type="button" disabled><i class="fas fa-check"></i> Submit</button>
                    </div>
                    <div class="muted mt-2">Submitting may take a moment if photo is large.</div>
                </div>
            `;

            const receiverInput = document.getElementById('receiverName');
            const photoInput = document.getElementById('photoInput');
            const clearSigBtn = document.getElementById('clearSigBtn');
            const captureGpsBtn = document.getElementById('captureGpsBtn');
            const submitBtn = document.getElementById('submitBtn');
            const signatureCanvas = document.getElementById('signatureCanvas');

            if (receiverInput) receiverInput.addEventListener('input', updateChecks);

            if (photoInput) {
                photoInput.addEventListener('change', async function () {
                    const f = photoInput.files && photoInput.files[0];
                    if (!f) return;
                    try {
                        const compressed = await compressImageToJpeg(f, { maxSize: 1280, quality: 0.72 });
                        photoDataUrl = compressed.dataUrl;
                        const previewWrap = document.getElementById('photoPreviewWrap');
                        const preview = document.getElementById('photoPreview');
                        const meta = document.getElementById('photoMeta');
                        if (preview) preview.src = photoDataUrl;
                        if (previewWrap) previewWrap.style.display = '';
                        const bytes = approxBytesFromDataUrl(photoDataUrl);
                        if (meta) meta.textContent = compressed.width + '×' + compressed.height + ' • ' + Math.round(bytes / 1024) + ' KB';
                        updateChecks();
                    } catch (e) {
                        console.error(e);
                        photoDataUrl = '';
                        alertSystem.show('Failed to process photo. Please try another image.', 'error');
                        updateChecks();
                    }
                });
            }

            if (signatureCanvas) {
                sig = createSignaturePad(signatureCanvas);
                scheduleSignatureExport();
            }

            if (clearSigBtn) {
                clearSigBtn.addEventListener('click', function () {
                    if (sig) sig.clear();
                });
            }

            if (captureGpsBtn) {
                captureGpsBtn.addEventListener('click', function () {
                    captureLocation();
                });
            }

            if (submitBtn) {
                submitBtn.addEventListener('click', async function () {
                    try {
                        submitBtn.disabled = true;
                        await submitPOD();
                    } finally {
                        submitBtn.disabled = false;
                        updateChecks();
                    }
                });
            }

            updateChecks();
        }

        async function submitPOD() {
            if (!loadData) {
                alertSystem.show('Load not loaded', 'error');
                return;
            }
            if (!canEdit()) {
                alertSystem.show('POD is already submitted for this load', 'warning');
                return;
            }

            const receiverName = (document.getElementById('receiverName') && document.getElementById('receiverName').value || '').trim();
            if (receiverName.length < 2) {
                alertSystem.show('Receiver name is required', 'error');
                return;
            }
            if (!photoDataUrl) {
                alertSystem.show('Delivery photo is required', 'error');
                return;
            }
            signatureDataUrl = sig ? sig.getDataUrl() : signatureDataUrl;
            if (await isSignatureEmpty(signatureDataUrl)) {
                alertSystem.show('Receiver signature is required', 'error');
                return;
            }

            if (!gps) {
                await captureLocation();
            }

            const user = getUser() || {};
            const carrierId = user.carrierId || user.id || '';
            const now = new Date().toISOString();
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            await ensureAuthReady();
            const carrierUid = (authSdk && authSdk.currentUser && authSdk.currentUser.uid) ? authSdk.currentUser.uid : '';
            if (!carrierUid) {
                alertSystem.show('Session expired. Please login again.', 'error');
                setTimeout(() => { window.location.href = 'login.html'; }, 800);
                return;
            }

            const podNode = {
                submittedAt: now,
                receiverName,
                carrierId: carrierId || (loadData.carrierId || ''),
                carrierFirebaseUid: carrierUid,
                gps: gps || null,
                photoDataUrl,
                signatureDataUrl,
                device: { userAgent: navigator.userAgent || '' }
            };

            const updates = {
                hasPOD: true,
                podUrl: photoDataUrl,
                podFileName: 'POD-' + safeText(loadId).substring(0, 8).toUpperCase() + '.jpg',
                podFileType: 'image/jpeg',
                podFileSize: approxBytesFromDataUrl(photoDataUrl),
                podUploadedAt: now,
                podUploadedBy: carrierId || (loadData.carrierId || 'carrier'),
                carrierFirebaseUid: carrierUid,
                pod: podNode
            };

            if (mode === 'complete') {
                updates.status = 'completed';
                updates.completedAt = now;
            }

            try {
                const db = window.AlphaBrokrage.firebaseDb;
                await db.ref('loads/' + loadId).update(updates);
                alertSystem.show('POD submitted successfully', 'success');
                setTimeout(() => {
                    window.location.href = 'load-details.html?id=' + encodeURIComponent(loadId);
                }, 700);
            } catch (e) {
                console.error(e);
                alertSystem.show('Failed to submit POD. Please try again.', 'error');
            }
        }

        async function loadAndRender() {
            if (!loadId) {
                renderNotFound();
                return;
            }
            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const snap = await db.ref('loads/' + loadId).once('value');
                const load = snap.val();
                if (!load) {
                    renderNotFound();
                    return;
                }

                const user = getUser();
                const myCarrierId = user && (user.carrierId || user.id || (user.email || '').replace(/@/g, '_').replace(/\./g, '_'));
                const isMine = myCarrierId && (load.carrierId === myCarrierId || load.assignedCarrier === myCarrierId || load.carrierEmail === (user && user.email));
                if (!isMine) {
                    renderNotFound();
                    return;
                }

                loadData = { ...load, loadId, id: loadId };
                document.getElementById('pageSubtitle').textContent = buildSubtitle(loadData);

                if (mode === 'view') {
                    renderView(loadData);
                    return;
                }

                renderSubmit(loadData);
            } catch (e) {
                console.error(e);
                alertSystem.show('Failed to load POD. Please try again.', 'error');
                renderNotFound();
            }
        }

        document.addEventListener('DOMContentLoaded', loadAndRender);
    </script>
</body>
</html>
