    <style>
        body.has-bottom-nav { padding-bottom: calc(80px + env(safe-area-inset-bottom, 48px)) !important; }
        .wrap { padding: 0 1.25rem 1rem; }
        .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
        .tab {
            background: rgba(255,255,255,0.85);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 0.75rem 0.9rem;
            font-weight: 900;
            color: var(--text-medium);
        }

        .row {
            background: var(--card-bg);
            border: 1px solid var(--border);

            padding: 0.95rem 1rem;

            gap: 0.85rem;

        .dot { width: 10px; height: 10px; border-radius: 999px; margin-top: 0.45rem; background: rgba(148, 163, 184, 0.7); flex-shrink: 0; }
        .row.unread .dot { background: rgba(37,99,235,0.9); box-shadow: 0 0 0 4px rgba(37,99,235,0.12); }
        .title { font-weight: 900; letter-spacing: -0.02em; }

        .meta { color: var(--text-medium); font-size: 0.78rem; margin-top: 0.35rem; display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; }
        .pill { border: 1px solid var(--border); padding: 0.15rem 0.5rem; border-radius: 999px; font-weight: 800; font-size: 0.72rem; background: rgba(15,23,42,0.02); }
        .actions { display:flex; gap:0.75rem; margin: 0 1.25rem 1rem; }
        .btnx { flex: 1; border-radius: 14px; padding: 0.85rem 1rem; font-weight: 900; border: 1px solid var(--border); background: rgba(255,255,255,0.9); }
        .btnx.primary { background: linear-gradient(145deg, #2563eb 0%, var(--primary) 100%); color:#fff; border:none; }
        .empty { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow-sm); padding: 1.25rem; text-align:center; color: var(--text-medium); }
        @media (min-width: 768px) { body { max-width: 500px; margin: 0 auto; } }

<body class="has-bottom-nav">
    <div class="page-header">
        <div class="header-content">
            <h1 class="page-title">Notifications</h1>
            <p class="page-subtitle" id="subtitle">Loading…</p>
        </div>
    </div>

    <div class="actions">
        <button class="btnx" type="button" id="btnEnablePush"><i class="fas fa-bell"></i> Enable Push</button>
        <button class="btnx primary" type="button" id="btnMarkAll"><i class="fas fa-check-double"></i> Mark All Read</button>
    </div>

    <div class="wrap">
        <div class="tabs">
            <button class="tab active" type="button" id="tabAll">All</button>
            <button class="tab" type="button" id="tabUnread">Unread</button>
        </div>
        <div id="listArea"></div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="loads.html" class="bottom-nav-item"><i class="fas fa-clipboard-list"></i><span>Loads</span></a>
        <a href="messages.html" class="bottom-nav-item"><i class="fas fa-comments"></i><span>Messages</span></a>
        <a href="wallet.html" class="bottom-nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <a href="profile.html" class="bottom-nav-item active"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
    <script src="../../assets/js/firebase-init.js"></script>
    <script src="../../assets/js/alerts.js"></script>
    <script src="../../assets/js/notifications.js"></script>
    <script>
        const alertSystem = new AlertSystem();
        let filterMode = 'all';

        function getCarrierAuth() {
            try { return JSON.parse(localStorage.getItem('carrierAuth') || localStorage.getItem('lastCarrierProfile') || 'null'); } catch { return null; }
        }
        function getCarrierId(u) {
            if (!u) return '';
            return u.carrierId || u.id || (u.email || '').replace(/@/g, '_').replace(/\./g, '_');
        }
        function fmtTime(ts) {
            if (!ts) return '';
            try { return new Date(ts).toLocaleString('en-GB'); } catch { return String(ts); }
        }
        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return;
            if (authSdk.currentUser) return;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => { if (!done) { done = true; resolve(); } }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
            if (!authSdk.currentUser && typeof authSdk.signInAnonymously === 'function') {
                try { await authSdk.signInAnonymously(); } catch (e) {}
            }
        }

        async function fetchNotifications(carrierId) {
            const db = window.AlphaBrokrage.firebaseDb;
            await ensureAuthReady();
            const snap = await db.ref(`notifications/carriers/${carrierId}`).limitToLast(250).once('value');
            const out = [];
            if (snap.exists()) {
                snap.forEach((ch) => out.push({ id: ch.key, ...(ch.val() || {}) }));
            }
            return out.sort((a, b) => new Date(b.createdAt || b.created_at || 0) - new Date(a.createdAt || a.created_at || 0));
        }

        function render(list) {
            const el = document.getElementById('listArea');
            const filtered = filterMode === 'unread' ? list.filter(x => !x.read) : list;
            const unreadCount = list.filter(x => !x.read).length;
            document.getElementById('subtitle').textContent = unreadCount ? `${unreadCount} unread` : 'All caught up';
            if (!filtered.length) {
                el.innerHTML = `<div class="empty"><div class="fw-bold">No notifications</div><div style="margin-top:0.35rem;">You are up to date.</div></div>`;
                return;
            }
            el.innerHTML = filtered.map((n) => {
                const title = n.title || 'Notification';
                const msg = n.message || '';
                const at = n.createdAt || n.created_at || '';
                const type = n.type || 'system';
                return `
                    <div class="row ${n.read ? '' : 'unread'}" data-id="${String(n.id).replace(/\"/g, '&quot;')}">
                        <div class="dot"></div>
                        <div style="min-width:0;flex:1;">
                            <div class="title">${String(title).replace(/</g, '&lt;')}</div>
                            <div class="msg">${String(msg).replace(/</g, '&lt;')}</div>
                            <div class="meta">
                                <span class="pill">${String(type).replace(/</g, '&lt;')}</span>
                                <span>${fmtTime(at)}</span>
                            </div>
                        </div>
                        <div style="color:var(--text-medium);margin-top:0.2rem;"><i class="fas fa-chevron-right"></i></div>
                    </div>
                `;
            }).join('');
            el.querySelectorAll('.row').forEach((row) => {
                row.addEventListener('click', async () => {
                    const id = row.getAttribute('data-id') || '';
                    const item = filtered.find(x => String(x.id) === String(id)) || null;
                    if (!id || !item) return;
                    try { await markAsRead(id); } catch (e) {}
                    const url = item.data && item.data.url ? String(item.data.url) : '';
                    if (url) {
                        if (url.startsWith('http')) window.location.href = url;
                        else window.location.href = '..' + url;
                    } else {
                        await init();
                    }
                });
            });
        }

        async function init() {
            const user = getCarrierAuth();
            if (!user) { window.location.href = 'login.html'; return; }
            const carrierId = getCarrierId(user);
            if (!carrierId) { window.location.href = 'login.html'; return; }
            try {
                const list = await fetchNotifications(carrierId);
                render(list);
            } catch (e) {
                console.error(e);
                document.getElementById('subtitle').textContent = 'Error';
                document.getElementById('listArea').innerHTML = `<div class="empty"><div class="fw-bold">Failed to load</div><div style="margin-top:0.35rem;">Please refresh and try again.</div></div>`;
            }
        }

        document.getElementById('tabAll').addEventListener('click', () => {
            filterMode = 'all';
            document.getElementById('tabAll').classList.add('active');
            document.getElementById('tabUnread').classList.remove('active');
            init();
        });
        document.getElementById('tabUnread').addEventListener('click', () => {
            filterMode = 'unread';
            document.getElementById('tabUnread').classList.add('active');
            document.getElementById('tabAll').classList.remove('active');
            init();
        });
        document.getElementById('btnMarkAll').addEventListener('click', async () => {
            try { await markAllAsRead(); } catch (e) {}
            init();
        });
        document.getElementById('btnEnablePush').addEventListener('click', async () => {
            try {
                if (typeof window.enablePushNotifications === 'function') {
                    await window.enablePushNotifications();
                    alertSystem.show('success', 'Push enabled');
                } else if (typeof initFCM === 'function') {
                    await initFCM();
                    alertSystem.show('success', 'Push enabled');
                } else {
                    alertSystem.show('error', 'Push is not available on this page');
                }
            } catch (e) {
                alertSystem.show('error', 'Failed to enable push');
            }
        });

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
