    <style>
        :root {
            --primary: #2563EB;
            --primary-dark: #1E40AF;
            --primary-light: #93C5FD;
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
            --text-dark: #0F172A;
            --text-medium: #64748B;
            --text-light: #94A3B8;
            --bg-main: #F8FAFC;
            --card-bg: #FFFFFF;
            --border: #E5E7EB;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #F8FAFC 0%, #EFF6FF 100%);
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--text-dark);
            line-height: 1.6;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(37, 99, 235, 0.3);
            border-radius: 10px;
            transition: background 0.3s ease;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(37, 99, 235, 0.5);
        }

        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(37, 99, 235, 0.3) transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        /* App Container */
        .app-container {
            max-width: 100%;
            margin: 0 auto;
            background: var(--bg-main);
            min-height: 100vh;
            min-height: 100dvh;
            position: relative;
            overflow-x: hidden;
        }

        /* Scroll Container */
        .scroll-container {
            padding-bottom: 2rem;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-top: env(safe-area-inset-top, 0);
        }

        /* Container – mobile: content at top */
        .login-container {
            max-width: 100%;
            padding: 0 1rem 1.5rem;
            padding-top: 0;
        }

        /* Welcome Section – full mobile view, box at top */
        .welcome-section {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 1.5rem 1rem 1.75rem;
            padding-top: max(1.25rem, env(safe-area-inset-top, 12px));
            border-radius: 0 0 24px 24px;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .welcome-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .welcome-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
            margin-bottom: 0.35rem;
            line-height: 1.2;
            position: relative;
            z-index: 1;
        }

        .welcome-subtitle {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 0;
            position: relative;
            z-index: 1;
        }

        .benefits-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-align: left;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1rem;
            border-radius: 14px;
            margin-top: 1rem;
            position: relative;
            z-index: 1;
        }

        .benefit-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: white;
        }

        .benefit-item i {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            width: 20px;
        }

        /* Form Card */
        .form-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }

        .form-section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-section-title i {
            color: var(--primary);
            font-size: 1.125rem;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg-main);
            color: var(--text-dark);
            transition: all 0.2s;
            min-height: 48px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--card-bg);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-light);
        }

        /* Password Toggle */
        .password-input-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-medium);
            font-size: 1.125rem;
            cursor: pointer;
            padding: 0.5rem;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:active {
            transform: translateY(-50%) scale(0.9);
        }

        /* Remember Me & Forgot Password */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .remember-me input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .remember-me label {
            font-size: 0.875rem;
            color: var(--text-dark);
            cursor: pointer;
        }

        .forgot-password {
            font-size: 0.875rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password:active {
            opacity: 0.7;
        }

        /* Buttons */
        .btn-primary {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary .spinner {
            display: none;
        }

        .btn-primary.loading .spinner {
            display: block;
        }

        .btn-primary.loading .btn-text {
            display: none;
        }

        /* Google Sign In */
        .google-signin-btn {
            width: 100%;
            padding: 0.875rem;
            font-size: 0.9375rem;
            font-weight: 500;
            color: var(--text-dark);
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .google-signin-btn:active {
            transform: scale(0.98);
            background: var(--bg-main);
        }

        .google-signin-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-medium);
            font-size: 0.875rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Error Message */
        .error-message {
            display: none;
            font-size: 0.8125rem;
            color: var(--error);
            margin-top: 0.5rem;
            padding-left: 0.25rem;
        }

        .form-group.error .error-message {
            display: block;
        }

        .form-group.error .form-input {
            border-color: var(--error);
        }

        /* Sign Up Link */
        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
        }

        .signup-link-text {
            font-size: 0.9375rem;
            color: var(--text-medium);
        }

        .signup-link-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link-text a:active {
            opacity: 0.7;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-card {
            animation: fadeInUp 0.4s ease-out;
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (min-width: 768px) {
            .app-container {
                max-width: 500px;
                margin: 0 auto;
                box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
            }

            .login-container {
                padding: 1.5rem 2rem 2rem;
            }
            .welcome-section {
                padding: 2rem 1.5rem;
                padding-top: 2rem;
            }
            .welcome-title {
                font-size: 1.75rem;
            }
            .welcome-subtitle {
                font-size: 0.9375rem;
                margin-bottom: 0.5rem;
            }
        }

    </style>

    <!-- Main Script -->
    <script>
        // Initialize alerts
        const alertSystem = new AlertSystem();

        function showError(message, opts) {
            alertSystem.error(message, opts || {});
        }

        function showSuccess(message, opts) {
            alertSystem.success(message, opts || {});
        }

        // Password Toggle
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('passwordToggleIcon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Form Validation – professional alerts
        function validateForm() {
            document.querySelectorAll('.form-group').forEach(group => group.classList.remove('error'));
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email && !password) {
                showError('Please enter your email and password.', { title: 'Required' });
                document.getElementById('email').closest('.form-group').classList.add('error');
                document.getElementById('password').closest('.form-group').classList.add('error');
                return false;
            }
            if (!email) {
                showError('Please enter your email.', { title: 'Required' });
                document.getElementById('email').closest('.form-group').classList.add('error');
                return false;
            }
            var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('Please enter a valid email address.', { title: 'Invalid Email' });
                document.getElementById('email').closest('.form-group').classList.add('error');
                return false;
            }
            if (!password) {
                showError('Please enter your password.', { title: 'Required' });
                document.getElementById('password').closest('.form-group').classList.add('error');
                return false;
            }
            if (password.length < 6) {
                showError('Password must be at least 6 characters.', { title: 'Invalid Password' });
                document.getElementById('password').closest('.form-group').classList.add('error');
                return false;
            }
            return true;
        }

        // Form Submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (!validateForm()) return;

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            try {
                const email = document.getElementById('email').value.trim().toLowerCase();
                const password = document.getElementById('password').value;
                const rememberMe = document.getElementById('rememberMe').checked;

                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
                if (!authSdk || !db) {
                    throw new Error('Login service unavailable');
                }
                try {
                    if (typeof authSdk.setPersistence === 'function') {
                        await authSdk.setPersistence(rememberMe ? 'local' : 'session');
                    }
                } catch (e) {}

                let legacyLookupPromise = null;
                try {
                    legacyLookupPromise = db.ref('carriers').orderByChild('email').equalTo(email).limitToFirst(1).once('value');
                } catch (e) {
                    legacyLookupPromise = null;
                }

                const cred = await authSdk.signInWithEmailAndPassword(email, password);
                const uid = cred && cred.user ? cred.user.uid : null;
                if (!uid) throw new Error('auth_failed');

                let carrier = null;
                try {
                    const cachedRaw = localStorage.getItem('carrierAuth') || localStorage.getItem('lastCarrierProfile');
                    if (cachedRaw) {
                        const cached = JSON.parse(cachedRaw);
                        if (cached && cached.firebaseUid === uid) carrier = cached;
                    }
                } catch (e) {}

                if (!carrier) {
                    const snap = await db.ref('carriers').orderByChild('firebaseUid').equalTo(uid).limitToFirst(1).once('value');
                    if (snap && snap.exists()) {
                        snap.forEach((child) => {
                            const c = child.val() || {};
                            if (!c.carrierId) c.carrierId = child.key;
                            carrier = c;
                        });
                    }
                }

                if (!carrier) {
                    try { await authSdk.signOut(); } catch (e) {}
                    showError('No carrier profile found. Please sign up first.', { title: 'Login Failed' });
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                    return;
                }

                try { await enforceTwoFAIfEnabled('carrier'); } catch (e) {
                    try { await authSdk.signOut(); } catch (e2) {}
                    showError('Two‑Step Verification failed.', { title: 'Login Failed' });
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                    return;
                }

                // Create auth object
                const carrierAuth = {
                    ...carrier,
                    isLoggedIn: true,
                    loginTime: new Date().toISOString(),
                    rememberMe: rememberMe,
                    rememberUntil: rememberMe ? (Date.now() + 30 * 24 * 60 * 60 * 1000) : 0,
                    userType: 'carrier'
                };

                // Save to localStorage
                localStorage.setItem('carrierAuth', JSON.stringify(carrierAuth));
                localStorage.setItem('lastCarrierProfile', JSON.stringify(carrierAuth));

                if (rememberMe) {
                    localStorage.setItem('rememberCarrier', 'true');
                } else {
                    try { localStorage.removeItem('rememberCarrier'); } catch (e) {}
                }

                showSuccess('Sign in successful! Redirecting...');

                // Redirect to dashboard after 1 second
                setTimeout(() => {
                    const name = (carrierAuth && (carrierAuth.firstName || carrierAuth.name || carrierAuth.companyName || carrierAuth.email)) ? String(carrierAuth.firstName || carrierAuth.name || carrierAuth.companyName || carrierAuth.email) : '';
                    const next = carrierAuth && carrierAuth.profileComplete === false ? '/mobile-app/carrier/edit-profile.html' : '/mobile-app/carrier/dashboard.html';
                    window.location.href = '/mobile-app/welcome.html?mode=back&role=carrier&name=' + encodeURIComponent(name) + '&next=' + encodeURIComponent(next);
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                const code = error && error.code ? String(error.code) : '';
                const msg = error && error.message ? String(error.message) : '';
                const looksLikeInvalidCreds = msg.includes('INVALID_LOGIN_CREDENTIALS') || msg.includes('INVALID_PASSWORD') || msg.includes('invalid login credentials');
                if (code === 'auth/user-not-found' || code === 'auth/invalid-login-credentials' || code === 'auth/invalid-credential' || (code === 'auth/internal-error' && looksLikeInvalidCreds)) {
                    try {
                        const legacySnap = legacyLookupPromise ? await legacyLookupPromise : await (window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb)
                            .ref('carriers').orderByChild('email').equalTo(document.getElementById('email').value.trim().toLowerCase()).limitToFirst(1).once('value');
                        let legacy = null;
                        let legacyKey = '';
                        if (legacySnap && legacySnap.exists()) {
                            legacySnap.forEach((child) => {
                                legacy = child.val() || {};
                                legacyKey = child.key;
                            });
                        }
                        if (legacy && legacyKey) {
                            if (legacy.password && legacy.password === password) {
                                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                                const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
                                const newCred = await authSdk.createUserWithEmailAndPassword(email, password);
                                const uid = newCred && newCred.user ? newCred.user.uid : '';
                                if (!uid) throw new Error('auth_failed');
                                await db.ref('carriers/' + legacyKey).update({ firebaseUid: uid });
                                try { await db.ref('carriers/' + legacyKey + '/password').remove(); } catch (e) {}
                                if (!legacy.carrierId) legacy.carrierId = legacyKey;
                                legacy.firebaseUid = uid;
                                try { await enforceTwoFAIfEnabled('carrier'); } catch (e) {
                                    try { await authSdk.signOut(); } catch (e2) {}
                                    showError('Two‑Step Verification failed.', { title: 'Login Failed' });
                                    submitBtn.classList.remove('loading');
                                    submitBtn.disabled = false;
                                    return;
                                }
                                const carrierAuth = { ...legacy, isLoggedIn: true, loginTime: new Date().toISOString() };
                                localStorage.setItem('carrierAuth', JSON.stringify(carrierAuth));
                                localStorage.setItem('lastCarrierProfile', JSON.stringify(carrierAuth));
                                if (rememberMe) localStorage.setItem('rememberCarrier', 'true');
                                showSuccess('Sign in successful! Redirecting...');
                                setTimeout(() => {
                                    const name = (carrierAuth && (carrierAuth.firstName || carrierAuth.name || carrierAuth.companyName || carrierAuth.email)) ? String(carrierAuth.firstName || carrierAuth.name || carrierAuth.companyName || carrierAuth.email) : '';
                                    const next = carrierAuth && carrierAuth.profileComplete === false ? '/mobile-app/carrier/edit-profile.html' : '/mobile-app/carrier/dashboard.html';
                                    window.location.href = '/mobile-app/welcome.html?mode=back&role=carrier&name=' + encodeURIComponent(name) + '&next=' + encodeURIComponent(next);
                                }, 800);
                                return;
                            }
                            showError('Wrong password.', { title: 'Login Failed' });
                            submitBtn.classList.remove('loading');
                            submitBtn.disabled = false;
                            return;
                        }
                    } catch (e) {
                        console.error(e);
                    }
                    showError('Wrong email.', { title: 'Login Failed' });
                }
                else if (code === 'auth/wrong-password') showError('Wrong password.', { title: 'Login Failed' });
                else if (code === 'auth/invalid-email') showError('Invalid email address.', { title: 'Login Failed' });
                else showError('Login failed. Please try again.');
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });

        function hasRememberedCarrierSession() {
            try {
                const raw = localStorage.getItem('carrierAuth');
                if (!raw) return false;
                const auth = JSON.parse(raw);
                let until = auth && auth.rememberUntil ? Number(auth.rememberUntil) : 0;
                const remembered = !!(auth && auth.rememberMe) || localStorage.getItem('rememberCarrier') === 'true';
                if (!remembered) return false;
                if (!until || !Number.isFinite(until)) {
                    const loginTs = auth && auth.loginTime ? Date.parse(auth.loginTime) : 0;
                    if (loginTs && Number.isFinite(loginTs)) until = loginTs + 30 * 24 * 60 * 60 * 1000;
                }
                if (!until || !Number.isFinite(until)) return false;
                if (Date.now() > until) return false;
                return !!(auth && auth.isLoggedIn);
            } catch (e) {
                return false;
            }
        }

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return;
            if (authSdk.currentUser) return;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => { if (!done) { done = true; resolve(); } }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
        }

        async function attemptAutoLogin() {
            try {
                const rememberBox = document.getElementById('rememberMe');
                if (rememberBox) rememberBox.checked = hasRememberedCarrierSession();
            } catch (e) {}

            if (!hasRememberedCarrierSession()) return;
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
            if (!authSdk || !db) return;

            try {
                if (typeof authSdk.setPersistence === 'function') {
                    await authSdk.setPersistence('local');
                }
            } catch (e) {}

            await ensureAuthReady();
            if (!authSdk.currentUser || !authSdk.currentUser.uid) return;
            const uid = String(authSdk.currentUser.uid);

            let carrier = null;
            try {
                const cachedRaw = localStorage.getItem('carrierAuth') || localStorage.getItem('lastCarrierProfile');
                if (cachedRaw) {
                    const cached = JSON.parse(cachedRaw);
                    if (cached && cached.firebaseUid === uid) carrier = cached;
                }
            } catch (e) {}

            if (!carrier) {
                try {
                    const snap = await db.ref('carriers').orderByChild('firebaseUid').equalTo(uid).limitToFirst(1).once('value');
                    if (snap && snap.exists()) {
                        snap.forEach((child) => {
                            const c = child.val() || {};
                            if (!c.carrierId) c.carrierId = child.key;
                            carrier = c;
                        });
                    }
                } catch (e) {}
            }

            if (!carrier) return;
            try { showSuccess('Signing you in...'); } catch (e) {}

            const carrierAuth = {
                ...carrier,
                isLoggedIn: true,
                loginTime: new Date().toISOString(),
                rememberMe: true,
                rememberUntil: Date.now() + 30 * 24 * 60 * 60 * 1000,
                userType: 'carrier'
            };
            try {
                localStorage.setItem('carrierAuth', JSON.stringify(carrierAuth));
                localStorage.setItem('lastCarrierProfile', JSON.stringify(carrierAuth));
                localStorage.setItem('rememberCarrier', 'true');
            } catch (e) {}

            const name = (carrierAuth && (carrierAuth.firstName || carrierAuth.name || carrierAuth.companyName || carrierAuth.email)) ? String(carrierAuth.firstName || carrierAuth.name || carrierAuth.companyName || carrierAuth.email) : '';
            const next = carrierAuth && carrierAuth.profileComplete === false ? '/mobile-app/carrier/edit-profile.html' : '/mobile-app/carrier/dashboard.html';
            window.location.href = '/mobile-app/welcome.html?mode=back&role=carrier&name=' + encodeURIComponent(name) + '&next=' + encodeURIComponent(next);
        }

        try { attemptAutoLogin().catch(function () {}); } catch (e) {}

        // Google Sign In
        const GOOGLE_CLIENT_ID = '834712514965-j9od0ea97k00nvkg92214eas912n8n5v.apps.googleusercontent.com';

        function signInWithGoogle() {
            if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
                google.accounts.id.prompt();
                return;
            }
            showError('Google Sign In is not available. Please use email login.');
        }

        const TWO_FA_BASE = 'https://us-central1-alpha-brokerage.cloudfunctions.net';

        async function enforceTwoFAIfEnabled(role) {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || !authSdk.currentUser) return;
            let idToken = '';
            try {
                idToken = await authSdk.currentUser.getIdToken();
            } catch (e) {
                return;
            }
            try {
                const stResp = await fetch(TWO_FA_BASE + '/twoFAStatusPublic?role=' + encodeURIComponent(role), {
                    headers: { 'Authorization': 'Bearer ' + idToken }
                });
                if (!stResp || !stResp.ok) return;
                let st = null;
                try { st = await stResp.json(); } catch (e) {}
                if (!st || !st.enforce) return;
                await promptTwoFACode(role, idToken);
            } catch (e) {
                return;
            }
        }

        async function promptTwoFACode(role, idToken) {
            return new Promise((resolve) => {
                let overlay = document.getElementById('twoFAOverlay');
                if (!overlay) {
                    overlay = document.createElement('div');
                    overlay.id = 'twoFAOverlay';
                    overlay.style.position = 'fixed';
                    overlay.style.inset = '0';
                    overlay.style.background = 'rgba(15,23,42,0.55)';
                    overlay.style.backdropFilter = 'blur(6px)';
                    overlay.style.display = 'flex';
                    overlay.style.alignItems = 'center';
                    overlay.style.justifyContent = 'center';
                    overlay.style.zIndex = '9999';
                    overlay.innerHTML = '<div style="width:100%;max-width:420px;background:#fff;border-radius:18px;padding:1.25rem;border:1px solid rgba(148,163,184,0.18);box-shadow:0 14px 40px rgba(2,6,23,0.08);text-align:center;"><div style="font-weight:800;color:#0F172A;margin-bottom:0.5rem;">Two‑Step Verification</div><div style="color:#64748B;font-size:0.875rem;margin-bottom:0.75rem;">Enter the 6‑digit code from Google Authenticator</div><input id="twoFAToken" inputmode="numeric" pattern="\\d{6}" maxlength="6" style="width:100%;padding:0.75rem 1rem;border:1px solid rgba(148,163,184,0.25);border-radius:12px;font-size:1rem;letter-spacing:6px;text-align:center;" placeholder="••••••"/><div id="twoFAError" style="color:#EF4444;font-size:0.875rem;margin-top:0.5rem;"></div><button id="twoFABtn" style="margin-top:0.75rem;width:100%;padding:0.9rem;background:linear-gradient(135deg,#0B0F19,#111827);color:#fff;border:none;border-radius:12px;font-weight:800;">Verify</button></div>';
                    document.body.appendChild(overlay);
                } else {
                    overlay.style.display = 'flex';
                }
                const btn = document.getElementById('twoFABtn');
                const err = document.getElementById('twoFAError');
                const tokenInput = document.getElementById('twoFAToken');
                err.textContent = '';
                btn.onclick = async () => {
                    const token = (tokenInput.value || '').trim();
                    if (!/^[0-9]{6}$/.test(token)) { err.textContent = 'Enter 6‑digit code'; return; }
                    btn.disabled = true;
                    btn.textContent = 'Verifying...';
                    try {
                        const resp = await fetch(TWO_FA_BASE + '/twoFAVerifyPublic', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + idToken },
                            body: JSON.stringify({ role, token })
                        });
                        const js = await resp.json();
                        if (js && js.success) {
                            overlay.style.display = 'none';
                            resolve(true);
                        } else {
                            err.textContent = (js && js.error && js.error.message) ? js.error.message : 'Invalid code';
                        }
                    } catch (e) {
                        err.textContent = 'Verification failed. Try again.';
                    } finally {
                        btn.disabled = false;
                        btn.textContent = 'Verify';
                    }
                };
            });
        }

        async function handleGoogleIdCredentialResponse(response) {
            try {
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
                if (!authSdk || !db) throw new Error('Auth/DB unavailable');

                const idToken = response && response.credential ? String(response.credential) : '';
                if (!idToken) throw new Error('Missing credential');

                const providerCred = firebase.auth.GoogleAuthProvider.credential(idToken);
                const userCred = await authSdk.signInWithCredential(providerCred);
                const uid = userCred && userCred.user ? userCred.user.uid : '';
                if (!uid) throw new Error('Google sign-in failed');

                const snap = await db.ref('carriers').orderByChild('firebaseUid').equalTo(uid).limitToFirst(1).once('value');
                let carrier = null;
                if (snap && snap.exists()) {
                    snap.forEach((child) => {
                        const c = child.val() || {};
                        if (!c.carrierId) c.carrierId = child.key;
                        carrier = c;
                    });
                }

                if (!carrier) {
                    try { await authSdk.signOut(); } catch (e) {}
                    showError('No carrier account found for this email. Please sign up first.');
                    return;
                }

                try { await enforceTwoFAIfEnabled('carrier'); } catch (e) {
                    try { await authSdk.signOut(); } catch (e2) {}
                    showError('Two‑Step Verification failed.', { title: 'Login Failed' });
                    return;
                }

                const carrierAuth = {
                    ...carrier,
                    isLoggedIn: true,
                    loginTime: new Date().toISOString()
                };
                localStorage.setItem('carrierAuth', JSON.stringify(carrierAuth));
                localStorage.setItem('lastCarrierProfile', JSON.stringify(carrierAuth));

                showSuccess('Signing in...');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800);
            } catch (e) {
                console.error(e);
                showError('Google sign in failed. Please try again.');
            }
        }

        // Forgot Password
        function handleForgotPassword() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk) {
                showError('Password reset unavailable right now.');
                return;
            }
            const email = document.getElementById('email').value.trim().toLowerCase();
            if (!email) {
                showError('Please enter your email first.');
                return;
            }
            authSdk.sendPasswordResetEmail(email)
                .then(() => { showSuccess('Password reset email sent. Check your inbox.'); })
                .catch((err) => {
                    const code = err && err.code ? String(err.code) : '';
                    if (code === 'auth/user-not-found') showError('No account found with this email.');
                    else if (code === 'auth/invalid-email') showError('Invalid email address.');
                    else showError('Failed to send reset email. Please try again.');
                });
        }

        // Initialize Google Sign In on load
        window.addEventListener('load', function() {
            if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
                try {
                    google.accounts.id.initialize({
                        client_id: GOOGLE_CLIENT_ID,
                        callback: handleGoogleIdCredentialResponse
                    });
                } catch (e) {}
            }
        });
    </script>
