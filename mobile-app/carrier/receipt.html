    <style>
        body.has-bottom-nav { padding-bottom: calc(80px + env(safe-area-inset-bottom, 48px)) !important; }
        .header-content { position: relative; z-index: 1; }
        .page-title { font-size: clamp(1.25rem, 4.5vw, 1.5rem); font-weight: 700; margin-bottom: 0.35rem; }
        .page-subtitle { font-size: clamp(0.8125rem, 2.5vw, 0.875rem); opacity: 0.9; }

        .receipt-card {
            background: var(--card-bg);
            margin: 0 clamp(1rem, 4vw, 1.25rem) 1.25rem;
            padding: clamp(1.25rem, 4vw, 1.75rem);
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
            max-width: 100%;
            box-sizing: border-box;
        }
        .receipt-brand {
            text-align: center;
            margin-bottom: 1rem;
            padding-bottom: 0.875rem;
            border-bottom: 2px dashed var(--border);
        }
        .receipt-brand h2 {
            font-size: clamp(1.2rem, 4vw, 1.375rem);
            font-weight: 800;
            color: var(--primary);
            margin: 0 0 0.2rem 0;
        }
        .receipt-brand p { font-size: clamp(0.6875rem, 2vw, 0.75rem); color: var(--text-medium); margin: 0; }
        .receipt-title {
            text-align: center;
            font-size: clamp(1rem, 3.5vw, 1.125rem);
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
        }
        .receipt-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: clamp(0.75rem, 2.2vw, 0.8125rem);
            color: var(--text-medium);
            flex-wrap: wrap;
            gap: 0.25rem;
        }
        .receipt-route {
            margin-bottom: 1rem;
            padding: clamp(0.75rem, 3vw, 1rem);
            background: var(--bg-main, #f8fafc);
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .receipt-route-row { display: flex; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.4rem; }
        .receipt-route-row:last-child { margin-bottom: 0; }
        .receipt-route-label { font-size: clamp(0.625rem, 2vw, 0.6875rem); font-weight: 700; color: var(--text-medium); text-transform: uppercase; width: 52px; flex-shrink: 0; }
        .receipt-route-value { font-size: clamp(0.8125rem, 2.5vw, 0.9375rem); font-weight: 600; color: var(--text-dark); word-break: break-word; min-width: 0; }
        .receipt-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.45rem 0;
            font-size: clamp(0.8125rem, 2.5vw, 0.875rem);
            border-bottom: 1px solid var(--border);
            gap: 0.5rem;
        }
        .receipt-row:last-of-type { border-bottom: none; }
        .receipt-row .label { color: var(--text-medium); font-weight: 500; flex-shrink: 0; }
        .receipt-row .value { color: var(--text-dark); font-weight: 600; text-align: right; word-break: break-word; min-width: 0; }
        .receipt-total {
            margin-top: 1rem;
            padding-top: 0.875rem;
            border-top: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
        }
        .receipt-total .label { font-size: clamp(0.9375rem, 2.8vw, 1rem); font-weight: 700; color: var(--text-dark); }
        .receipt-total .value { font-size: clamp(1.25rem, 4vw, 1.5rem); font-weight: 800; color: var(--success); }
        .receipt-status {
            text-align: center;
            margin-top: 1rem;
            padding: 0.4rem;
            font-size: clamp(0.75rem, 2.2vw, 0.8125rem);
            font-weight: 700;
            color: var(--success);
        }
        .receipt-thanks {
            text-align: center;
            margin-top: 1rem;
            font-size: clamp(0.8125rem, 2.5vw, 0.875rem);
            color: var(--text-medium);
        }
        .actions-section { margin: 0 clamp(1rem, 4vw, 1.25rem) 1.25rem; }
        .btn-print {
            width: 100%;
            padding: clamp(0.75rem, 2.5vw, 0.875rem) 1rem;
            min-height: 48px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: clamp(0.875rem, 2.6vw, 0.9375rem);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-print:active { transform: scale(0.98); }
        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.625rem;
            padding: clamp(0.7rem, 2.5vw, 0.75rem) 1rem;
            min-height: 48px;
            width: 100%;
            background: #25D366;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: clamp(0.875rem, 2.6vw, 0.9375rem);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-whatsapp:active { transform: scale(0.98); }
        .btn-whatsapp i { font-size: 1.125rem; }
        .btn-back {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.625rem;
            padding: clamp(0.7rem, 2.5vw, 0.75rem) 1rem;
            min-height: 48px;
            width: 100%;
            background: var(--card-bg);
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 12px;
            font-size: clamp(0.875rem, 2.6vw, 0.9375rem);
            font-weight: 600;
            text-decoration: none;
        }
        .btn-back:active { opacity: 0.9; }

        .empty-state { text-align: center; padding: clamp(2rem, 6vw, 3rem) 1.25rem; margin: 0 1rem; }
        .empty-state i { font-size: clamp(2.5rem, 8vw, 3rem); color: var(--text-medium); margin-bottom: 0.875rem; }
        .empty-state h3 { font-size: clamp(1rem, 3.5vw, 1.125rem); margin-bottom: 0.5rem; }
        .empty-state p { font-size: clamp(0.8125rem, 2.5vw, 0.875rem); color: var(--text-medium); }
        .loading { display: flex; justify-content: center; align-items: center; padding: clamp(2rem, 6vw, 3rem); }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media print {
            body.has-bottom-nav { padding-bottom: 0 !important; }
            .page-header { break-after: avoid; }
            .receipt-card { box-shadow: none; border: 1px solid #ddd; }
            .bottom-nav, .actions-section, .btn-print, .btn-whatsapp { display: none !important; }
        }
        @media (min-width: 768px) { body { max-width: 500px; margin: 0 auto; } }
        @media (max-width: 360px) {
            .receipt-card { margin-left: 0.75rem; margin-right: 0.75rem; padding: 1rem; }
            .actions-section { margin-left: 0.75rem; margin-right: 0.75rem; }
        }
    </style>
</head>
<body class="has-bottom-nav">
    <div class="page-header">
        <div class="header-content">
            <h1 class="page-title">Receipt</h1>
            <p class="page-subtitle" id="receiptSubtitle">Loading...</p>
        </div>
    </div>

    <div id="contentArea">
        <div class="loading">
            <div class="spinner"></div>
        </div>
    </div>

    <div id="actionsArea" style="display: none;">
        <div class="actions-section">
            <button type="button" class="btn-print" onclick="window.print()">
                <i class="fas fa-print"></i> Print / Save as PDF
            </button>
            <button type="button" id="btnShareWhatsApp" class="btn-whatsapp">
                <i class="fab fa-whatsapp"></i> Share on WhatsApp
            </button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="loads.html" class="bottom-nav-item"><i class="fas fa-clipboard-list"></i><span>Loads</span></a>
        <a href="messages.html" class="bottom-nav-item"><i class="fas fa-comments"></i><span>Messages</span></a>
        <a href="wallet.html" class="bottom-nav-item active"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <a href="profile.html" class="bottom-nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="../../assets/js/firebase-init.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const loadId = params.get('id') || params.get('loadId') || '';
        const mode = (params.get('mode') || 'receipt').toLowerCase();

        try {
            if (mode === 'payout') {
                document.title = 'Payout Statement - Alpha Freight';
                const t = document.querySelector('.page-title');
                if (t) t.textContent = 'Payout Statement';
            }
        } catch (e) {}

        function getUser() {
            try {
                const raw = localStorage.getItem('carrierAuth');
                return raw ? JSON.parse(raw) : null;
            } catch { return null; }
        }

        function formatCurrency(amt) {
            return '£' + parseFloat(amt || 0).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function getCarrierCommissionRate(originalAmount) {
            const amt = parseFloat(originalAmount) || 0;
            let commissionRate = 0.05;
            if (amt > 5000) {
                commissionRate = 0.03;
            } else if (amt > 1000) {
                commissionRate = 0.04;
            }
            return commissionRate;
        }

        function getNetCarrierAmount(load) {
            const originalBudget = load && (load.budget || (load.minBudget && load.maxBudget ? (parseFloat(load.minBudget) + parseFloat(load.maxBudget)) / 2 : load.maxBudget || load.minBudget || load.price || 0));
            const original = parseFloat(originalBudget) || 0;
            const commissionRate = getCarrierCommissionRate(original);
            const commission = original * commissionRate;
            return Math.round((original - commission) * 100) / 100;
        }
        function formatDate(str) {
            if (!str) return 'N/A';
            try { return new Date(str).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
            catch { return str; }
        }

        function isMyLoad(load) {
            const user = getUser();
            if (!user) return false;
            const cid = user.carrierId || (user.email || '').replace(/@/g, '_').replace(/\./g, '_');
            return (load.carrierId === cid || load.assignedCarrier === cid || load.carrierEmail === user.email);
        }

        function renderReceipt(load) {
            const content = document.getElementById('contentArea');
            const actionsArea = document.getElementById('actionsArea');

            if (!load || !isMyLoad(load)) {
                content.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-receipt"></i>
                        <h3>Receipt Not Found</h3>
                        <p>This load may not be assigned to you or the link is invalid.</p>
                        <a href="my-loads.html" class="btn-back" style="margin-top:1rem;">Back to My Loads</a>
                    </div>
                `;
                document.getElementById('receiptSubtitle').textContent = 'Receipt';
                return;
            }

            const lid = load.loadId || load.id || loadId;
            document.getElementById('receiptSubtitle').textContent = 'Load #' + (lid + '').substring(0, 8);

            const pickup = load.pickupLocation || load.from || 'N/A';
            const delivery = load.deliveryLocation || load.to || 'N/A';
            const cargo = load.cargoType || load.cargo || 'General';
            const grossAmount = parseFloat(load.commissionBaseAmount || load.price || load.budget || load.maxBudget || load.minBudget || 0) || 0;
            const commissionAmount = parseFloat(load.carrierCommissionAmount || load.supplierCommission || (grossAmount * getCarrierCommissionRate(grossAmount)) || 0) || 0;
            const netAmount = (typeof load.carrierNetAmount === 'number' ? load.carrierNetAmount : getNetCarrierAmount(load));
            const pickupDate = load.pickupDate || load.pickup_date;
            const deliveryDate = load.deliveryDate || load.delivery_date;
            const weight = load.cargoWeight ? load.cargoWeight + ' tonnes' : 'N/A';
            const distance = load.distance ? load.distance + ' miles' : 'N/A';
            const receiptDate = load.completedAt || load.deliveredAt || new Date().toISOString();
            const carrierName = (load.carrierName || '').trim() || 'Carrier';
            const docTitle = mode === 'payout' ? 'PAYOUT STATEMENT' : 'RECEIPT';
            const docSub = mode === 'payout' ? 'Carrier Payout Statement' : 'Delivery Receipt';

            content.innerHTML = `
                <div class="receipt-card">
                    <div class="receipt-brand">
                        <h2>Alpha Freight</h2>
                        <p>${docSub}</p>
                    </div>
                    <div class="receipt-title">${docTitle}</div>
                    <div class="receipt-meta">
                        <span>Load #${(lid + '').substring(0, 12)}</span>
                        <span>${formatDate(receiptDate)}</span>
                    </div>
                    <div class="receipt-route">
                        <div class="receipt-route-row">
                            <span class="receipt-route-label">From</span>
                            <span class="receipt-route-value">${pickup}</span>
                        </div>
                        <div class="receipt-route-row">
                            <span class="receipt-route-label">To</span>
                            <span class="receipt-route-value">${delivery}</span>
                        </div>
                    </div>
                    <div class="receipt-row">
                        <span class="label">Cargo Type</span>
                        <span class="value">${cargo}</span>
                    </div>
                    <div class="receipt-row">
                        <span class="label">Weight</span>
                        <span class="value">${weight}</span>
                    </div>
                    <div class="receipt-row">
                        <span class="label">Distance</span>
                        <span class="value">${distance}</span>
                    </div>
                    <div class="receipt-row">
                        <span class="label">Pickup Date</span>
                        <span class="value">${formatDate(pickupDate)}</span>
                    </div>
                    <div class="receipt-row">
                        <span class="label">Delivery Date</span>
                        <span class="value">${formatDate(deliveryDate)}</span>
                    </div>
                    <div class="receipt-row">
                        <span class="label">Carrier</span>
                        <span class="value">${carrierName}</span>
                    </div>
                    ${mode === 'payout' ? `
                        <div class="receipt-row">
                            <span class="label">Amount (Gross)</span>
                            <span class="value">${formatCurrency(grossAmount)}</span>
                        </div>
                        <div class="receipt-row">
                            <span class="label">Commission</span>
                            <span class="value">-${formatCurrency(commissionAmount)}</span>
                        </div>
                        <div class="receipt-total">
                            <span class="label">Payout (Net)</span>
                            <span class="value">${formatCurrency(netAmount)}</span>
                        </div>
                    ` : `
                        <div class="receipt-total">
                            <span class="label">Amount (Net)</span>
                            <span class="value">${formatCurrency(netAmount)}</span>
                        </div>
                    `}
                    <div class="receipt-status">
                        <i class="fas fa-check-circle"></i> Completed
                    </div>
                    <div class="receipt-thanks">Thank you for your business.</div>
                </div>
            `;
            actionsArea.style.display = 'block';

            const shareBtn = document.getElementById('btnShareWhatsApp');
            if (shareBtn) {
                shareBtn.onclick = shareReceiptAsImage;
            }
        }

        async function shareReceiptAsImage() {
            const card = document.querySelector('.receipt-card');
            if (!card || typeof html2canvas === 'undefined') {
                alert('Receipt not ready or sharing not supported.');
                return;
            }
            const btn = document.getElementById('btnShareWhatsApp');
            if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating image...'; }
            try {
                const canvas = await html2canvas(card, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    logging: false
                });
                canvas.toBlob(async function(blob) {
                    if (!blob) {
                        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fab fa-whatsapp"></i> Share on WhatsApp'; }
                        return;
                    }
                    const file = new File([blob], 'AlphaFreight-Receipt.png', { type: 'image/png' });
                    let shared = false;
                    if (navigator.share) {
                        try {
                            await navigator.share({
                                title: 'Delivery Receipt',
                                files: [file]
                            });
                            shared = true;
                        } catch (err) {
                            if (err.name !== 'AbortError') shared = false;
                        }
                    }
                    if (!shared) {
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = 'AlphaFreight-Receipt.png';
                        a.click();
                        URL.revokeObjectURL(a.href);
                        alert('Image saved. Open WhatsApp and share this image from your gallery.');
                    }
                    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fab fa-whatsapp"></i> Share on WhatsApp'; }
                }, 'image/png', 1);
            } catch (e) {
                console.error(e);
                if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fab fa-whatsapp"></i> Share on WhatsApp'; }
                alert('Could not create image. Try Print instead.');
            }
        }

        async function loadReceipt() {
            if (!loadId) {
                document.getElementById('receiptSubtitle').textContent = 'Receipt';
                document.getElementById('contentArea').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-receipt"></i>
                        <h3>No Load Selected</h3>
                        <p>Open a receipt from My Loads.</p>
                        <a href="my-loads.html" class="btn-back" style="margin-top:1rem;">Back to My Loads</a>
                    </div>
                `;
                return;
            }
            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const snap = await db.ref('loads/' + loadId).once('value');
                const load = snap.val();
                if (load) {
                    load.loadId = loadId;
                    load.id = loadId;
                    renderReceipt(load);
                } else {
                    renderReceipt(null);
                }
            } catch (e) {
                console.error(e);
                document.getElementById('contentArea').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error</h3>
                        <p>Failed to load receipt. Please try again.</p>
                        <a href="my-loads.html" class="btn-back" style="margin-top:1rem;">Back to My Loads</a>
                    </div>
                `;
                document.getElementById('receiptSubtitle').textContent = 'Receipt';
            }
        }

        document.addEventListener('DOMContentLoaded', loadReceipt);
    </script>
</body>
</html>
