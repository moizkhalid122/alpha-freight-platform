        /* Theme: carrier-premium-theme.css */
        .header-content {
            position: relative;
            z-index: 1;

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;

            font-size: 0.875rem;
            opacity: 0.9;
        }

        /* Status Card */
        .status-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            margin: 0 1.25rem 1.5rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            text-align: center;
        }

        .status-indicator {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            transition: all 0.3s;
        }

        .status-indicator.active {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            animation: pulse 2s infinite;
        }

        .status-indicator.inactive {
            background: linear-gradient(135deg, var(--text-medium) 0%, var(--text-light) 100%);
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);

            50% {

                box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);

        .status-text {
            font-size: 1.125rem;

            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .status-subtext {
            font-size: 0.875rem;
            color: var(--text-medium);
        }

        /* Map Container */
        .map-container {
            margin: 0 1.25rem 1.5rem;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            height: 300px;
            background: var(--bg-main);

        }

        #locationMap {

        }

        /* Satellite Toggle Button */
        .satellite-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: white;
            border: 2px solid var(--border);
            border-radius: 8px;

            display: flex;

            color: var(--text-dark);

        .satellite-toggle:hover {

            border-color: var(--primary);

        .satellite-toggle i {

    <!-- Google Maps API -->
    <script>
        // Load Google Maps API with API key from config
        function loadGoogleMaps() {
            const apiKey = window.GOOGLE_MAPS_API_KEY || 'YOUR_API_KEY_HERE';
            
            if (apiKey === 'YOUR_API_KEY_HERE' || !apiKey) {
                console.error('⚠️ Google Maps API key not found!');
                console.error('Please add your API key in: assets/js/google-maps-config.js');
                document.getElementById('locationMap').innerHTML = `
                    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 2rem; text-align: center; color: #64748B;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 1rem; color: #F59E0B;"></i>
                        <h3 style="margin-bottom: 0.5rem; color: #0F172A;">Google Maps API Key Required</h3>
                        <p style="font-size: 0.875rem; margin-bottom: 1rem;">Please add your Google Maps API key in:</p>
                        <code style="background: #F8FAFC; padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.75rem;">assets/js/google-maps-config.js</code>
                        <p style="font-size: 0.75rem; margin-top: 1rem; color: #94A3B8;">See GOOGLE_MAPS_API_KEY_SETUP.md for instructions</p>
                    </div>
                `;
                return;
            }

            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&libraries=geometry,places&callback=initGoogleMap`;
            script.async = true;
            script.defer = true;
            script.onerror = function() {
                document.getElementById('locationMap').innerHTML = `
                    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 2rem; text-align: center; color: #EF4444;">
                        <i class="fas fa-times-circle" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                        <h3 style="margin-bottom: 0.5rem;">Failed to Load Google Maps</h3>
                        <p style="font-size: 0.875rem;">Please check your API key and try again</p>
                    </div>
                `;
            };
            document.head.appendChild(script);
        }

        // Initialize Google Map
        function initGoogleMap() {
            if (typeof google === 'undefined' || !google.maps) {
                console.error('Google Maps API not loaded');
                return;
            }

            // Default location (London, UK)
            const defaultLat = 51.5074;
            const defaultLng = -0.1278;

            // Create map
            currentMapType = google.maps.MapTypeId.ROADMAP;
            map = new google.maps.Map(document.getElementById('locationMap'), {
                center: { lat: defaultLat, lng: defaultLng },
                zoom: 13,
                mapTypeId: currentMapType,
                disableDefaultUI: false,
                zoomControl: true,
                mapTypeControl: false,
                scaleControl: true,
                streetViewControl: false,
                rotateControl: false,
                fullscreenControl: true
            });

            // Initialize satellite toggle button state
            const toggleBtn = document.getElementById('satelliteToggle');
            if (toggleBtn) {
                toggleBtn.classList.remove('active');
            }

            // Create marker
            marker = new google.maps.Marker({
                position: { lat: defaultLat, lng: defaultLng },
                map: map,
                title: 'Your Location',
                icon: {
                    url: 'http://maps.google.com/mapfiles/ms/icons/blue-dot.png',
                    scaledSize: new google.maps.Size(40, 40)
                },
                animation: google.maps.Animation.DROP
            });

            // Info window
            const infoWindow = new google.maps.InfoWindow({
                content: '<b>Your Location</b><br>Waiting for GPS...'
            });
            marker.addListener('click', () => {
                infoWindow.open(map, marker);
            });
            infoWindow.open(map, marker);
        }

        // Load Google Maps when page loads
        window.addEventListener('DOMContentLoaded', loadGoogleMaps);
    </script>

    <!-- Main Script -->
    <script>
        // Initialize alerts
        const alertSystem = new AlertSystem();

        // Helper functions
        function showError(message) {
            alertSystem.show('error', message);
        }

        function showSuccess(message) {
            alertSystem.show('success', message);
        }

        // Global variables
        let map = null;
        let marker = null;
        let watchId = null;
        let isSharing = false;
        let currentLocation = null;
        let currentMapType = null;

        // Get user data
        function getUserData() {
            const carrierAuth = localStorage.getItem('carrierAuth');
            if (!carrierAuth) return null;
            return JSON.parse(carrierAuth);
        }

        // Initialize map (called by Google Maps callback)
        // Map is initialized in initGoogleMap() function above

        // Get heading direction
        function getHeadingDirection(heading) {
            if (heading === null || heading === undefined) return '-';
            const directions = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
            const index = Math.round(heading / 45) % 8;
            return directions[index];
        }

        // Reverse geocode using Google Maps Geocoding API
        async function reverseGeocode(lat, lng) {
            try {
                // Try Google Geocoding API first (if API key is available)
                const apiKey = window.GOOGLE_MAPS_API_KEY;
                if (apiKey && apiKey !== 'YOUR_API_KEY_HERE') {
                    const response = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&key=${apiKey}`);
                    const data = await response.json();
                    
                    if (data && data.results && data.results.length > 0) {
                        const address = data.results[0].formatted_address;
                        document.getElementById('currentAddress').textContent = address || 'Location';
                        return;
                    }
                }
                
                // Fallback to OpenStreetMap Nominatim (free, no API key needed)
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`);
                const data = await response.json();
                
                if (data && data.display_name) {
                    const address = data.display_name.split(',').slice(0, 3).join(',').trim();
                    document.getElementById('currentAddress').textContent = address || 'Location';
                } else {
                    document.getElementById('currentAddress').textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                }
            } catch (error) {
                console.error('Geocoding error:', error);
                document.getElementById('currentAddress').textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
            }
        }

        // Update location on map (Google Maps)
        function updateLocation(lat, lng, heading = null) {
            if (!map || !marker) return;

            const position = { lat: lat, lng: lng };

            // Update marker position
            marker.setPosition(position);

            // Rotate marker based on heading (if available)
            if (heading !== null && heading !== undefined && typeof google !== 'undefined' && google.maps) {
                // Create rotated icon for heading
                const icon = {
                    path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
                    scale: 5,
                    rotation: heading,
                    fillColor: '#2563EB',
                    fillOpacity: 1,
                    strokeColor: '#FFFFFF',
                    strokeWeight: 2
                };
                marker.setIcon(icon);
            } else {
                // Default blue marker
                marker.setIcon({
                    url: 'http://maps.google.com/mapfiles/ms/icons/blue-dot.png',
                    scaledSize: new google.maps.Size(40, 40)
                });
            }

            // Center map on location
            map.setCenter(position);
            map.setZoom(15);

            // Update info window
            const infoWindow = new google.maps.InfoWindow({
                content: `<b>Your Location</b><br>${lat.toFixed(6)}, ${lng.toFixed(6)}`
            });
            infoWindow.open(map, marker);
        }

        // Start location sharing
        function startLocationSharing() {
            if (!('geolocation' in navigator)) {
                showError('Geolocation is not supported by your browser');
                return;
            }

            const user = getUserData();
            if (!user) {
                showError('Please sign in to share location');
                return;
            }

            const options = {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            };

            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const speed = position.coords.speed ? (position.coords.speed * 3.6).toFixed(1) : 0; // m/s to km/h
                    const heading = position.coords.heading || null;
                    const accuracy = position.coords.accuracy;

                    currentLocation = { lat, lng, speed, heading, accuracy };

                    // Update UI
                    updateLocation(lat, lng, heading);
                    document.getElementById('currentSpeed').textContent = `${speed} km/h`;
                    document.getElementById('currentHeading').textContent = getHeadingDirection(heading);
                    document.getElementById('lastUpdate').textContent = 'Just now';
                    reverseGeocode(lat, lng);

                    // Save to Firebase
                    saveLocationToFirebase(lat, lng, speed, heading, accuracy);

                    // Save to localStorage
                    try {
                        localStorage.setItem('carrierLocationSharing', JSON.stringify({
                            on: true,
                            updatedAt: new Date().toISOString(),
                            lat: lat,
                            lng: lng
                        }));
                    } catch (e) {
                        console.error('localStorage error:', e);
                    }

                },
                (error) => {
                    console.error('Geolocation error:', error);
                    let errorMsg = 'Failed to get location';
                    if (error.code === 1) {
                        errorMsg = 'Location access denied. Please enable location permissions.';
                    } else if (error.code === 2) {
                        errorMsg = 'Location unavailable';
                    } else if (error.code === 3) {
                        errorMsg = 'Location request timeout';
                    }
                    showError(errorMsg);
                    stopLocationSharing();
                },
                options
            );

            isSharing = true;
            updateUI();
        }

        // Stop location sharing
        function stopLocationSharing() {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            isSharing = false;
            updateUI();

            // Clear Firebase location
            const user = getUserData();
            if (user) {
                const carrierId = user.carrierId || user.email?.replace('@', '_').replace('.', '_');
                const db = window.AlphaBrokrage.firebaseDb;
                if (db) {
                    db.ref(`carrierLocations/${carrierId}`).remove().catch(console.error);
                }
            }

            // Clear localStorage
            try {
                localStorage.removeItem('carrierLocationSharing');
            } catch (e) {}
        }

        // Save location to Firebase
        async function saveLocationToFirebase(lat, lng, speed, heading, accuracy) {
            const user = getUserData();
            if (!user) return;

            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const carrierId = user.carrierId || user.email?.replace('@', '_').replace('.', '_');

                const locationData = {
                    lat: lat,
                    lng: lng,
                    speed: parseFloat(speed) || 0,
                    heading: heading !== null ? parseFloat(heading) : null,
                    accuracy: accuracy || null,
                    timestamp: Date.now(),
                    updatedAt: new Date().toISOString(),
                    carrierId: carrierId,
                    carrierName: user.companyName || `${user.firstName || ''} ${user.lastName || ''}`.trim() || user.email
                };

                await db.ref(`carrierLocations/${carrierId}`).set(locationData);

            } catch (error) {
                console.error('Firebase error:', error);
            }
        }

        // Toggle location sharing
        function toggleLocationSharing() {
            if (isSharing) {
                stopLocationSharing();
                showSuccess('Location sharing stopped');
            } else {
                startLocationSharing();
                showSuccess('Location sharing started');
            }
        }

        // Toggle map type (Satellite/Roadmap)
        function toggleMapType() {
            if (!map || typeof google === 'undefined' || !google.maps) {
                return;
            }

            const toggleBtn = document.getElementById('satelliteToggle');
            const mapTypeText = document.getElementById('mapTypeText');

            // Toggle between ROADMAP and SATELLITE
            if (currentMapType === google.maps.MapTypeId.ROADMAP) {
                currentMapType = google.maps.MapTypeId.SATELLITE;
                map.setMapTypeId(google.maps.MapTypeId.SATELLITE);
                toggleBtn.classList.add('active');
                mapTypeText.textContent = 'Roadmap';
                toggleBtn.querySelector('i').className = 'fas fa-map';
            } else {
                currentMapType = google.maps.MapTypeId.ROADMAP;
                map.setMapTypeId(google.maps.MapTypeId.ROADMAP);
                toggleBtn.classList.remove('active');
                mapTypeText.textContent = 'Satellite';
                toggleBtn.querySelector('i').className = 'fas fa-satellite';
            }
        }

        // Update UI
        function updateUI() {
            const statusIndicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            const statusSubtext = document.getElementById('statusSubtext');
            const shareBtn = document.getElementById('shareLocationBtn');

            if (isSharing) {
                statusIndicator.classList.remove('inactive');
                statusIndicator.classList.add('active');
                statusIndicator.innerHTML = '<i class="fas fa-map-marker-alt"></i>';
                statusText.textContent = 'Location Sharing Active';
                statusSubtext.textContent = 'Your location is being shared in real-time';
                shareBtn.classList.add('active');
                shareBtn.innerHTML = '<i class="fas fa-stop"></i><span>Stop Sharing Location</span>';
            } else {
                statusIndicator.classList.remove('active');
                statusIndicator.classList.add('inactive');
                statusIndicator.innerHTML = '<i class="fas fa-map-marker-alt"></i>';
                statusText.textContent = 'Location Sharing Off';
                statusSubtext.textContent = 'Tap the button below to start sharing';
                shareBtn.classList.remove('active');
                shareBtn.innerHTML = '<i class="fas fa-map-marker-alt"></i><span>Start Sharing Location</span>';
            }
        }

        // Check if already sharing
        function checkSharingStatus() {
            try {
                const sharingData = localStorage.getItem('carrierLocationSharing');
                if (sharingData) {
                    const data = JSON.parse(sharingData);
                    if (data.on) {
                        // Resume sharing
                        startLocationSharing();
                    }
                }
            } catch (e) {
                console.error('Error checking sharing status:', e);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateUI();
            
            // Wait for Google Maps to load, then get initial location
            function getInitialLocation() {
                if (typeof google === 'undefined' || !google.maps || !map) {
                    // Wait a bit more for Google Maps to load
                    setTimeout(getInitialLocation, 100);
                    return;
                }

                // Request location permission and get initial location
                if ('geolocation' in navigator) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const lat = position.coords.latitude;
                            const lng = position.coords.longitude;
                            updateLocation(lat, lng);
                            reverseGeocode(lat, lng);
                        },
                        (error) => {
                            console.error('Initial location error:', error);
                        },
                        { enableHighAccuracy: true, timeout: 10000 }
                    );
                }
            }

            // Start checking for Google Maps
            getInitialLocation();
        });
    </script>
</body>
</html>
