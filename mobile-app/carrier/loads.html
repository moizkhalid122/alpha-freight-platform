        /* Search Bar */
        .search-section {
            padding: 0 1.25rem;
            margin-bottom: 1rem;
        }

        .search-bar {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 3rem;
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--text-dark);
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-medium);
            font-size: 1.125rem;
        }

        /* Filters */
        .filters-section {
            padding: 0 1.25rem;
            margin-bottom: 1rem;
        }

        .filters-row {
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding-bottom: 0.5rem;
        }

        .filters-row::-webkit-scrollbar {
            display: none;
        }

        .filter-chip {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-dark);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .filter-chip.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .filter-chip:active {
            transform: scale(0.95);
        }

        /* Loads List */
        .loads-section {
            padding: 0 1.25rem;
        }

        .load-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            transition: all 0.3s;
            cursor: pointer;
        }

        .load-card:active {
            transform: scale(0.98);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(6px);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 9999;
            padding: 1rem;
        }
        .modal-sheet {
            width: 100%;
            max-width: 520px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 22px;
            box-shadow: 0 24px 72px rgba(15, 23, 42, 0.35);
            overflow: hidden;
            transform: translateY(18px);
            opacity: 0;

        .modal-overlay.show { display: flex; }
        .modal-overlay.show .modal-sheet { transform: translateY(0); opacity: 1; }
        .modal-head {
            padding: 1.25rem 1.25rem 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;

        .modal-title { font-weight: 900; letter-spacing: -0.02em; font-size: 1.05rem; }
        .modal-close {

            height: 40px;
            border-radius: 12px;

            background: #fff;
            color: var(--text-dark);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;

        .modal-body { padding: 0 1.25rem 1.1rem; }
        .profile-row {

            gap: 0.9rem;
            align-items: center;
            padding: 0.9rem;
            border-radius: 16px;
            border: 1px solid var(--border);

            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;

        .skeleton-card .sk-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .skeleton-card .sk-actions .skeleton-line {
            flex: 1;
            height: 44px;
            border-radius: 12px;
            margin-bottom: 0;
        }

        .skeleton-card .sk-actions .skeleton-line:last-child {
            flex: 0.4;
        }

        .skeleton-line {
            height: 14px;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, var(--border) 0%, rgba(0,0,0,0.08) 35%, var(--border) 50%, rgba(0,0,0,0.08) 65%, var(--border) 100%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.6s ease-in-out infinite;
        }

        .skeleton-card.sk-1 .skeleton-line { animation-delay: 0s; }
        .skeleton-card.sk-2 .skeleton-line { animation-delay: 0.15s; }
        .skeleton-card.sk-3 .skeleton-line { animation-delay: 0.3s; }
        .skeleton-card.sk-4 .skeleton-line { animation-delay: 0.45s; }

        .skeleton-card .skeleton-line.tall {
            height: 18px;
            margin-bottom: 0.35rem;
        }

        .skeleton-line.short { width: 50%; }
        .skeleton-line.medium { width: 75%; }
        .skeleton-line.long { width: 100%; }

        @keyframes skeleton-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .load-more-wrap {
            padding: 1rem 1.25rem 1.5rem;
            text-align: center;

            color: var(--primary);

            border-radius: 12px;

            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;

        .btn-load-more:active { transform: scale(0.98); }
        .btn-load-more:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Bottom nav: supplier-bottom-nav.css – same as dashboard */
        /* Animations */
        @keyframes fadeInUp {
            from {

            }

        .load-card {
            animation: fadeInUp 0.4s ease-out;
        }

        /* Responsive */
        @media (min-width: 768px) {
            body {
                max-width: 500px;
                margin: 0 auto;
                box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
            }
        }
    </style>

    <script>
        // Initialize alerts
        const alertSystem = new AlertSystem();

        // Helper functions
        function showError(message) {
            alertSystem.show('error', message);
        }

        function showSuccess(message) {
            alertSystem.show('success', message);
        }

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return;
            if (authSdk.currentUser) return;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => {
                    if (done) return;
                    done = true;
                    resolve();
                }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
        }

        function getInitials(name) {
            const n = (name || '').trim();
            if (!n) return 'S';
            const parts = n.split(/\s+/).filter(Boolean);
            if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
            return n.substring(0, 2).toUpperCase();
        }

        function buildStars(rating) {
            const r = Math.max(0, Math.min(5, Math.round((parseFloat(rating) || 0) * 2) / 2));
            let stars = '';
            for (let i = 1; i <= 5; i++) stars += i <= Math.round(r) ? '★' : '☆';
            return stars;
        }

        async function computeSupplierRating(supplierId) {
            if (!supplierId) return { rating: 0, count: 0 };
            const db = window.AlphaBrokrage.firebaseDb;
            const snap = await db.ref('loads').orderByChild('supplierId').equalTo(supplierId).limitToLast(200).once('value');
            const ratings = [];
            (snap.exists() ? snap : null) && snap.forEach((child) => {
                const load = child.val() || {};
                const st = String(load.status || '').toLowerCase();
                const completed = st === 'completed' || st === 'delivered';
                const rt = parseFloat(load.supplierRating || 0) || 0;
                if (completed && rt > 0) ratings.push(rt);
            });
            if (!ratings.length) return { rating: 0, count: 0 };
            const avg = ratings.reduce((a, b) => a + b, 0) / ratings.length;
            return { rating: Math.round(avg * 10) / 10, count: ratings.length };
        }

        async function fetchSupplierProfile(supplierId) {
            if (!supplierId) return null;
            const db = window.AlphaBrokrage.firebaseDb;
            const snap = await db.ref('suppliers/' + supplierId).once('value');
            if (!snap.exists()) return null;
            const p = snap.val() || {};
            if (!p.supplierId) p.supplierId = supplierId;
            return p;
        }

        function showAcceptModal(payload) {
            const overlay = document.getElementById('acceptModalOverlay');
            const closeBtn = document.getElementById('acceptModalClose');
            const cancelBtn = document.getElementById('acceptModalCancel');
            const acceptBtn = document.getElementById('acceptModalAccept');
            const supplierRow = document.getElementById('acceptSupplierRow');

            const titleEl = document.getElementById('acceptModalTitle');
            const subEl = document.getElementById('acceptModalSub');
            const avatarEl = document.getElementById('acceptSupplierAvatar');
            const nameEl = document.getElementById('acceptSupplierName');
            const starsEl = document.getElementById('acceptSupplierStars');
            const ratingTextEl = document.getElementById('acceptSupplierRatingText');
            const routeEl = document.getElementById('acceptRouteValue');

            titleEl.textContent = 'Accept Load';
            subEl.textContent = 'Loading supplier…';
            nameEl.textContent = 'Supplier';
            starsEl.textContent = '☆☆☆☆☆';
            ratingTextEl.textContent = '—';
            routeEl.textContent = payload && payload.route ? payload.route : '—';
            avatarEl.innerHTML = 'S';

            overlay.classList.add('show');
            overlay.setAttribute('aria-hidden', 'false');

            let finished = false;
            function cleanup() {
                overlay.classList.remove('show');
                overlay.setAttribute('aria-hidden', 'true');
                closeBtn.onclick = null;
                cancelBtn.onclick = null;
                acceptBtn.onclick = null;
                supplierRow.onclick = null;
                overlay.onclick = null;
                acceptBtn.disabled = false;
                cancelBtn.disabled = false;
            }

            function resolveOnce(v, resolve) {
                if (finished) return;
                finished = true;
                cleanup();
                resolve(v);
            }

            return new Promise(async (resolve) => {
                overlay.onclick = (e) => {
                    if (e && e.target === overlay) resolveOnce(false, resolve);
                };
                closeBtn.onclick = () => resolveOnce(false, resolve);
                cancelBtn.onclick = () => resolveOnce(false, resolve);
                acceptBtn.onclick = () => {
                    acceptBtn.disabled = true;
                    cancelBtn.disabled = true;
                    resolveOnce(true, resolve);
                };

                try {
                    const supplierId = payload && payload.supplierId ? payload.supplierId : '';
                    const [profile, rating] = await Promise.all([
                        fetchSupplierProfile(supplierId),
                        computeSupplierRating(supplierId)
                    ]);
                    const displayName = (profile && (profile.companyName || `${profile.firstName || ''} ${profile.lastName || ''}`.trim() || profile.email)) || (payload && payload.fallbackName) || 'Supplier';
                    const photoUrl = profile && (profile.profilePhoto || profile.photoUrl || profile.avatarUrl || profile.photoURL);

                    nameEl.textContent = displayName;
                    avatarEl.innerHTML = photoUrl ? `<img src="${String(photoUrl).replace(/\"/g, '&quot;')}" alt="Supplier">` : getInitials(displayName);
                    if (rating && rating.count > 0) {
                        starsEl.textContent = buildStars(rating.rating);
                        ratingTextEl.textContent = `${rating.rating}/5 (${rating.count})`;
                    } else {
                        starsEl.textContent = '☆☆☆☆☆';
                        ratingTextEl.textContent = 'New';
                    }
                    subEl.textContent = 'Tap supplier to view profile';

                    supplierRow.onclick = () => {
                        if (!supplierId) return;
                        window.location.href = `supplier-profile.html?id=${encodeURIComponent(supplierId)}`;
                    };
                } catch (e) {
                    console.error(e);
                    subEl.textContent = 'Supplier info not available';
                }
            });
        }

        // Global variables
        let allLoads = [];
        let filteredLoads = [];
        let currentFilter = 'all';
        let searchQuery = '';

        // Format currency
        function formatCurrency(amount) {
            const num = parseFloat(amount) || 0;
            return '£' + num.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function getCarrierCommissionRate(originalAmount) {
            const amt = parseFloat(originalAmount) || 0;
            let commissionRate = 0.05;
            if (amt > 5000) {
                commissionRate = 0.03;
            } else if (amt > 1000) {
                commissionRate = 0.04;
            }
            return commissionRate;
        }

        function getNetCarrierAmount(load) {
            const originalBudget = load && (load.budget || (load.minBudget && load.maxBudget ? (parseFloat(load.minBudget) + parseFloat(load.maxBudget)) / 2 : load.maxBudget || load.minBudget || load.price || 0));
            const original = parseFloat(originalBudget) || 0;
            const commissionRate = getCarrierCommissionRate(original);
            const commission = original * commissionRate;
            return Math.round((original - commission) * 100) / 100;
        }

        // Format date
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
            } catch {
                return dateString;
            }
        }

        // Small initial fetch = fast response (20 loads). "Load more" for rest.
        const INITIAL_FETCH_LIMIT = 20;
        const LOADS_MORE_PAGE = 20;
        let oldestLoadedKey = null; // for pagination

        // Only show loads that are still available (not accepted by any carrier, not completed/cancelled)
        function isLoadAvailable(load) {
            const status = (load.status || '').toLowerCase();
            const takenStatuses = ['accepted', 'completed', 'cancelled', 'picked-up', 'in-transit', 'delivered', 'on-route', 'picked_up', 'in_transit'];
            if (takenStatuses.includes(status)) return false;
            if (load.carrierId || load.assignedCarrier || load.acceptedBy) return false;
            return true;
        }

        function parseLoadsSnapshot(snapshotVal) {
            const loads = snapshotVal || {};
            return Object.entries(loads).map(([id, load]) => ({
                ...load,
                loadId: id,
                id: id
            })).filter(isLoadAvailable);
        }

        function sortLoadsByDate(list) {
            list.sort((a, b) => {
                const dateA = new Date(a.createdAt || a.pickupDate || 0);
                const dateB = new Date(b.createdAt || b.pickupDate || 0);
                return dateB - dateA;
            });
        }

        async function loadAllLoads() {
            const loadsSection = document.getElementById('loadsSection');
            const loadMoreWrap = document.getElementById('loadMoreWrap');
            try {
                const db = window.AlphaBrokrage.firebaseDb;
                // First screen: only 20 loads = much faster (small payload)
                const loadsRef = db.ref('loads').orderByKey().limitToLast(INITIAL_FETCH_LIMIT);
                const snapshot = await loadsRef.once('value');
                const loads = snapshot.val() || {};

                const newList = parseLoadsSnapshot(loads);
                sortLoadsByDate(newList);
                allLoads = newList;
                const keys = Object.keys(loads);
                oldestLoadedKey = keys.length ? keys.reduce((a, b) => a < b ? a : b) : null;

                filteredLoads = [...allLoads];
                renderLoads();
                updateLoadsCount();
                loadMoreWrap.style.display = allLoads.length >= INITIAL_FETCH_LIMIT ? 'block' : 'none';

            } catch (error) {
                console.error('Error loading loads:', error);
                showError('Failed to load loads. Please try again.');
                loadsSection.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error Loading Loads</h3>
                        <p>Please try again later</p>
                    </div>
                `;
                loadMoreWrap.style.display = 'none';
            }
        }

        async function loadMoreLoads() {
            const btn = document.getElementById('btnLoadMore');
            const loadMoreWrap = document.getElementById('loadMoreWrap');
            if (!oldestLoadedKey || !btn) return;
            btn.disabled = true;
            btn.textContent = 'Loading...';
            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const ref = db.ref('loads').orderByKey().endAt(oldestLoadedKey).limitToLast(LOADS_MORE_PAGE + 1);
                const snapshot = await ref.once('value');
                const loads = snapshot.val() || {};
                const newList = parseLoadsSnapshot(loads);
                const existingIds = new Set(allLoads.map(l => l.loadId));
                const added = newList.filter(l => !existingIds.has(l.loadId));
                if (added.length === 0) {
                    loadMoreWrap.style.display = 'none';
                    btn.disabled = false;
                    btn.textContent = 'Load more loads';
                    return;
                }
                allLoads = allLoads.concat(added);
                sortLoadsByDate(allLoads);
                const allKeys = Object.keys(snapshot.val() || {});
                oldestLoadedKey = allKeys.length ? allKeys.reduce((a, b) => a < b ? a : b) : null;
                filteredLoads = allLoads.filter(load => {
                    if (currentFilter !== 'all') {
                        const cargoType = (load.cargoType || '').toLowerCase();
                        if (currentFilter === 'urgent') { if (!load.urgent) return false; }
                        else if (cargoType !== currentFilter) return false;
                    }
                    if (searchQuery) {
                        const q = searchQuery.toLowerCase();
                        const pickup = (load.pickupLocation || '').toLowerCase();
                        const delivery = (load.deliveryLocation || '').toLowerCase();
                        const cargo = (load.cargoType || '').toLowerCase();
                        if (!pickup.includes(q) && !delivery.includes(q) && !cargo.includes(q)) return false;
                    }
                    return true;
                });
                renderLoads();
                updateLoadsCount();
                if (added.length < LOADS_MORE_PAGE) loadMoreWrap.style.display = 'none';
            } catch (e) {
                console.error(e);
                showError('Failed to load more.');
            }
            btn.disabled = false;
            btn.textContent = 'Load more loads';
        }

        // Filter loads
        function filterLoads(filter) {
            currentFilter = filter;

            // Update filter chips
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.classList.remove('active');
            });
            document.querySelector(`[data-filter="${filter}"]`).classList.add('active');

            applyFilters();
        }

        // Apply filters and search
        function applyFilters() {
            filteredLoads = allLoads.filter(load => {
                // Filter by type
                if (currentFilter !== 'all') {
                    const cargoType = (load.cargoType || '').toLowerCase();
                    if (currentFilter === 'urgent') {
                        if (!load.urgent) return false;
                    } else if (cargoType !== currentFilter) {
                        return false;
                    }
                }

                // Search filter
                if (searchQuery) {
                    const query = searchQuery.toLowerCase();
                    const pickup = (load.pickupLocation || '').toLowerCase();
                    const delivery = (load.deliveryLocation || '').toLowerCase();
                    const cargo = (load.cargoType || '').toLowerCase();
                    
                    if (!pickup.includes(query) && !delivery.includes(query) && !cargo.includes(query)) {
                        return false;
                    }
                }

                return true;
            });

            renderLoads();
            updateLoadsCount();
        }

        // Search handler
        document.getElementById('searchInput').addEventListener('input', function(e) {
            searchQuery = e.target.value.trim();
            applyFilters();
        });

        // Build HTML for one load card
        function buildLoadCardHtml(load, index) {
            const price = formatCurrency(getNetCarrierAmount(load));
            const pickupDate = formatDate(load.pickupDate);
            const cargoType = load.cargoType || 'General';
            const weight = load.cargoWeight ? `${load.cargoWeight} tonnes` : 'N/A';
            const distance = load.distance ? `${load.distance} miles` : 'N/A';
            const supplierAttr = (load.supplierId || load.supplier_id || load.postedBy || '').replace(/"/g, '&quot;');
            return `
                <div class="load-card" data-supplier-id="${supplierAttr}" onclick="viewLoadDetails('${load.loadId}')" style="animation-delay: ${index * 0.05}s">
                    <div class="load-header">
                        <div class="load-route">
                            <div class="route-title">
                                <i class="fas fa-map-marker-alt"></i>
                                ${load.pickupLocation || 'N/A'} → ${load.deliveryLocation || 'N/A'}
                            </div>
                            <div class="route-subtitle">${cargoType}</div>
                        </div>
                        <div class="load-price">
                            ${price}
                            <span class="load-price-label">Net</span>
                        </div>
                    </div>
                    <div class="load-details">
                        <div class="load-detail-item">
                            <i class="fas fa-calendar-alt"></i>
                            <span>Pickup: ${pickupDate}</span>
                        </div>
                        <div class="load-detail-item">
                            <i class="fas fa-truck"></i>
                            <span>${weight}</span>
                        </div>
                        <div class="load-detail-item">
                            <i class="fas fa-route"></i>
                            <span>${distance}</span>
                        </div>
                        <div class="load-detail-item">
                            <i class="fas fa-box"></i>
                            <span>${cargoType}</span>
                        </div>
                    </div>
                    <div class="load-actions">
                        <button class="btn-accept" onclick="event.stopPropagation(); acceptLoad('${load.loadId}', event.target)">
                            <i class="fas fa-check"></i>
                            Accept Load
                        </button>
                        <button class="btn-view" onclick="event.stopPropagation(); viewLoadDetails('${load.loadId}')">
                            View
                        </button>
                    </div>
                </div>
            `;
        }

        // Render loads (full replace – used by filters/search)
        function renderLoads() {
            const loadsSection = document.getElementById('loadsSection');
            if (filteredLoads.length === 0) {
                loadsSection.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>No Loads Found</h3>
                        <p>${searchQuery || currentFilter !== 'all' ? 'Try adjusting your search or filters' : 'No loads available at the moment'}</p>
                    </div>
                `;
                return;
            }
            loadsSection.innerHTML = filteredLoads.map((load, i) => buildLoadCardHtml(load, i)).join('');
        }

        // Update loads count
        function updateLoadsCount() {
            const count = filteredLoads.length;
            const total = allLoads.length;
            document.getElementById('loadsCount').textContent = 
                count === total ? `${count} loads available` : `${count} of ${total} loads`;
        }

        // Accept load
        async function acceptLoad(loadId, clickedEl) {
            const authRaw = localStorage.getItem('carrierAuth');
            if (!authRaw) {
                showError('Please sign in to accept loads');
                window.location.href = 'login.html';
                return;
            }
            const user = JSON.parse(authRaw);
            const carrierId = user.carrierId || (user.email ? user.email.replace(/@/g, '_').replace(/\./g, '_') : null);
            if (!carrierId || !user.email) {
                showError('Please sign in to accept loads');
                window.location.href = 'login.html';
                return;
            }

            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                await ensureAuthReady();
                const carrierUid = (authSdk && authSdk.currentUser && authSdk.currentUser.uid) ? authSdk.currentUser.uid : (user.firebaseUid || '');
                if (!carrierUid) {
                    showError('Session expired. Please login again.');
                    setTimeout(() => { window.location.href = 'login.html'; }, 800);
                    return;
                }
                const loadRef = db.ref(`loads/${loadId}`);

                const loadSnap = await loadRef.once('value');
                const loadData = loadSnap.val() || {};
                const currentStatus = String(loadData.status || '').toLowerCase();
                if (currentStatus && currentStatus !== 'available' && currentStatus !== 'pending' && currentStatus !== 'active') {
                    showError('This load is no longer available.');
                    return;
                }
                let supplierId = loadData.supplierId || loadData.supplier_id || loadData.supplier || loadData.postedBy || (loadData.supplierEmail || '').replace(/@/g, '_').replace(/\./g, '_');
                if (supplierId === 'broker' || supplierId === 'admin') supplierId = '';
                if (!supplierId && clickedEl) {
                    const card = clickedEl.closest && clickedEl.closest('.load-card');
                    const sid = card && card.getAttribute && card.getAttribute('data-supplier-id');
                    if (sid && sid !== 'broker' && sid !== 'admin') supplierId = sid;
                }

                const ok = await showAcceptModal({
                    supplierId,
                    fallbackName: loadData.supplierName || loadData.companyName || loadData.supplierEmail || '',
                    route: `${loadData.pickupLocation || ''} → ${loadData.deliveryLocation || ''}`
                });
                if (!ok) return;

                const updateData = {
                    status: 'accepted',
                    carrierId: carrierId,
                    carrierFirebaseUid: carrierUid,
                    carrierEmail: user.email,
                    carrierName: `${user.firstName || ''} ${user.lastName || ''}`.trim(),
                    acceptedAt: new Date().toISOString(),
                    acceptedBy: carrierId
                };
                if (supplierId) updateData.supplierId = supplierId; // ensure it's stored for status updates
                await loadRef.update(updateData);

                if (supplierId) {
                    const carrierName = `${(user.firstName || '').trim()} ${(user.lastName || '').trim()}`.trim() || user.companyName || 'A carrier';
                    const notif = {
                        title: 'Load Accepted!',
                        message: `${carrierName} has accepted your load: ${loadData.pickupLocation || ''} → ${loadData.deliveryLocation || ''}`,
                        type: 'load_accepted',
                        loadId,
                        read: false,
                        createdAt: new Date().toISOString()
                    };
                    await db.ref('notifications/suppliers/' + supplierId).push(notif);
                }

                showSuccess('Load accepted successfully!');

                // Remove from list
                allLoads = allLoads.filter(load => load.loadId !== loadId);
                applyFilters();

                // Redirect to my loads after 1 second
                setTimeout(() => {
                    window.location.href = 'my-loads.html';
                }, 1000);

            } catch (error) {
                console.error('Error accepting load:', error);
                showError('Failed to accept load. Please try again.');
            }
        }

        // View load details
        function viewLoadDetails(loadId) {
            window.location.href = `load-details.html?id=${loadId}`;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadAllLoads();
            document.getElementById('btnLoadMore').addEventListener('click', loadMoreLoads);
        });
    </script>
</body>
</html>
