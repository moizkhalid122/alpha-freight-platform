<body class="has-bottom-nav">
    <div class="page-header">
        <div class="header-content">
            <h1 class="page-title">Top Carriers</h1>
            <p class="page-subtitle" id="subtitle">Loading…</p>
        </div>
    </div>

    <div class="wrap">
        <div class="hint">Ranking is based on recent completed deliveries.</div>
        <div id="listArea" class="list"></div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="loads.html" class="bottom-nav-item active"><i class="fas fa-clipboard-list"></i><span>Loads</span></a>
        <a href="messages.html" class="bottom-nav-item"><i class="fas fa-comments"></i><span>Messages</span></a>
        <a href="wallet.html" class="bottom-nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <a href="profile.html" class="bottom-nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="../../assets/js/firebase-init.js"></script>
    <script src="../../assets/js/alerts.js"></script>
    <script>
        const alertSystem = new AlertSystem();

        function getAuth() {
            try { return JSON.parse(localStorage.getItem('carrierAuth') || '{}'); } catch { return {}; }
        }

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return;
            if (authSdk.currentUser) return;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => { if (!done) { done = true; resolve(); } }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
        }

        function getInitials(name) {
            const n = (name || '').trim();
            if (!n) return 'C';
            const parts = n.split(/\s+/).filter(Boolean);
            if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
            return n.substring(0, 2).toUpperCase();
        }

        function buildStars(rating) {
            const r = Math.max(0, Math.min(5, Math.round((parseFloat(rating) || 0) * 2) / 2));
            let stars = '';
            for (let i = 1; i <= 5; i++) stars += i <= Math.round(r) ? '★' : '☆';
            return stars;
        }

        function normalizeStatus(s) {
            const t = String(s || '').toLowerCase().replace(/_/g, '-');
            if (t === 'complete') return 'completed';
            if (t === 'intransit') return 'in-transit';
            return t;
        }

        function sanitizeFirebaseKey(key) {
            return String(key || '').replace(/[.#$\[\]\/]/g, '_');
        }

        async function resolveCarrierProfile(rawId) {
            const id = String(rawId || '').trim();
            if (!id) return null;
            const db = window.AlphaBrokrage.firebaseDb;

            const candidates = [];
            candidates.push(id);
            const sanitized = sanitizeFirebaseKey(id);
            if (sanitized && sanitized !== id) candidates.push(sanitized);

            for (const cand of candidates) {
                try {
                    const snap = await db.ref('carriers/' + cand).once('value');
                    if (snap.exists()) {
                        const p = snap.val() || {};
                        if (!p.carrierId) p.carrierId = cand;
                        return { key: cand, profile: p };
                    }
                } catch (e) {}
            }

            if (id.includes('@')) {
                try {
                    const snap = await db.ref('carriers').orderByChild('email').equalTo(id).limitToFirst(1).once('value');
                    if (snap.exists()) {
                        let out = null;
                        snap.forEach((child) => {
                            if (out) return true;
                            const p = child.val() || {};
                            out = { key: child.key, profile: { ...p, carrierId: p.carrierId || child.key } };
                            return true;
                        });
                        if (out) return out;
                    }
                } catch (e) {}
            }

            return { key: sanitized, profile: null };
        }

        async function fetchRecentCompletedLoads() {
            const db = window.AlphaBrokrage.firebaseDb;
            const [a, b] = await Promise.all([
                db.ref('loads').orderByChild('status').equalTo('completed').limitToLast(600).once('value'),
                db.ref('loads').orderByChild('status').equalTo('delivered').limitToLast(400).once('value')
            ]);
            const out = [];
            const add = (snap) => {
                if (!snap || !snap.exists()) return;
                snap.forEach((child) => {
                    const load = child.val() || {};
                    const st = normalizeStatus(load.status);
                    if (st !== 'completed' && st !== 'delivered') return;
                    out.push({ id: child.key, ...load });
                });
            };
            add(a);
            add(b);
            return out;
        }

        async function buildLeaderboard() {
            const loads = await fetchRecentCompletedLoads();
            const rawMap = new Map();
            for (const load of loads) {
                const cid = load.carrierId || '';
                if (!cid) continue;
                const cur = rawMap.get(cid) || { carrierId: cid, completed: 0, ratings: [] };
                cur.completed += 1;
                const rt = parseFloat(load.carrierRating || 0) || 0;
                if (rt > 0) cur.ratings.push(rt);
                rawMap.set(cid, cur);
            }
            const rows = Array.from(rawMap.values()).sort((x, y) => (y.completed - x.completed) || (y.ratings.length - x.ratings.length));
            const topRaw = rows.slice(0, 50);
            const resolved = await Promise.all(topRaw.map(async (r) => {
                const resolvedProfile = await resolveCarrierProfile(r.carrierId);
                const key = resolvedProfile && resolvedProfile.key ? resolvedProfile.key : sanitizeFirebaseKey(r.carrierId);
                const profile = resolvedProfile ? resolvedProfile.profile : null;
                return { ...r, carrierId: key, profile: profile || null };
            }));

            const merged = new Map();
            for (const it of resolved) {
                if (!it || !it.carrierId) continue;
                const key = it.carrierId;
                const cur = merged.get(key) || { carrierId: key, completed: 0, ratings: [], profile: it.profile || null };
                cur.completed += it.completed || 0;
                if (Array.isArray(it.ratings) && it.ratings.length) cur.ratings = cur.ratings.concat(it.ratings);
                if (!cur.profile && it.profile) cur.profile = it.profile;
                merged.set(key, cur);
            }
            return Array.from(merged.values()).sort((a, b) => (b.completed - a.completed) || (b.ratings.length - a.ratings.length)).slice(0, 50);
        }

        function safe(v) { return v == null ? '' : String(v); }

        function renderList(items) {
            const el = document.getElementById('listArea');
            if (!items || !items.length) {
                el.innerHTML = `<div class="empty"><div class="fw-bold">No data yet</div><div style="margin-top:0.35rem;">Completed deliveries will appear here.</div></div>`;
                document.getElementById('subtitle').textContent = 'No carriers yet';
                return;
            }
            document.getElementById('subtitle').textContent = `${items.length} carriers ranked`;
            el.innerHTML = items.map((it, idx) => {
                const p = it.profile || {};
                const displayName = (p.companyName || `${p.firstName || ''} ${p.lastName || ''}`.trim() || p.email) || 'Carrier';
                const photoUrl = p.profilePhoto || p.photoUrl || p.avatarUrl || p.photoURL;
                const rating = it.ratings.length ? (it.ratings.reduce((a, b) => a + b, 0) / it.ratings.length) : 0;
                const stars = it.ratings.length ? buildStars(rating) : '☆☆☆☆☆';
                const ratingText = it.ratings.length ? `${Math.round(rating * 10) / 10}/5 (${it.ratings.length})` : 'New';
                return `
                    <div class="row" data-id="${safe(it.carrierId).replace(/\"/g, '&quot;')}">
                        <div class="rank">${idx + 1}</div>
                        <div class="avatar">${photoUrl ? `<img src="${safe(photoUrl).replace(/\"/g, '&quot;')}" alt="Carrier">` : getInitials(displayName)}</div>
                        <div style="min-width:0;">
                            <div class="name">${safe(displayName)}</div>
                            <div class="meta">
                                <span class="badgex">${it.completed} completed</span>
                                <span><span class="stars">${stars}</span><span style="margin-left:0.35rem;">${ratingText}</span></span>
                            </div>
                        </div>
                        <div class="chev"><i class="fas fa-chevron-right"></i></div>
                    </div>
                `;
            }).join('');
            el.querySelectorAll('.row').forEach((row) => {
                row.addEventListener('click', () => {
                    const id = row.getAttribute('data-id') || '';
                    if (!id) return;
                    window.location.href = `carrier-profile.html?id=${encodeURIComponent(id)}`;
                });
            });
        }

        async function init() {
            const auth = getAuth();
            if (!auth.isLoggedIn) {
                window.location.href = 'login.html';
                return;
            }
            try {
                await ensureAuthReady();
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                if (!authSdk || !authSdk.currentUser) {
                    window.location.href = 'login.html';
                    return;
                }
                const items = await buildLeaderboard();
                renderList(items);
            } catch (e) {
                console.error(e);
                alertSystem.show('Failed to load carriers', 'error');
                document.getElementById('subtitle').textContent = 'Error';
                renderList([]);
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
