    <style>
        /* Theme: carrier-premium-theme.css */
        .header-content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .new-message-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border: none;
            padding: 0.625rem 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .new-message-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.3);
        }

        /* Conversations List */
        .conversations-section {
            padding: 0 1.25rem;
        }

        .conversation-item {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .conversation-item:active {
            transform: scale(0.98);
        }

        .conversation-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.125rem;
            flex-shrink: 0;
        }

        .conversation-content {
            flex: 1;
            min-width: 0;
        }

        .conversation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.25rem;
        }

        .conversation-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .conversation-time {
            font-size: 0.75rem;
            color: var(--text-medium);
        }

        .conversation-preview {
            font-size: 0.875rem;
            color: var(--text-medium);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .unread-badge {
            background: var(--primary);
            color: white;
            border-radius: 12px;
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            min-width: 20px;
            text-align: center;
        }

        /* Chat View (Hidden by default) */
        .chat-view {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 80px;
            background: var(--bg-main);
            z-index: 1000;
            flex-direction: column;
        }

        .chat-view.active {
            display: flex;
        }

        .chat-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.3);
        }

        .chat-title {
            flex: 1;
            font-size: 1.125rem;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message-bubble {
            max-width: 75%;
            padding: 0.75rem 1rem;
            border-radius: 16px;
            word-wrap: break-word;
            animation: fadeInUp 0.3s ease-out;
        }

        .message-sent {
            background: var(--primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message-received {
            background: var(--card-bg);
            color: var(--text-dark);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-sm);
        }

        .message-time {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 0.25rem;
        }

        .chat-input-area {
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            padding: 1rem;
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            border-radius: 24px;
            font-size: 0.9375rem;
            resize: none;
            max-height: 120px;
            min-height: 44px;
            font-family: inherit;
        }

        .message-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1.5rem;
            background: var(--card-bg);
            border-radius: 16px;
            margin: 0 1.25rem;
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--text-light);
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            font-size: 0.875rem;
            color: var(--text-medium);
        }

        /* Loading State */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Bottom nav: supplier-bottom-nav.css – same as dashboard */
        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .conversation-item {
            animation: fadeInUp 0.4s ease-out;
        }

        /* Responsive */
        @media (min-width: 768px) {
            body {
                max-width: 500px;
                margin: 0 auto;
                box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
            }
        }
    </style>
</head>
<body class="has-bottom-nav">
    <!-- Page Header -->
    <div class="page-header">
        <div class="header-content">
            <h1 class="page-title">Messages</h1>
            <button class="new-message-btn" onclick="openNewMessage()">
                <i class="fas fa-plus"></i>
                <span>New</span>
            </button>
        </div>
    </div>

    <!-- Conversations List -->
    <div class="conversations-section" id="conversationsSection">
        <div class="loading">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Chat View -->
    <div class="chat-view" id="chatView">
        <div class="chat-header">
            <button class="back-btn" onclick="closeChat()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="chat-title" id="chatTitle">Chat</div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="empty-state">
                <i class="fas fa-comment-dots"></i>
                <h3>No messages yet</h3>
                <p>Start the conversation!</p>
            </div>
        </div>
        <div class="chat-input-area">
            <textarea class="message-input" id="messageInput" placeholder="Type a message..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" aria-label="Main navigation">
        <a href="dashboard.html" class="bottom-nav-item">

            <span>Home</span>

            <span>Loads</span>
        </a>
        <a href="messages.html" class="bottom-nav-item active">
            <i class="fas fa-comments"></i>
            <span>Messages</span>
        </a>
        <a href="wallet.html" class="bottom-nav-item">
            <i class="fas fa-wallet"></i>
            <span>Wallet</span>
        </a>
        <a href="profile.html" class="bottom-nav-item">
            <i class="fas fa-user"></i>
            <span>Profile</span>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <!-- Firebase Init -->
    <script src="../../assets/js/firebase-init.js"></script>

    <!-- Alerts -->
    <script src="../../assets/js/alerts.js"></script>

    <!-- Main Script -->
    <script>
        // Initialize alerts
        const alertSystem = new AlertSystem();

        // Helper functions
        function showError(message) {
            alertSystem.show('error', message);
        }

        function showSuccess(message) {
            alertSystem.show('success', message);
        }

        // Global variables
        let currentConversation = null;
        let messagesRef = null;
        let messagesQuery = null;
        let conversations = [];

        // Get user data
        function getUserData() {
            const carrierAuth = localStorage.getItem('carrierAuth');
            if (!carrierAuth) return null;
            return JSON.parse(carrierAuth);
        }

        // Format time
        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return 'Just now';
            if (minutes < 60) return `${minutes}m ago`;
            if (hours < 24) return `${hours}h ago`;
            if (days < 7) return `${days}d ago`;
            return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        }

        // Format message time
        function formatMessageTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        }

        // Load conversations
        async function loadConversations() {
            const user = getUserData();
            if (!user) {
                document.getElementById('conversationsSection').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-sign-in-alt"></i>
                        <h3>Please Sign In</h3>
                        <p>Sign in to view your messages</p>
                    </div>
                `;
                return;
            }

            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const carrierId = user.carrierId || user.email?.replace('@', '_').replace('.', '_');

                const queryRef = db.ref('messages').orderByChild('carrierId').equalTo(carrierId).limitToLast(500);
                const snapshot = await queryRef.once('value');
                const allMessages = snapshot.val() || {};

                // Group messages by supplier
                const conversationMap = {};
                Object.entries(allMessages).forEach(([msgId, msg]) => {
                    if (msg.carrierId === carrierId || msg.carrierEmail === user.email) {
                        const supplierId = msg.supplierId || 'support';
                        const supplierName = msg.supplierName || 'Support';

                        if (!conversationMap[supplierId]) {
                            conversationMap[supplierId] = {
                                supplierId: supplierId,
                                supplierName: supplierName,
                                lastMessage: '',
                                lastMessageTime: 0,
                                unreadCount: 0,
                                messages: []
                            };
                        }

                        conversationMap[supplierId].messages.push({
                            ...msg,
                            id: msgId
                        });

                        // Update last message
                        const msgTime = msg.timestamp || msg.createdAt || 0;
                        if (msgTime > conversationMap[supplierId].lastMessageTime) {
                            conversationMap[supplierId].lastMessage = msg.message || '';
                            conversationMap[supplierId].lastMessageTime = msgTime;
                        }

                        // Count unread
                        if ((msg.senderType === 'supplier' || msg.senderType === 'support') && !msg.read) {
                            conversationMap[supplierId].unreadCount++;
                        }
                    }
                });

                conversations = Object.values(conversationMap).sort((a, b) => 
                    b.lastMessageTime - a.lastMessageTime
                );

                renderConversations();

            } catch (error) {
                console.error('Error loading conversations:', error);
                showError('Failed to load conversations');
                document.getElementById('conversationsSection').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error Loading Messages</h3>
                        <p>Please try again later</p>
                    </div>
                `;
            }
        }

        // Render conversations
        function renderConversations() {
            const section = document.getElementById('conversationsSection');

            if (conversations.length === 0) {
                section.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>No Messages Yet</h3>
                        <p>Start a conversation with a supplier</p>
                    </div>
                `;
                return;
            }

            section.innerHTML = conversations.map((conv, index) => {
                const initials = conv.supplierName.substring(0, 2).toUpperCase();
                const unreadBadge = conv.unreadCount > 0 
                    ? `<span class="unread-badge">${conv.unreadCount}</span>` 
                    : '';

                return `
                    <div class="conversation-item" onclick="openConversation('${conv.supplierId}', '${conv.supplierName}')" style="animation-delay: ${index * 0.1}s">
                        <div class="conversation-avatar">${initials}</div>
                        <div class="conversation-content">
                            <div class="conversation-header">
                                <div class="conversation-name">${conv.supplierName}</div>
                                <div class="conversation-time">${formatTime(conv.lastMessageTime)}</div>
                            </div>
                            <div class="conversation-preview">${conv.lastMessage || 'No messages yet'}</div>
                        </div>
                        ${unreadBadge}
                    </div>
                `;
            }).join('');
        }

        // Open conversation
        function openConversation(supplierId, supplierName) {
            currentConversation = { supplierId, supplierName };
            document.getElementById('chatTitle').textContent = supplierName;
            document.getElementById('chatView').classList.add('active');
            loadMessages(supplierId);
        }

        // Close chat
        function closeChat() {
            document.getElementById('chatView').classList.remove('active');
            currentConversation = null;
            if (messagesRef && messagesQuery) {
                messagesQuery.off('value', messagesRef);
            }
            messagesRef = null;
            messagesQuery = null;
        }

        // Load messages
        function loadMessages(supplierId) {
            const user = getUserData();
            if (!user) return;

            const db = window.AlphaBrokrage.firebaseDb;
            const carrierId = user.carrierId || user.email?.replace('@', '_').replace('.', '_');

            if (messagesRef && messagesQuery) {
                messagesQuery.off('value', messagesRef);
            }

            messagesQuery = db.ref('messages').orderByChild('carrierId').equalTo(carrierId).limitToLast(500);
            messagesRef = (snapshot) => {
                const messages = [];
                snapshot.forEach((child) => {
                    const msg = child.val() || {};
                    if (msg.supplierId === supplierId) {
                        messages.push({ ...msg, id: child.key });
                    }
                });

                // Sort by timestamp
                messages.sort((a, b) => {
                    const timeA = a.timestamp || a.createdAt || 0;
                    const timeB = b.timestamp || b.createdAt || 0;
                    return timeA - timeB;
                });

                displayMessages(messages);
                markAsRead(supplierId);
            };
            messagesQuery.on('value', messagesRef);
        }

        // Display messages
        function displayMessages(messages) {
            const container = document.getElementById('chatMessages');
            const user = getUserData();
            const carrierId = user.carrierId || user.email?.replace('@', '_').replace('.', '_');

            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comment-dots"></i>
                        <h3>No messages yet</h3>
                        <p>Start the conversation!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = messages.map(msg => {
                const isSent = msg.senderType === 'carrier' && msg.senderId === carrierId;
                const time = formatMessageTime(msg.timestamp || msg.createdAt);
                const messageText = (msg.message || '').replace(/\n/g, '<br>');

                return `
                    <div class="message-bubble ${isSent ? 'message-sent' : 'message-received'}">
                        <div>${messageText}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
            }).join('');

            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        // Send message
        async function sendMessage() {
            if (!currentConversation) {
                showError('Please select a conversation');
                return;
            }

            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();

            if (!message) return;

            const user = getUserData();
            if (!user) {
                showError('Please sign in to send messages');
                return;
            }

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const carrierId = user.carrierId || user.email?.replace('@', '_').replace('.', '_');
                const carrierName = user.companyName || 
                    (user.firstName && user.lastName ? `${user.firstName} ${user.lastName}` : '') ||
                    user.name || user.email || 'Carrier';

                const messageData = {
                    supplierId: currentConversation.supplierId,
                    supplierName: currentConversation.supplierName,
                    carrierId: carrierId,
                    carrierEmail: user.email,
                    carrierName: carrierName,
                    message: message,
                    senderType: 'carrier',
                    senderId: carrierId,
                    carrierUid: (window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth && window.AlphaBrokrage.firebaseAuth.currentUser) ? window.AlphaBrokrage.firebaseAuth.currentUser.uid : '',
                    senderUid: (window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth && window.AlphaBrokrage.firebaseAuth.currentUser) ? window.AlphaBrokrage.firebaseAuth.currentUser.uid : '',
                    recipientType: currentConversation.supplierId === 'support' ? 'support' : 'supplier',
                    recipientId: currentConversation.supplierId,
                    read: false,
                    timestamp: Date.now(),
                    createdAt: new Date().toISOString()
                };

                await db.ref('messages').push(messageData);

                messageInput.value = '';
                messageInput.style.height = 'auto';

                // Reload conversations to update last message
                loadConversations();

            } catch (error) {
                console.error('Error sending message:', error);
                showError('Failed to send message. Please try again.');
            } finally {
                sendBtn.disabled = false;
            }
        }

        // Mark as read
        function markAsRead(supplierId) {
            const user = getUserData();
            if (!user) return;

            const db = window.AlphaBrokrage.firebaseDb;
            const carrierId = user.carrierId || user.email?.replace('@', '_').replace('.', '_');

            db.ref('messages')
                .orderByChild('carrierId')
                .equalTo(carrierId)
                .once('value', (snapshot) => {
                    const updates = {};
                    snapshot.forEach((child) => {
                        const msg = child.val();
                        if (msg.supplierId === supplierId && 
                            (msg.senderType === 'supplier' || msg.senderType === 'support') && 
                            !msg.read) {
                            updates[`messages/${child.key}/read`] = true;
                        }
                    });
                    if (Object.keys(updates).length > 0) {
                        db.ref().update(updates);
                    }
                });
        }

        // Handle key down
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Auto-resize textarea
        document.addEventListener('DOMContentLoaded', function() {
            const messageInput = document.getElementById('messageInput');
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });
        });

        // Open new message
        function openNewMessage() {
            openConversation('support', 'Alpha Freight Support');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            ensureAuthReady().then(loadConversations);
        });

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return;
            if (authSdk.currentUser) return;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => {
                    if (done) return;
                    done = true;
                    resolve();
                }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
        }
    </script>
