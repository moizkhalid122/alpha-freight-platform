<head>

    <link rel="apple-touch-icon" href="../../image-removebg-preview - 2026-03-04T141043.516.png">
    
    <!-- Fonts -->

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Theme: carrier-premium-theme.css */
        .header-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.125rem;
        }

        .back-btn:active {
            transform: scale(0.95);
        }

        .header-text {
            flex: 1;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .page-subtitle {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        /* Form Card */
        .form-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            margin: 0 1.25rem 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .section-divider {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-dark);
            margin: 1.5rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-divider:first-child {
            margin-top: 0;
        }

        .section-divider i {
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-label .required {
            color: var(--error);
            margin-left: 0.25rem;
        }

        .form-label .optional {
            color: var(--text-medium);
            font-weight: 400;
            font-size: 0.8125rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--text-dark);
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-light);
        }

        .form-input.error {
            border-color: var(--error);
        }

        .form-input:disabled {
            background: var(--bg-main);
            color: var(--text-medium);
            cursor: not-allowed;
        }

        .form-help {
            font-size: 0.8125rem;
            color: var(--text-medium);
            margin-top: 0.5rem;
        }

        .form-help i {
            color: var(--primary);
            margin-right: 0.25rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            margin: 0 1.25rem 1.5rem;
        }

        .submit-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Bottom nav: supplier-bottom-nav.css – same as dashboard */
        /* Responsive */
        @media (min-width: 768px) {
            body {
                max-width: 500px;
                margin: 0 auto;
                box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
            }
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="has-bottom-nav">
    <!-- Page Header -->
    <div class="page-header">
        <div class="header-content">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="header-text">
                <h1 class="page-title">Edit Profile</h1>
                <p class="page-subtitle">Update your personal and company information</p>
            </div>
        </div>
    </div>

    <!-- Profile Form -->
    <form id="profileForm" onsubmit="saveProfile(event)">
        <!-- Personal Information -->
        <div class="form-card">
            <div class="section-divider">
                <i class="fas fa-user"></i>
                Personal Information
            </div>

            <div class="form-group">
                <label class="form-label">
                    First Name
                    <span class="required">*</span>
                </label>
                <input type="text" class="form-input" id="firstName" placeholder="Enter first name" required>
            </div>

            <div class="form-group">
                <label class="form-label">
                    Last Name
                    <span class="required">*</span>
                </label>
                <input type="text" class="form-input" id="lastName" placeholder="Enter last name" required>
            </div>

            <div class="form-group">
                <label class="form-label">
                    Email
                    <span class="required">*</span>
                </label>
                <input type="email" class="form-input" id="email" placeholder="Enter email address" required disabled>
                <div class="form-help">
                    <i class="fas fa-info-circle"></i>
                    Email cannot be changed
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    Phone Number
                    <span class="required">*</span>
                </label>
                <input type="tel" class="form-input" id="phone" placeholder="+44 1234567890" required>
                <div class="form-help">
                    <i class="fas fa-info-circle"></i>
                    Include country code (e.g., +44 for UK)
                </div>
            </div>
        </div>

        <!-- Company Information -->
        <div class="form-card">
            <div class="section-divider">
                <i class="fas fa-building"></i>
                Company Information
            </div>

            <div class="form-group">
                <label class="form-label">
                    Company Name
                    <span class="required">*</span>
                </label>
                <input type="text" class="form-input" id="companyName" placeholder="Enter company name" required>
            </div>

            <div class="form-group">
                <label class="form-label">
                    Company Registration Number
                    <span class="required">*</span>
                </label>
                <input type="text" class="form-input" id="companyReg" placeholder="Enter registration number" required>
                <div class="form-help">
                    <i class="fas fa-info-circle"></i>
                    Your company's official registration number
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">
                        Fleet Size
                        <span class="required">*</span>
                    </label>
                    <input type="number" class="form-input" id="fleetSize" placeholder="0" min="1" required>
                    <div class="form-help">
                        <i class="fas fa-info-circle"></i>
                        Number of vehicles
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        Years in Operation
                        <span class="required">*</span>
                    </label>
                    <input type="number" class="form-input" id="yearsOperation" placeholder="0" min="0" required>
                    <div class="form-help">
                        <i class="fas fa-info-circle"></i>
                        Years active
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    VAT Number
                    <span class="optional">(Optional)</span>
                </label>
                <input type="text" class="form-input" id="vatNumber" placeholder="Enter VAT number">
            </div>

            <div class="form-group">
                <label class="form-label">
                    Operator License
                    <span class="optional">(Optional)</span>
                </label>
                <input type="text" class="form-input" id="operatorLicense" placeholder="Enter operator license number">
            </div>

            <div class="form-group">
                <label class="form-label">
                    Company Address
                    <span class="optional">(Optional)</span>
                </label>
                <input type="text" class="form-input" id="address" placeholder="Enter company address">
            </div>

            <div class="form-group">
                <label class="form-label">
                    Website
                    <span class="optional">(Optional)</span>
                </label>
                <input type="url" class="form-input" id="website" placeholder="https://www.example.com">
            </div>

            <div class="form-group">
                <label class="form-label">
                    Company Description
                    <span class="optional">(Optional)</span>
                </label>
                <textarea class="form-input" id="companyDescription" placeholder="Describe your company and services" rows="4" style="resize: vertical; min-height: 100px;"></textarea>
            </div>
        </div>
    </form>

    <!-- Submit Button -->
    <button class="submit-btn" id="submitBtn" onclick="saveProfile()">
        <i class="fas fa-save"></i>
        <span>Save Changes</span>
    </button>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" aria-label="Main navigation">
        <a href="dashboard.html" class="bottom-nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="loads.html" class="bottom-nav-item">
            <i class="fas fa-clipboard-list"></i>
            <span>Loads</span>
        </a>
        <a href="messages.html" class="bottom-nav-item">
            <i class="fas fa-comments"></i>
            <span>Messages</span>
        </a>
        <a href="wallet.html" class="bottom-nav-item">
            <i class="fas fa-wallet"></i>
            <span>Wallet</span>
        </a>
        <a href="profile.html" class="bottom-nav-item active">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <!-- Firebase Init -->
    <script src="../../assets/js/firebase-init.js"></script>

    <!-- Alerts -->
    <script src="../../assets/js/alerts.js"></script>

    <!-- Main Script -->
    <script>
        // Initialize alerts
        const alertSystem = new AlertSystem();

        // Helper functions
        function showError(message) {
            alertSystem.show('error', message);
        }

        function showSuccess(message) {
            alertSystem.show('success', message);
        }

        // Get user data
        function getUserData() {
            const carrierAuth = localStorage.getItem('carrierAuth');
            if (!carrierAuth) return null;
            return JSON.parse(carrierAuth);
        }

        // Go back
        function goBack() {
            window.history.back();
        }

        // Load existing profile data
        function loadProfileData() {
            const user = getUserData();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            // Load from localStorage
            document.getElementById('firstName').value = user.firstName || '';
            document.getElementById('lastName').value = user.lastName || '';
            document.getElementById('email').value = user.email || '';
            document.getElementById('phone').value = user.phone || '';
            document.getElementById('companyName').value = user.companyName || '';
            document.getElementById('companyReg').value = user.companyReg || '';
            document.getElementById('fleetSize').value = user.fleetSize || '';
            document.getElementById('yearsOperation').value = user.yearsOperation || '';
            document.getElementById('vatNumber').value = user.vatNumber || '';
            document.getElementById('operatorLicense').value = user.operatorLicense || '';
            document.getElementById('address').value = user.address || '';
            document.getElementById('website').value = user.website || '';
            document.getElementById('companyDescription').value = user.companyDescription || '';

            // Try to load from Firebase
            loadFromFirebase();
        }

        // Load from Firebase
        async function loadFromFirebase() {
            const user = getUserData();
            if (!user) return;

            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const carrierId = user.carrierId || user.email?.replace('@', '_').replace('.', '_');
                const profileRef = db.ref(`carriers/${carrierId}`);
                const snapshot = await profileRef.once('value');
                const profileData = snapshot.val();

                if (profileData) {
                    // Update form fields if Firebase has more complete data
                    if (profileData.firstName && !document.getElementById('firstName').value) {
                        document.getElementById('firstName').value = profileData.firstName || '';
                    }
                    if (profileData.lastName && !document.getElementById('lastName').value) {
                        document.getElementById('lastName').value = profileData.lastName || '';
                    }
                    if (profileData.phone && !document.getElementById('phone').value) {
                        document.getElementById('phone').value = profileData.phone || '';
                    }
                    if (profileData.companyName && !document.getElementById('companyName').value) {
                        document.getElementById('companyName').value = profileData.companyName || '';
                    }
                    if (profileData.companyReg && !document.getElementById('companyReg').value) {
                        document.getElementById('companyReg').value = profileData.companyReg || '';
                    }
                    if (profileData.fleetSize && !document.getElementById('fleetSize').value) {
                        document.getElementById('fleetSize').value = profileData.fleetSize || '';
                    }
                    if (profileData.yearsOperation && !document.getElementById('yearsOperation').value) {
                        document.getElementById('yearsOperation').value = profileData.yearsOperation || '';
                    }
                    if (profileData.vatNumber) {
                        document.getElementById('vatNumber').value = profileData.vatNumber || '';
                    }
                    if (profileData.operatorLicense) {
                        document.getElementById('operatorLicense').value = profileData.operatorLicense || '';
                    }
                    if (profileData.address) {
                        document.getElementById('address').value = profileData.address || '';
                    }
                    if (profileData.website) {
                        document.getElementById('website').value = profileData.website || '';
                    }
                    if (profileData.companyDescription) {
                        document.getElementById('companyDescription').value = profileData.companyDescription || '';
                    }
                }
            } catch (error) {
                console.error('Error loading from Firebase:', error);
            }
        }

        // Validate form
        function validateForm() {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const companyName = document.getElementById('companyName').value.trim();
            const companyReg = document.getElementById('companyReg').value.trim();
            const fleetSize = document.getElementById('fleetSize').value;
            const yearsOperation = document.getElementById('yearsOperation').value;

            // Reset errors
            document.querySelectorAll('.form-input').forEach(input => {
                input.classList.remove('error');
            });

            let isValid = true;

            if (!firstName) {
                document.getElementById('firstName').classList.add('error');
                isValid = false;
            }

            if (!lastName) {
                document.getElementById('lastName').classList.add('error');
                isValid = false;
            }

            if (!phone) {
                document.getElementById('phone').classList.add('error');
                isValid = false;
            }

            if (!companyName) {
                document.getElementById('companyName').classList.add('error');
                isValid = false;
            }

            if (!companyReg) {
                document.getElementById('companyReg').classList.add('error');
                isValid = false;
            }

            if (!fleetSize || parseInt(fleetSize) < 1) {
                document.getElementById('fleetSize').classList.add('error');
                isValid = false;
            }

            if (!yearsOperation || parseInt(yearsOperation) < 0) {
                document.getElementById('yearsOperation').classList.add('error');
                isValid = false;
            }

            return isValid;
        }

        // Save profile
        async function saveProfile(event) {
            if (event) {
                event.preventDefault();
            }

            const user = getUserData();
            if (!user) {
                showError('Please sign in');
                return;
            }

            // Validate form
            if (!validateForm()) {
                showError('Please fill all required fields correctly');
                return;
            }

            // Get form values
            const profileData = {
                firstName: document.getElementById('firstName').value.trim(),
                lastName: document.getElementById('lastName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                companyName: document.getElementById('companyName').value.trim(),
                companyReg: document.getElementById('companyReg').value.trim(),
                fleetSize: parseInt(document.getElementById('fleetSize').value) || 0,
                yearsOperation: parseInt(document.getElementById('yearsOperation').value) || 0,
                vatNumber: document.getElementById('vatNumber').value.trim() || null,
                operatorLicense: document.getElementById('operatorLicense').value.trim() || null,
                address: document.getElementById('address').value.trim() || null,
                website: document.getElementById('website').value.trim() || null,
                companyDescription: document.getElementById('companyDescription').value.trim() || null,
                profileComplete: true,
                updatedAt: new Date().toISOString()
            };

            // Disable button
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Saving...</span>';

            try {
                const carrierId = user.carrierId || user.email?.replace('@', '_').replace('.', '_');

                // Update localStorage
                const updatedUser = {
                    ...user,
                    ...profileData,
                    name: `${profileData.firstName} ${profileData.lastName}`.trim()
                };
                localStorage.setItem('carrierAuth', JSON.stringify(updatedUser));
                localStorage.setItem('lastCarrierProfile', JSON.stringify(updatedUser));

                // Save to Firebase
                const db = window.AlphaBrokrage.firebaseDb;
                await db.ref(`carriers/${carrierId}`).update(profileData);

                showSuccess('Profile updated successfully!');

                // Redirect after delay
                setTimeout(() => {
                    window.location.href = 'profile.html';
                }, 1500);

            } catch (error) {
                console.error('Error saving profile:', error);
                showError('Failed to save profile. Please try again.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i><span>Save Changes</span>';
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadProfileData();
        });
    </script>
</body>
</html>
