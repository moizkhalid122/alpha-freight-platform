    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="../../assets/js/firebase-init.js"></script>
    <script src="../../assets/js/alerts.js"></script>
    <script>
        const alertSystem = new AlertSystem();
        const params = new URLSearchParams(location.search);
        const loadId = params.get('id') || params.get('loadId') || '';

        let loadData = null;

        function getUser() {
            try {
                const raw = localStorage.getItem('carrierAuth');
                return raw ? JSON.parse(raw) : null;
            } catch { return null; }
        }

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return;
            if (authSdk.currentUser) return;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => {
                    if (done) return;
                    done = true;
                    resolve();
                }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
        }

        function formatCurrency(amt) {
            return '£' + parseFloat(amt || 0).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function getCarrierCommissionRate(originalAmount) {
            const amt = parseFloat(originalAmount) || 0;
            let commissionRate = 0.05;
            if (amt > 5000) {
                commissionRate = 0.03;
            } else if (amt > 1000) {
                commissionRate = 0.04;
            }
            return commissionRate;
        }

        function getNetCarrierAmount(load) {
            if (load && load.acceptedOffer && String(load.acceptedOffer.type || '').toLowerCase() === 'bid' && load.acceptedOffer.amount !== undefined && load.acceptedOffer.amount !== null && load.acceptedOffer.amount !== '') {
                const v = parseFloat(load.acceptedOffer.amount);
                if (!isNaN(v)) return Math.round(v * 100) / 100;
            }
            if (load && load.agreedPrice !== undefined && load.agreedPrice !== null && load.agreedPrice !== '') {
                const v = parseFloat(load.agreedPrice);
                if (!isNaN(v)) return Math.round(v * 100) / 100;
            }
            const originalBudget = load && (load.budget || (load.minBudget && load.maxBudget ? (parseFloat(load.minBudget) + parseFloat(load.maxBudget)) / 2 : load.maxBudget || load.minBudget || load.price || 0));
            const original = parseFloat(originalBudget) || 0;
            const commissionRate = getCarrierCommissionRate(original);
            const commission = original * commissionRate;
            return Math.round((original - commission) * 100) / 100;
        }
        function formatDate(str) {
            if (!str) return 'N/A';
            try { return new Date(str).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
            catch { return str; }
        }

        function formatDateTime(str) {
            if (!str) return '';
            try { return new Date(str).toLocaleString('en-GB'); } catch { return String(str); }
        }

        function normalizeStatus(s) {
            const t = String(s || '').toLowerCase().replace(/_/g, '-');
            if (t === 'complete') return 'completed';
            if (t === 'intransit') return 'in-transit';
            return t;
        }

        function getOrderRef(lid, load) {
            if (load && load.formattedOrderId) return String(load.formattedOrderId);
            if (load && load.orderRef) return String(load.orderRef);
            const id = String(lid || loadId || '');
            const shortId = id ? id.substring(0, 8).toUpperCase() : '--------';
            return 'ORD-' + shortId;
        }

        function getPaidAt(load) {
            const ps = load && load.paymentStatus;
            if (ps && typeof ps === 'object') return ps.paidAt || ps.upfrontPaidDate || '';
            return load && (load.paidAt || '');
        }

        function buildTimelineSteps(load) {
            const steps = [];
            steps.push({ label: 'Posted', at: load && (load.createdAt || load.postedAt || '') });
            steps.push({ label: 'Accepted', at: load && (load.acceptedAt || '') });
            steps.push({ label: 'Cancelled', at: load && (load.cancelledAt || load.canceledAt || '') });
            steps.push({ label: 'Picked Up', at: load && (load.pickedUpAt || '') });
            steps.push({ label: 'In Transit', at: load && (load.inTransitAt || '') });
            steps.push({ label: 'Delivered', at: load && (load.completedAt || load.deliveredAt || '') });
            steps.push({ label: 'POD Submitted', at: load && ((load.pod && load.pod.submittedAt) || load.podUploadedAt || '') });
            steps.push({ label: 'Paid', at: getPaidAt(load) });
            const trimmed = [];
            for (const s of steps) {
                if (!s.at && trimmed.length === 0) continue;
                trimmed.push(s);
            }
            return trimmed.length ? trimmed : steps.slice(0, 2);
        }

        function buildTimelineHtml(load) {
            const steps = buildTimelineSteps(load);
            const items = steps.map((s) => {
                const done = !!s.at;
                return `
                    <div class="timeline-item ${done ? 'done' : ''}">
                        <div class="timeline-dot"></div>
                        <div class="timeline-text">
                            <div class="timeline-label">${s.label}</div>
                            <div class="timeline-at">${s.at ? formatDateTime(s.at) : 'Pending'}</div>
                        </div>
                    </div>
                `;
            }).join('');
            return `
                <div class="timeline">
                    <div class="timeline-title">
                        <span>Status Timeline</span>
                        <span style="color:var(--text-medium);font-weight:800;font-size:0.85rem;">${getOrderRef(load && (load.loadId || load.id || loadId), load)}</span>
                    </div>
                    <div class="timeline-items">${items}</div>
                </div>
            `;
        }

        function calculateCancelFee(load) {
            const amt = parseFloat(load && (load.totalCost || load.totalAmount || load.price || load.budget || load.maxBudget || load.minBudget || 0)) || 0;
            return Math.round(Math.min(50, amt * 0.1) * 100) / 100;
        }

        async function createDbNotification(userId, userType, title, message, data) {
            try {
                if (!userId || !userType) return null;
                const type = (data && data.type) ? data.type : 'system';

                try {
                    if (typeof NotificationManager !== 'undefined' && NotificationManager.create) {
                        return await NotificationManager.create(type, title, message, data || {}, userId, userType);
                    }
                } catch (e) {}

                const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
                if (!db) return null;
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                const senderUid = (authSdk && authSdk.currentUser && authSdk.currentUser.uid) ? String(authSdk.currentUser.uid) : '';
                if (!senderUid) return null;
                const ref = db.ref('notificationQueue').push();
                await ref.set({
                    senderUid,
                    toUserId: userId,
                    toUserType: userType,
                    title,
                    message,
                    type,
                    data: data || {},
                    createdAt: new Date().toISOString()
                }).catch(() => {});
                return ref.key || null;
            } catch (e) {
                return null;
            }
        }

        function getSupplierIdFromLoad(load) {
            if (!load) return '';
            return load.supplierId || load.postedBy || (load.supplierEmail || '').replace(/@/g, '_').replace(/\./g, '_') || '';
        }

        async function approveCancellation() {
            if (!loadData) return;
            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                await ensureAuthReady();
                const authUid = (authSdk && authSdk.currentUser && authSdk.currentUser.uid) ? authSdk.currentUser.uid : '';
                if (!authUid) { window.location.href = 'login.html'; return; }
                const user = getUser() || {};
                const myCarrierId = user.carrierId || (user.email || '').replace(/@/g, '_').replace(/\./g, '_');
                const isMyCarrier = (loadData.carrierId && myCarrierId && loadData.carrierId === myCarrierId) || (loadData.carrierEmail && user.email && loadData.carrierEmail === user.email) || (!loadData.carrierId && myCarrierId);
                const req = loadData.cancellationRequest || {};
                const fee = (req && typeof req.proposedFee === 'number')
                    ? loadData.cancellationRequest.proposedFee
                    : calculateCancelFee(loadData);
                const feePaid = fee <= 0 || req.feePaid === true || !!req.feePaymentId || !!req.feePaymentIntentId;
                if (fee > 0 && !feePaid) {

        async function compressImageToJpeg(file, opts) {
            const maxSize = opts && opts.maxSize ? opts.maxSize : 1280;
            const quality = opts && opts.quality ? opts.quality : 0.75;
            const dataUrl = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(new Error('read_failed'));
                reader.readAsDataURL(file);
            });
            const img = await new Promise((resolve, reject) => {
                const i = new Image();
                i.onload = () => resolve(i);
                i.onerror = () => reject(new Error('invalid_image'));
                i.src = dataUrl;
            });
            const w = img.width || 1;
            const h = img.height || 1;
            const scale = Math.min(1, maxSize / Math.max(w, h));
            const outW = Math.max(1, Math.round(w * scale));
            const outH = Math.max(1, Math.round(h * scale));
            const canvas = document.createElement('canvas');
            canvas.width = outW;
            canvas.height = outH;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, outW, outH);
            ctx.drawImage(img, 0, 0, outW, outH);
            return canvas.toDataURL('image/jpeg', quality);
        }

                            </div>
                        </div>
                        <div class="route-row">
                            <div class="route-dot delivery"></div>
                            <div>
                                <div class="route-label">Delivery</div>
                                <div class="route-value">${delivery}</div>
                            </div>
                        </div>
                    </div>
                    <div class="details-grid">
                        <div class="detail-item">
                            <div class="detail-label">Pickup Date</div>
                            <div class="detail-value">${formatDate(pickupDate)}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Delivery Date</div>
                            <div class="detail-value">${formatDate(deliveryDate)}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Cargo Type</div>
                            <div class="detail-value">${cargo}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Weight</div>
                            <div class="detail-value">${weight}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Distance</div>
                            <div class="detail-value">${distance}</div>
                        </div>
                    </div>
                    <div class="price-row">
                        <span class="price-label">Payment (Net)</span>
                        <span class="price-value">${formatCurrency(price)}</span>
                    </div>
                </div>
                ${buildTimelineHtml(load)}
                ${accessNote || ''}
                ${reqHtml || ''}
                ${actionsHtml ? `<div class="actions-section"><div class="action-btns">${actionsHtml}</div></div>` : ''}
            `;
        }

        async function updateStatus(newStatus) {
            if (!loadData || !loadId) return;
            const user = getUser();
            if (!user) {
                alertSystem.show('error', 'Please sign in');
                return;
            }
            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                await ensureAuthReady();
                const authUid = (authSdk && authSdk.currentUser && authSdk.currentUser.uid) ? authSdk.currentUser.uid : '';
                if (!authUid) {
                    alertSystem.show('error', 'Session expired. Please login again.');
                    setTimeout(() => { window.location.href = 'login.html'; }, 800);
                    return;
                }
                const loadRef = db.ref('loads/' + loadId);
                const updates = { status: newStatus };
                if (newStatus === 'picked-up') updates.pickedUpAt = new Date().toISOString();
                else if (newStatus === 'in-transit') updates.inTransitAt = new Date().toISOString();
                else if (newStatus === 'completed') updates.completedAt = new Date().toISOString();
                const cid = user.carrierId || (user.email || '').replace(/@/g, '_').replace(/\./g, '_');
                if (!loadData.carrierId && cid) updates.carrierId = cid;
                if ((loadData.carrierEmail && loadData.carrierEmail === user.email) || (loadData.carrierId && cid && loadData.carrierId === cid) || (!loadData.carrierId && cid)) {
                    if (loadData.carrierFirebaseUid !== authUid) updates.carrierFirebaseUid = authUid;
                }

                await loadRef.update(updates);

                const supplierId = loadData.supplierId || loadData.postedBy || (loadData.supplierEmail || '').replace(/@/g, '_').replace(/\./g, '_');
                if (supplierId) {
                    const route = (loadData.pickupLocation || '') + ' → ' + (loadData.deliveryLocation || '');
                    let title = 'Load Status Update';
                    let message = 'Your load has been updated: ' + route;
                    if (newStatus === 'picked-up') { title = 'Load Picked Up'; message = 'Your load has been picked up: ' + route; }
                    else if (newStatus === 'in-transit') { title = 'Load In Transit'; message = 'Your load is now in transit: ' + route; }
                    else if (newStatus === 'completed') { title = 'Load Delivered!'; message = 'Your load has been delivered: ' + route; }
                    const type = newStatus === 'completed' ? 'load_completed' : 'load_status_update';
                    await createDbNotification(
                        supplierId,
                        'supplier',
                        title,
                        message,
                        { type, loadId, url: '/mobile-app/supplier/load-details.html?id=' + encodeURIComponent(loadId) }
                    );
                }

                alertSystem.show('success', 'Status updated to ' + newStatus.replace('-', ' '));
                loadData = { ...loadData, ...updates };
                renderContent(loadData);
            } catch (e) {
                console.error(e);
                alertSystem.show('error', 'Failed to update status. Please try again.');
            }
        }

        async function loadDetails() {
            if (!loadId) {
                document.getElementById('loadIdDisplay').textContent = 'No load selected';
                renderContent(null);
                return;
            }
            try {
                const db = window.AlphaBrokrage.firebaseDb;
                let load = null;
                try {
                    const snap = await db.ref('loads/' + loadId).once('value');
                    load = snap.val() || null;
                } catch (e) {
                    load = null;
                }
                if (!load) {
                    try {
                        const ms = await db.ref('marketLoads/' + loadId).once('value');
                        load = ms.val() || null;
                    } catch (e) {
                        load = null;
                    }
                }
                if (load) {
                    load.loadId = loadId;
                    load.id = loadId;
                    renderContent(load);
                    return;
                }
                renderContent(null);
            } catch (e) {
                console.error(e);
                try {
                    const db = window.AlphaBrokrage.firebaseDb;
                    const ms = await db.ref('marketLoads/' + loadId).once('value');
                    const load = ms.val() || null;
                    if (load) {
                        load.loadId = loadId;
                        load.id = loadId;
                        renderContent(load);
                        return;
                    }
                } catch (e2) {}
                document.getElementById('contentArea').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error</h3>
                        <p>Failed to load details. Please try again.</p>
                        <a href="loads.html" class="btn-action secondary" style="margin-top:1rem;display:inline-flex;">Back to Loads</a>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadDetails();
            const overlay = document.getElementById('disputeModal');
            const closeBtn = document.getElementById('disputeModalClose');
            const cancelBtn = document.getElementById('dpCancel');
            const submitBtn = document.getElementById('dpSubmit');
            const input = document.getElementById('dpFile');
            const meta = document.getElementById('dpFileMeta');
            const prev = document.getElementById('dpPreviewWrap');
            if (closeBtn) closeBtn.addEventListener('click', closeDisputeModal);
            if (cancelBtn) cancelBtn.addEventListener('click', closeDisputeModal);
            if (overlay) overlay.addEventListener('click', (e) => { if (e.target === overlay) closeDisputeModal(); });
            if (submitBtn) submitBtn.addEventListener('click', submitDispute);
            if (input && meta) {
                input.addEventListener('change', async () => {
                    const f = input.files && input.files[0];
                    if (!f) { meta.textContent = ''; if (prev) { prev.style.display='none'; prev.innerHTML=''; } return; }
                    meta.textContent = `${f.name} • ${Math.round((f.size || 0) / 1024)} KB`;
                    if (prev) {
                        try {
                            const dataUrl = await compressImageToJpeg(f, { maxSize: 920, quality: 0.7 });
                            prev.style.display = '';
                            prev.innerHTML = `<img class="thumb" src="${String(dataUrl).replace(/\"/g,'&quot;')}" alt="Evidence">`;
                        } catch (e) {}
                    }
                });
            }
        });
    </script>
</body>
</html>
