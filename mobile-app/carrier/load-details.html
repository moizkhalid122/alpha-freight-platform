    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

    <script src="../../assets/js/alerts.js"></script>
    <script>
        const alertSystem = new AlertSystem();
        const params = new URLSearchParams(location.search);
        const loadId = params.get('id') || params.get('loadId') || '';

        let loadData = null;

        function getUser() {
            try {
                const raw = localStorage.getItem('carrierAuth');
                return raw ? JSON.parse(raw) : null;
            } catch { return null; }
        }

        async function ensureAuthReady() {
            const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
            if (!authSdk || typeof authSdk.onAuthStateChanged !== 'function') return;
            if (authSdk.currentUser) return;
            await new Promise((resolve) => {
                let done = false;
                const timer = setTimeout(() => {
                    if (done) return;
                    done = true;
                    resolve();
                }, 3500);
                const unsub = authSdk.onAuthStateChanged(() => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    try { unsub(); } catch (e) {}
                    resolve();
                });
            });
        }

        function formatCurrency(amt) {
            return '£' + parseFloat(amt || 0).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function getCarrierCommissionRate(originalAmount) {
            const amt = parseFloat(originalAmount) || 0;
            let commissionRate = 0.05;
            if (amt > 5000) {
                commissionRate = 0.03;
            } else if (amt > 1000) {
                commissionRate = 0.04;
            }
            return commissionRate;
        }

        function getNetCarrierAmount(load) {
            const originalBudget = load && (load.budget || (load.minBudget && load.maxBudget ? (parseFloat(load.minBudget) + parseFloat(load.maxBudget)) / 2 : load.maxBudget || load.minBudget || load.price || 0));
            const original = parseFloat(originalBudget) || 0;
            const commissionRate = getCarrierCommissionRate(original);
            const commission = original * commissionRate;
            return Math.round((original - commission) * 100) / 100;
        }
        function formatDate(str) {
            if (!str) return 'N/A';
            try { return new Date(str).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
            catch { return str; }
        }

        function formatDateTime(str) {
            if (!str) return '';
            try { return new Date(str).toLocaleString('en-GB'); } catch { return String(str); }
        }

        function normalizeStatus(s) {
            const t = String(s || '').toLowerCase().replace(/_/g, '-');
            if (t === 'complete') return 'completed';
            if (t === 'intransit') return 'in-transit';
            return t;
        }

        function getOrderRef(lid, load) {
            if (load && load.formattedOrderId) return String(load.formattedOrderId);
            if (load && load.orderRef) return String(load.orderRef);
            const id = String(lid || loadId || '');
            const shortId = id ? id.substring(0, 8).toUpperCase() : '--------';
            return 'ORD-' + shortId;
        }

        function getPaidAt(load) {
            const ps = load && load.paymentStatus;
            if (ps && typeof ps === 'object') return ps.paidAt || ps.upfrontPaidDate || '';
            return load && (load.paidAt || '');
        }

        function buildTimelineSteps(load) {
            const steps = [];
            steps.push({ label: 'Posted', at: load && (load.createdAt || load.postedAt || '') });
            steps.push({ label: 'Accepted', at: load && (load.acceptedAt || '') });
            steps.push({ label: 'Cancelled', at: load && (load.cancelledAt || load.canceledAt || '') });
            steps.push({ label: 'Picked Up', at: load && (load.pickedUpAt || '') });
            steps.push({ label: 'In Transit', at: load && (load.inTransitAt || '') });
            steps.push({ label: 'Delivered', at: load && (load.completedAt || load.deliveredAt || '') });
            steps.push({ label: 'POD Submitted', at: load && ((load.pod && load.pod.submittedAt) || load.podUploadedAt || '') });
            steps.push({ label: 'Paid', at: getPaidAt(load) });
            const trimmed = [];
            for (const s of steps) {
                if (!s.at && trimmed.length === 0) continue;
                trimmed.push(s);
            }
            return trimmed.length ? trimmed : steps.slice(0, 2);
        }

        function buildTimelineHtml(load) {
            const steps = buildTimelineSteps(load);
            const items = steps.map((s) => {
                const done = !!s.at;
                return `
                    <div class="timeline-item ${done ? 'done' : ''}">
                        <div class="timeline-dot"></div>
                        <div class="timeline-text">
                            <div class="timeline-label">${s.label}</div>
                            <div class="timeline-at">${s.at ? formatDateTime(s.at) : 'Pending'}</div>
                        </div>
                    </div>
                `;
            }).join('');
            return `
                <div class="timeline">
                    <div class="timeline-title">
                        <span>Status Timeline</span>
                        <span style="color:var(--text-medium);font-weight:800;font-size:0.85rem;">${getOrderRef(load && (load.loadId || load.id || loadId), load)}</span>
                    </div>
                    <div class="timeline-items">${items}</div>
                </div>
            `;
        }

        function calculateCancelFee(load) {
            const amt = parseFloat(load && (load.totalCost || load.totalAmount || load.price || load.budget || load.maxBudget || load.minBudget || 0)) || 0;
            return Math.round(Math.min(50, amt * 0.1) * 100) / 100;
        }

        async function createDbNotification(userId, userType, title, message, data) {
            try {
                const db = window.AlphaBrokrage && window.AlphaBrokrage.firebaseDb;
                if (!db || !userId || !userType) return null;
                const payload = {
                    user_id: userId,
                    user_type: userType,
                    type: (data && data.type) ? data.type : 'system',
                    title: title,
                    message: message,
                    data: data || {},
                    read: false,
                    created_at: new Date().toISOString()
                };
                const ref = db.ref('notifications').push();
                await ref.set(payload).catch(() => {});
                try {
                    if (userType === 'supplier') {
                        await db.ref(`notifications/suppliers/${userId}`).push({ title, message, type: payload.type, data: payload.data, read: false, createdAt: new Date().toISOString() }).catch(() => {});
                    } else if (userType === 'carrier') {
                        await db.ref(`notifications/carriers/${userId}`).push({ title, message, type: payload.type, data: payload.data, read: false, createdAt: new Date().toISOString() }).catch(() => {});
                    }
                } catch (e) {}
                return ref.key || null;
            } catch (e) {
                return null;
            }
        }

        function getSupplierIdFromLoad(load) {
            if (!load) return '';
            return load.supplierId || load.postedBy || (load.supplierEmail || '').replace(/@/g, '_').replace(/\./g, '_') || '';
        }

        async function approveCancellation() {
            if (!loadData) return;
            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                await ensureAuthReady();
                const authUid = (authSdk && authSdk.currentUser && authSdk.currentUser.uid) ? authSdk.currentUser.uid : '';
                if (!authUid) { window.location.href = 'login.html'; return; }
                const req = loadData.cancellationRequest || {};
                const fee = (req && typeof req.proposedFee === 'number')
                    ? loadData.cancellationRequest.proposedFee
                    : calculateCancelFee(loadData);
                const feePaid = fee <= 0 || req.feePaid === true || !!req.feePaymentId || !!req.feePaymentIntentId;
                if (fee > 0 && !feePaid) {
                    alertSystem.show('error', 'Cancellation fee is not paid yet.');
                    return;
                }
                await db.ref('loads/' + loadId).update({
                    status: 'cancelled',
                    cancelledAt: new Date().toISOString(),
                    cancelledByRole: 'supplier',
                    cancelledBy: 'supplier',
                    cancelledReason: (req && req.reason) ? req.reason : '',
                    cancellationFee: fee,
                    cancellationPolicyVersion: 1,
                    cancellationStatus: 'approved',
                    cancellationRequest: {
                        ...(loadData.cancellationRequest || {}),
                        status: 'approved',
                        approvedAt: new Date().toISOString(),
                        approvedByRole: 'carrier'
                    }
                });
                try {
                    const supplierId = getSupplierIdFromLoad(loadData);
                    if (supplierId) {
                        await createDbNotification(
                            supplierId,
                            'supplier',
                            'Cancellation Approved',
                            'Carrier approved your cancellation. Your order is now cancelled.',
                            { type: 'cancel_approved', loadId: loadId, url: '/mobile-app/supplier/load-details.html?id=' + encodeURIComponent(loadId) }
                        );
                    }
                } catch (e) {}
                alertSystem.show('success', 'Cancellation approved');
                await loadDetails();
            } catch (e) {
                console.error(e);
                alertSystem.show('error', 'Failed to approve cancellation');
            }
        }

        async function rejectCancellation() {
            if (!loadData) return;
            const reason = prompt('Reason for rejecting cancellation?') || '';
            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                await ensureAuthReady();
                const authUid = (authSdk && authSdk.currentUser && authSdk.currentUser.uid) ? authSdk.currentUser.uid : '';
                if (!authUid) { window.location.href = 'login.html'; return; }
                const req = loadData.cancellationRequest || {};
                const fee = (req && typeof req.proposedFee === 'number') ? req.proposedFee : calculateCancelFee(loadData);
                const feePaid = fee <= 0 || req.feePaid === true || !!req.feePaymentId || !!req.feePaymentIntentId;
                const refundDueAt = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString();
                await db.ref('loads/' + loadId).update({
                    cancellationStatus: 'rejected',
                    cancellationRequest: {
                        ...(loadData.cancellationRequest || {}),
                        status: 'rejected',
                        rejectedAt: new Date().toISOString(),
                        rejectedByRole: 'carrier',
                        rejectionReason: String(reason || '')
                    },
                    cancellationRefund: feePaid ? {
                        status: 'pending',
                        amount: fee,
                        dueAt: refundDueAt,
                        createdAt: new Date().toISOString()
                    } : null
                });
                try {
                    const supplierId = getSupplierIdFromLoad(loadData);
                    if (supplierId) {
                        const msg = feePaid
                            ? 'Carrier rejected your cancellation. You must complete the order. Refund will be processed within 7 days.'
                            : 'Carrier rejected your cancellation. You must complete the order.';
                        await createDbNotification(
                            supplierId,
                            'supplier',
                            'Cancellation Rejected',
                            msg,
                            { type: 'cancel_rejected', loadId: loadId, url: '/mobile-app/supplier/load-details.html?id=' + encodeURIComponent(loadId) }
                        );
                    }
                } catch (e) {}
                alertSystem.show('success', 'Cancellation rejected');
                await loadDetails();
            } catch (e) {
                console.error(e);
                alertSystem.show('error', 'Failed to reject cancellation');
            }
        }

        async function approveReschedule() {
            if (!loadData) return;
            const req = loadData.rescheduleRequest || {};
            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                await ensureAuthReady();
                const authUid = (authSdk && authSdk.currentUser && authSdk.currentUser.uid) ? authSdk.currentUser.uid : '';
                if (!authUid) { window.location.href = 'login.html'; return; }
                const loadRef = db.ref('loads/' + loadId);
                const updates = {
                    rescheduleRequest: { ...req, status: 'approved', approvedAt: new Date().toISOString(), approvedByRole: 'carrier' },
                    rescheduleStatus: 'approved'
                };
                if (req.newPickupDate) updates.pickupDate = req.newPickupDate;
                if (req.newDeliveryDate) updates.deliveryDate = req.newDeliveryDate;
                await loadRef.update(updates);
                const historyRef = loadRef.child('rescheduleHistory').push();
                await historyRef.set({
                    requestedByRole: req.requestedByRole || 'supplier',
                    approvedByRole: 'carrier',
                    requestedAt: req.requestedAt || new Date().toISOString(),
                    approvedAt: new Date().toISOString(),
                    newPickupDate: req.newPickupDate || '',
                    newDeliveryDate: req.newDeliveryDate || '',
                    message: req.message || ''
                });
                alertSystem.show('success', 'Reschedule approved');
                await loadDetails();
            } catch (e) {
                console.error(e);
                alertSystem.show('error', 'Failed to approve reschedule');
            }
        }

        async function rejectReschedule() {
            if (!loadData) return;
            const reason = prompt('Reason for rejecting reschedule?') || '';
            const req = loadData.rescheduleRequest || {};
            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                await ensureAuthReady();
                const authUid = (authSdk && authSdk.currentUser && authSdk.currentUser.uid) ? authSdk.currentUser.uid : '';
                if (!authUid) { window.location.href = 'login.html'; return; }
                await db.ref('loads/' + loadId).update({
                    rescheduleRequest: { ...req, status: 'rejected', rejectedAt: new Date().toISOString(), rejectedByRole: 'carrier', rejectionReason: String(reason || '') },
                    rescheduleStatus: 'rejected'
                });
                alertSystem.show('success', 'Reschedule rejected');
                await loadDetails();
            } catch (e) {
                console.error(e);
                alertSystem.show('error', 'Failed to reject reschedule');
            }
        }

        function getStatusClass(s) {
            const t = (s || '').toLowerCase();
            if (['accepted', 'active'].includes(t)) return 'accepted';
            if (t === 'picked-up' || t === 'picked_up') return 'picked-up';
            if (t.includes('transit')) return 'in-transit';
            if (['completed', 'delivered'].includes(t)) return 'completed';
            if (['cancelled', 'canceled'].includes(t)) return 'cancelled';
            return 'accepted';
        }
        function getStatusLabel(s) {
            const t = (s || '').toLowerCase();
            if (['accepted', 'active'].includes(t)) return 'Accepted';
            if (t === 'picked-up' || t === 'picked_up') return 'Picked Up';
            if (t.includes('transit')) return 'In Transit';
            if (['completed', 'delivered'].includes(t)) return 'Completed';
            if (['cancelled', 'canceled'].includes(t)) return 'Cancelled';
            return (s || '').charAt(0).toUpperCase() + (s || '').slice(1).replace('-', ' ');
        }

        function isMyLoad(load) {
            const user = getUser();
            if (!user) return false;
            const cid = user.carrierId || (user.email || '').replace(/@/g, '_').replace(/\./g, '_');
            return (load.carrierId === cid || load.assignedCarrier === cid || load.carrierEmail === user.email);
        }

        function buildActionsHtml(load) {
            const status = (load.status || '').toLowerCase();
            const lid = load.loadId || load.id || loadId;
            const hasPOD = !!(load && (load.hasPOD || load.podUrl || (load.pod && (load.pod.photoDataUrl || load.pod.signatureDataUrl))));
            if (status === 'accepted' || status === 'active') {
                return `
                    <button type="button" class="btn-action success" onclick="updateStatus('picked-up')">
                        <i class="fas fa-box"></i> Mark Picked Up
                    </button>
                `;
            }
            if (status === 'picked-up' || status === 'picked_up') {
                return `
                    <button type="button" class="btn-action success" onclick="updateStatus('in-transit')">
                        <i class="fas fa-truck"></i> Start Transit
                    </button>
                `;
            }
            if (status.includes('transit')) {
                return `
                    <a href="pod.html?id=${encodeURIComponent(loadId)}&mode=complete" class="btn-action success">
                        <i class="fas fa-clipboard-check"></i> Deliver & POD
                    </a>
                `;
            }
            if (status === 'completed' || status === 'delivered') {
                return `
                    ${hasPOD ? `
                    <a href="pod.html?id=${encodeURIComponent(loadId)}&mode=view" class="btn-action secondary">
                        <i class="fas fa-file-signature"></i> View POD
                    </a>
                    ` : `
                    <a href="pod.html?id=${encodeURIComponent(loadId)}" class="btn-action success">
                        <i class="fas fa-file-signature"></i> Submit POD
                    </a>
                    `}
                    <a href="receipt.html?id=${lid}&mode=payout" class="btn-action secondary">
                        <i class="fas fa-file-invoice-dollar"></i> Payout
                    </a>
                `;
            }
            return '';
        }

        function buildRequestsHtml(load) {
            const status = normalizeStatus(load && load.status);
            const cancelReq = load && load.cancellationRequest;
            const rsReq = load && load.rescheduleRequest;
            const dispute = load && load.dispute;
            let html = '';

            if (cancelReq && cancelReq.requestedByRole === 'supplier' && status !== 'cancelled' && status !== 'completed' && status !== 'delivered') {
                const rawStatus = String(cancelReq.status || '').toLowerCase();
                const fee = typeof cancelReq.proposedFee === 'number' ? cancelReq.proposedFee : calculateCancelFee(load);
                const feePaid = fee <= 0 || cancelReq.feePaid === true || !!cancelReq.feePaymentId || !!cancelReq.feePaymentIntentId;
                const effective = rawStatus === 'pending' ? (feePaid ? 'pending_approval' : 'fee_pending') : rawStatus;

                if (effective === 'fee_pending') {
                    html += `
                        <div class="req-card">
                            <div class="req-title">
                                <span>Cancellation Request</span>
                                <span class="pill warn"><i class="fas fa-hourglass-half"></i> Fee Pending</span>
                            </div>
                            <div class="req-sub">Reason: ${String(cancelReq.reason || '').replace(/</g, '&lt;')}</div>
                            <div class="req-sub" style="margin-top:0.35rem;">Fee required: £${fee.toFixed(2)}</div>
                            <div class="req-sub" style="margin-top:0.35rem;">Waiting for supplier to pay the fee.</div>
                        </div>
                    `;
                } else if (effective === 'pending_approval') {
                    html += `
                        <div class="req-card">
                            <div class="req-title">
                                <span>Cancellation Request</span>
                                <span class="pill danger"><i class="fas fa-ban"></i> Pending</span>
                            </div>
                            <div class="req-sub">Reason: ${String(cancelReq.reason || '').replace(/</g, '&lt;')}</div>
                            <div class="req-sub" style="margin-top:0.35rem;">Fee paid: £${fee.toFixed(2)}</div>
                            <div class="req-actions">
                                <button type="button" class="btn-action success" onclick="approveCancellation()"><i class="fas fa-check"></i> Approve</button>
                                <button type="button" class="btn-action danger" onclick="rejectCancellation()"><i class="fas fa-times"></i> Reject</button>
                            </div>
                        </div>
                    `;
                }
            }

            if (rsReq && rsReq.status === 'pending' && rsReq.requestedByRole === 'supplier' && status !== 'cancelled' && status !== 'completed' && status !== 'delivered') {
                html += `
                    <div class="req-card">
                        <div class="req-title">
                            <span>Reschedule Request</span>
                            <span class="pill warn"><i class="fas fa-calendar"></i> Pending</span>
                        </div>
                        <div class="req-sub">New pickup: ${rsReq.newPickupDate ? formatDate(rsReq.newPickupDate) : '—'} • New delivery: ${rsReq.newDeliveryDate ? formatDate(rsReq.newDeliveryDate) : '—'}</div>
                        ${rsReq.message ? `<div class="req-sub" style="margin-top:0.35rem;">Message: ${String(rsReq.message).replace(/</g, '&lt;')}</div>` : ''}
                        <div class="req-actions">
                            <button type="button" class="btn-action success" onclick="approveReschedule()"><i class="fas fa-check"></i> Approve</button>
                            <button type="button" class="btn-action danger" onclick="rejectReschedule()"><i class="fas fa-times"></i> Reject</button>
                        </div>
                    </div>
                `;
            }

            if (dispute && dispute.status === 'open') {
                const evidence = dispute.evidenceDataUrl ? `<a class="btn-action secondary" href="${String(dispute.evidenceDataUrl).replace(/\"/g, '&quot;')}" target="_blank" rel="noopener">View Evidence</a>` : '';
                html += `
                    <div class="req-card">
                        <div class="req-title">
                            <span>Dispute Open</span>
                            <span class="pill danger"><i class="fas fa-flag"></i> Open</span>
                        </div>
                        <div class="req-sub">Type: ${String(dispute.type || 'other').replace(/</g, '&lt;')}</div>
                        <div class="req-sub" style="margin-top:0.35rem;">${String(dispute.message || '').replace(/</g, '&lt;')}</div>
                        ${evidence ? `<div class="req-actions">${evidence}</div>` : ''}
                    </div>
                `;
            }

            return html;
        }

        function renderContent(load) {
            const content = document.getElementById('contentArea');
            if (!load || !isMyLoad(load)) {
                content.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Load Not Found</h3>
                        <p>This load may not be assigned to you or the link is invalid.</p>
                        <a href="my-loads.html" class="btn-action secondary" style="margin-top:1rem;display:inline-flex;">Back to My Loads</a>
                    </div>
                `;
                return;
            }

            loadData = load;
            const lid = load.loadId || load.id || loadId;
            document.getElementById('loadIdDisplay').textContent = 'Load #' + (lid + '').substring(0, 8);

            const statusClass = getStatusClass(load.status);
            const statusLabel = getStatusLabel(load.status);
            const pickup = load.pickupLocation || load.from || 'N/A';
            const delivery = load.deliveryLocation || load.to || 'N/A';
            const cargo = load.cargoType || load.cargo || 'General';
            const price = getNetCarrierAmount(load);
            const pickupDate = load.pickupDate || load.pickup_date;
            const deliveryDate = load.deliveryDate || load.delivery_date;
            const weight = load.cargoWeight ? load.cargoWeight + ' tonnes' : 'N/A';
            const distance = load.distance ? load.distance + ' miles' : 'N/A';

            const actionsHtml = buildActionsHtml(load);
            const reqHtml = buildRequestsHtml(load);

            content.innerHTML = `
                <div class="details-card">
                    <div class="details-header">
                        <div>
                            <div class="load-id">Load #${(lid + '').substring(0, 8)}</div>
                            <div class="id-sub">${getOrderRef(lid, load)}</div>
                        </div>
                        <span class="status-badge ${statusClass}">${statusLabel}</span>
                    </div>
                    <div class="route-section">
                        <div class="route-row">
                            <div class="route-dot pickup"></div>
                            <div>
                                <div class="route-label">Pickup</div>
                                <div class="route-value">${pickup}</div>
                            </div>
                        </div>
                        <div class="route-row">
                            <div class="route-dot delivery"></div>
                            <div>
                                <div class="route-label">Delivery</div>
                                <div class="route-value">${delivery}</div>
                            </div>
                        </div>
                    </div>
                    <div class="details-grid">
                        <div class="detail-item">
                            <div class="detail-label">Pickup Date</div>
                            <div class="detail-value">${formatDate(pickupDate)}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Delivery Date</div>
                            <div class="detail-value">${formatDate(deliveryDate)}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Cargo Type</div>
                            <div class="detail-value">${cargo}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Weight</div>
                            <div class="detail-value">${weight}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Distance</div>
                            <div class="detail-value">${distance}</div>
                        </div>
                    </div>
                    <div class="price-row">
                        <span class="price-label">Payment (Net)</span>
                        <span class="price-value">${formatCurrency(price)}</span>
                    </div>
                </div>
                ${buildTimelineHtml(load)}
                ${reqHtml || ''}
                ${actionsHtml ? `<div class="actions-section"><div class="action-btns">${actionsHtml}</div></div>` : ''}
            `;
        }

        async function updateStatus(newStatus) {
            if (!loadData || !loadId) return;
            const user = getUser();
            if (!user) {
                alertSystem.show('error', 'Please sign in');
                return;
            }
            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const authSdk = window.AlphaBrokrage && window.AlphaBrokrage.firebaseAuth;
                await ensureAuthReady();
                const authUid = (authSdk && authSdk.currentUser && authSdk.currentUser.uid) ? authSdk.currentUser.uid : '';
                if (!authUid) {
                    alertSystem.show('error', 'Session expired. Please login again.');
                    setTimeout(() => { window.location.href = 'login.html'; }, 800);
                    return;
                }
                const loadRef = db.ref('loads/' + loadId);
                const updates = { status: newStatus };
                if (newStatus === 'picked-up') updates.pickedUpAt = new Date().toISOString();
                else if (newStatus === 'in-transit') updates.inTransitAt = new Date().toISOString();
                else if (newStatus === 'completed') updates.completedAt = new Date().toISOString();
                const cid = user.carrierId || (user.email || '').replace(/@/g, '_').replace(/\./g, '_');
                if (!loadData.carrierId && cid) updates.carrierId = cid;
                if ((loadData.carrierEmail && loadData.carrierEmail === user.email) || (loadData.carrierId && cid && loadData.carrierId === cid) || (!loadData.carrierId && cid)) {
                    if (loadData.carrierFirebaseUid !== authUid) updates.carrierFirebaseUid = authUid;
                }

                await loadRef.update(updates);

                const supplierId = loadData.supplierId || loadData.postedBy || (loadData.supplierEmail || '').replace(/@/g, '_').replace(/\./g, '_');
                if (supplierId) {
                    const route = (loadData.pickupLocation || '') + ' → ' + (loadData.deliveryLocation || '');
                    let title = 'Load Status Update';
                    let message = 'Your load has been updated: ' + route;
                    if (newStatus === 'picked-up') { title = 'Load Picked Up'; message = 'Your load has been picked up: ' + route; }
                    else if (newStatus === 'in-transit') { title = 'Load In Transit'; message = 'Your load is now in transit: ' + route; }
                    else if (newStatus === 'completed') { title = 'Load Delivered!'; message = 'Your load has been delivered: ' + route; }
                    await db.ref('notifications/suppliers/' + supplierId).push({
                        title, message,
                        type: newStatus === 'completed' ? 'load_completed' : 'load_status_update',
                        loadId, read: false, createdAt: new Date().toISOString()
                    });
                }

                alertSystem.show('success', 'Status updated to ' + newStatus.replace('-', ' '));
                loadData = { ...loadData, ...updates };
                renderContent(loadData);
            } catch (e) {
                console.error(e);
                alertSystem.show('error', 'Failed to update status. Please try again.');
            }
        }

        async function loadDetails() {
            if (!loadId) {
                document.getElementById('loadIdDisplay').textContent = 'No load selected';
                renderContent(null);
                return;
            }
            try {
                const db = window.AlphaBrokrage.firebaseDb;
                const snap = await db.ref('loads/' + loadId).once('value');
                const load = snap.val();
                if (load) {
                    load.loadId = loadId;
                    load.id = loadId;
                    renderContent(load);
                } else {
                    renderContent(null);
                }
            } catch (e) {
                console.error(e);
                document.getElementById('contentArea').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error</h3>
                        <p>Failed to load details. Please try again.</p>
                        <a href="my-loads.html" class="btn-action secondary" style="margin-top:1rem;display:inline-flex;">Back to My Loads</a>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', loadDetails);
    </script>
</body>
</html>
